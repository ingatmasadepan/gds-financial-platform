const MON_YEARS  = ['2026','2025','2024']; // years with monthly TB data
function getKeys(yr,period='full'){
  if(!MON_YEARS.includes(yr)) return null; // annual only → use annPnl
  const base = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
  const avail = base.filter(k=>TB[k]);
  if(period==='full'||period==='ytd') return avail;
  if(period.startsWith('q')){
    const qi={'q1':[0,1,2],'q2':[3,4,5],'q3':[6,7,8],'q4':[9,10,11]}[period]||[];
    return qi.map(i=>base[i]).filter(k=>k&&TB[k]);
  }
  if(period.startsWith('m')){const i=parseInt(period.slice(1))-1;return [base[i]].filter(k=>k&&TB[k]);}
  return avail;
}
function getCur(yr,period='full'){
  if(!MON_YEARS.includes(yr)) return annPnl(parseInt(yr));
  const ks=getKeys(yr,period);
  return ks&&ks.length?aggKeys(ks):annPnl(parseInt(yr));
}
function getPeriodOpts(yr){
  if(!MON_YEARS.includes(yr)) return [{v:'full',l:`Full Year ${yr}`}];
  const base=yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
  const avail=base.filter(k=>TB[k]);
  const opts=[{v:'full',l:'Full Year'},{v:'ytd',l:'YTD'}];
  avail.forEach((k,i)=>opts.push({v:`m${i+1}`,l:ML[i]}));

  });
  return opts;
}

// P&L CALCULATION (Hotel USALI format)
// ══════════════════════════════════════════════════════════════════
function pnl(d) {
  const rev        = (d.rooms||0) + (d.fnb||0) + (d.minor||0) + (d.otherinc||0);
  const deptProfit = rev - (d.cos||0) - (d.deptPay||0) - (d.deptOther||0);
  const gop        = deptProfit - (d.ovhdPay||0) - (d.ovhdOther||0);
  const nonOp      = (d.incentFee||0)+(d.mgmtFee||0)+(d.deprTotal||0)+(d.interest||0)
                   + (d.roi||0)+(d.sinkFund||0)+(d.ownExp||0)+(d.otherNonOp||0);
  const nop        = gop - nonOp - (d.tax||0);
  return {
    ...d, rev, deptProfit, gop, nonOp, nop,
    gopMgn:  rev>0 ? gop/rev*100  : 0,
    nopMgn:  rev>0 ? nop/rev*100  : 0,
    cosRat:  rev>0 ? (d.cos||0)/rev*100 : 0,
    payRat:  rev>0 ? (d.deptPay||0)/rev*100 : 0,
    ovhdRat: rev>0 ? ((d.ovhdPay||0)+(d.ovhdOther||0))/rev*100 : 0,
    roomsMix:rev>0 ? (d.rooms||0)/rev*100 : 0,
    fnbMix:  rev>0 ? (d.fnb||0)/rev*100 : 0,
  };
}
function aggKeys(keys, src=TB) {
  const agg = {};
  keys.filter(k=>src[k]).forEach(k=>{
    Object.entries(src[k]).forEach(([f,v])=>{ agg[f]=(agg[f]||0)+v; });
  });
  return pnl(agg);
}
function annPnl(year) { return pnl(ANN[year]||{}); }
function bsCalc(snap) {
  const s = snap||{cash:0,ar:0,inv:0,pre:0,fixG:0,accD:0,otNA:0,ap:0,acc:0,cLTD:0,ltD:0,dTax:0,pic:0,re:0};
  const tCA = s.cash + s.ar + s.inv + s.pre;
  const netF = s.fixG - s.accD;
  const tA = tCA + netF + s.otNA;
  const tCL = s.ap + s.acc + s.cLTD;
  const tL = tCL + s.ltD + s.dTax;
  const tEq = s.pic + s.re;
  return { ...s, tCA, netF, tA, tCL, tL, tEq };
}
let T = DARK;
const fM  = n => {
  if(n===undefined||n===null||isNaN(n)) return '-';
  const neg = n < 0;
  const a = Math.abs(n) * 1000; // convert Rp Milyar → Millions
  // 1 decimal if not whole, 0 if whole
  const dec = (a % 1 < 0.05 || a % 1 >= 0.95) ? 0 : 1;
  const fixed = dec === 1 ? Math.floor(a * 10) / 10 : Math.round(a);
  // Format with Indonesian thousand separator (.) and decimal (,)
  const parts = fixed.toFixed(dec).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  const s = (parts.length > 1 && parts[1] !== '0' ? parts[0] + ',' + parts[1] : parts[0]) + 'M';
  return neg ? `(${s})` : s;
};
const fP  = n => n===undefined?'-': `${n.toFixed(1)}%`;
const fC  = n => n<0?`(${fM(Math.abs(n))})`:`${fM(n)}`;
const clr = (n,th=T) => n>=0?th.green:th.red;

// P&L PAGE
// ══════════════════════════════════════════════════════════════════
function PLPage() {
  const [yr,setYr]=useState('2026');
  const [period,setPeriod]=useState('full');
  const c=T.card,brd=T.border,ac=T.accent,sc=T.secondary,tx=T.text,mu=T.muted,sb=T.sub;

  const isAnnual = parseInt(yr) < 2024;

  // Build period options
  const periodOptions = useMemo(()=>{
    if(isAnnual) return [{v:'full',l:`Full Year ${yr}`}];
    const mKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
    const opts=[{v:'full',l:`Full Year ${yr}`},{v:'ytd',l:`YTD ${yr}`}];
    mKeys.forEach((k,i)=>{ if(TB[k]) opts.push({v:`m${i+1}`,l:ML[i]+' '+yr}); });
    const qMap={Q1:[0,1,2],Q2:[3,4,5],Q3:[6,7,8],Q4:[9,10,11]};
    Object.entries(qMap).forEach(([q,idxs])=>{
      const qKeys=idxs.map(i=>`${yr}-${String(i+1).padStart(2,'0')}`).filter(k=>TB[k]);
      if(qKeys.length===3) opts.push({v:q.toLowerCase(),l:`${q} ${yr}`});
    });
    return opts;
  },[yr,isAnnual]);

  // When year changes, reset period
  const handleYrChange = (v)=>{ setYr(v); setPeriod('full'); };

  // Determine keys to aggregate
  const keys = useMemo(()=>{
    if(isAnnual) return null; // use annPnl
    const mKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
    if(period==='full') return mKeys.filter(k=>TB[k]);
    if(period==='ytd'){
      const avail=mKeys.filter(k=>TB[k]);
      return avail;
    }
    if(period==='q1') return mKeys.slice(0,3).filter(k=>TB[k]);
    if(period==='q2') return mKeys.slice(3,6).filter(k=>TB[k]);
    if(period==='q3') return mKeys.slice(6,9).filter(k=>TB[k]);
    if(period==='q4') return mKeys.slice(9,12).filter(k=>TB[k]);
    const mi=parseInt(period.replace('m',''))-1;
    return [mKeys[mi]].filter(k=>k&&TB[k]);
  },[yr,period,isAnnual]);

  const cur = useMemo(()=>{
    if(isAnnual) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnnual]);

  // Budget comparison (only for 2026 months)
  const bud = useMemo(()=>{
    if(yr!=='2026') return null;
    const bKeys = period==='full'?['2026-01','2026-02']:
                  period==='ytd'?['2026-01','2026-02']:
                  period==='m1'?['2026-01']:period==='m2'?['2026-02']:null;
    if(!bKeys) return null;
    const validKeys = bKeys.filter(k=>BUD26[k]);
    if(!validKeys.length) return null;
    return aggKeys(validKeys, BUD26);
  },[yr,period]);

  const prior = useMemo(()=>{
    const pyear = parseInt(yr)-1;
    if(isAnnual) return pyear>=2013?annPnl(pyear):null;
    if(period==='full'||period==='ytd'){
      if(parseInt(yr)===2025) return aggKeys(mKeys24);
      if(parseInt(yr)===2026) return aggKeys(mKeys25);
      return pyear>=2013?annPnl(pyear):null;
    }
    // Monthly prior year same month
    if(period.startsWith('m')&&parseInt(yr)>=2025){
      const mi=parseInt(period.replace('m',''))-1;
      const priorKey=`${pyear}-${String(mi+1).padStart(2,'0')}`;
      return TB[priorKey]?aggKeys([priorKey]):null;
    }
    return null;
  },[yr,period,isAnnual]);

  const trendKeys = yr==='2024'?mKeys24:yr==='2025'?mKeys25:['2026-01','2026-02'];
  const marginTrend = useMemo(()=> (!isAnnual?trendKeys.filter(k=>TB[k]):[]).map((k,i)=>{
    const d=pnl(TB[k]);
    return {name:ML[i],gopMgn:+d.gopMgn.toFixed(1),nopMgn:+d.nopMgn.toFixed(1)};
  }),[yr,isAnnual]);

  const revTrend = useMemo(()=>{
    if(isAnnual){
      return Object.entries(ANN).filter(([y])=>parseInt(y)<=parseInt(yr)).slice(-8).map(([y,d])=>{
        const v=pnl(d); return {name:y,rev:+v.rev.toFixed(3),gop:+v.gop.toFixed(3),nop:+v.nop.toFixed(3)};
      });
    }
    return trendKeys.filter(k=>TB[k]).map((k,i)=>{
      const d=pnl(TB[k]);
      return {name:ML[i],rev:+d.rev.toFixed(3),gop:+d.gop.toFixed(3),nop:+d.nop.toFixed(3)};
    });
  },[yr,isAnnual]);

  if(!cur) return <div style={{padding:40,color:T.muted}}>Loading...</div>;

  const rows=[
    {l:'ROOM REVENUE',v:cur.rooms,b:bud?.rooms,p:prior?.rooms,pct:cur.rooms/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'F&B REVENUE',v:cur.fnb,b:bud?.fnb,p:prior?.fnb,pct:cur.fnb/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'MINOR OPERATED',v:cur.minor,b:bud?.minor,p:prior?.minor,pct:cur.minor/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'OTHER INCOME',v:cur.otherinc,b:bud?.otherinc,p:prior?.otherinc,pct:cur.otherinc/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'TOTAL REVENUE',v:cur.rev,b:bud?.rev,p:prior?.rev,pct:100,indent:0,bold:true,sep:true},
    {l:'Cost of Sales',v:-cur.cos,b:bud?-bud.cos:null,p:prior?-prior.cos:null,pct:cur.cos/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Dept Payroll',v:-cur.deptPay,b:bud?-bud.deptPay:null,p:prior?-prior.deptPay:null,pct:cur.deptPay/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Dept Other Exp',v:-cur.deptOther,b:bud?-bud.deptOther:null,p:prior?-prior.deptOther:null,pct:cur.deptOther/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'DEPT PROFIT',v:cur.deptProfit,b:bud?.deptProfit,p:prior?.deptProfit,pct:cur.deptProfit/cur.rev*100,indent:0,bold:true,sep:true},
    {l:'Overhead Payroll',v:-cur.ovhdPay,b:bud?-bud.ovhdPay:null,p:prior?-prior.ovhdPay:null,pct:cur.ovhdPay/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Overhead Other Exp',v:-cur.ovhdOther,b:bud?-bud.ovhdOther:null,p:prior?-prior.ovhdOther:null,pct:cur.ovhdOther/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'GROSS OPERATING PROFIT',v:cur.gop,b:bud?.gop,p:prior?.gop,pct:cur.gopMgn,indent:0,bold:true,sep:true,highlight:true},
    {l:'Incentive Fee',v:-cur.incentFee,b:bud?-bud.incentFee:null,p:prior?-prior.incentFee:null,pct:cur.incentFee/cur.rev*100,indent:1,neg:true},
    {l:'Management Fee',v:-cur.mgmtFee,b:bud?-bud.mgmtFee:null,p:prior?-prior.mgmtFee:null,pct:cur.mgmtFee/cur.rev*100,indent:1,neg:true},
    {l:'Depreciation & Amort.',v:-cur.deprTotal,b:bud?-bud.deprTotal:null,p:prior?-prior.deprTotal:null,pct:cur.deprTotal/cur.rev*100,indent:1,neg:true},
    {l:'Interest (Net)',v:cur.interest,b:bud?.interest,p:prior?.interest,pct:Math.abs(cur.interest)/cur.rev*100,indent:1},
    {l:'ROI Expense',v:-cur.roi,b:bud?-bud.roi:null,p:prior?-prior.roi:null,pct:cur.roi/cur.rev*100,indent:1,neg:true},
    {l:'Owning Company Exp',v:-cur.ownExp,b:bud?-bud.ownExp:null,p:prior?-prior.ownExp:null,pct:cur.ownExp/cur.rev*100,indent:1,neg:true},
    {l:'Other Non-Operating',v:-cur.otherNonOp,b:bud?-bud.otherNonOp:null,p:prior?-prior.otherNonOp:null,pct:cur.otherNonOp/cur.rev*100,indent:1,neg:true},
    {l:'Income Tax',v:-cur.tax,b:bud?-bud.tax:null,p:prior?-prior.tax:null,pct:0,indent:1,neg:true},
    {l:'NET OPERATING PROFIT',v:cur.nop,b:bud?.nop,p:prior?.nop,pct:cur.nopMgn,indent:0,bold:true,sep:true,highlight:true},
  ];

  const showBud = !!bud;
  const showPrior = !!prior;
  const colCount = 2 + (showBud?1:0) + (showPrior?1:0);

  return (
    <div style={{padding:24}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:T.text,fontFamily:'IBM Plex Mono,monospace'}}>
            PROFIT &amp; LOSS STATEMENT
          </div>
          <div style={{fontSize:11,color:T.muted,marginTop:2}}>
            {isAnnual?`Annual ${yr}`:`${period==='full'?'Full Year':period==='ytd'?'Year-to-Date':period.startsWith('m')?periodOptions.find(o=>o.v===period)?.l:period.toUpperCase()+' '+yr} · Rp Milyar`}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=>
              <option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnnual&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer'}}>
              {periodOptions.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* KPI Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:20}}>
        {[
          {l:'Total Revenue',v:cur.rev,fmt:fC,color:ac},
          {l:'GOP',v:cur.gop,fmt:fC,color:cur.gop>=0?T.green:T.red},
          {l:'GOP Margin',v:cur.gopMgn,fmt:n=>`${n.toFixed(1)}%`,color:cur.gopMgn>=30?T.green:cur.gopMgn>=20?T.yellow:T.red},
          {l:'NOP',v:cur.nop,fmt:fC,color:cur.nop>=0?T.green:T.red},
          {l:'NOP Margin',v:cur.nopMgn,fmt:n=>`${n.toFixed(1)}%`,color:cur.nopMgn>=5?T.green:cur.nopMgn>=0?T.yellow:T.red},
        ].map(({l,v,fmt,color})=>(
          <div key={l} style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'12px 16px'}}>
            <div style={{fontSize:10,color:mu,textTransform:'uppercase',letterSpacing:1}}>{l}</div>
            <div style={{fontSize:18,fontWeight:700,color,marginTop:4,fontFamily:'IBM Plex Mono,monospace'}}>{fmt(v)}</div>
          </div>
        ))}
      </div>

      {/* P&L Table */}
      <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,overflow:'hidden',marginBottom:20}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{background:T.bg,borderBottom:`1px solid ${brd}`}}>
                <th style={{padding:'10px 16px',textAlign:'left',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>
                  {isAnnual?`${yr} Full Year`:'LINE ITEM'}
                </th>
                <th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>
                  {period==='full'?`ACTUAL ${yr}`:period==='ytd'?`YTD ACTUAL`:period.startsWith('m')?periodOptions.find(o=>o.v===period)?.l:'ACTUAL'}
                </th>
                <th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>%</th>
                {showBud&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>BUDGET</th>}
                {showBud&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>VAR</th>}
                {showPrior&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>{parseInt(yr)-1}</th>}
                {showPrior&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>VAR%</th>}
              </tr>
            </thead>
            <tbody>
              {rows.map((row,i)=>{
                const varBud = showBud&&row.b!=null?row.v-row.b:null;
                const varPrior = showPrior&&row.p!=null?(row.p!==0?(row.v-row.p)/Math.abs(row.p)*100:null):null;
                return (
                  <tr key={i} style={{
                    borderBottom:`1px solid ${row.sep?brd:'transparent'}`,
                    background: row.highlight?(cur.nop>=0&&row.l.includes('NET')||cur.gop>=0&&row.l.includes('GROSS'))?`${T.green}10`:`${T.red}08`:'transparent',
                  }}>
                    <td style={{padding:`${row.sep?'10px':'6px'} 16px`,paddingLeft:row.indent?32:16,
                      color:row.bold?tx:sb,fontWeight:row.bold?700:400,
                      fontFamily:row.bold?'IBM Plex Mono,monospace':'inherit',fontSize:row.bold?12:11}}>
                      {row.l}
                    </td>
                    <td style={{padding:`${row.sep?'10px':'6px'} 16px`,textAlign:'right',
                      color:row.bold?(row.v>=0?T.green:T.red):tx,fontWeight:row.bold?700:400,
                      fontFamily:'IBM Plex Mono,monospace',fontSize:row.bold?12:11}}>
                      {fC(row.v)}
                    </td>
                    <td style={{padding:'6px 16px',textAlign:'right',color:mu,fontSize:11}}>
                      {row.pct!=null?`${Math.abs(row.pct).toFixed(1)}%`:''}
                    </td>
                    {showBud&&<td style={{padding:'6px 16px',textAlign:'right',color:sb,fontFamily:'IBM Plex Mono,monospace',fontSize:11}}>
                      {row.b!=null?fC(row.b):'-'}
                    </td>}
                    {showBud&&<td style={{padding:'6px 16px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:11,
                      color:varBud!=null?(varBud>=0?T.green:T.red):mu}}>
                      {varBud!=null?fC(varBud):'-'}
                    </td>}
                    {showPrior&&<td style={{padding:'6px 16px',textAlign:'right',color:sb,fontFamily:'IBM Plex Mono,monospace',fontSize:11}}>
                      {row.p!=null?fC(row.p):'-'}
                    </td>}
                    {showPrior&&<td style={{padding:'6px 16px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:11,
                      color:varPrior!=null?(varPrior>=0?T.green:T.red):mu}}>
                      {varPrior!=null?`${varPrior>=0?'+':''}${varPrior.toFixed(1)}%`:'-'}
                    </td>}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Charts */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:11,color:mu,marginBottom:12,textTransform:'uppercase',letterSpacing:1}}>Revenue Trend</div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={revTrend} margin={{top:4,right:8,bottom:4,left:8}}>
              <CartesianGrid strokeDasharray="3 3" stroke={brd}/>
              <XAxis dataKey="name" tick={{fill:mu,fontSize:10}} tickLine={false}/>
              <YAxis tick={{fill:mu,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(1)}M`}/>
              <Tooltip contentStyle={{background:T.bg,border:`1px solid ${brd}`,borderRadius:6}} labelStyle={{color:tx}} formatter={(v,n)=>[`${v.toFixed(3)}M`,n]}/>
              <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10,color:sb}}/>
              <Bar dataKey="rev" fill={ac} name="Revenue" radius={[2,2,0,0]}/>
              <Bar dataKey="gop" fill={sc} name="GOP" radius={[2,2,0,0]}/>
              <Bar dataKey="nop" fill={T.purple||'#8B5CF6'} name="NOP" radius={[2,2,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:11,color:mu,marginBottom:12,textTransform:'uppercase',letterSpacing:1}}>{isAnnual?'Annual Margin Trend':'Monthly Margin Trend'}</div>
          {!isAnnual&&marginTrend.length>0?(
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={marginTrend} margin={{top:4,right:8,bottom:4,left:8}}>
                <CartesianGrid strokeDasharray="3 3" stroke={brd}/>
                <XAxis dataKey="name" tick={{fill:mu,fontSize:10}} tickLine={false}/>
                <YAxis tick={{fill:mu,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${brd}`,borderRadius:6}} formatter={(v,n)=>[`${v}%`,n]}/>
                <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10,color:sb}}/>
                <Line type="monotone" dataKey="gopMgn" stroke={sc} name="GOP%" strokeWidth={2} dot={{r:4}}/>
                <Line type="monotone" dataKey="nopMgn" stroke={T.purple||'#8B5CF6'} name="NOP%" strokeWidth={2} dot={{r:4}}/>
                <ReferenceLine y={0} stroke={T.red} strokeDasharray="3 3"/>
              </LineChart>
            </ResponsiveContainer>
          ):(
            <div style={{height:180,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{textAlign:'center'}}>
                {[...Array(8)].map((_,i)=>{
                  const y=parseInt(yr)-7+i; if(y<2013||y>2025) return null;
                  const d=annPnl(y);
                  return <div key={y} style={{display:'inline-flex',flexDirection:'column',alignItems:'center',margin:'0 6px'}}>
                    <div style={{fontSize:9,color:d.gopMgn>=30?T.green:d.gopMgn>=20?T.yellow:T.red,fontWeight:700}}>{d.gopMgn.toFixed(0)}%</div>
                    <div style={{width:24,background:T.border,borderRadius:2,marginTop:2,height:60,position:'relative',overflow:'hidden'}}>
                      <div style={{position:'absolute',bottom:0,width:'100%',background:d.gopMgn>=30?T.green:d.gopMgn>=20?T.yellow:T.red,height:`${Math.max(0,Math.min(100,d.gopMgn/50*100))}%`}}/>
                    </div>
                    <div style={{fontSize:9,color:mu,marginTop:2}}>{y}</div>
                  </div>;
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function BSPage() {
  const [per,setPer]=useState('2025');
  const snapKey = per==='2026'?'jan26':per==='2025'?'dec25':per==='2024'?'dec24':'dec23';
  const prvKey  = per==='2026'?'dec25':per==='2025'?'dec24':per==='2024'?'dec23':null;
  const rawSnap = BS_SNAPSHOTS[snapKey];
  const rawPrv  = prvKey?BS_SNAPSHOTS[prvKey]:null;
  if(!rawSnap) return <div style={{padding:40,color:T.muted}}>Data tidak tersedia untuk periode ini.</div>;
  const bs  = bsCalc(rawSnap);
  const prv = rawPrv?bsCalc(rawPrv):bs;

  const BSRow=({l,v,p,bold,indent,isLiab})=>(
    <tr>
      <td style={{padding:'5px 12px',paddingLeft:indent?28:12,color:bold?T.text:T.sub,fontSize:11,fontFamily:"'IBM Plex Sans'",fontWeight:bold?600:400}}>{l}</td>
      <td style={{padding:'5px 12px',textAlign:'right',color:bold?(v<0?T.red:T.text):T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:bold?600:400}}>{v!==undefined?fC(v):''}</td>
      <td style={{padding:'5px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{p!==undefined?fC(p):''}</td>
      <td style={{padding:'5px 12px',textAlign:'right',fontSize:10,fontFamily:"'IBM Plex Mono'",color:p!==undefined&&v!==undefined?clr(isLiab?-(v-p):v-p):T.muted}}>
        {p!==undefined&&v!==undefined&&p!==0?`${((v-p)/Math.abs(p)*100).toFixed(1)}%`:'-'}
      </td>
    </tr>
  );
  const Sec=({t})=><tr><td colSpan={4} style={{padding:'10px 12px 4px',color:T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{t}</td></tr>;
  const Div=()=><tr><td colSpan={4}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;

  const debtItems = [
    {l:'Current Ratio',v:(bs.tCA/bs.tCL).toFixed(2),c:T.green},
    {l:'Quick Ratio',v:((bs.cash+bs.ar)/bs.tCL).toFixed(2),c:T.green},
    {l:'Debt/Equity',v:(bs.ltD/bs.tEq).toFixed(2),c:T.yellow},
    {l:'Net Fixed Assets',v:fM(bs.netF),c:T.text},
  ];

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div><div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Balance Sheet</div><div style={{color:T.muted,fontSize:11}}>Statement of Financial Position</div></div>
        <select value={per} onChange={e=>setPer(e.target.value)} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 12px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
          {['2023','2024','2025','2026'].map(y=><option key={y} value={y}>{y==='2026'?'Feb 2026':y}</option>)}
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'3fr 1fr',gap:12}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {/* ASSETS */}
          <Card style={{padding:0}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{background:T.border}}><th colSpan={4} style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}> ASSETS</th></tr>
              <tr style={{background:T.border}}>{['Account','Current','Prior','Chg'].map((h,i)=><th key={i} style={{padding:'6px 12px',textAlign:i===0?'left':'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>{h}</th>)}</tr></thead>
              <tbody>
                <Sec t="CURRENT ASSETS"/>
                <BSRow l="Cash & Equivalents" v={bs.cash} p={prv.cash} indent/>
                <BSRow l="Accounts Receivable" v={bs.ar}  p={prv.ar}   indent/>
                <BSRow l="Inventories"         v={bs.inv} p={prv.inv}  indent/>
                <BSRow l="Prepaid & Others"    v={bs.pre} p={prv.pre}  indent/>
                <Div/>
                <BSRow l="Total Current Assets" v={bs.tCA} p={prv.tCA} bold/>
                <Sec t="NON-CURRENT ASSETS"/>
                <BSRow l="Fixed Assets (Gross)"    v={bs.fixG}   p={prv.fixG}   indent/>
                <BSRow l="Accum. Depreciation"     v={-bs.accD}  p={-prv.accD}  indent/>
                <BSRow l="Net Fixed Assets"        v={bs.netF}   p={prv.netF}   indent bold/>
                <BSRow l="Other Non-Current"       v={bs.otNA}   p={prv.otNA}   indent/>
                <Div/>
                <tr style={{background:`${T.accent}10`}}>
                  <td style={{padding:'7px 12px',color:T.accent,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>TOTAL ASSETS</td>
                  <td style={{padding:'7px 12px',textAlign:'right',color:T.accent,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(bs.tA)}</td>
                  <td style={{padding:'7px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{fM(prv.tA)}</td>
                  <td style={{padding:'7px 12px',textAlign:'right',color:clr(bs.tA-prv.tA),fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{((bs.tA-prv.tA)/prv.tA*100).toFixed(1)}%</td>
                </tr>
              </tbody>
            </table>
          </Card>
          {/* LIAB + EQUITY */}
          <Card style={{padding:0}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{background:T.border}}><th colSpan={4} style={{padding:'8px 12px',textAlign:'left',color:T.secondary,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}> LIAB + EQUITY</th></tr>
              <tr style={{background:T.border}}>{['Account','Current','Prior','Chg'].map((h,i)=><th key={i} style={{padding:'6px 12px',textAlign:i===0?'left':'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>{h}</th>)}</tr></thead>
              <tbody>
                <Sec t="CURRENT LIABILITIES"/>
                <BSRow l="Accounts Payable"   v={bs.ap}   p={prv.ap}   indent isLiab/>
                <BSRow l="Accrued Expenses"   v={bs.acc}  p={prv.acc}  indent isLiab/>
                <BSRow l="Current LT Debt"    v={bs.cLTD} p={prv.cLTD} indent isLiab/>
                <Div/>
                <BSRow l="Total Current Liab" v={bs.tCL} p={prv.tCL} bold isLiab/>
                <Sec t="LONG-TERM LIABILITIES"/>
                <BSRow l="Long-term Debt"    v={bs.ltD}  p={prv.ltD}  indent isLiab/>
                <BSRow l="Deferred Tax"      v={bs.dTax} p={prv.dTax} indent isLiab/>
                <Div/>
                <BSRow l="Total LT Liab"  v={bs.ltD+bs.dTax} p={prv.ltD+prv.dTax} bold isLiab/>
                <BSRow l="TOTAL LIAB"     v={bs.tL} p={prv.tL} bold isLiab/>
                <Sec t="EQUITY"/>
                <BSRow l="Paid-in Capital"    v={bs.pic} p={prv.pic} indent/>
                <BSRow l="Retained Earnings"  v={bs.re}  p={prv.re}  indent/>
                <Div/>
                <tr style={{background:`${T.secondary}10`}}>

// CASH FLOW PAGE
// ══════════════════════════════════════════════════════════════════
function CFPage() {
  const [yr,setYr]=useState('2025');
  const keys = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
  const cur  = aggKeys(keys);
  const bsNow = bsCalc(BS_SNAPSHOTS[yr==='2026'?'jan26':yr==='2025'?'dec25':yr==='2024'?'dec24':'dec23']||{cash:0,ar:0,inv:0,pre:0,fixG:0,accD:0,otNA:0,ap:0,acc:0,cLTD:0,ltD:0,dTax:0,pic:0,re:0});
  const bsPrv = bsCalc(BS_SNAPSHOTS[yr==='2026'?'dec25':yr==='2025'?'dec24':yr==='2024'?'dec23':'dec23']||{cash:0,ar:0,inv:0,pre:0,fixG:0,accD:0,otNA:0,ap:0,acc:0,cLTD:0,ltD:0,dTax:0,pic:0,re:0});

  const ops = cur.nop + cur.deprTotal + cur.interest - (bsNow.ar-bsPrv.ar) - (bsNow.inv-bsPrv.inv) + (bsNow.ap-bsPrv.ap) + (bsNow.acc-bsPrv.acc);
  const inv = -(bsNow.fixG-bsPrv.fixG);
  const fin = -(bsPrv.ltD-bsNow.ltD) - Math.round(cur.np*0.4); // debt repay + dividends
  const netCF = ops+inv+fin;

  const cfMonthly = keys.map((k,i)=>{
    const d=pnl(TB[k]||{rr:0,rf:0,ro:0,pa:0,fc:0,ut:0,mn:0,mk:0,ad:0,dp:0,it:0});
    const ops2=d.np+d.deprTotal;
    const inv2=-80;
    const fin2=-100-Math.round(d.np*0.04);
    return {name:ML[i]||k,operating:Math.round(ops2),investing:Math.round(inv2),financing:Math.round(fin2),net:Math.round(ops2+inv2+fin2)};
  });

  const CFRow=({l,v,indent,bold,isOut})=>(
    <tr>
      <td style={{padding:'5px 12px',paddingLeft:indent?28:12,color:bold?T.text:T.sub,fontSize:11,fontFamily:"'IBM Plex Sans'",fontWeight:bold?600:400}}>{l}</td>
      <td style={{padding:'5px 12px',textAlign:'right',color:v>=0?(isOut?T.red:T.green):T.red,fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:bold?600:400}}>{fC(v)}</td>
    </tr>
  );
  const Sec=({t,c})=><tr><td colSpan={2} style={{padding:'10px 12px 4px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{t}</td></tr>;

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div><div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Cash Flow Statement</div><div style={{color:T.muted,fontSize:11}}>Indirect Method · {yr}</div></div>
        <select value={yr} onChange={e=>setYr(e.target.value)} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 12px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
          {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=><option key={y} value={y}>{y==='2026'?'2026 (YTD Jan-Feb)':y}</option>)}
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:12}}>
        <Card style={{padding:0}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:T.border}}><th colSpan={2} style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}> CASH FLOW — {yr}</th></tr></thead>
            <tbody>
              <Sec t="A. OPERATING ACTIVITIES"/>
              <CFRow l="Net Profit" v={cur.nop} indent/>
              <CFRow l="Add: Depreciation" v={cur.deprTotal} indent/>
              <CFRow l="Add: Interest (non-cash)" v={Math.round(cur.interest*0.3)} indent/>
              <CFRow l="Chg: Accounts Receivable" v={-(bsNow.ar-bsPrv.ar)} indent isOut/>
              <CFRow l="Chg: Inventory" v={-(bsNow.inv-bsPrv.inv)} indent isOut/>
              <CFRow l="Chg: Accounts Payable" v={bsNow.ap-bsPrv.ap} indent/>
              <CFRow l="Chg: Accrued Expenses" v={bsNow.acc-bsPrv.acc} indent/>
              <CFRow l="Net Cash from Operations" v={Math.round(ops)} bold/>
              <Sec t="B. INVESTING ACTIVITIES" c={T.secondary}/>
              <CFRow l="Purchase of Fixed Assets" v={bsNow.fixG-bsPrv.fixG===0?-Math.round(keys.length*80):inv} indent isOut/>
              <CFRow l="Net Cash from Investing" v={Math.round(inv)} bold/>
              <Sec t="C. FINANCING ACTIVITIES" c={T.purple}/>
              <CFRow l="Long-term Debt Repayment" v={-(bsPrv.ltD-bsNow.ltD)} indent isOut/>
              <CFRow l="Dividends Paid" v={-Math.round(cur.np*0.4)} indent isOut/>
              <CFRow l="Net Cash from Financing" v={Math.round(fin)} bold/>
              <tr style={{background:`${netCF>=0?T.green:T.red}15`}}>
                <td style={{padding:'8px 12px',color:T.text,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>NET CHANGE IN CASH</td>
                <td style={{padding:'8px 12px',textAlign:'right',color:netCF>=0?T.green:T.red,fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fC(Math.round(netCF))}</td>
              </tr>
              <tr>
                <td style={{padding:'6px 12px',color:T.sub,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>Opening Cash</td>
                <td style={{padding:'6px 12px',textAlign:'right',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{fM(bsPrv.cash)}</td>
              </tr>
              <tr>
                <td style={{padding:'6px 12px',color:T.accent,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>Closing Cash</td>
                <td style={{padding:'6px 12px',textAlign:'right',color:T.accent,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(bsNow.cash)}</td>
              </tr>
            </tbody>
          </table>
        </Card>
        <Card>
          <SectionTitle>Monthly Cash Flow — {yr}</SectionTitle>
          <ResponsiveContainer width="100%" height={280}>
            <ComposedChart data={cfMonthly} margin={{top:5,right:10,left:0,bottom:0}}>
              <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
              <XAxis dataKey="name" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
              <YAxis stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'"}} tickFormatter={v=>`${v}M`}/>
              <Tooltip content={<TT/>}/>
              <Legend iconType="circle" iconSize={6} wrapperStyle={{fontSize:10,fontFamily:"'IBM Plex Mono'"}}/>
              <ReferenceLine y={0} stroke={T.border}/>
              <Bar dataKey="operating" name="Operating" fill="#00D4FF" fillOpacity={0.8}/>
              <Bar dataKey="investing" name="Investing" fill="#EF4444" fillOpacity={0.7}/>
              <Bar dataKey="financing" name="Financing" fill="#8B5CF6" fillOpacity={0.7}/>
              <Line type="monotone" dataKey="net" name="Net CF" stroke="#22C55E" strokeWidth={2.5} dot={{fill:'#22C55E',r:3}}/>
            </ComposedChart>
          </ResponsiveContainer>
        </Card>
      </div>
    </div>
  );
}

// BUDGET CONTROL PAGE

function BudgetPage() {
  const months = ML.map((_,i)=>{
    const k=`2026-${String(i+1).padStart(2,'0')}`;
    const act=TB[k]?pnl(TB[k]):null;
    const bud=BUD26[k]?pnl(BUD26[k]):null;
    return {
      name:ML[i], k, act, bud,
      revVar: act&&bud?act.rev-bud.rev:null,
      npVar:  act&&bud?act.np-bud.np:null,
      payVar: act&&bud?act.pa-bud.pa:null,
      hasActual:!!act,
    };
  });

  const totAct = aggKeys(['2026-01','2026-02']);
  const totBud = aggKeys(['2026-01','2026-02'],BUD26);

  const insights = [
    {sev:'warning',msg:`Revenue Jan–Feb 2026: Actual ${fM(totAct.rev)} vs Budget ${fM(totBud.rev)} (${((totAct.rev-totBud.rev)/totBud.rev*100).toFixed(1)}% variance)`},
    {sev:'info',   msg:`Payroll Jan: ${fP(pnl(TB['2026-01']).payRat)} of revenue — within target range (<32%)`},
    {sev:'danger', msg:`Utilities Feb: actual ${fM(pnl(TB['2026-02']).ovhdOther)} vs budget ${fM(pnl(BUD26['2026-02']).ovhdOther)} — exceeded by ${fM(pnl(TB['2026-02']).ut-pnl(BUD26['2026-02']).ovhdOther)}`},
    {sev:'success',msg:`Net profit YTD: ${fM(totAct.nop)} vs budget ${fM(totBud.nop)} — ahead by ${fM(totAct.np-totBud.nop)}`},
  ];
  const sevColor={'warning':T.yellow,'info':T.accent,'danger':T.red,'success':T.green};

  const chartData = months.filter(m=>m.act&&m.bud).map(m=>({
    name:m.name,
    'Actual Rev':m.act.rev, 'Budget Rev':m.bud.rev,
    'Rev Var':m.revVar,
  }));

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div><div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Budget vs Actual — 2026</div><div style={{color:T.muted,fontSize:11}}>Budget Control Module · Actuals: Jan–Feb 2026</div></div>
        <Chip color={T.accent}>2 of 12 months actual</Chip>
      </div>

      {/* Insight Banners */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:16}}>
        {insights.map((ins,i)=>(
          <div key={i} style={{background:`${sevColor[ins.sev]}10`,border:`1px solid ${sevColor[ins.sev]}30`,borderRadius:8,padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{color:sevColor[ins.sev],fontSize:14,marginTop:1}}>{ins.sev==='warning'?'⚠':ins.sev==='danger'?'🔴':ins.sev==='success'?'✅':'ℹ'}</span>
            <span style={{color:T.sub,fontSize:11,fontFamily:"'IBM Plex Sans'"}}>{ins.msg}</span>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:12}}>
        <Card>
          <SectionTitle>Revenue: Budget vs Actual</SectionTitle>
          <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={months.map(m=>({name:m.name,actual:m.act?.rev,budget:m.bud?.rev,variance:m.revVar}))}>
              <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
              <XAxis dataKey="name" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
              <YAxis stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'"}} tickFormatter={v=>`${(v/1000).toFixed(1)}B`}/>
              <Tooltip content={<TT/>}/>
              <Legend iconType="circle" iconSize={6} wrapperStyle={{fontSize:10,fontFamily:"'IBM Plex Mono'"}}/>
              <ReferenceLine y={0} stroke={T.border}/>
              <Bar dataKey="budget" name="Budget" fill={`${T.muted}60`} radius={[2,2,0,0]}/>
              <Bar dataKey="actual" name="Actual" fill={T.accent} fillOpacity={0.85} radius={[2,2,0,0]}/>
              <Bar dataKey="variance" name="Variance" fill={T.green} fillOpacity={0.7} radius={[2,2,0,0]}/>
            </ComposedChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <SectionTitle>YTD Summary (Jan–Feb)</SectionTitle>
          {[
            {l:'Revenue',a:totAct.rev,b:totBud.rev},
            {l:'F&B Cost',a:totAct.cos,b:totBud.cos},
            {l:'Payroll',a:totAct.pa,b:totBud.pa},
            {l:'Utilities',a:totAct.ut,b:totBud.ut},
            {l:'EBITDA',a:totAct.gop,b:totBud.gop},
            {l:'Net Profit',a:totAct.nop,b:totBud.nop},
          ].map(r=>{
            const vPct = r.b>0?(r.a-r.b)/r.b*100:0;

                  <th key={i} style={{padding:'7px 10px',textAlign:i===0?'left':'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'",whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {months.map((m,i)=>(
                <tr key={i} style={{borderBottom:`1px solid ${T.border}`,background:i%2===0?'transparent':`${T.border}30`}}>
                  <td style={{padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:m.hasActual?600:400}}>{m.name}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',color:T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{m.bud?fM(m.bud.rev):fM(pnl(BUD26[m.k]).rev)}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',color:m.hasActual?T.text:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{m.act?fM(m.act.rev):'—'}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',color:m.revVar!=null?clr(m.revVar):T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{m.revVar!=null?fC(m.revVar):'—'}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',color:m.revVar!=null?clr(m.revVar):T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{m.bud&&m.revVar!=null?`${(m.revVar/m.bud.rev*100).toFixed(1)}%`:'—'}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',color:T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{m.bud?fM(m.bud.nop):fM(pnl(BUD26[m.k]).nop)}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',color:m.hasActual?T.text:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{m.act?fM(m.act.nop):'—'}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',color:m.npVar!=null?clr(m.npVar):T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{m.npVar!=null?fC(m.npVar):'—'}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',color:m.npVar!=null?clr(m.npVar):T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{m.bud&&m.npVar!=null?`${(m.npVar/Math.abs(m.bud.nop)*100).toFixed(1)}%`:'—'}</td>
                  <td style={{padding:'6px 10px',textAlign:'right'}}>
                    {m.hasActual?<Chip color={m.revVar>=0?T.green:T.red}>{m.revVar>=0?'ON TRACK':'BEHIND'}</Chip>:<Chip color={T.muted}>FORECAST</Chip>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// FINANCIAL KPI PAGE
// ══════════════════════════════════════════════════════════════════
function KPIPage() {
  const [yr,setYr]=useState('2025');

  const bs   = bsCalc(BS_SNAPSHOTS[yr==='2025'?'dec25':yr==='2024'?'dec24':'jan26']);

  const kpis = [
    {cat:'Liquidity',items:[
      {l:'Current Ratio',v:(bs.tCA/bs.tCL).toFixed(2),th:'> 1.5',ok:bs.tCA/bs.tCL>1.5,unit:'x'},
      {l:'Quick Ratio',v:((bs.cash+bs.ar)/bs.tCL).toFixed(2),th:'> 1.0',ok:(bs.cash+bs.ar)/bs.tCL>1.0,unit:'x'},
      {l:'Cash Ratio',v:(bs.cash/bs.tCL).toFixed(2),th:'> 0.5',ok:bs.cash/bs.tCL>0.5,unit:'x'},

    {cat:'Leverage',items:[
      {l:'Debt to Equity',v:(bs.tL/bs.tEq).toFixed(2),th:'< 0.8',ok:bs.tL/bs.tEq<0.8,unit:'x'},

    {cat:'Margins',items:[
      {l:'Gross Margin',v:cur.gopMgn.toFixed(1),th:'> 80%',ok:cur.gopMgn>80,unit:'%'},

      {l:'Net Margin',v:cur.nopMgn.toFixed(1),th:'> 15%',ok:cur.nopMgn>15,unit:'%'},

    {cat:'Hotel KPIs',items:[
      {l:'Payroll Ratio',v:cur.payRat.toFixed(1),th:'< 35%',ok:cur.payRat<35,unit:'%',inv:true},

    ]},
  ];

  const trendData = mKeys25.map((k,i)=>{
    const d=pnl(TB[k]);

    return {name:ML[i],payRat:+d.payRat.toFixed(1),netMgn:+d.nopMgn.toFixed(1),gopMgn:+d.gopMgn.toFixed(1)};
  });

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>

        <select value={yr} onChange={e=>setYr(e.target.value)} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 12px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
          {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=><option key={y} value={y}>{y==='2026'?'2026 (YTD Jan-Feb)':y}</option>)}
        </select>

// FORECAST ENGINE
// ══════════════════════════════════════════════════════════════════
function ForecastPage() {
  const [scenario,setScenario]=useState('base');
  const [revGrowth,setRevGrowth]=useState({conservative:4,base:8,optimistic:14});
  const [costInfl,setCostInfl]=useState({conservative:5,base:4,optimistic:3});
  const [horizon,setHorizon]=useState(12);

  const scenarios = {conservative:{name:'Conservative',color:T.yellow},base:{name:'Base Case',color:T.accent},optimistic:{name:'Optimistic',color:T.green}};
  const baseMonth = pnl(TB['2025-12']);

  const forecastData = useMemo(()=>{
    return Array.from({length:horizon},(_,i)=>{
      const mo = i+1;
      const row={name:ML[(i)%12]+(mo>12?' (Y2)':'')};
      Object.keys(scenarios).forEach(sc=>{
        const rg=(1+revGrowth[sc]/100/12);
        const ci=(1+costInfl[sc]/100/12);
        const n=Math.pow(rg,mo);
        const nc=Math.pow(ci,mo);
        const rev=Math.round(baseMonth.rev*n);
        const pa=Math.round(baseMonth.pa*nc);
        const fc=Math.round(baseMonth.fc*nc);
        const ut=Math.round(baseMonth.ut*nc);
        const mn=Math.round(baseMonth.mn*nc);
        const mk=Math.round(baseMonth.mk*nc);
        const ad=Math.round(baseMonth.ad*nc);
        const dp=baseMonth.dp,it=baseMonth.it;
        const fP2=pnl({rr:Math.round(rev*0.75),rf:Math.round(rev*0.17),ro:Math.round(rev*0.08),pa,fc,ut,mn,mk,ad,dp,it});
        row[`${sc}Rev`]=fP2.rev;
        row[`${sc}NP`]=fP2.np;
        row[`${sc}EBITDA`]=fP2.gop;
      });
      return row;
    });
  },[revGrowth,costInfl,horizon]);

  const summary = useMemo(()=>{
    const ann={}; Object.keys(scenarios).forEach(sc=>{
      ann[sc]={rev:forecastData.slice(0,12).reduce((s,r)=>s+(r[`${sc}Rev`]||0),0),np:forecastData.slice(0,12).reduce((s,r)=>s+(r[`${sc}NP`]||0),0)};
    }); return ann;
  },[forecastData]);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div><div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Forecast Engine</div><div style={{color:T.muted,fontSize:11}}>Scenario-based financial forecasting · Base period: Dec 2025</div></div>
        <div style={{display:'flex',gap:8}}>
          {[12,24].map(h=><button key={h} onClick={()=>setHorizon(h)} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:horizon===h?T.accent:'transparent',color:horizon===h?'#080C12':T.sub,cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{h}M</button>)}
        </div>
      </div>

      {/* Sliders */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
        {Object.entries(scenarios).map(([sc,{name,color}])=>(
          <Card key={sc} style={{borderColor:scenario===sc?color:T.border,cursor:'pointer',borderWidth:scenario===sc?2:1}} onClick={()=>setScenario(sc)}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
              <span style={{color:scenario===sc?color:T.sub,fontWeight:700,fontSize:12,fontFamily:"'IBM Plex Mono'"}}>{name}</span>
              {scenario===sc&&<Chip color={color}>ACTIVE</Chip>}
            </div>
            <div style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>Revenue Growth</span>
                <span style={{color:color,fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{revGrowth[sc]}%</span>
              </div>
              <input type="range" min={0} max={25} value={revGrowth[sc]} onChange={e=>setRevGrowth({...revGrowth,[sc]:+e.target.value})} style={{width:'100%',accentColor:color}}/>
            </div>
            <div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>Cost Inflation</span>
                <span style={{color:T.red,fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{costInfl[sc]}%</span>
              </div>
              <input type="range" min={0} max={15} value={costInfl[sc]} onChange={e=>setCostInfl({...costInfl,[sc]:+e.target.value})} style={{width:'100%',accentColor:T.red}}/>
            </div>
            <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
              <div style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>12M Revenue Forecast</div>
              <div style={{color:color,fontSize:16,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(summary[sc]?.rev)}</div>
              <div style={{color:summary[sc]?.np>=0?T.green:T.red,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>NP: {fM(summary[sc]?.nop)}</div>

      {/* Chart */}

              <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>

              <BarChart data={forecastData.slice(0,12)}>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" stroke={T.muted} tick={{fontSize:7,fontFamily:"'IBM Plex Mono'"}}/>

          </Card>
          <Card>
            <SectionTitle>Scenario Comparison</SectionTitle>
            {Object.entries(scenarios).map(([sc,{name,color}])=>(
              <div key={sc} style={{padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>

            ))}
          </Card>
        </div>
      </div>
    </div>
  );
}

// AI INTELLIGENCE PAGE
// ══════════════════════════════════════════════════════════════════
function AIPage() {
  const avgRev25 = aggKeys(mKeys25).rev/12;
  const avgPay25 = aggKeys(mKeys25).deptPay/12;

  const alerts = mKeys25.map(k=>{
    const d=pnl(TB[k]); const m=k.slice(5);
    const results=[];
    if(d.rev < avgRev25*0.88) results.push({sev:'warning',type:'Revenue Drop',msg:`Revenue ${fM(d.rev)} — ${((avgRev25-d.rev)/avgRev25*100).toFixed(1)}% below 2025 average. Possible low occupancy or seasonal dip.`});
    if(d.deptPay > avgPay25*1.08) results.push({sev:'critical',type:'Cost Spike',msg:`Payroll ${fM(d.deptPay)} — ${((d.pa-avgPay25)/Math.max(avgPay25,0.001)*100).toFixed(1)}% above avg. Review staffing level vs occupancy.`});
    if(d.gopMgn < 35)       results.push({sev:'info',type:'Margin Watch',msg:`EBITDA Margin ${fP(d.gopMgn)} — below 35% threshold. Monitor OpEx.`});
    return results.map(r=>({...r,period:k,month:ML[parseInt(m)-1]+' 2025'}));
  }).flat().slice(0,8);

  // Feb 2026 anomalies
  const feb26=pnl(TB['2026-02']);
  const feb26Bud=pnl(BUD26['2026-02']);
  const extraAlerts=[
    {sev:'warning',type:'Budget Variance',period:'2026-02',month:'Feb 2026',msg:`Revenue ${fM(feb26.rev)} vs Budget ${fM(feb26Bud.rev)} — ${((feb26.rev-feb26Bud.rev)/feb26Bud.rev*100).toFixed(1)}% variance. Monitor Jan–Feb seasonality.`},
    {sev:'info',type:'Payroll Ratio',period:'2026-02',month:'Feb 2026',msg:`Payroll ratio ${fP(feb26.payRat)} — within normal range. Continue monitoring vs. budget target <32%.`},
    {sev:'success',type:'Cost Control',period:'2026-01',month:'Jan 2026',msg:`Total expenses Jan 2026: ${fM(pnl(TB['2026-01']).cos)} — controlled. D/E ratio improving year-on-year.`},
  ];
  const allAlerts=[...alerts,...extraAlerts];
  const sevColor2={'critical':T.red,'warning':T.yellow,'info':T.accent,'success':T.green};
  const sevIcon ={'critical':'🔴','warning':'⚠️','info':'💡','success':'✅'};

  const anomalyCount={critical:allAlerts.filter(a=>a.sev==='critical').length,warning:allAlerts.filter(a=>a.sev==='warning').length,info:allAlerts.filter(a=>a.sev==='info').length,success:allAlerts.filter(a=>a.sev==='success').length};

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>AI Financial Intelligence</div>
        <div style={{color:T.muted,fontSize:11}}>Automated anomaly detection & financial insights · 2025–2026</div>
      </div>
      {/* Summary row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        {[['🔴','Critical',anomalyCount.critical,T.red],['⚠','Warning',anomalyCount.warning,T.yellow],['💡','Insights',anomalyCount.info,T.accent],['✅','Positive',anomalyCount.success,T.green]].map(([ic,l,n,c])=>(
          <Card key={l} style={{padding:'14px',borderLeft:`3px solid ${c}`,display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:24}}>{ic}</span>
            <div>
              <div style={{color:c,fontSize:20,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{n}</div>
              <div style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{l}</div>
            </div>
          </Card>
        ))}
      </div>
      {/* Alerts */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {allAlerts.map((a,i)=>(
          <Card key={i} style={{borderLeft:`3px solid ${sevColor2[a.sev]||T.muted}`,padding:'14px 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:14}}>{sevIcon[a.sev]||'ℹ'}</span>
                <span style={{color:sevColor2[a.sev],fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{a.type}</span>
              </div>
              <span style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{a.month}</span>
            </div>
            <p style={{color:T.sub,fontSize:11,fontFamily:"'IBM Plex Sans'",lineHeight:1.5,margin:0}}>{a.msg}</p>
          </Card>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// REPORT GENERATOR (plain JS — outside JSX to avoid Babel issues)
// ══════════════════════════════════════════════════════════════════
function generateReportHTML(selPeriod, selReport, theme) {
  var keys = selPeriod==='2025'?mKeys25:selPeriod==='2024'?mKeys24:['2026-01','2026-02'];
  var d    = aggKeys(keys);
  var bsKey   = selPeriod==='2026'?'jan26':selPeriod==='2025'?'dec25':selPeriod==='2024'?'dec24':'dec23';
  var bsPrvKey= selPeriod==='2026'?'dec25':selPeriod==='2025'?'dec24':selPeriod==='2024'?'dec23':null;
  var bs  = bsCalc(BS_SNAPSHOTS[bsKey]);
  var bsp = bsCalc(BS_SNAPSHOTS[bsPrvKey]);
  var isDark = theme==='dark';
  var ops = d.np+d.dp+Math.round(d.it*0.3)-(bs.ar-bsp.ar)-(bs.inv-bsp.inv)+(bs.ap-bsp.ap)+(bs.acc-bsp.acc);
  var inv2= -(bs.fixG-bsp.fixG)||-(keys.length*80);
  var fin2= -(bsp.ltD-bs.ltD)-Math.round(d.np*0.4);
  var netCF=ops+inv2+fin2;
  var budKeys=selPeriod==='2026'?['2026-01','2026-02']:null;
  var bud=budKeys?aggKeys(budKeys,BUD26):null;

  var bg  =isDark?'#080C12':'#ffffff';
  var card=isDark?'#0D1520':'#f8fafc';
  var bdr =isDark?'#1A2535':'#e2e8f0';
  var txt =isDark?'#E2E8F0':'#0f172a';
  var sub =isDark?'#94A3B8':'#475569';
  var acc =isDark?'#00D4FF':'#0086A8';
  var grn =isDark?'#22C55E':'#16A34A';
  var red =isDark?'#EF4444':'#DC2626';
  var yel =isDark?'#EAB308':'#CA8A04';
  var hdr =isDark?'#0D1520':'#1e293b';
  var totRowBg=isDark?'rgba(0,212,255,0.08)':'#f0f9ff';
  var secRowBg=isDark?'#080C12':card;

  function fV(v){
    if(v===undefined||v===null) return '-';
    var a=Math.abs(v);
    var s=a>=1000?(a/1000).toFixed(2)+'B':a.toFixed(0)+'M';
    return v<0?'('+s+')':s;
  }
  function fPct(v){ return v!==undefined?v.toFixed(1)+'%':'-'; }
  function vPct(a,b){ return b&&b!==0?((a-b)/Math.abs(b)*100).toFixed(1)+'%':'-'; }
  function gc(v,pos){ return (pos?v>=0:v<=0)?grn:red; }

  var dateStr = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  var perLabel = selPeriod==='2026'?'Feb 2026':selPeriod;

  var showPL  = selReport==='pl'||selReport==='board';
  var showBS  = selReport==='bs'||selReport==='board';
  var showCF  = selReport==='cf'||selReport==='board';

    +'<div class="ins '+(d.nopMgn>15?'good':'warn')+'">Net Profit: <strong>'+fV(d.nop)+'</strong> ('+fPct(d.nopMgn)+' margin) &mdash; Tax: '+fV(d.tax)+'</div>'
    +'<div class="ins">Balance Sheet: Total Assets <strong>'+fV(bs.tA)+'</strong> &middot; Equity <strong>'+fV(bs.tEq)+'</strong> &middot; D/E '+( bs.tL/bs.tEq).toFixed(2)+'x</div>'
    +plHTML+bsHTML+cfHTML+kpiHTML+budHTML
    +'<div class="footer">'
    +'<span>Grand Darmo Suite by Amithya &middot; Surabaya &middot; <strong>CONFIDENTIAL</strong></span>'
    +'<span>GDS Financial Intelligence Platform &middot; '+dateStr+'</span>'
    +'</div>'
    +'</div>'
    +'<script>window.onload=function(){setTimeout(function(){window.print()},800)}<\/script>'
    +'</body></html>';
}

// USER MANAGEMENT PAGE (MASTER only)
// ══════════════════════════════════════════════════════════════════
const ROLE_PAGES = {
  MASTER: ['dashboard','pl','bs','cf','budget','kpi','forecast','ai','macro','reports','users'],
  OWNER:  ['dashboard','pl','bs','cf','forecast','ai','macro','reports'],
  GM:     ['dashboard','budget','kpi','macro'],
  HOD:    ['dashboard','kpi'],
};

const LS_KEY = 'gds_users_v1';

function loadUsers() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  // Default users — first load
  return [
    { id:'u1', username:'sanda',   password:'accurate26',       role:'MASTER', name:'System Administrator', active:true, createdAt:'2026-01-01' },
    { id:'u2', username:'owning',  password:'gdsowning26',      role:'OWNER',  name:'Property Owner',       active:true, createdAt:'2026-01-01' },
    { id:'u3', username:'gm',      password:'gdsgm26',          role:'GM',     name:'General Manager',      active:true, createdAt:'2026-01-01' },
    { id:'u4', username:'hod',     password:'oneteamonespirit', role:'HOD',    name:'Head of Department',   active:true, createdAt:'2026-01-01' },
  ];
}

function saveUsers(users) {
  localStorage.setItem(LS_KEY, JSON.stringify(users));
}

function UserManagementPage({ currentUser }) {
  const [users, setUsers]         = useState(loadUsers);
  const [modal, setModal]         = useState(null); // 'add' | 'edit' | 'password' | 'delete'
  const [selected, setSelected]   = useState(null);
  const [toast, setToast]         = useState(null);
  const [form, setForm]           = useState({});
  const [showPw, setShowPw]       = useState(false);

  const ROLES = ['MASTER','OWNER','GM','HOD'];
  const ROLE_COLORS = { MASTER:'#00D4FF', OWNER:'#D4A847', GM:'#00897B', HOD:'#8B5CF6' };

  function showToast(msg, type='success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function persist(updated) {
    setUsers(updated);
    saveUsers(updated);
  }

  function openAdd() {
    setForm({ username:'', password:'', name:'', role:'GM', active:true });
    setModal('add');
    setShowPw(false);
  }

  function openEdit(u) {
    setSelected(u);
    setForm({ username:u.username, name:u.name, role:u.role, active:u.active });
    setModal('edit');
  }

  function openPassword(u) {
    setSelected(u);
    setForm({ password:'' });
    setModal('password');
    setShowPw(false);
  }

  function openDelete(u) {
    setSelected(u);
    setModal('delete');
  }

  function handleAdd() {
    if (!form.username.trim() || !form.password.trim() || !form.name.trim()) {
      showToast('Semua field wajib diisi.', 'error'); return;
    }
    if (users.find(u => u.username === form.username.trim())) {
      showToast('Username sudah dipakai.', 'error'); return;
    }
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const newUser = {
      id: 'u' + Date.now(),
      username:  form.username.trim().toLowerCase(),
      password:  form.password,
      name:      form.name.trim(),
      role:      form.role,
      active:    true,
      createdAt: new Date().toISOString().slice(0,10),
    };
    persist([...users, newUser]);
    setModal(null);
    showToast(`User "${newUser.username}" berhasil ditambahkan.`);
  }

  function handleEdit() {
    if (!form.name.trim()) { showToast('Nama tidak boleh kosong.', 'error'); return; }
    if (selected.username === currentUser.username && form.role !== 'MASTER') {
      showToast('Tidak bisa mengubah role akun sendiri.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id
      ? { ...u, name:form.name.trim(), role:form.role, active:form.active }
      : u
    );
    persist(updated);
    setModal(null);
    showToast('User berhasil diupdate.');
  }

  function handlePassword() {
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id ? { ...u, password:form.password } : u);
    persist(updated);
    setModal(null);
    showToast(`Password "${selected.username}" berhasil diganti.`);
  }

  function handleDelete() {
    if (selected.username === currentUser.username) {
      showToast('Tidak bisa menghapus akun sendiri.', 'error'); setModal(null); return;
    }
    persist(users.filter(u => u.id !== selected.id));
    setModal(null);
    showToast(`User "${selected.username}" dihapus.`);
  }

  function toggleActive(u) {
    if (u.username === currentUser.username) { showToast('Tidak bisa menonaktifkan akun sendiri.', 'error'); return; }
    const updated = users.map(x => x.id === u.id ? { ...x, active: !x.active } : x);
    persist(updated);
    showToast(`${u.username} ${!u.active ? 'diaktifkan' : 'dinonaktifkan'}.`);
  }

  const inp = {
    background: T.bg, border:`1px solid ${T.border}`, borderRadius:6,
    color: T.text, padding:'9px 12px', fontSize:12, width:'100%',
    fontFamily:"'IBM Plex Mono',monospace", outline:'none',
  };
  const btn = (color, bg) => ({
    background: bg||'transparent', border:`1px solid ${color}`, borderRadius:6,
    color, padding:'7px 14px', fontSize:11, cursor:'pointer',
    fontFamily:"'IBM Plex Mono',monospace", fontWeight:600,
  });

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', top:20, right:24, zIndex:9999, background: toast.type==='error'?T.red:T.green, color:'#fff', padding:'10px 20px', borderRadius:8, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", boxShadow:'0 4px 20px rgba(0,0,0,0.4)' }}>
          {toast.type==='error' ? '✕ ' : '✓ '}{toast.msg}
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <div style={{ color:T.text, fontSize:18, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>User Management</div>
          <div style={{ color:T.muted, fontSize:11, marginTop:4 }}>{users.length} user terdaftar · Disimpan di browser</div>
        </div>
        <button onClick={openAdd} style={{ ...btn(T.accent), background:`${T.accent}22`, padding:'9px 20px', fontSize:12 }}>
          + Tambah User
        </button>
      </div>

      {/* Role Legend */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {ROLES.map(r => (
          <div key={r} style={{ display:'flex', alignItems:'center', gap:6, background:T.card, border:`1px solid ${T.border}`, borderRadius:6, padding:'5px 12px' }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:ROLE_COLORS[r] }}/>
            <span style={{ color:T.sub, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{r}</span>
            <span style={{ color:T.muted, fontSize:9 }}>— {ROLE_PAGES[r].length} modul</span>
          </div>
        ))}
      </div>

      {/* User Table */}
      <Card style={{ padding:0, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${T.border}` }}>
              {['USERNAME','NAMA','ROLE','STATUS','DIBUAT','AKSI'].map(h => (
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:T.muted, fontSize:9, letterSpacing:2, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map((u, i) => (
              <tr key={u.id} style={{ borderBottom: i<users.length-1?`1px solid ${T.border}`:'none', background: u.username===currentUser.username?`${T.accent}08`:'transparent' }}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:28, height:28, borderRadius:6, background:`${ROLE_COLORS[u.role]}22`, border:`1px solid ${ROLE_COLORS[u.role]}44`, display:'flex', alignItems:'center', justifyContent:'center', color:ROLE_COLORS[u.role], fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>
                      {u.username[0].toUpperCase()}
                    </div>
                    <span style={{ color:T.text, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>
                      {u.username}
                      {u.username===currentUser.username && <span style={{ color:T.accent, fontSize:9, marginLeft:6 }}>▶ ANDA</span>}
                    </span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.sub, fontSize:12, fontFamily:"'IBM Plex Sans',sans-serif" }}>{u.name}</td>
                <td style={{ padding:'13px 16px' }}>
                  <Chip color={ROLE_COLORS[u.role]}>{u.role}</Chip>
                </td>
                <td style={{ padding:'13px 16px' }}>
                  <div onClick={() => toggleActive(u)} style={{ cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5, background: u.active?`${T.green}22`:`${T.red}22`, border:`1px solid ${u.active?T.green:T.red}44`, borderRadius:20, padding:'3px 10px' }}>
                    <div style={{ width:6, height:6, borderRadius:'50%', background: u.active?T.green:T.red }}/>
                    <span style={{ color: u.active?T.green:T.red, fontSize:9, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{u.active?'AKTIF':'NONAKTIF'}</span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{u.createdAt}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={() => openEdit(u)} style={{ ...btn(T.accent), padding:'4px 10px', fontSize:10 }} title="Edit profil">✎ Edit</button>
                    <button onClick={() => openPassword(u)} style={{ ...btn(T.yellow), padding:'4px 10px', fontSize:10 }} title="Ganti password">🔑 PW</button>
                    {u.username !== currentUser.username && (
                      <button onClick={() => openDelete(u)} style={{ ...btn(T.red), padding:'4px 10px', fontSize:10 }} title="Hapus user">✕</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      <div style={{ marginTop:12, color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>
        ⓘ Data user tersimpan di localStorage browser ini. Bersih saat clear browser data.
      </div>

      {/* ── MODAL ───────────────────────────────── */}
      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}>
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:28, width:420, maxWidth:'90vw' }}>

            {/* ADD USER */}
            {modal === 'add' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>+ Tambah User Baru</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>USERNAME</div>
                  <input style={inp} value={form.username} onChange={e=>setForm({...form,username:e.target.value.toLowerCase().replace(/\s/g,'')})} placeholder="cth: finance_mgr" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="cth: Budi Santoso" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD</div>
                  <div style={{ position:'relative' }}>
                    <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" />
                    <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                  </div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE & AKSES MODUL</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleAdd} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan User</button>
              </div>
            </>}

            {/* EDIT USER */}
            {modal === 'edit' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>✎ Edit User — {selected?.username}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}
                    disabled={selected?.username === currentUser.username}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:8, letterSpacing:1 }}>STATUS</div>
                  <div style={{ display:'flex', gap:10 }}>
                    {[true,false].map(v=>(
                      <button key={String(v)} onClick={()=>setForm({...form,active:v})}
                        style={{ ...btn(v?T.green:T.red), background:form.active===v?(v?`${T.green}22`:`${T.red}22`):'transparent', flex:1 }}>
                        {v?'✓ AKTIF':'✕ NONAKTIF'}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleEdit} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan Perubahan</button>
              </div>
            </>}

            {/* CHANGE PASSWORD */}
            {modal === 'password' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:6 }}>🔑 Ganti Password</div>
              <div style={{ color:T.muted, fontSize:11, marginBottom:20 }}>User: <span style={{ color:T.accent }}>{selected?.username}</span></div>
              <div>
                <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD BARU</div>
                <div style={{ position:'relative' }}>
                  <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" autoFocus />
                  <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                </div>
                {form.password.length > 0 && form.password.length < 6 && (
                  <div style={{ color:T.red, fontSize:10, marginTop:4 }}>Terlalu pendek — minimal 6 karakter</div>
                )}
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handlePassword} style={{ ...btn(T.yellow), background:`${T.yellow}22` }}>Ganti Password</button>
              </div>
            </>}

            {/* DELETE */}
            {modal === 'delete' && <>
              <div style={{ color:T.red, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:8 }}>✕ Hapus User</div>
              <div style={{ color:T.sub, fontSize:12, marginBottom:20, lineHeight:1.6 }}>
                Yakin hapus user <span style={{ color:T.accent, fontFamily:"'IBM Plex Mono',monospace" }}>{selected?.username}</span> ({selected?.name})?<br/>
                <span style={{ color:T.red, fontSize:11 }}>Tindakan ini tidak bisa dibatalkan.</span>
              </div>
              <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleDelete} style={{ ...btn(T.red), background:`${T.red}22` }}>Ya, Hapus</button>
              </div>
            </>}

          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════
function App() {
  const [user,setUser]=useState(null);
  const [dark,setDark]=useState(true);
  const [page,setPage]=useState('dashboard');
  T = dark?DARK:LIGHT;

  if(!user) return <LoginPage onLogin={u=>{setUser(u);setPage(u.pages[0]||'dashboard');}}/>;

  const pageMap = {
    dashboard:<DashboardPage/>,
    pl:<PLPage/>,
    bs:<BSPage/>,
    cf:<CFPage/>,
    budget:<BudgetPage/>,
    kpi:<KPIPage/>,
    forecast:<ForecastPage/>,
    ai:<AIPage/>,
    macro:<MacroPage/>,
    reports:<ReportsPage/>,
    users:<UserManagementPage currentUser={user}/>,
  };

  return (
    <div style={{display:'flex',background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'IBM Plex Sans',sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:#080C12}
        ::-webkit-scrollbar-thumb{background:#1A2535;border-radius:3px}
        input[type=range]{height:4px;cursor:pointer}
        select option{background:#0D1520;color:#E2E8F0}
        @media print{
          body{background:#fff!important;color:#000!important}
          #root>div>div:first-child{display:none!important}
          *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
      `}</style>
      <Sidebar user={user} active={page} setPage={p=>user.pages.includes(p)?setPage(p):null} dark={dark}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',maxHeight:'100vh'}}>
        <TopBar page={page} dark={dark} setDark={setDark} onLogout={()=>setUser(null)}/>
        <main style={{flex:1,overflow:'auto',padding:'24px',background:T.bg}}>
          {pageMap[page]||<DashboardPage/>}
        </main>
      </div>
    </div>
  );
}


const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(App));
  </script>
  <script>
    function setBar(p,m){document.getElementById('bar').style.width=p+'%';if(m)document.getElementById('status').textContent=m;}
    function hide(){var e=document.getElementById('loading');e.style.opacity='0';setTimeout(function(){e.style.display='none'},500);}
    function err(m){document.getElementById('status').style.color='#EF4444';document.getElementById('status').textContent=m;console.error('GDS:',m);}
    window.addEventListener('load',function(){
      setBar(30,'Memeriksa library...');
      try{
        if(!window.React) return err('React gagal dimuat');
        if(!window.ReactDOM) return err('ReactDOM gagal dimuat');
        if(!window.Recharts) return err('Recharts gagal dimuat');
        if(!window.Babel) return err('Babel gagal dimuat');
        setBar(60,'Kompilasi JSX...');
        var src=document.getElementById('app-src').textContent;
        var out=Babel.transform(src,{presets:['react']});
        setBar(90,'Menjalankan...');
        setTimeout(function(){
          try{eval(out.code);setBar(100);hide();}
          catch(e){err('Runtime: '+e.message);console.error(e);}
        },100);
      }catch(e){err('Compile: '+e.message);console.error(e);}
    });
  </script>
</body>
