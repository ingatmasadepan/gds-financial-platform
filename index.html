// ── Detect period from filename ───────────────────────────────────
function detectPeriodFromFilename(name) {
  const upper = name.toUpperCase();
  // Patterns: TB_2026_01, TB_202601, 2026-01, Jan2026, January2026
  const patterns = [
    /TB[_\-]?(\d{4})[_\-]?(\d{2})/i,
    /(\d{4})[_\-](\d{2})/,
    /(\d{4})(\d{2})(?!\d)/,
  ];
  for (const p of patterns) {
    const m = name.match(p);
    if (m) {
      const yr = m[1], mo = m[2].padStart(2,'0');
      if (parseInt(yr) >= 2013 && parseInt(yr) <= 2030 && parseInt(mo) >= 1 && parseInt(mo) <= 12) {
        return { year: yr, month: mo, key: `${yr}-${mo}`, label: `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]} ${yr}` };
      }
    }
  }
  // Month name patterns
  const months = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  for (const [mn, mo] of Object.entries(months)) {
    const re = new RegExp(`(${mn}\\w*)[\\.\\s_\\-]*(\\d{4})|(\\d{4})[\\.\\s_\\-]*(${mn}\\w*)`, 'i');
    const m = name.match(re);
    if (m) {
      const yr = m[2]||m[3];
      return { year: yr, month: mo, key: `${yr}-${mo}`, label: `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]} ${yr}` };
    }
  }
  return null;
}

// ── Parse CSV ─────────────────────────────────────────────────────
function parseCSV(text) {
  // Proper CSV parser — handles quoted fields with embedded commas
  function splitCSVLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; } // escaped quote
        else inQ = !inQ;
      } else if ((ch === ',' || ch === ';' || ch === '\t') && !inQ) {
        result.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    result.push(cur.trim());
    return result;
  }
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.replace(/^\"|"$/g,'').toLowerCase().trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = splitCSVLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = vals[i] !== undefined ? vals[i].replace(/^\"|"$/g,'') : ''; });
    return row;
  });
}
// ── Parse number from string ──────────────────────────────────────
// Handles: integers, decimals, scientific notation (5.68e+8 → 568000000),
//          accounting negatives (126,478.73) → positive debit value,
//          comma-separated thousands, spaces, SheetJS CSV output formats
function parseNum(v) {
  if (v===undefined||v===null||v==='') return 0;
  let s = String(v).trim();
  // Accounting format parentheses: (1,234.56) → -1234.56  
  if (s.startsWith('(') && s.endsWith(')')) s = '-' + s.slice(1,-1);
  // Remove thousand-separator commas and whitespace
  s = s.replace(/,/g,'').replace(/\s/g,'');
  // parseFloat handles scientific notation natively: 5.68e+8 → 568000000
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// ── Map rows → TB data object ─────────────────────────────────────
function mapRowsToTB(rows) {
  const first = rows[0] || {};
  const keys  = Object.keys(first).map(k => k.toLowerCase());

  const findCol = (...candidates) => {
    for (const c of candidates) {
      const found = keys.find(k => k.includes(c));
      if (found) return found;
    }
    return null;
  };

  const codeCol   = findCol('account no','account','kode','code','acc','no','nomor');
  const debitCol  = findCol('total debit','debit','dr','debet');
  const creditCol = findCol('total credit','credit','cr','kredit');
  const descCol   = findCol('desc','description','name','keterangan','nama','uraian');

  let totalDebit = 0, totalCredit = 0;
  const tb = {};
  const unmapped = [];

  // Balance sheet account prefixes — skip these silently
  const BS_PREFIXES = new Set([
    '110','111','112','113','120','121','122','130','140','141','142',
    '150','160','170','180','190','193','200','210','220','230','240',
    '250','260','270','280','290','300','310','320','330','340','350',
  ]);

  rows.forEach(row => {
    let code   = codeCol   ? String(row[codeCol]  ||'').trim() : '';
    const desc = descCol   ? String(row[descCol]  ||'').trim() : '';
    const debit  = debitCol  ? parseNum(row[debitCol])  : 0;
    const credit = creditCol ? parseNum(row[creditCol]) : 0;

    // Skip subtotal/header rows (no valid account code format)
    if (!code || code.length < 3) return;
    // Skip rows that are category headers like '400', '410' (numeric only, no dash)
    if (/^\d+$/.test(code)) return;
    // Skip rows without debit/credit data (subtotal rows)
    if (debit === 0 && credit === 0 && !code.includes('-')) return;

    totalDebit  += debit;
    totalCredit += credit;

    // ── Get 3-digit prefix: '400-14-010' → '400' ─────────────
    const pfx3 = code.length >= 3 ? code.substring(0, 3) : '';

    // ── Skip Balance Sheet accounts ──────────────────────────
    if (BS_PREFIXES.has(pfx3)) return;

    // ── Handle 800-xx-xxx non-operating accounts ─────────────
    if (pfx3 === '800') {
      const field = TB_800_MAP[code] || 'otherNonOp';
      const amount = (debit - credit) / 1e9;
      tb[field] = (tb[field] || 0) + amount;
      return;
    }

    // ── Handle 900-xx-xxx (tax/other) → otherNonOp ───────────
    if (pfx3 === '900') {
      const amount = (debit - credit) / 1e9;
      if (Math.abs(amount) > 0) {
        tb['otherNonOp'] = (tb['otherNonOp'] || 0) + amount;
      }
      return;
    }

    // ── Standard mapping by 3-digit prefix ───────────────────
    const mapping = TB_FIELD_MAP[pfx3];
    if (mapping) {
      const [field, isRevenue] = mapping;
      const amount = isRevenue
        ? (credit - debit) / 1e9   // Revenue: credit normal
        : (debit - credit) / 1e9;  // Expense: debit normal
      tb[field] = (tb[field] || 0) + amount;
    } else if (code && desc) {
      unmapped.push({ code, desc, debit, credit });
    }
  });

  return { tb, totalDebit, totalCredit, unmapped };
}

// ── Validate balance ──────────────────────────────────────────────
function validateBalance(totalDebit, totalCredit) {
  const diff = Math.abs(totalDebit - totalCredit);
  const threshold = Math.max(totalDebit, totalCredit) * 0.001; // 0.1% tolerance
  return { balanced: diff <= threshold, diff, totalDebit, totalCredit };
}

function TBImportPage({ currentUser, onImportDone }) {

  const [parsedTB,     setParsedTB]     = useState(null);
  const [validation,   setValidation]   = useState(null);
  const [detectedPeriod, setDetectedPeriod] = useState(null);
  const [manualYear,   setManualYear]   = useState('2026');
  const [manualMonth,  setManualMonth]  = useState('02');
  const [useManual,    setUseManual]    = useState(false);
  const [periodConflict, setPeriodConflict] = useState(false);
  const [conflictChoice, setConflictChoice] = useState(null); // 'replace'|'cancel'
  const [importing,    setImporting]    = useState(false);
  const [importLog,    setImportLog]    = useState(window.__GDS_TB_IMPORT_LOG || []);
  const [parseError,   setParseError]   = useState('');
  const [unmapped,     setUnmapped]     = useState([]);
  const [dragOver,     setDragOver]     = useState(false);
  const [activeTab,    setActiveTab]    = useState('import');   // import|history|mapping

  const ML12 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const effectivePeriod = useMemo(() => {
    if (useManual || !detectedPeriod) {
      const key = `${manualYear}-${manualMonth}`;
      return { year: manualYear, month: manualMonth, key, label: `${ML12[parseInt(manualMonth)-1]} ${manualYear}` };
    }
    return detectedPeriod;
  }, [useManual, manualYear, manualMonth, detectedPeriod]);

  // Re-check period conflict whenever effectivePeriod changes (e.g. user overrides manually)
  useEffect(() => {
    if (step === 'preview' || step === 'confirm') {
      const tbRef = window.__TB_REF;
      const exists = !!(tbRef && tbRef[effectivePeriod.key]);
      setPeriodConflict(exists);
      setConflictChoice(null);
    }
  }, [effectivePeriod.key, step]);
  const processFile = useCallback(async (f) => {
    setParseError('');
    setStep('upload');
    setFile(f);
    setFileName(f.name);
    setFileSize(f.size);

    const detected = detectPeriodFromFilename(f.name);
    setDetectedPeriod(detected);
    setUseManual(!detected);

    try {
      const text = await f.text();
      let rows = [];

      if (f.name.toLowerCase().endsWith('.csv') || f.type.includes('csv')) {
        rows = parseCSV(text);
      } else if (f.name.match(/\.xlsx?$/i)) {
        // For XLS/XLSX: try parsing as CSV first (some tools export xlsx as csv)
        // Real XLSX needs SheetJS — try to use it if available
        if (typeof XLSX !== 'undefined') {
          const ab = await f.arrayBuffer();
          const wb = XLSX.read(ab, {type:'array'});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const csv = XLSX.utils.sheet_to_csv(ws);
          rows = parseCSV(csv);
        } else {
          // Fallback: try as text
          rows = parseCSV(text);
          if (!rows.length) {
            setParseError('File Excel memerlukan library SheetJS. Coba export sebagai CSV terlebih dahulu.');
            return;
          }
        }
      } else {
        rows = parseCSV(text);
      }

      if (!rows.length) {
        setParseError('File tidak dapat dibaca atau kosong. Pastikan format kolom benar.');
        return;
      }

      setRawRows(rows);
      const { tb, totalDebit, totalCredit, unmapped: um } = mapRowsToTB(rows);
      setParsedTB(tb);
      setUnmapped(um);
      const val = validateBalance(totalDebit, totalCredit);
      setValidation(val);

      // Check period conflict — use window.__TB_REF which points to actual TB object
      const pKey = detected ? detected.key : `${manualYear}-${manualMonth}`;
      const tbRef = window.__TB_REF;
      const exists = !!(tbRef && tbRef[pKey]);
      setPeriodConflict(exists);
      setConflictChoice(null);
      setStep('preview');
    } catch(err) {
      setParseError('Error membaca file: ' + err.message);
    }
  }, [manualYear, manualMonth]);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (f) processFile(f);

  const handleFileInput = (e) => {
    const f = e.target.files[0];
    if (f) processFile(f);
  };

  // ── Import execution ──────────────────────────────────────────

    // If conflict exists but user chose cancel → do not proceed

    // If conflict exists and user hasn't chosen yet → auto-proceed as revisi
    // (they already confirmed by clicking "Import Sekarang")
    setImporting(true);

    setTimeout(() => {

        window.__GDS_RECALC_PERIOD = effectivePeriod.key;
        setImporting(false);

        // Call parent callback AFTER state update — setTimeout ensures render cycle completes

      } catch(err) {
        setImporting(false);
        setParseError('Import gagal: ' + err.message);
        setStep('preview');
      }
    }, 1200);
  };

  const handleReset = () => {
    setStep('upload');
    setFile(null);
    setFileName('');
    setRawRows([]);
    setParsedTB(null);
    setValidation(null);
    setDetectedPeriod(null);
    setParseError('');
    setUnmapped([]);
    setConflictChoice(null);
    setPeriodConflict(false);

  const fIDR = n => { const a=Math.abs(n); return (a>=1e9?(a/1e9).toFixed(2)+'B':a>=1e6?(a/1e6).toFixed(1)+'M':a>=1e3?(a/1e3).toFixed(0)+'K':a.toFixed(0))+' IDR'; };

  const TAB = (k,l,ic) => (

                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}} className="r-grid-2">
                    {[
                      ['Kode Akun','code / account / kode / no'],
                      ['Keterangan','desc / name / keterangan / uraian'],
                      ['Debit','debit / dr / debet'],
                      ['Credit','credit / cr / kredit'],
                    ].map(([k,v])=>(
                      <div key={k} style={{fontSize:10}}>
                        <span style={{color:T.accent,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{k}: </span>
                        <span style={{color:T.muted}}>{v}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:8,fontSize:9,color:T.muted}}>
                    💡 Nama file: <span style={{fontFamily:"'IBM Plex Mono'",color:T.sub}}>TB_2026_01.xlsx</span> atau <span style={{fontFamily:"'IBM Plex Mono'",color:T.sub}}>Jan2026.csv</span> → periode terdeteksi otomatis
                  </div>
                </div>
              </Card>
            )}

            {/* ── STEP: PREVIEW ── */}
            {step==='preview' && parsedTB && (
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {/* Period detection banner */}
                <Card style={{padding:'14px 16px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
                    <div>
                      <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",marginBottom:4,textTransform:'uppercase'}}>
                        {detectedPeriod&&!useManual?'✅ Periode Terdeteksi Otomatis':'📅 Periode Manual'}
                      </div>
                      <div style={{color:T.text,fontSize:16,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{effectivePeriod.label}</div>
                      <div style={{color:T.muted,fontSize:10,marginTop:2}}>Key: {effectivePeriod.key} · File: {fileName}</div>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      {detectedPeriod && (
                        <button onClick={()=>setUseManual(p=>!p)}
                          style={{padding:'5px 12px',borderRadius:5,border:`1px solid ${T.border}`,
                            background:useManual?`${T.accent}15`:'none',
                            color:useManual?T.accent:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                          {useManual?'Gunakan Deteksi Otomatis':'Override Manual'}
                        </button>
                      )}
                      {useManual && (
                        <div style={{display:'flex',gap:6}}>
                          <select value={manualYear} onChange={e=>setManualYear(e.target.value)}
                            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:5,padding:'5px 8px',color:T.text,fontSize:10,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
                            {['2026','2025','2024','2023'].map(y=><option key={y} value={y}>{y}</option>)}
                          </select>
                          <select value={manualMonth} onChange={e=>setManualMonth(e.target.value)}
                            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:5,padding:'5px 8px',color:T.text,fontSize:10,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
                            {ML12.map((m,i)=><option key={i+1} value={String(i+1).padStart(2,'0')}>{m}</option>)}
                          </select>
                        </div>
                      )}
                    </div>
                  </div>
                </Card>

                {/* Validation result */}
                <Card style={{padding:'14px 16px',border:`1px solid ${validation?.balanced?T.green:T.red}40`,background:validation?.balanced?`${T.green}06`:`${T.red}06`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <span style={{fontSize:24}}>{validation?.balanced?'✅':'⚠️'}</span>
                      <div>
                        <div style={{color:validation?.balanced?T.green:T.red,fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
                          {validation?.balanced?'Trial Balance Seimbang':'Trial Balance Tidak Seimbang'}
                        </div>
                        <div style={{color:T.muted,fontSize:10,marginTop:2}}>
                          Debit: {fIDR(validation?.totalDebit||0)} · Credit: {fIDR(validation?.totalCredit||0)}
                          {!validation?.balanced && ` · Selisih: ${fIDR(validation?.diff||0)}`}
                        </div>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8,fontSize:12,color:T.muted,fontFamily:"'IBM Plex Mono'"}}>
                      <span>{rawRows.length} baris data</span>
                      {unmapped.length>0 && <span style={{color:T.yellow}}>· {unmapped.length} akun tidak terpetakan</span>}
                    </div>
                  </div>
                  {!validation?.balanced && (
                    <div style={{marginTop:10,padding:'8px 12px',background:`${T.red}10`,borderRadius:6,
                      border:`1px solid ${T.red}25`,fontSize:10,color:T.red}}>
                      ⚠ Trial balance tidak seimbang. Data tetap dapat diimpor namun perlu diverifikasi terlebih dahulu.
                    </div>
                  )}
                </Card>

                {/* Period conflict */}
                {periodConflict && (
                  <div style={{padding:'14px 16px',background:`${T.yellow}0d`,borderRadius:10,
                    border:`1px solid ${T.yellow}40`}}>
                    <div style={{color:T.yellow,fontSize:12,fontWeight:700,marginBottom:8,fontFamily:"'IBM Plex Mono'"}}>
                      ⚡ Periode {effectivePeriod.label} Sudah Ada
                    </div>
                    <div style={{color:T.sub,fontSize:11,marginBottom:12}}>
                      Data untuk periode ini sudah tersedia di sistem. Pilih tindakan:
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>setConflictChoice('replace')}
                        style={{padding:'8px 16px',borderRadius:6,border:`2px solid ${conflictChoice==='replace'?T.accent:T.border}`,
                          background:conflictChoice==='replace'?`${T.accent}15`:'none',
                          color:conflictChoice==='replace'?T.accent:T.sub,
                          fontSize:11,fontFamily:"'IBM Plex Mono'",cursor:'pointer',fontWeight:700}}>
                        🔄 Revisi / Replace Data
                      </button>
                      <button onClick={()=>setConflictChoice('cancel')}
                        style={{padding:'8px 16px',borderRadius:6,border:`2px solid ${conflictChoice==='cancel'?T.red:T.border}`,
                          background:conflictChoice==='cancel'?`${T.red}10`:'none',
                          color:conflictChoice==='cancel'?T.red:T.sub,
                          fontSize:11,fontFamily:"'IBM Plex Mono'",cursor:'pointer',fontWeight:700}}>
                        ✕ Batalkan Import
                      </button>
                    </div>
                  </div>
                )}

                {/* P&L preview from parsed data */}
                <Card>
                  <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",marginBottom:12,textTransform:'uppercase'}}>Preview Data P&L Terdeteksi</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:12}} className="r-grid-4">
                    {[
                      {l:'Room Revenue',   v:safe(parsedTB.rooms),     c:T.accent},
                      {l:'F&B Revenue',    v:safe(parsedTB.fnb),       c:T.accent},
                      {l:'Total Revenue',  v:safe(parsedTB.rooms)+safe(parsedTB.fnb)+safe(parsedTB.minor)+safe(parsedTB.otherinc), c:T.green},
                      {l:'Dept Payroll',   v:safe(parsedTB.deptPay),   c:T.red},
                      {l:'Cost of Sales',  v:safe(parsedTB.cos),       c:T.red},
                      {l:'Overhead Pay',   v:safe(parsedTB.ovhdPay),   c:T.red},
                    ].map(k=>(
                      <div key={k.l} style={{background:T.bg,borderRadius:6,padding:'10px 12px',border:`1px solid ${T.border}`}}>
                        <div style={{fontSize:9,color:T.muted,marginBottom:3,letterSpacing:1,textTransform:'uppercase'}}>{k.l}</div>
                        <div style={{fontSize:14,fontWeight:700,color:k.c,fontFamily:"'IBM Plex Mono'"}}>{fB(k.v)}</div>
                      </div>
                    ))}
                  </div>
                  {unmapped.length>0 && (
                    <details style={{marginTop:8}}>
                      <summary style={{color:T.yellow,fontSize:10,fontFamily:"'IBM Plex Mono'",cursor:'pointer',padding:'6px 0'}}>
                        ⚠ {unmapped.length} Akun Tidak Terpetakan (klik untuk lihat)
                      </summary>
                      <div style={{maxHeight:160,overflowY:'auto',marginTop:8}}>
                        <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
                          <thead>
                            <tr style={{background:T.border}}>
                              {['Kode','Keterangan','Debit','Credit'].map(h=>(
                                <th key={h} style={{padding:'5px 8px',textAlign:h==='Kode'||h==='Keterangan'?'left':'right',
                                  color:T.muted,fontFamily:"'IBM Plex Mono'",fontSize:9}}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {unmapped.slice(0,20).map((u,i)=>(
                              <tr key={i} style={{borderBottom:`1px solid ${T.border}`}}>
                                <td style={{padding:'4px 8px',color:T.yellow,fontFamily:"'IBM Plex Mono'"}}>{u.code||'—'}</td>
                                <td style={{padding:'4px 8px',color:T.sub,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{u.desc||'—'}</td>
                                <td style={{padding:'4px 8px',textAlign:'right',fontFamily:"'IBM Plex Mono'",color:T.muted}}>{fIDR(u.debit)}</td>
                                <td style={{padding:'4px 8px',textAlign:'right',fontFamily:"'IBM Plex Mono'",color:T.muted}}>{fIDR(u.credit)}</td>
                              </tr>
                            ))}
                            {unmapped.length>20&&<tr><td colSpan={4} style={{padding:'4px 8px',color:T.muted,fontSize:9}}>... dan {unmapped.length-20} lainnya</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </details>
                  )}
                </Card>

                {/* Action buttons */}
                <div style={{display:'flex',gap:10}}>
                  <button onClick={handleReset}
                    style={{padding:'10px 20px',borderRadius:7,border:`1px solid ${T.border}`,
                      background:'none',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                    ← Upload Ulang
                  </button>
                  <button
                    disabled={periodConflict&&conflictChoice==='cancel'}
                    onClick={()=>setStep('confirm')}
                    style={{flex:1,padding:'10px 20px',borderRadius:7,border:'none',
                      background:(periodConflict&&conflictChoice==='cancel')?T.border:T.accent,
                      color:(periodConflict&&conflictChoice==='cancel')?T.muted:'#080C12',
                      fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'",
                      cursor:(periodConflict&&conflictChoice==='cancel')?'not-allowed':'pointer'}}>
                    Lanjut ke Konfirmasi →
                  </button>
                </div>
                {periodConflict && conflictChoice==='cancel' && (
                  <div style={{textAlign:'center',color:T.red,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>Import dibatalkan. Upload file baru untuk melanjutkan.</div>
                )}
              </div>
            )}

            {/* ── STEP: CONFIRM ── */}
            {step==='confirm' && (
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <Card style={{border:`1px solid ${T.accent}30`}}>
                  <div style={{color:T.accent,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'",marginBottom:16}}>
                    Konfirmasi Import Trial Balance
                  </div>
                  {[
                    ['Perusahaan', 'Grand Darmo Suite by Amithya'],
                    ['Periode', effectivePeriod.label],
                    ['File', fileName],
                    ['Ukuran File', fileSize>1024*1024?(fileSize/1024/1024).toFixed(1)+' MB':(fileSize/1024).toFixed(0)+' KB'],
                    ['Total Baris Data', rawRows.length.toLocaleString()],
                    ['Status Neraca', validation?.balanced?'✅ Seimbang':'⚠️ Tidak Seimbang'],
                    ['Akun Tidak Terpetakan', unmapped.length>0?`⚠ ${unmapped.length} akun`:'✅ Semua terpetakan'],
                    ['Tindakan', periodConflict ? '🔄 Revisi Data Existing' : '✨ Buat Periode Baru'],
                    ['Diimpor oleh', `${currentUser?.name||'—'} (${currentUser?.role||'—'})`],
                    ['Waktu', new Date().toLocaleString('id-ID')],
                  ].map(([k,v])=>(
                    <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                      padding:'8px 0',borderBottom:`1px solid ${T.border}`}}>
                      <span style={{color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{k}</span>
                      <span style={{color:T.text,fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'",textAlign:'right',maxWidth:'60%'}}>{v}</span>
                    </div>
                  ))}

                  <div style={{marginTop:14,padding:'10px 14px',background:`${T.accent}08`,borderRadius:7,
                    border:`1px solid ${T.accent}20`,fontSize:10,color:T.sub,lineHeight:1.7}}>
                    🔄 Setelah import berhasil, platform akan memicu recalculation otomatis untuk:
                    Profit & Loss · Balance Sheet · Cash Flow · KPI · Forecast · AI Intelligence · Overview · Reports
                  </div>

                  {periodConflict && (
                    <div style={{marginTop:10,padding:'10px 14px',background:`${T.yellow}0d`,borderRadius:7,
                      border:`1px solid ${T.yellow}35`,fontSize:10,color:T.yellow}}>
                      ⚡ Data periode <strong>{effectivePeriod.label}</strong> sudah ada dan akan <strong>direvisi</strong> dengan data dari file ini.
                    </div>
                  )}
                </Card>

                <div style={{display:'flex',gap:10}}>
                  <button onClick={()=>setStep('preview')}
                    style={{padding:'10px 20px',borderRadius:7,border:`1px solid ${T.border}`,
                      background:'none',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                    ← Kembali
                  </button>
                  <button onClick={handleImport} disabled={importing || conflictChoice==='cancel'}
                    style={{flex:1,padding:'12px 24px',borderRadius:7,border:'none',
                      background:(importing||conflictChoice==='cancel')?T.border:'linear-gradient(135deg,#00D4FF,#00897B)',
                      color:(importing||conflictChoice==='cancel')?T.muted:'#080C12',
                      fontSize:13,fontWeight:800,fontFamily:"'IBM Plex Mono'",
                      cursor:(importing||conflictChoice==='cancel')?'not-allowed':'pointer',letterSpacing:1,
                      boxShadow:(importing||conflictChoice==='cancel')?'none':'0 4px 12px rgba(0,212,255,0.25)'}}>
                    {importing?'⏳ Mengimpor Data…': periodConflict ? '🔄 REVISI SEKARANG' : '⬆ IMPORT SEKARANG'}
                  </button>
                </div>
              </div>
            )}

            {/* ── STEP: RESULT ── */}
            {step==='result' && (
              <Card style={{border:`1px solid ${T.green}30`,background:`${T.green}05`}}>
                <div style={{textAlign:'center',padding:'20px 0'}}>
                  <div style={{fontSize:48,marginBottom:12}}>✅</div>
                  <div style={{color:T.green,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'",marginBottom:8}}>
                    Import Berhasil
                  </div>
                  <div style={{color:T.sub,fontSize:12,lineHeight:1.7,marginBottom:20}}>
                    Trial Balance untuk <strong style={{color:T.text}}>{effectivePeriod.label}</strong> berhasil diimpor.<br/>
                    Recalculation telah dipicu untuk seluruh modul platform.
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}} className="r-grid-3">
                    {[
                      {l:'Periode',  v:effectivePeriod.label, c:T.accent},
                      {l:'Baris',    v:rawRows.length,         c:T.text},
                      {l:'Status',   v:validation?.balanced?'Seimbang':'Perlu Cek', c:validation?.balanced?T.green:T.yellow},
                    ].map(k=>(
                      <div key={k.l} style={{background:T.bg,borderRadius:8,padding:'12px',border:`1px solid ${T.border}`}}>
                        <div style={{fontSize:9,color:T.muted,marginBottom:4,letterSpacing:1,textTransform:'uppercase'}}>{k.l}</div>
                        <div style={{fontSize:14,fontWeight:700,color:k.c,fontFamily:"'IBM Plex Mono'"}}>{k.v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:'flex',gap:10,justifyContent:'center'}}>
                    <button onClick={handleReset}
                      style={{padding:'10px 24px',borderRadius:7,border:`1px solid ${T.border}`,
                        background:'none',color:T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                      Import File Lain
                    </button>
                    <button onClick={()=>setActiveTab('history')}
                      style={{padding:'10px 24px',borderRadius:7,border:'none',
                        background:T.accent,color:'#080C12',
                        fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                      Lihat History →
                    </button>
                  </div>
                </div>
              </Card>
            )}
          </div>

          {/* RIGHT: Info panel */}
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {/* Status panel */}
            <Card style={{padding:'14px 16px'}}>
              <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",marginBottom:12,textTransform:'uppercase'}}>Status Modul</div>
              {[
                {l:'Profit & Loss',   m:'P&L',      ok:true},
                {l:'Balance Sheet',   m:'BS',       ok:true},
                {l:'Cash Flow',       m:'CF',       ok:true},
                {l:'Financial KPIs',  m:'KPI',      ok:true},
                {l:'Forecast Engine', m:'FC',       ok:true},
                {l:'AI Intelligence', m:'AI',       ok:true},
                {l:'Overview',        m:'OVW',      ok:true},
                {l:'Reports',         m:'RPT',      ok:true},
              ].map(m=>(
                <div key={m.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                  <span style={{fontSize:10,color:T.sub,fontFamily:"'IBM Plex Mono'"}}>{m.l}</span>
                  <span style={{fontSize:9,padding:'2px 7px',borderRadius:3,fontWeight:700,fontFamily:"'IBM Plex Mono'",
                    background:step==='result'?`${T.green}15`:m.ok?`${T.accent}15`:T.border,
                    color:step==='result'?T.green:m.ok?T.accent:T.muted}}>
                    {step==='result'?'RECALCULATED':'READY'}
                  </span>
                </div>
              ))}
            </Card>

            {/* Quick stats */}
            <Card style={{padding:'14px 16px'}}>
              <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",marginBottom:12,textTransform:'uppercase'}}>Import Statistics</div>
              {[
                {l:'Total Imports',    v:importLog.length},
                {l:'Successful',       v:importLog.filter(l=>l.status==='SUCCESS').length},
                {l:'Periods Covered',  v:[...new Set(importLog.map(l=>l.periodKey))].length},
                {l:'Last Import',      v:importLog[0]?.period||'—'},
              ].map(s=>(
                <div key={s.l} style={{display:'flex',justifyContent:'space-between',
                  padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                  <span style={{fontSize:10,color:T.muted}}>{s.l}</span>
                  <span style={{fontSize:11,fontWeight:700,color:T.accent,fontFamily:"'IBM Plex Mono'"}}>{s.v}</span>
                </div>
              ))}
            </Card>

            {/* Tip */}
            <div style={{padding:'12px 14px',background:`${T.accent}06`,borderRadius:8,border:`1px solid ${T.border}`}}>
              <div style={{color:T.accent,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",marginBottom:6,textTransform:'uppercase'}}>💡 Tips</div>
              <div style={{color:T.muted,fontSize:10,lineHeight:1.7}}>
                Penamaan file yang direkomendasikan:<br/>
                <span style={{fontFamily:"'IBM Plex Mono'",color:T.sub}}>TB_2026_01.csv</span><br/>
                <span style={{fontFamily:"'IBM Plex Mono'",color:T.sub}}>TB_2026_02.xlsx</span><br/>
                Format ini memungkinkan deteksi periode otomatis.
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ══ TAB: HISTORY ══ */}
      {activeTab==='history' && (
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",textTransform:'uppercase'}}>Import Log — {importLog.length} entri</div>
            {importLog.length>0 && (
              <button onClick={()=>{window.__GDS_TB_IMPORT_LOG=[];setImportLog([]);}}
                style={{padding:'4px 10px',borderRadius:4,border:`1px solid ${T.border}`,background:'none',
                  color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                Clear Log
              </button>
            )}
          </div>
          {importLog.length===0 ? (
            <div style={{textAlign:'center',padding:'40px 0',color:T.muted}}>
              <div style={{fontSize:32,marginBottom:12}}>📋</div>
              <div style={{fontSize:11}}>Belum ada import history</div>
            </div>
          ) : (
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr style={{background:T.border}}>
                    {['Waktu','Periode','File','Baris','Neraca','Tindakan','User','Status'].map(h=>(
                      <th key={h} style={{padding:'8px 10px',textAlign:'left',color:T.muted,fontSize:9,
                        letterSpacing:1,fontFamily:"'IBM Plex Mono'",whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {importLog.map((log,i)=>(
                    <tr key={log.id||i} style={{borderBottom:`1px solid ${T.border}`,
                      background:i%2===0?'transparent':`${T.accent}03`}}>
                      <td style={{padding:'7px 10px',color:T.muted,fontFamily:"'IBM Plex Mono'",fontSize:10,whiteSpace:'nowrap'}}>{log.timestamp}</td>
                      <td style={{padding:'7px 10px',color:T.accent,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{log.period}</td>
                      <td style={{padding:'7px 10px',color:T.sub,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={log.fileName}>{log.fileName}</td>
                      <td style={{padding:'7px 10px',color:T.text,fontFamily:"'IBM Plex Mono'",textAlign:'right'}}>{log.rows?.toLocaleString()}</td>
                      <td style={{padding:'7px 10px'}}>
                        <span style={{fontSize:9,fontWeight:700,fontFamily:"'IBM Plex Mono'",
                          color:log.balanced?T.green:T.yellow}}>
                          {log.balanced?'✅ OK':'⚠ Cek'}
                        </span>
                      </td>
                      <td style={{padding:'7px 10px'}}>
                        <span style={{fontSize:9,padding:'2px 6px',borderRadius:3,fontWeight:700,fontFamily:"'IBM Plex Mono'",
                          background:log.action==='NEW'?`${T.green}15`:`${T.yellow}15`,
                          color:log.action==='NEW'?T.green:T.yellow}}>
                          {log.action==='NEW'?'NEW':'REVISI'}
                        </span>
                      </td>
                      <td style={{padding:'7px 10px',color:T.sub,fontSize:10}}>{log.user}</td>
                      <td style={{padding:'7px 10px'}}>
                        <span style={{fontSize:9,padding:'2px 6px',borderRadius:3,fontWeight:700,
                          background:`${T.green}15`,color:T.green}}>
                          {log.status}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </Card>
      )}

      {/* ══ TAB: ACCOUNT MAPPING ══ */}
      {activeTab==='mapping' && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
          {[
            {title:'💰 Revenue', color:T.green, items:[
              ['4100–4120','Room Revenue','rooms'],
              ['4200–4220','F&B Revenue','fnb'],
              ['4300','Minor Operated','minor'],
              ['4400','Other Income','otherinc'],
            ]},
            {title:'🔴 Cost of Sales', color:T.red, items:[
              ['5100–5200','Cost of Sales / F&B Cost','cos'],
            ]},
            {title:'👥 Departmental Payroll', color:T.yellow, items:[
              ['6100–6110','Room Dept Payroll','deptPay'],
              ['6200','F&B Dept Payroll','deptPay'],
            ]},
            {title:'⚙️ Dept Other Expenses', color:T.orange, items:[
              ['6150','Room Dept Other','deptOther'],
              ['6250','F&B Dept Other','deptOther'],
            ]},
            {title:'🏢 Overhead Payroll', color:T.purple, items:[
              ['7100–7110','Overhead Payroll','ovhdPay'],
            ]},
            {title:'📋 Overhead Other', color:T.accent, items:[
              ['7200–7210','Overhead Other Expenses','ovhdOther'],
              ['7300','Utility / Other Overhead','ovhdOther'],
            ]},
            {title:'🏦 Non-Operating', color:T.muted, items:[
              ['8100','Incentive Fee','incentFee'],
              ['8200','Management Fee','mgmtFee'],
              ['8300','Depreciation','deprTotal'],
              ['8400','Interest','interest'],
              ['8500','ROI / Financing','roi'],
              ['8600','Owner Expenses','ownExp'],
              ['8700','Other Non-Op','otherNonOp'],
            ]},
          ].map(group=>(
            <Card key={group.title} style={{padding:'14px 16px'}}>
              <div style={{color:group.color,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'",
                marginBottom:10,borderBottom:`1px solid ${T.border}`,paddingBottom:8}}>
                {group.title}
              </div>
              {group.items.map(([code,desc,field])=>(
                <div key={code} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'5px 0',borderBottom:`1px solid ${T.border}22`}}>
                  <div>
                    <span style={{fontFamily:"'IBM Plex Mono'",fontSize:10,color:group.color,fontWeight:700}}>{code}</span>
                    <span style={{fontSize:10,color:T.sub,marginLeft:8}}>{desc}</span>
                  </div>

      )}
    </div>
  );
}

// PROFESSIONAL BOARD REPORT GENERATOR v2
// Reads from existing modules — no recalculation

// ══════════════════════════════════════════════════════════════════
// BOARD REPORT GENERATOR v3 — Charts + Professional Layout
// ══════════════════════════════════════════════════════════════════
function ReportsPage({ tbVersion=0 }) {
  const [selPeriod,     setSelPeriod]     = useState('2025');
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [selSubPeriod,  setSelSubPeriod]  = useState('full');
  const [selReport,     setSelReport]     = useState('board');
  const [theme,         setTheme]         = useState('dark');
  const [summaryText,   setSummaryText]   = useState('');
  const [editedSummary, setEditedSummary] = useState('');
  const [savedSummaries,setSavedSummaries]= useState({});
  const [summaryDirty,  setSummaryDirty]  = useState(false);
  const [exporting,     setExporting]     = useState(false);

  const ALL_SECTIONS = ['exec','dashboard','revenue','cost','pl','bs','cf','kpi','budget','forecast','macro'];
  const [selectedSections, setSelectedSections] = useState(ALL_SECTIONS);

  const SECTION_META = {
    exec:      {icon:'📋',label:'Executive Summary',    desc:'AI-generated financial narrative'},
    dashboard: {icon:'📊',label:'Performance Dashboard',desc:'KPIs, alerts & health indicators'},
    revenue:   {icon:'💰',label:'Revenue Analysis',     desc:'Revenue breakdown & trends'},
    cost:      {icon:'✂️', label:'Cost Structure',       desc:'Cost analysis & ratios'},
    pl:        {icon:'≋', label:'Profit & Loss',        desc:'Full income statement'},
    bs:        {icon:'◫', label:'Balance Sheet',        desc:'Statement of financial position'},
    cf:        {icon:'⟲', label:'Cash Flow',            desc:'Indirect cash flow statement'},
    kpi:       {icon:'◈', label:'Financial KPIs',       desc:'All ratios & scorecard'},
    budget:    {icon:'⊞', label:'Budget vs Actual',     desc:'Variance analysis'},
    forecast:  {icon:'📡',label:'Forecast Outlook',     desc:'12-month scenario projections'},
    macro:     {icon:'🌍',label:'Macro Radar Signals',  desc:'External environment analysis'},
  };

  const reports = [
    {id:'board',    name:'Board Pack',      icon:'⊟', desc:'Complete executive board report'},
    {id:'pl',       name:'P&L Report',      icon:'≋', desc:'P&L statement + summary'},
    {id:'bs',       name:'Balance Sheet',   icon:'◫', desc:'Balance sheet + liquidity'},
    {id:'cf',       name:'Cash Flow',       icon:'⟲', desc:'Cash flow analysis'},
    {id:'kpi',      name:'KPI Scorecard',   icon:'◈', desc:'All financial ratios'},
    {id:'budget',   name:'Budget Analysis', icon:'⊞', desc:'Budget vs actual variance'},
    {id:'forecast', name:'Forecast',        icon:'📡',desc:'Scenario-based projections'},
    {id:'macro',    name:'Macro Report',    icon:'🌍',desc:'External environment'},
    {id:'custom',   name:'Custom',          icon:'⚙', desc:'Select sections below'},
  ];

  const handleReportChange = (id) => {
    setSelReport(id);
    const presets = {board:ALL_SECTIONS,pl:['exec','revenue','pl'],bs:['exec','bs'],
      cf:['exec','cf'],kpi:['exec','kpi'],budget:['exec','budget'],forecast:['exec','forecast'],macro:['exec','macro']};
    if(id!=='custom') setSelectedSections(presets[id]||ALL_SECTIONS);
  };

  const toggleSection = (id) => setSelectedSections(prev => prev.includes(id)?prev.filter(s=>s!==id):[...prev,id]);

  const subPeriodOpts = useMemo(() => {
    const yr=selPeriod;
    if(parseInt(yr)<2024) return [{v:'full',l:`Full Year ${yr}`}];
    if(yr==='2026') return [{v:'ytd',l:'YTD Jan–Feb 2026'},{v:'m1',l:'January 2026'},{v:'m2',l:'February 2026'}];
    const months=ML.map((m,i)=>{const k=`${yr}-${String(i+1).padStart(2,'0')}`;return TB[k]?{v:`m${i+1}`,l:`${m} ${yr}`}:null;}).filter(Boolean);
    return [{v:'full',l:`Full Year ${yr}`},{v:'q1',l:`Q1 ${yr}`},{v:'q2',l:`Q2 ${yr}`},{v:'q3',l:`Q3 ${yr}`},{v:'q4',l:`Q4 ${yr}`},...months];
  }, [selPeriod]);

  const handleYrChange = (v) => { setSelPeriod(v); setSelSubPeriod(v==='2026'?'ytd':'full'); setSummaryDirty(false); };
  const periodKey = `${selPeriod}_${selSubPeriod}`;

  useEffect(() => {
    const yr=selPeriod,sp=selSubPeriod,isAnn=parseInt(yr)<2024;
    let keys2;
    if(isAnn) keys2=null;
    else if(yr==='2026') keys2=sp==='m1'?['2026-01']:sp==='m2'?['2026-02']:['2026-01','2026-02'];
    else if(sp==='full') keys2=yr==='2025'?mKeys25:mKeys24;
    else if(sp.startsWith('q')){const qn=parseInt(sp.slice(1)),base=(qn-1)*3;keys2=[1,2,3].map(i=>`${yr}-${String(base+i).padStart(2,'0')}`).filter(k=>TB[k]);}
    else keys2=[`${yr}-${sp.slice(1).padStart(2,'0')}`];
    const d2=isAnn?annPnl(parseInt(yr)):(keys2&&keys2.length?aggKeys(keys2):annPnl(parseInt(yr)));
    const bsK=yr==='2026'?(sp==='m1'?'jan26':'feb26'):`dec${yr.slice(2)}`;
    const bs2=bsCalc(BS_SNAPSHOTS[bsK]||BS_SNAPSHOTS['feb26']);
    const bud2=(yr==='2026'&&keys2)?aggKeys(keys2,BUD26):null;
    const cr2=bs2.tCA/Math.max(bs2.tCL,0.001),de2=bs2.tL/Math.max(bs2.tEq,0.001),roa2=d2.nop/Math.max(bs2.tA,0.001)*100;
    const budVP=bud2?((d2.rev-bud2.rev)/Math.max(bud2.rev,0.001)*100):null;
    const getLabel=()=>{if(yr==='2026')return sp==='m1'?'Jan 2026':sp==='m2'?'Feb 2026':'YTD Jan–Feb 2026';if(sp==='full')return'Full Year '+yr;if(sp.startsWith('q'))return'Q'+sp.slice(1)+' '+yr;return ML[parseInt(sp.slice(1))-1]+' '+yr;};
    const pl2=getLabel();
    const fM2=(v)=>{if(!v&&v!==0)return'—';const a=Math.abs(v)*1000;const s=a>=1?a.toFixed(1)+'M':(a*1000).toFixed(0)+'K';return v<0?'('+s+')':s;};
    const fP2=(v)=>(!v&&v!==0)?'—':v.toFixed(1)+'%';
    const auto=`Grand Darmo Suite by Amithya recorded total revenue of ${fM2(d2.rev)} for ${pl2}, `+
      `with GOP/EBITDA of ${fM2(d2.gop)} (${fP2(d2.gopMgn)} margin) and Net Operating Profit of ${fM2(d2.nop)} (${fP2(d2.nopMgn)} margin). `+
      (budVP!==null?`Revenue ${budVP>=0?'exceeded':'missed'} budget by ${Math.abs(budVP).toFixed(1)}%. `:'')+
      `Payroll ratio ${fP2(d2.payRat)}, ${d2.payRat<35?'within':'above'} 35% benchmark. `+
      `Assets: ${fM2(bs2.tA)}, equity: ${fM2(bs2.tEq)}, CR ${cr2.toFixed(2)}x, D/E ${de2.toFixed(2)}x. `+
      `ROA ${fP2(roa2)} indicates ${roa2>5?'adequate':'pressured'} asset utilisation. `+
      `External macro: BI rate 5.75%, USD/IDR 16,250 — ${de2<1&&cr2>1.2?'broadly supportive':'cautious'} environment.`;
    setSummaryText(auto);
    const aiSaved=(typeof window!=='undefined'&&window.__GDS_AI_SUMMARY&&window.__GDS_AI_SUMMARY[periodKey])||null;
    if(savedSummaries[periodKey]) setEditedSummary(savedSummaries[periodKey]);
    else if(aiSaved) setEditedSummary(aiSaved);
    else setEditedSummary(auto);
    setSummaryDirty(false);
  }, [selPeriod,selSubPeriod]);

  const handleSaveSummary=()=>{setSavedSummaries(p=>({...p,[periodKey]:editedSummary}));setSummaryDirty(false);};
  const handleResetSummary=()=>{setEditedSummary(summaryText);setSummaryDirty(false);};
  const finalSummary=savedSummaries[periodKey]||summaryText;
  const wordCount=editedSummary.split(/\s+/).filter(Boolean).length;
  const isSaved=savedSummaries[periodKey]===editedSummary;

  const handleExport=()=>{
    setExporting(true);
    try{
      const aiSaved=(typeof window!=='undefined'&&window.__GDS_AI_SUMMARY&&window.__GDS_AI_SUMMARY[periodKey])||null;
      const sum=savedSummaries[periodKey]||aiSaved||finalSummary;
      const html=generateReportHTML(selPeriod,selSubPeriod,selReport,theme,sum,selectedSections);
      try{
        const blob=new Blob([html],{type:'text/html;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(url),10000);
        setTimeout(()=>setExporting(false),1500);return;
      }catch(e){}
      const enc='data:text/html;charset=utf-8,'+encodeURIComponent(html);
      const a2=document.createElement('a');a2.href=enc;a2.target='_blank';
      document.body.appendChild(a2);a2.click();document.body.removeChild(a2);
      setTimeout(()=>setExporting(false),1500);
    }catch(err){setExporting(false);alert('Export error: '+err.message);}
  };

  const IS = {width:'100%',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:'8px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'};

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{t('rep_title')}</div>
          <div style={{color:T.muted,fontSize:11}}>Professional board reports · Print / PDF export · Executive-ready · Prepared by Sanda Frendianto</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'5fr 3fr',gap:16}} className="r-grid-2">
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* Report type cards */}
          <div>
            <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",marginBottom:8,textTransform:'uppercase'}}>Report Type</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}} className="r-grid-3">
              {reports.map(r=>(
                <div key={r.id} onClick={()=>handleReportChange(r.id)}
                  style={{background:selReport===r.id?`${T.accent}12`:T.card,border:`${selReport===r.id?2:1}px solid ${selReport===r.id?T.accent:T.border}`,borderRadius:10,padding:'12px 14px',cursor:'pointer',userSelect:'none',transition:'all 0.15s'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <span style={{color:selReport===r.id?T.accent:T.muted,fontSize:16}}>{r.icon}</span>
                    <span style={{color:selReport===r.id?T.text:T.sub,fontSize:10,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{r.name}</span>
                  </div>
                  <div style={{color:T.muted,fontSize:9,lineHeight:1.4}}>{r.desc}</div>
                  {selReport===r.id&&<div style={{marginTop:6,display:'inline-block',padding:'2px 8px',borderRadius:4,background:`${T.accent}20`,color:T.accent,fontSize:9,fontFamily:"'IBM Plex Mono'",fontWeight:700,letterSpacing:1}}>● SELECTED</div>}
                </div>
              ))}
            </div>
          </div>

          {/* Section picker */}
          <Card style={{padding:'16px 18px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:14,height:2,background:T.accent}}/>Report Sections
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>setSelectedSections(ALL_SECTIONS)} style={{padding:'3px 8px',borderRadius:4,border:`1px solid ${T.border}`,background:'none',color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>All</button>
                <button onClick={()=>setSelectedSections(['exec'])} style={{padding:'3px 8px',borderRadius:4,border:`1px solid ${T.border}`,background:'none',color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>Clear</button>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}} className="r-grid-3">
              {ALL_SECTIONS.map(id=>{
                const m=SECTION_META[id],active=selectedSections.includes(id);
                return(
                  <div key={id} onClick={()=>toggleSection(id)}
                    style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
                      background:active?`${T.accent}10`:T.bg,border:`1px solid ${active?T.accent:T.border}`,
                      borderRadius:7,cursor:'pointer',userSelect:'none',transition:'all 0.12s'}}>
                    <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${active?T.accent:T.border}`,background:active?T.accent:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {active&&<span style={{color:'#080C12',fontSize:9,fontWeight:900,lineHeight:1}}>✓</span>}
                    </div>
                    <span style={{fontSize:9,color:active?T.text:T.muted,fontFamily:"'IBM Plex Mono'",lineHeight:1.3}}>{m.icon} {m.label}</span>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:10,fontSize:9,color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{selectedSections.length}/{ALL_SECTIONS.length} sections · {selectedSections.length===ALL_SECTIONS.length?'Complete Board Pack':'Custom report'}</div>
          </Card>

          {/* Exec Summary editor */}
          <Card style={{padding:'18px 20px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:14,height:2,background:T.accent}}/>Executive Summary
                {typeof window!=='undefined'&&window.__GDS_AI_SUMMARY?.[periodKey]&&
                  <span style={{fontSize:8,color:T.accent,padding:'1px 6px',borderRadius:3,background:`${T.accent}15`,border:`1px solid ${T.accent}30`}}>AI Intelligence</span>}
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {summaryDirty&&<button onClick={handleResetSummary} style={{padding:'4px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,cursor:'pointer',fontSize:10,fontFamily:"'IBM Plex Mono'"}}>↺ Reset</button>}
                <button onClick={handleSaveSummary} style={{padding:'5px 12px',borderRadius:5,border:'none',background:isSaved?`${T.green}20`:T.accent,color:isSaved?T.green:'#080C12',cursor:'pointer',fontSize:10,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{isSaved?'✓ Saved':'💾 Save'}</button>
              </div>
            </div>
            <div style={{marginBottom:8,padding:'7px 12px',background:`${T.accent}08`,borderRadius:6,border:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:T.muted,fontSize:10}}>{isSaved?`✓ Saved for ${selPeriod} ${selSubPeriod}`:savedSummaries[periodKey]?'⚠ Unsaved':'Auto-generated · Edit freely'}</span>
              <span style={{color:wordCount>150?T.red:wordCount>120?T.yellow:T.green,fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{wordCount} words</span>
            </div>
            <textarea value={editedSummary} onChange={e=>{setEditedSummary(e.target.value);setSummaryDirty(e.target.value!==summaryText);}}
              style={{width:'100%',minHeight:130,background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',color:T.text,fontSize:12,fontFamily:"'IBM Plex Sans',sans-serif",lineHeight:1.8,resize:'vertical',outline:'none',boxSizing:'border-box'}}
              placeholder="Executive summary auto-generated when period is selected…"/>
            <div style={{marginTop:6,color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>Priority: Reports saved &gt; AI Intelligence &gt; Auto-generated · Prepared by Sanda Frendianto, Asst. Financial Controller</div>
          </Card>
        </div>

        {/* Right column */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:14,height:2,background:T.accent}}/>EXPORT SETTINGS
            </div>
            <div style={{marginBottom:10}}>
              <label style={{color:T.muted,fontSize:9,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>YEAR</label>
              <select value={selPeriod} onChange={e=>handleYrChange(e.target.value)} style={IS}>
                {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{color:T.muted,fontSize:9,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>PERIOD</label>
              <select value={selSubPeriod} onChange={e=>setSelSubPeriod(e.target.value)} style={IS}>
                {subPeriodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
              </select>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{color:T.muted,fontSize:9,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>THEME</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}} className="r-grid-2">
                {[['dark','◑ Dark'],['light','☀ Light']].map(([v,l])=>(
                  <button key={v} onClick={()=>setTheme(v)} style={{padding:'8px',background:theme===v?T.accent:'transparent',border:`1px solid ${theme===v?T.accent:T.border}`,borderRadius:6,color:theme===v?'#080C12':T.sub,cursor:'pointer',fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:14,padding:'10px 12px',background:T.bg,borderRadius:7,border:`1px solid ${T.border}`}}>
              <div style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'",marginBottom:6,letterSpacing:1}}>SELECTED SECTIONS ({selectedSections.length})</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {selectedSections.map(id=><span key={id} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:`${T.accent}18`,color:T.accent,fontFamily:"'IBM Plex Mono'"}}>{SECTION_META[id]?.icon} {SECTION_META[id]?.label}</span>)}
              </div>
            </div>
            <button onClick={handleExport} disabled={exporting}
              style={{width:'100%',background:exporting?T.border:'linear-gradient(135deg,#00D4FF,#00897B)',border:'none',borderRadius:8,padding:'14px',color:exporting?T.muted:'#080C12',fontSize:13,fontWeight:800,cursor:exporting?'not-allowed':'pointer',letterSpacing:1,fontFamily:"'IBM Plex Mono'",boxShadow:exporting?'none':'0 4px 12px rgba(0,212,255,0.3)',transition:'all 0.2s'}}>
              {exporting?'⏳ Generating…':'⊟ GENERATE & PRINT'}
            </button>
            <div style={{marginTop:8,color:T.muted,fontSize:9,textAlign:'center',fontFamily:"'IBM Plex Mono'",lineHeight:1.7}}>Opens in new tab · Use browser print dialog<br/>Save as PDF via print → Save as PDF</div>
          </Card>
          <Card style={{padding:'14px 16px'}}>
            <div style={{color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",marginBottom:10}}>{t('rep_saved_sum')}</div>
            {Object.keys(savedSummaries).length===0?(
              <div style={{color:T.muted,fontSize:11,textAlign:'center',padding:'12px 0'}}>No saved summaries yet</div>
            ):(
              Object.entries(savedSummaries).map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${T.border}`,cursor:'pointer'}}
                  onClick={()=>{const[y,sp]=k.split('_');setSelPeriod(y);setSelSubPeriod(sp);}}>
                  <span style={{color:T.sub,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{k}</span>
                  <span style={{color:T.green,fontSize:9}}>✓</span>
                </div>
              ))
            )}
          </Card>
        </div>
      </div>
    </div>
  );
}



const ROLE_PAGES = {
  MASTER: ['dashboard','pl','bs','cf','budget','kpi','forecast','ai','macro','reports','actions','tbimport','users'],
  OWNER:  ['dashboard','pl','bs','cf','forecast','ai','macro','reports','actions'],
  GM:     ['dashboard','budget','kpi','macro','actions'],
  HOD:    ['dashboard','kpi','actions'],
};

const LS_KEY = 'gds_users_v1';

function loadUsers() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  // Default users — first load
  return [
    { id:'u1', username:'sanda',   password:'accurate26',       role:'MASTER', name:'System Administrator', active:true, createdAt:'2026-01-01' },
    { id:'u2', username:'owning',  password:'gdsowning26',      role:'OWNER',  name:'Property Owner',       active:true, createdAt:'2026-01-01' },
    { id:'u3', username:'gm',      password:'gdsgm26',          role:'GM',     name:'General Manager',      active:true, createdAt:'2026-01-01' },
    { id:'u4', username:'hod',     password:'oneteamonespirit', role:'HOD',    name:'Head of Department',   active:true, createdAt:'2026-01-01' },
  ];
}

function saveUsers(users) {
  localStorage.setItem(LS_KEY, JSON.stringify(users));
}

function UserManagementPage({ currentUser }) {
  const [users, setUsers]         = useState(loadUsers);
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [modal, setModal]         = useState(null); // 'add' | 'edit' | 'password' | 'delete'
  const [selected, setSelected]   = useState(null);
  const [toast, setToast]         = useState(null);
  const [form, setForm]           = useState({});
  const [showPw, setShowPw]       = useState(false);

  const ROLES = ['MASTER','OWNER','GM','HOD'];
  const ROLE_COLORS = { MASTER:'#00D4FF', OWNER:'#D4A847', GM:'#00897B', HOD:'#8B5CF6' };

  function showToast(msg, type='success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function persist(updated) {
    setUsers(updated);
    saveUsers(updated);
  }

  function openAdd() {
    setForm({ username:'', password:'', name:'', role:'GM', active:true });
    setModal('add');
    setShowPw(false);
  }

  function openEdit(u) {
    setSelected(u);
    setForm({ username:u.username, name:u.name, role:u.role, active:u.active });
    setModal('edit');
  }

  function openPassword(u) {
    setSelected(u);
    setForm({ password:'' });
    setModal('password');
    setShowPw(false);
  }

  function openDelete(u) {
    setSelected(u);
    setModal('delete');
  }

  function handleAdd() {
    if (!form.username.trim() || !form.password.trim() || !form.name.trim()) {
      showToast('Semua field wajib diisi.', 'error'); return;
    }
    if (users.find(u => u.username === form.username.trim())) {
      showToast('Username sudah dipakai.', 'error'); return;
    }
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const newUser = {
      id: 'u' + Date.now(),
      username:  form.username.trim().toLowerCase(),
      password:  form.password,
      name:      form.name.trim(),
      role:      form.role,
      active:    true,
      createdAt: new Date().toISOString().slice(0,10),
    };
    persist([...users, newUser]);
    setModal(null);
    showToast(`User "${newUser.username}" berhasil ditambahkan.`);
  }

  function handleEdit() {
    if (!form.name.trim()) { showToast('Nama tidak boleh kosong.', 'error'); return; }
    if (selected.username === currentUser.username && form.role !== 'MASTER') {
      showToast('Tidak bisa mengubah role akun sendiri.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id
      ? { ...u, name:form.name.trim(), role:form.role, active:form.active }
      : u
    );
    persist(updated);
    setModal(null);
    showToast('User berhasil diupdate.');
  }

  function handlePassword() {
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id ? { ...u, password:form.password } : u);
    persist(updated);
    setModal(null);
    showToast(`Password "${selected.username}" berhasil diganti.`);
  }

  function handleDelete() {
    if (selected.username === currentUser.username) {
      showToast('Tidak bisa menghapus akun sendiri.', 'error'); setModal(null); return;
    }
    persist(users.filter(u => u.id !== selected.id));
    setModal(null);
    showToast(`User "${selected.username}" dihapus.`);
  }

  function toggleActive(u) {
    if (u.username === currentUser.username) { showToast('Tidak bisa menonaktifkan akun sendiri.', 'error'); return; }
    const updated = users.map(x => x.id === u.id ? { ...x, active: !x.active } : x);
    persist(updated);
    showToast(`${u.username} ${!u.active ? 'diaktifkan' : 'dinonaktifkan'}.`);
  }

  const inp = {
    background: T.bg, border:`1px solid ${T.border}`, borderRadius:6,
    color: T.text, padding:'9px 12px', fontSize:12, width:'100%',
    fontFamily:"'IBM Plex Mono',monospace", outline:'none',
  };
  const btn = (color, bg) => ({
    background: bg||'transparent', border:`1px solid ${color}`, borderRadius:6,
    color, padding:'7px 14px', fontSize:11, cursor:'pointer',
    fontFamily:"'IBM Plex Mono',monospace", fontWeight:600,
  });

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', top:20, right:24, zIndex:9999, background: toast.type==='error'?T.red:T.green, color:'#fff', padding:'10px 20px', borderRadius:8, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", boxShadow:'0 4px 20px rgba(0,0,0,0.4)' }}>
          {toast.type==='error' ? '✕ ' : '✓ '}{toast.msg}
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <div style={{ color:T.text, fontSize:18, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>User Management</div>
          <div style={{ color:T.muted, fontSize:11, marginTop:4 }}>{users.length} user terdaftar · Disimpan di browser</div>
        </div>
        <button onClick={openAdd} style={{ ...btn(T.accent), background:`${T.accent}22`, padding:'9px 20px', fontSize:12 }}>
          + Tambah User
        </button>
      </div>

      {/* Role Legend */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {ROLES.map(r => (
          <div key={r} style={{ display:'flex', alignItems:'center', gap:6, background:T.card, border:`1px solid ${T.border}`, borderRadius:6, padding:'5px 12px' }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:ROLE_COLORS[r] }}/>
            <span style={{ color:T.sub, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{r}</span>
            <span style={{ color:T.muted, fontSize:9 }}>— {ROLE_PAGES[r].length} modul</span>
          </div>
        ))}
      </div>

      {/* User Table */}
      <Card style={{ padding:0, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${T.border}` }}>
              {['USERNAME','NAMA','ROLE','STATUS','DIBUAT','AKSI'].map(h => (
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:T.muted, fontSize:9, letterSpacing:2, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map((u, i) => (
              <tr key={u.id} style={{ borderBottom: i<users.length-1?`1px solid ${T.border}`:'none', background: u.username===currentUser.username?`${T.accent}08`:'transparent' }}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:28, height:28, borderRadius:6, background:`${ROLE_COLORS[u.role]}22`, border:`1px solid ${ROLE_COLORS[u.role]}44`, display:'flex', alignItems:'center', justifyContent:'center', color:ROLE_COLORS[u.role], fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>
                      {u.username[0].toUpperCase()}
                    </div>
                    <span style={{ color:T.text, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>
                      {u.username}
                      {u.username===currentUser.username && <span style={{ color:T.accent, fontSize:9, marginLeft:6 }}>▶ ANDA</span>}
                    </span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.sub, fontSize:12, fontFamily:"'IBM Plex Sans',sans-serif" }}>{u.name}</td>
                <td style={{ padding:'13px 16px' }}>
                  <Chip color={ROLE_COLORS[u.role]}>{u.role}</Chip>
                </td>
                <td style={{ padding:'13px 16px' }}>
                  <div onClick={() => toggleActive(u)} style={{ cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5, background: u.active?`${T.green}22`:`${T.red}22`, border:`1px solid ${u.active?T.green:T.red}44`, borderRadius:20, padding:'3px 10px' }}>
                    <div style={{ width:6, height:6, borderRadius:'50%', background: u.active?T.green:T.red }}/>
                    <span style={{ color: u.active?T.green:T.red, fontSize:9, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{u.active?'AKTIF':'NONAKTIF'}</span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{u.createdAt}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={() => openEdit(u)} style={{ ...btn(T.accent), padding:'4px 10px', fontSize:10 }} title="Edit profil">✎ Edit</button>
                    <button onClick={() => openPassword(u)} style={{ ...btn(T.yellow), padding:'4px 10px', fontSize:10 }} title="Ganti password">🔑 PW</button>
                    {u.username !== currentUser.username && (
                      <button onClick={() => openDelete(u)} style={{ ...btn(T.red), padding:'4px 10px', fontSize:10 }} title="Hapus user">✕</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      <div style={{ marginTop:12, color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>
        ⓘ Data user tersimpan di localStorage browser ini. Bersih saat clear browser data.
      </div>

      {/* ── MODAL ───────────────────────────────── */}
      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}>
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:28, width:'100%', maxWidth:'90vw' }}>

            {/* ADD USER */}
            {modal === 'add' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>+ Tambah User Baru</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>USERNAME</div>
                  <input style={inp} value={form.username} onChange={e=>setForm({...form,username:e.target.value.toLowerCase().replace(/\s/g,'')})} placeholder="cth: finance_mgr" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="cth: Budi Santoso" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD</div>
                  <div style={{ position:'relative' }}>
                    <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" />
                    <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                  </div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE & AKSES MODUL</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleAdd} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan User</button>
              </div>
            </>}

            {/* EDIT USER */}
            {modal === 'edit' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>✎ Edit User — {selected?.username}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}
                    disabled={selected?.username === currentUser.username}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:8, letterSpacing:1 }}>STATUS</div>
                  <div style={{ display:'flex', gap:10 }}>
                    {[true,false].map(v=>(
                      <button key={String(v)} onClick={()=>setForm({...form,active:v})}
                        style={{ ...btn(v?T.green:T.red), background:form.active===v?(v?`${T.green}22`:`${T.red}22`):'transparent', flex:1 }}>
                        {v?'✓ AKTIF':'✕ NONAKTIF'}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleEdit} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan Perubahan</button>
              </div>
            </>}

            {/* CHANGE PASSWORD */}
            {modal === 'password' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:6 }}>🔑 Ganti Password</div>
              <div style={{ color:T.muted, fontSize:11, marginBottom:20 }}>User: <span style={{ color:T.accent }}>{selected?.username}</span></div>
              <div>
                <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD BARU</div>
                <div style={{ position:'relative' }}>
                  <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" autoFocus />
                  <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                </div>
                {form.password.length > 0 && form.password.length < 6 && (
                  <div style={{ color:T.red, fontSize:10, marginTop:4 }}>Terlalu pendek — minimal 6 karakter</div>
                )}
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handlePassword} style={{ ...btn(T.yellow), background:`${T.yellow}22` }}>Ganti Password</button>
              </div>
            </>}

            {/* DELETE */}
            {modal === 'delete' && <>
              <div style={{ color:T.red, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:8 }}>✕ Hapus User</div>
              <div style={{ color:T.sub, fontSize:12, marginBottom:20, lineHeight:1.6 }}>
                Yakin hapus user <span style={{ color:T.accent, fontFamily:"'IBM Plex Mono',monospace" }}>{selected?.username}</span> ({selected?.name})?<br/>
                <span style={{ color:T.red, fontSize:11 }}>Tindakan ini tidak bisa dibatalkan.</span>
              </div>
              <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleDelete} style={{ ...btn(T.red), background:`${T.red}22` }}>Ya, Hapus</button>
              </div>
            </>}

          </div>
        </div>
      )}
    </div>
  );
}

function App() {

          /* Prevent donut/pie chart overflow */
          .recharts-wrapper{max-width:100%!important;overflow:hidden!important}

          /* KPI score numbers - slightly smaller */
          .kpi-score-num{font-size:28px!important}
          /* Fix select/dropdown widths */
          select{max-width:100%!important}
          /* Ensure no child overflows parent */
          .gds-content *{max-width:100%;word-break:break-word}
          /* Exception: numbers and charts */
          .gds-content .recharts-wrapper,
          .gds-content canvas,
          .gds-content svg{max-width:100%!important;height:auto!important}
        }
        @media(max-width:480px){
          /* Stack page header buttons */
          .gds-page-header{flex-wrap:wrap!important;gap:8px!important}
          /* Smaller text in tight spaces */
          .gds-content{font-size:11px}
          /* Smaller chart heights on phone */
          .recharts-responsive-container{min-height:160px!important}
          /* Period selectors stack */
          .gds-period-row{flex-wrap:wrap!important;gap:6px!important}
        }
        @media print{
          body{background:#fff!important;color:#000!important}
          .gds-sidebar,.gds-hamburger,.gds-overlay{display:none!important}
          *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
      `}</style>
      <Sidebar user={user} active={page} setPage={p=>{if(user.pages.includes(p)){setPage(p);setSideOpen(false);}}} dark={dark} open={sideOpen} onClose={()=>setSideOpen(false)}/>
      <div className="gds-main">
        <TopBar page={page} dark={dark} setDark={setDark} onLogout={()=>setUser(null)} onMenu={()=>setSideOpen(o=>!o)}/>
        <main className="gds-content">
          {pageMap[page]||<DashboardPage/>}
        </main>
      </div>
    </div>
    </LangContext.Provider>
  );
}

  <script>
    window.addEventListener('error', function(e){
      var d=document.getElementById('status');
      var b=document.getElementById('bar');
      if(d) d.textContent='JS ERROR: '+e.message+' @ '+(e.filename||'').split('/').pop()+':'+e.lineno;
      if(b){b.style.width='100%';b.style.background='#EF4444';}
    });
    function setBar(p,m){document.getElementById('bar').style.width=p+'%';if(m)document.getElementById('status').textContent=m;}
    function hide(){var e=document.getElementById('loading');e.style.opacity='0';setTimeout(function(){e.style.display='none'},500);}
    function err(m){document.getElementById('status').style.color='#EF4444';document.getElementById('status').textContent=m;console.error('GDS:',m);}
    window.addEventListener('load',function(){
      setBar(30,'Memeriksa library...');
      try{
        if(!window.React) return err('React gagal dimuat');
        if(!window.ReactDOM) return err('ReactDOM gagal dimuat');
        if(!window.Recharts) return err('Recharts gagal dimuat');
        if(!window.Babel) return err('Babel gagal dimuat');
        setBar(60,'Kompilasi JSX...');
        var src=document.getElementById('app-src').textContent;
        var out=Babel.transform(src,{presets:['react']});
        setBar(90,'Menjalankan...');
        setTimeout(function(){
          try{eval(out.code);setBar(100);hide();}
          catch(e){err('Runtime: '+e.message+' | '+e.stack?.split('\n')[1]);console.error(e);}
        },100);
      }catch(e){err('Compile: '+e.message);console.error(e);}
    });
  </script>
