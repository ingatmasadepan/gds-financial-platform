const MON_YEARS  = ['2026','2025','2024']; // years with monthly TB data
function getKeys(yr,period='full'){
  if(!MON_YEARS.includes(yr)) return null; // annual only → use annPnl
  const base = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
  const avail = base.filter(k=>TB[k]);
  if(period==='full'||period==='ytd') return avail;
  if(period.startsWith('q')){
    const qi={'q1':[0,1,2],'q2':[3,4,5],'q3':[6,7,8],'q4':[9,10,11]}[period]||[];
    return qi.map(i=>base[i]).filter(k=>k&&TB[k]);
  }
  if(period.startsWith('m')){const i=parseInt(period.slice(1))-1;return [base[i]].filter(k=>k&&TB[k]);}
  return avail;
}
function getCur(yr,period='full'){
  if(!MON_YEARS.includes(yr)) return annPnl(parseInt(yr));
  const ks=getKeys(yr,period);
  return ks&&ks.length?aggKeys(ks):annPnl(parseInt(yr));
}
function getPeriodOpts(yr){
  if(!MON_YEARS.includes(yr)) return [{v:'full',l:`Full Year ${yr}`}];
  const base=yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
  const avail=base.filter(k=>TB[k]);
  const opts=[{v:'full',l:'Full Year'},{v:'ytd',l:'YTD'}];
  avail.forEach((k,i)=>opts.push({v:`m${i+1}`,l:ML[i]}));
  ['q1','q2','q3','q4'].forEach(q=>{
    const qi={'q1':[0,1,2],'q2':[3,4,5],'q3':[6,7,8],'q4':[9,10,11]}[q];
    if(qi.every(i=>base[i]&&TB[base[i]])) opts.push({v:q,l:q.toUpperCase()});
  });
  return opts;
}

// ══════════════════════════════════════════════════════════════════
// P&L CALCULATION (Hotel USALI format)
// ══════════════════════════════════════════════════════════════════
function pnl(d) {
  const rev        = (d.rooms||0) + (d.fnb||0) + (d.minor||0) + (d.otherinc||0);
  const deptProfit = rev - (d.cos||0) - (d.deptPay||0) - (d.deptOther||0);
  const gop        = deptProfit - (d.ovhdPay||0) - (d.ovhdOther||0);
  const nonOp      = (d.incentFee||0)+(d.mgmtFee||0)+(d.deprTotal||0)+(d.interest||0)
                   + (d.roi||0)+(d.sinkFund||0)+(d.ownExp||0)+(d.otherNonOp||0);
  const nop        = gop - nonOp - (d.tax||0);
  return {
    ...d, rev, deptProfit, gop, nonOp, nop,
    gopMgn:  rev>0 ? gop/rev*100  : 0,
    nopMgn:  rev>0 ? nop/rev*100  : 0,
    cosRat:  rev>0 ? (d.cos||0)/rev*100 : 0,
    payRat:  rev>0 ? (d.deptPay||0)/rev*100 : 0,
    ovhdRat: rev>0 ? ((d.ovhdPay||0)+(d.ovhdOther||0))/rev*100 : 0,
    roomsMix:rev>0 ? (d.rooms||0)/rev*100 : 0,
    fnbMix:  rev>0 ? (d.fnb||0)/rev*100 : 0,
    utlRat:  rev>0 ? (d.ovhdOther||0)/rev*100 : 0,
    mntRat:  rev>0 ? (d.deptOther||0)/rev*100 : 0,
    np: nop, ebit: gop,
  };
}
function aggKeys(keys, src=TB) {
  const agg = {};
  keys.filter(k=>src[k]).forEach(k=>{
    Object.entries(src[k]).forEach(([f,v])=>{ agg[f]=(agg[f]||0)+v; });
  });
  return pnl(agg);
}
function annPnl(year) { return pnl(ANN[year]||{}); }
function bsCalc(snap) {
  const s = snap||{cash:0,ar:0,inv:0,pre:0,fixG:0,accD:0,otNA:0,ap:0,acc:0,advDep:0,taxPay:0,othCL:0,dTMgmt:0,pic:0,re:0};
  const stInv = 0; // Short-term investment already included in cash (113 prefix)
  const tCA  = s.cash + s.ar + s.inv + s.pre;
  const netF = s.fixG + s.accD; // accD is negative
  const tA   = tCA + netF + (s.otNA||0);
  const tCL  = s.ap + s.acc + (s.advDep||0) + (s.taxPay||0) + (s.othCL||0);
  const tL   = tCL + (s.dTMgmt||0);
  const tEq  = s.pic + s.re;
  const tLE  = tL + tEq;
  return { ...s, stInv, tCA, netF, tA, tCL, tL, tEq, tLE };
}
let T = DARK;
const fM  = n => {
  if(n===undefined||n===null||isNaN(n)) return '-';
  const neg = n < 0;
  const a = Math.abs(n) * 1000; // convert Rp Milyar → Millions
  // 1 decimal if not whole, 0 if whole
  const dec = (a % 1 < 0.05 || a % 1 >= 0.95) ? 0 : 1;
  const fixed = dec === 1 ? Math.floor(a * 10) / 10 : Math.round(a);
  // Format with Indonesian thousand separator (.) and decimal (,)
  const parts = fixed.toFixed(dec).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  const s = (parts.length > 1 && parts[1] !== '0' ? parts[0] + ',' + parts[1] : parts[0]) + 'M';
  return neg ? `(${s})` : s;
};
const fP  = n => n===undefined?'-': `${n.toFixed(1)}%`;
const fC  = n => n<0?`(${fM(Math.abs(n))})`:`${fM(n)}`;
const clr = (n,th=T) => n>=0?th.green:th.red;

// ══════════════════════════════════════════════════════════════════
// DASHBOARD PAGE
// ══════════════════════════════════════════════════════════════════
function DashboardPage() {
  const [yr, setYr]         = useState('2026');
  const [period, setPeriod] = useState('m2');
  const [activeTab, setActiveTab] = useState('overview');

  const isMonthly = MON_YEARS.includes(yr);
  const isMonth   = isMonthly && period.startsWith('m');

  const cur = useMemo(() => getCur(yr, period), [yr, period]);

  const prv = useMemo(() => {
    if (!isMonthly) {
      const prevYr = parseInt(yr) - 1;
      return prevYr >= 2013 ? annPnl(prevYr) : null;
    }
    if (period==='full'||period==='ytd') {
      if(yr==='2025') return aggKeys(mKeys24);
      if(yr==='2024') return annPnl(2023);
      if(yr==='2026') return aggKeys(mKeys25);
    }
    const base = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
    const mi   = parseInt(period.replace('m','')) - 1;
    if(mi===0){
      const pk = yr==='2025'?mKeys24:yr==='2026'?mKeys25:null;
      return pk?pnl(TB[pk[11]]||{}):null;
    }
    const pk2 = base[mi-1];
    return pk2&&TB[pk2]?pnl(TB[pk2]):null;
  }, [yr, period, isMonthly]);

  const bsNowKey = useMemo(()=>{
    if(!isMonthly){
      const m={'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16','2017':'dec17',
        '2018':'dec18','2019':'dec19','2020':'dec20','2021':'dec21','2022':'dec22','2023':'dec23'};
      return m[yr]||'dec23';
    }
    return snapKey(yr,period);
  },[yr,period,isMonthly]);
  const bsPrvKey2 = useMemo(()=>prevSnapKey(yr,period),[yr,period]);
  const bs  = useMemo(()=>bsCalc(BS_SNAPSHOTS[bsNowKey]||{}),[bsNowKey]);
  const bsp = useMemo(()=>bsCalc(BS_SNAPSHOTS[bsPrvKey2]||{}),[bsPrvKey2]);

  const budPeriod = isMonth&&yr==='2026'?`2026-${String(parseInt(period.replace('m',''))).padStart(2,'0')}`:null;
  const bud = useMemo(()=>budPeriod&&BUD26[budPeriod]?pnl(BUD26[budPeriod]):null,[budPeriod]);

  const chg = (a,b)=>(b&&Math.abs(b)>0.0001)?(a-b)/Math.abs(b)*100:null;
  const safe = n=>(n===undefined||n===null||isNaN(n)||!isFinite(n))?0:n;

  const trendKeys = useMemo(()=>{
    if(yr==='2026') return [...mKeys25.slice(-10),...mKeys26_ytd];
    if(yr==='2025') return mKeys25;
    return mKeys24;
  },[yr]);

  const trendData = useMemo(()=>trendKeys.map(k=>{
    if(!TB[k]) return null;
    const d=pnl(TB[k]);
    const occ=TB[k].avail>0?TB[k].occ/TB[k].avail*100:0;
    return {name:k.slice(0,7),rev:safe(d.rev),gop:safe(d.gop),nop:safe(d.nop),rooms:safe(d.rooms),payRat:safe(d.payRat),occ:safe(occ)};
  }).filter(Boolean),[trendKeys]);

  const waterfallData = useMemo(()=>[
    {name:'Revenue',    value:safe(cur.rev),          type:'start'},
    {name:'F&B Cost',   value:-safe(cur.cos),          type:'neg'},
    {name:'Dept Pay',   value:-safe(cur.deptPay),      type:'neg'},
    {name:'Dept Other', value:-safe(cur.deptOther),    type:'neg'},
    {name:'Ovhd Pay',   value:-safe(cur.ovhdPay),      type:'neg'},
    {name:'Ovhd Other', value:-safe(cur.ovhdOther),    type:'neg'},
    {name:'GOP',        value:safe(cur.gop),           type:'sub'},
    {name:'Non-Op',     value:-safe(cur.nonOp),        type:'neg'},
    {name:'NOP',        value:safe(cur.nop),           type:'end'},
  ],[cur]);

  const pieData = useMemo(()=>[
    {name:'F&B Cost',   value:safe(cur.cos),       color:'#00897B'},
    {name:'Dept Pay',   value:safe(cur.deptPay),   color:'#00D4FF'},
    {name:'Dept Other', value:safe(cur.deptOther), color:'#8B5CF6'},
    {name:'Ovhd Pay',   value:safe(cur.ovhdPay),   color:'#F97316'},
    {name:'Ovhd Other', value:safe(cur.ovhdOther), color:'#EAB308'},
    {name:'Non-Op',     value:safe(cur.nonOp),     color:'#EC4899'},
  ].filter(e=>e.value>0),[cur]);

  const revMixData = useMemo(()=>[
    {name:'Rooms', value:safe(cur.rooms),    color:'#00D4FF'},
    {name:'F&B',   value:safe(cur.fnb),      color:'#00897B'},
    {name:'Minor', value:safe(cur.minor),    color:'#8B5CF6'},
    {name:'Other', value:safe(cur.otherinc), color:'#EAB308'},
  ].filter(e=>e.value>0),[cur]);

  const monthlyBar = useMemo(()=>{
    const base=yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:yr==='2024'?mKeys24:null;
    if(!base) return [];
    return base.map((k,i)=>{
      if(!TB[k]) return {name:ML[i]||k.slice(5,7),rev:0,gop:0,nop:0};
      const d=pnl(TB[k]);
      return {name:ML[i]||k.slice(5,7),rev:safe(d.rev),gop:safe(d.gop),nop:safe(d.nop)};
    });
  },[yr]);

  const yoyData = useMemo(()=>['2023','2024','2025'].map(y=>{
    const d=annPnl(parseInt(y));
    return {yr:y,rev:safe(d.rev),gop:safe(d.gop),nop:safe(d.nop),gopMgn:safe(d.gopMgn),nopMgn:safe(d.nopMgn)};
  }),[]);

  const periodLabel = useMemo(()=>{
    if(!isMonthly) return `Full Year ${yr}`;
    if(period==='full') return `Full Year ${yr}`;
    if(period==='ytd')  return `YTD ${yr}`;
    if(period.startsWith('q')) return `${period.toUpperCase()} ${yr}`;
    const mi=parseInt(period.replace('m',''))-1;
    return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mi]} ${yr}`;
  },[yr,period,isMonthly]);

  const occKey = isMonth?`${yr}-${String(parseInt(period.replace('m',''))).padStart(2,'0')}`:null;
  const occData = occKey&&TB[occKey]?TB[occKey]:null;
  const occPct  = occData&&occData.avail?(occData.occ/occData.avail*100):null;
  const arrVal  = occData?occData.arr:null;
  const revPAR  = occData&&occData.occ>0?safe(cur.rooms)*1e9/occData.occ:null;

  const alerts = useMemo(()=>{
    const a=[];
    if(safe(cur.gopMgn)<20) a.push({t:'danger',m:`GOP margin rendah: ${fP(cur.gopMgn)} (target >30%)`});
    else if(safe(cur.gopMgn)<30) a.push({t:'warn',m:`GOP margin di bawah target: ${fP(cur.gopMgn)}`});
    if(safe(cur.nopMgn)<0)  a.push({t:'danger',m:`Net Operating Loss: ${fP(cur.nopMgn)}`});
    if(safe(cur.payRat)>40) a.push({t:'warn', m:`Payroll ratio tinggi: ${fP(cur.payRat)} (target <35%)`});
    if(bs.tCL>0&&bs.tCA/bs.tCL<1.0) a.push({t:'warn',m:`Current ratio di bawah 1.0x: ${(bs.tCA/bs.tCL).toFixed(2)}x`});
    if(occPct&&occPct<40) a.push({t:'warn',m:`Occupancy rendah: ${occPct.toFixed(1)}%`});
    if(a.length===0) a.push({t:'ok',m:`Semua indikator utama dalam batas normal — ${periodLabel}`});
    return a;
  },[cur,bs,occPct,periodLabel]);

  const AC={danger:'#EF4444',warn:'#EAB308',ok:'#10B981'};
  const AB={danger:'rgba(239,68,68,0.08)',warn:'rgba(234,179,8,0.08)',ok:'rgba(16,185,129,0.08)'};
  const AI={danger:'⚠',warn:'⚡',ok:'✓'};

  return (
    <div>
      {/* HEADER */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Financial Overview</div>
          <div style={{color:T.muted,fontSize:11,marginTop:2}}>Grand Darmo Suite · Surabaya · {periodLabel}</div>
        </div>
        <PeriodSel yr={yr} setYr={v=>{setYr(v);setPeriod(MON_YEARS.includes(v)?'full':'full');}} period={period} setPeriod={setPeriod} years={YEAR_RANGE}/>
      </div>

      {/* ALERT STRIP */}
      <div style={{marginBottom:12,display:'flex',flexDirection:'column',gap:5}}>
        {alerts.map((a,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:AB[a.t],border:`1px solid ${AC[a.t]}33`,borderRadius:7,borderLeft:`3px solid ${AC[a.t]}`}}>
            <span style={{color:AC[a.t],fontWeight:700,fontSize:12}}>{AI[a.t]}</span>
            <span style={{color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{a.m}</span>
          </div>
        ))}
      </div>

      {/* KPI ROW 1 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:10}}>
        <KPICard label="Total Revenue" value={fM(cur.rev)} sub={`Rooms: ${fM(cur.rooms)}`} change={prv?chg(cur.rev,prv.rev):null} icon="💰" color={T.accent}/>
        <KPICard label="GOP" value={fM(cur.gop)} sub={fP(cur.gopMgn)+' margin'} change={prv?chg(cur.gop,prv.gop):null} icon="📊" color={safe(cur.gop)>=0?T.secondary:T.red}/>
        <KPICard label="Net Profit" value={fM(cur.nop)} sub={fP(cur.nopMgn)+' margin'} change={prv?chg(cur.nop,prv.nop):null} icon="🏦" color={safe(cur.nop)>=0?T.green:T.red}/>
        {bud
          ?<KPICard label="vs Budget (Rev)" value={fM(cur.rev-bud.rev)} sub={`Budget: ${fM(bud.rev)}`} icon="🎯" color={cur.rev>=bud.rev?T.green:T.red}/>
          :<KPICard label="Payroll Ratio" value={fP(cur.payRat)} sub="target <35%" icon="👥" color={safe(cur.payRat)<35?T.green:T.red}/>
        }
      </div>

      {/* KPI ROW 2 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:12}}>
        <KPICard label="Cash & Bank" value={fM(bs.cash)} sub={bsp.cash>0?((bs.cash-bsp.cash)/bsp.cash*100).toFixed(1)+'% vs prior':'—'} icon="💵" color={T.accent}/>
        <KPICard label="Total Assets" value={fM(bs.tA)} sub={`Net FA: ${fM(bs.netF)}`} icon="🏗️"/>
        <KPICard label="Total Liabilities" value={fM(bs.tL)} sub={`Due Mgmt: ${fM(bs.dTMgmt||0)}`} icon="📋" color={T.red}/>
        <KPICard label="Total Equity" value={fM(bs.tEq)} sub={`D/E: ${bs.tEq>0?(bs.tL/bs.tEq).toFixed(2):'—'}x`} icon="📈" color={safe(bs.tEq)>=0?T.secondary:T.red}/>
      </div>

      {/* OCCUPANCY STRIP */}
      {occData&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:12}}>
          {[
            {l:'Occupancy',    v:`${occPct?occPct.toFixed(1):'—'}%`,                            c:occPct>55?T.green:occPct>40?T.yellow:T.red},
            {l:'ARR (Rp)',      v:arrVal?Math.round(arrVal).toLocaleString('id-ID'):'—',          c:T.accent},
            {l:'RevPAR (Rp)',   v:revPAR?Math.round(revPAR).toLocaleString('id-ID'):'—',         c:T.text},
            {l:'Rooms Occ.',   v:(occData.occ||0).toLocaleString('id-ID'),                       c:T.sub},
            {l:'Rooms Avail',  v:(occData.avail||0).toLocaleString('id-ID'),                     c:T.muted},
          ].map(({l,v,c})=>(
            <div key={l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 14px'}}>
              <div style={{color:T.muted,fontSize:9,letterSpacing:2,textTransform:'uppercase',fontFamily:"'IBM Plex Mono'",marginBottom:4}}>{l}</div>
              <div style={{color:c,fontSize:16,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{v}</div>
            </div>
          ))}
        </div>
      )}

      {/* TAB NAV */}
      <div style={{display:'flex',gap:2,marginBottom:12,background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:3,width:'fit-content'}}>
        {[['overview','📊 Overview'],['trend','📈 Tren'],['structure','🧩 Struktur']].map(([k,l])=>(
          <button key={k} onClick={()=>setActiveTab(k)}
            style={{padding:'6px 16px',borderRadius:6,border:'none',background:activeTab===k?T.accent:'transparent',color:activeTab===k?'#080C12':T.sub,cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>
            {l}
          </button>
        ))}
      </div>

      {/* TAB: OVERVIEW */}
      {activeTab==='overview'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:12}}>
            <Card>
              <SectionTitle>P&L Waterfall — {periodLabel}</SectionTitle>
              <ResponsiveContainer width="100%" height={230}>
                <BarChart data={waterfallData} margin={{top:5,right:10,left:0,bottom:24}}>
                  <CartesianGrid stroke={T.border} strokeDasharray="2 4" vertical={false}/>
                  <XAxis dataKey="name" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}} angle={-30} textAnchor="end"/>
                  <YAxis stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}} tickFormatter={v=>`${(v*1000).toFixed(0)}M`}/>
                  <Tooltip content={<TT/>}/>
                  <Bar dataKey="value" name="Amount (B IDR)" radius={[3,3,0,0]}>
                    {waterfallData.map((e,i)=>(
                      <Cell key={i} fill={e.type==='start'?T.accent:e.type==='sub'?T.secondary:e.type==='end'?(e.value>=0?T.green:'#EF4444'):'#EF4444'}/>
                    ))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </Card>
            <Card>
              <SectionTitle>Key Ratios</SectionTitle>
              {[
                {l:'GOP Margin',     v:safe(cur.gopMgn),  th:30,  inv:false, tl:'>30%'},
                {l:'NOP Margin',     v:safe(cur.nopMgn),  th:10,  inv:false, tl:'>10%'},
                {l:'Payroll Ratio',  v:safe(cur.payRat),  th:35,  inv:true,  tl:'<35%'},
                {l:'Ovhd Ratio',     v:safe(cur.ovhdRat), th:25,  inv:true,  tl:'<25%'},
                {l:'Current Ratio',  v:bs.tCL>0?bs.tCA/bs.tCL*100:0, th:150, inv:false, tl:'>1.5x', raw:bs.tCL>0?(bs.tCA/bs.tCL).toFixed(2)+'x':'—'},
                {l:'Quick Ratio',    v:bs.tCL>0?(bs.cash+bs.ar)/bs.tCL*100:0, th:100, inv:false, tl:'>1.0x', raw:bs.tCL>0?((bs.cash+bs.ar)/bs.tCL).toFixed(2)+'x':'—'},
              ].map(r=>{
                const ok=r.inv?r.v<=r.th:r.v>=r.th;
                const c=ok?T.green:r.v>(r.th*0.7)&&!r.inv?T.yellow:T.red;
                return(
                  <div key={r.l} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{color:T.sub,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{r.l}</span>
                      <div style={{display:'flex',gap:6,alignItems:'center'}}>
                        <span style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>{r.tl}</span>
                        <span style={{color:c,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{r.raw||fP(r.v)}</span>
                      </div>
                    </div>
                    <div style={{height:5,background:T.border,borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${Math.min(Math.abs(r.v)/r.th*100,100)}%`,background:c,borderRadius:3}}/>
                    </div>
                  </div>
                );
              })}
              <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
                <div style={{color:T.muted,fontSize:9,letterSpacing:2,marginBottom:8,fontFamily:"'IBM Plex Mono'"}}>BS SNAPSHOT</div>
                {[{l:'Total Assets',v:fM(bs.tA),c:T.text},{l:'Total Liab.',v:fM(bs.tL),c:T.red},{l:'Total Equity',v:fM(bs.tEq),c:safe(bs.tEq)>=0?T.green:T.red}].map(r=>(
                  <div key={r.l} style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{r.l}</span>
                    <span style={{color:r.c,fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{r.v}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:12}}>
            <Card>
              <SectionTitle>Revenue Mix</SectionTitle>
              <ResponsiveContainer width="100%" height={170}>
                <PieChart>
                  <Pie data={revMixData} cx="50%" cy="50%" innerRadius={42} outerRadius={68} paddingAngle={2} dataKey="value">
                    {revMixData.map((e,i)=><Cell key={i} fill={e.color}/>)}
                  </Pie>
                  <Tooltip formatter={v=>fM(v)}/>
                  <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
                </PieChart>
              </ResponsiveContainer>
              {bud&&(
                <div style={{marginTop:6,paddingTop:8,borderTop:`1px solid ${T.border}`}}>
                  <div style={{color:T.muted,fontSize:9,letterSpacing:2,marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>VS BUDGET</div>
                  {[{l:'Revenue',a:cur.rev,b:bud.rev},{l:'GOP',a:cur.gop,b:bud.gop},{l:'NOP',a:cur.nop,b:bud.nop}].map(r=>{
                    const v=chg(r.a,r.b);
                    return(
                      <div key={r.l} style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{color:T.sub,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>{r.l}</span>
                        <span style={{color:v>=0?T.green:T.red,fontSize:10,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{v!=null?(v>0?'+':'')+v.toFixed(1)+'%':'—'}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>
            <Card>
              <SectionTitle>Monthly P&L — {yr}</SectionTitle>
              <ResponsiveContainer width="100%" height={170}>
                <ComposedChart data={monthlyBar} margin={{top:5,right:10,left:0,bottom:0}}>
                  <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                  <XAxis dataKey="name" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}}/>
                  <YAxis stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}} tickFormatter={v=>`${(v*1000).toFixed(0)}M`}/>
                  <Tooltip content={<TT/>}/>
                  <Legend iconType="circle" iconSize={6} wrapperStyle={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
                  <Bar dataKey="rev" name="Revenue" fill={T.accent}    fillOpacity={0.6} radius={[0,0,0,0]}/>
                  <Bar dataKey="gop" name="GOP"     fill={T.secondary} fillOpacity={0.8} radius={[2,2,0,0]}/>
                  <Line type="monotone" dataKey="nop" name="NOP" stroke={T.green} strokeWidth={2} dot={{r:3,fill:T.green}}/>
                </ComposedChart>
              </ResponsiveContainer>
            </Card>
          </div>
        </div>
      )}

      {/* TAB: TREND */}
      {activeTab==='trend'&&(
        <div>
          <Card style={{marginBottom:12}}>
            <SectionTitle>Revenue & Profitability — {yr==='2026'?'Rolling 12M':'Full Year '+yr}</SectionTitle>
            <ResponsiveContainer width="100%" height={240}>
              <ComposedChart data={trendData} margin={{top:5,right:40,left:0,bottom:0}}>
                <defs>
                  <linearGradient id="gR2" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={T.accent} stopOpacity={0.15}/><stop offset="95%" stopColor={T.accent} stopOpacity={0}/></linearGradient>
                  <linearGradient id="gG2" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={T.secondary} stopOpacity={0.15}/><stop offset="95%" stopColor={T.secondary} stopOpacity={0}/></linearGradient>
                </defs>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}}/>
                <YAxis yAxisId="l" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}} tickFormatter={v=>`${(v*1000).toFixed(0)}M`}/>
                <YAxis yAxisId="r" orientation="right" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}} tickFormatter={v=>`${v.toFixed(0)}%`} domain={[0,100]}/>
                <Tooltip content={<TT/>}/>
                <Legend iconType="circle" iconSize={6} wrapperStyle={{fontSize:10,fontFamily:"'IBM Plex Mono'"}}/>
                <Area yAxisId="l" type="monotone" dataKey="rev"  name="Revenue" stroke={T.accent}    fill="url(#gR2)" strokeWidth={2}/>
                <Area yAxisId="l" type="monotone" dataKey="gop"  name="GOP"     stroke={T.secondary} fill="url(#gG2)" strokeWidth={2}/>
                <Line yAxisId="l" type="monotone" dataKey="nop"  name="NOP"     stroke={T.green}     strokeWidth={1.5} dot={false}/>
                <Line yAxisId="r" type="monotone" dataKey="occ"  name="OCC %"   stroke={T.yellow}    strokeWidth={1} dot={false} strokeDasharray="4 2"/>
              </ComposedChart>
            </ResponsiveContainer>
          </Card>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <Card>
              <SectionTitle>Payroll Ratio Trend</SectionTitle>
              <ResponsiveContainer width="100%" height={180}>
                <ComposedChart data={trendData} margin={{top:5,right:10,left:0,bottom:0}}>
                  <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                  <XAxis dataKey="name" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}}/>
                  <YAxis stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}} tickFormatter={v=>`${v.toFixed(0)}%`}/>
                  <Tooltip content={<TT/>}/>
                  <ReferenceLine y={35} stroke={T.red} strokeDasharray="4 2" label={{value:'35%',position:'insideTopRight',fill:T.red,fontSize:9}}/>
                  <Bar dataKey="payRat" name="Payroll %" fill={T.accent} fillOpacity={0.7} radius={[2,2,0,0]}/>
                </ComposedChart>
              </ResponsiveContainer>
            </Card>
            <Card>
              <SectionTitle>Year-on-Year (2023–2025)</SectionTitle>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={yoyData} margin={{top:5,right:10,left:0,bottom:0}}>
                  <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                  <XAxis dataKey="yr" stroke={T.muted} tick={{fontSize:10,fontFamily:"'IBM Plex Mono'",fill:T.muted}}/>
                  <YAxis stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'",fill:T.muted}} tickFormatter={v=>`${v.toFixed(1)}B`}/>
                  <Tooltip content={<TT/>}/>
                  <Legend iconType="circle" iconSize={6} wrapperStyle={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
                  <Bar dataKey="rev" name="Revenue" fill={T.accent}    fillOpacity={0.8} radius={[2,2,0,0]}/>
                  <Bar dataKey="gop" name="GOP"     fill={T.secondary} fillOpacity={0.8} radius={[2,2,0,0]}/>
                  <Bar dataKey="nop" name="NOP"     fill={T.green}     fillOpacity={0.8} radius={[2,2,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </Card>
          </div>
        </div>
      )}

      {/* TAB: STRUCTURE */}
      {activeTab==='structure'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
            <Card>
              <SectionTitle>Cost Structure — {periodLabel}</SectionTitle>
              <ResponsiveContainer width="100%" height={210}>
                <PieChart>
                  <Pie data={pieData} cx="50%" cy="50%" innerRadius={52} outerRadius={82} paddingAngle={2} dataKey="value">
                    {pieData.map((e,i)=><Cell key={i} fill={e.color}/>)}
                  </Pie>
                  <Tooltip formatter={v=>fM(v)}/>
                  <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
                </PieChart>
              </ResponsiveContainer>
            </Card>
            <Card>
              <SectionTitle>Revenue Mix — {periodLabel}</SectionTitle>
              <ResponsiveContainer width="100%" height={210}>
                <PieChart>
                  <Pie data={revMixData} cx="50%" cy="50%" innerRadius={52} outerRadius={82} paddingAngle={2} dataKey="value">
                    {revMixData.map((e,i)=><Cell key={i} fill={e.color}/>)}
                  </Pie>
                  <Tooltip formatter={v=>fM(v)}/>
                  <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
                </PieChart>
              </ResponsiveContainer>
            </Card>
          </div>
          <Card>
            <SectionTitle>Expense Breakdown — {periodLabel}</SectionTitle>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr style={{borderBottom:`2px solid ${T.border}`}}>
                    {['Kategori','Amount (M IDR)','% Revenue','vs Prior'].map(h=>(
                      <th key={h} style={{padding:'8px 12px',textAlign:h==='Kategori'?'left':'right',color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",textTransform:'uppercase'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    {l:'F&B Cost',          v:safe(cur.cos),                                      pv:prv?safe(prv.cos):null,      bg:false},
                    {l:'Dept Payroll',       v:safe(cur.deptPay),                                  pv:prv?safe(prv.deptPay):null,  bg:true},
                    {l:'Dept Other Expenses',v:safe(cur.deptOther),                                pv:prv?safe(prv.deptOther):null,bg:false},
                    {l:'Overhead Payroll',   v:safe(cur.ovhdPay),                                  pv:prv?safe(prv.ovhdPay):null,  bg:true},
                    {l:'Overhead Other Exp.',v:safe(cur.ovhdOther),                                pv:prv?safe(prv.ovhdOther):null,bg:false},
                    {l:'Mgmt & Incentive Fee',v:safe(cur.incentFee)+safe(cur.mgmtFee),             pv:prv?safe(prv.incentFee)+safe(prv.mgmtFee):null,bg:true},
                    {l:'Depreciation',       v:safe(cur.deprTotal),                                pv:prv?safe(prv.deprTotal):null,bg:false},
                    {l:'Interest & ROI',     v:safe(cur.interest)+safe(cur.roi),                   pv:prv?safe(prv.interest)+safe(prv.roi):null,bg:true},
                  ].map(r=>{
                    const pct=cur.rev>0?r.v/cur.rev*100:0;
                    const delta=(r.pv&&r.pv>0)?chg(r.v,r.pv):null;
                    return(
                      <tr key={r.l} style={{background:r.bg?T.card:'transparent',borderBottom:`1px solid ${T.border}22`}}>
                        <td style={{padding:'8px 12px',color:T.text,fontFamily:"'IBM Plex Sans'"}}>{r.l}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:T.red,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{fM(r.v)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{fP(pct)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:delta!=null?(delta>0?T.red:T.green):T.muted,fontFamily:"'IBM Plex Mono'",fontSize:10}}>
                          {delta!=null?(delta>0?'▲ ':'▼ ')+Math.abs(delta).toFixed(1)+'%':'—'}
                        </td>
                      </tr>
                    );
                  })}
                  <tr style={{borderTop:`2px solid ${T.border}`}}>
                    <td style={{padding:'9px 12px',color:T.text,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>TOTAL EXPENSES</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:T.red,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{fM(safe(cur.rev)-safe(cur.nop))}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{fP(cur.rev>0?(safe(cur.rev)-safe(cur.nop))/cur.rev*100:0)}</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}
function PLPage() {
  const [yr,setYr]=useState('2026');
  const [period,setPeriod]=useState('full');
  const c=T.card,brd=T.border,ac=T.accent,sc=T.secondary,tx=T.text,mu=T.muted,sb=T.sub;

  const isAnnual = parseInt(yr) < 2024;

  // Build period options
  const periodOptions = useMemo(()=>{
    if(isAnnual) return [{v:'full',l:`Full Year ${yr}`}];
    const mKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
    const opts=[{v:'full',l:`Full Year ${yr}`},{v:'ytd',l:`YTD ${yr}`}];
    mKeys.forEach((k,i)=>{ if(TB[k]) opts.push({v:`m${i+1}`,l:ML[i]+' '+yr}); });
    const qMap={Q1:[0,1,2],Q2:[3,4,5],Q3:[6,7,8],Q4:[9,10,11]};
    Object.entries(qMap).forEach(([q,idxs])=>{
      const qKeys=idxs.map(i=>`${yr}-${String(i+1).padStart(2,'0')}`).filter(k=>TB[k]);
      if(qKeys.length===3) opts.push({v:q.toLowerCase(),l:`${q} ${yr}`});
    });
    return opts;
  },[yr,isAnnual]);

  // When year changes, reset period
  const handleYrChange = (v)=>{ setYr(v); setPeriod('full'); };

  // Determine keys to aggregate
  const keys = useMemo(()=>{
    if(isAnnual) return null; // use annPnl
    const mKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
    if(period==='full') return mKeys.filter(k=>TB[k]);
    if(period==='ytd'){
      const avail=mKeys.filter(k=>TB[k]);
      return avail;
    }
    if(period==='q1') return mKeys.slice(0,3).filter(k=>TB[k]);
    if(period==='q2') return mKeys.slice(3,6).filter(k=>TB[k]);
    if(period==='q3') return mKeys.slice(6,9).filter(k=>TB[k]);
    if(period==='q4') return mKeys.slice(9,12).filter(k=>TB[k]);
    const mi=parseInt(period.replace('m',''))-1;
    return [mKeys[mi]].filter(k=>k&&TB[k]);
  },[yr,period,isAnnual]);

  const cur = useMemo(()=>{
    if(isAnnual) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnnual]);

  // Budget comparison (only for 2026 months)
  const bud = useMemo(()=>{
    if(yr!=='2026') return null;
    const bKeys = period==='full'?['2026-01','2026-02']:
                  period==='ytd'?['2026-01','2026-02']:
                  period==='m1'?['2026-01']:period==='m2'?['2026-02']:null;
    if(!bKeys) return null;
    const validKeys = bKeys.filter(k=>BUD26[k]);
    if(!validKeys.length) return null;
    return aggKeys(validKeys, BUD26);
  },[yr,period]);

  const prior = useMemo(()=>{
    const pyear = parseInt(yr)-1;
    if(isAnnual) return pyear>=2013?annPnl(pyear):null;
    if(period==='full'||period==='ytd'){
      if(parseInt(yr)===2025) return aggKeys(mKeys24);
      if(parseInt(yr)===2026) return aggKeys(mKeys25);
      return pyear>=2013?annPnl(pyear):null;
    }
    // Monthly prior year same month
    if(period.startsWith('m')&&parseInt(yr)>=2025){
      const mi=parseInt(period.replace('m',''))-1;
      const priorKey=`${pyear}-${String(mi+1).padStart(2,'0')}`;
      return TB[priorKey]?aggKeys([priorKey]):null;
    }
    return null;
  },[yr,period,isAnnual]);

  const trendKeys = yr==='2024'?mKeys24:yr==='2025'?mKeys25:['2026-01','2026-02'];
  const marginTrend = useMemo(()=> (!isAnnual?trendKeys.filter(k=>TB[k]):[]).map((k,i)=>{
    const d=pnl(TB[k]);
    return {name:ML[i],gopMgn:+d.gopMgn.toFixed(1),nopMgn:+d.nopMgn.toFixed(1)};
  }),[yr,isAnnual]);

  const revTrend = useMemo(()=>{
    if(isAnnual){
      return Object.entries(ANN).filter(([y])=>parseInt(y)<=parseInt(yr)).slice(-8).map(([y,d])=>{
        const v=pnl(d); return {name:y,rev:+v.rev.toFixed(3),gop:+v.gop.toFixed(3),nop:+v.nop.toFixed(3)};
      });
    }
    return trendKeys.filter(k=>TB[k]).map((k,i)=>{
      const d=pnl(TB[k]);
      return {name:ML[i],rev:+d.rev.toFixed(3),gop:+d.gop.toFixed(3),nop:+d.nop.toFixed(3)};
    });
  },[yr,isAnnual]);

  if(!cur) return <div style={{padding:40,color:T.muted}}>Loading...</div>;

  const rows=[
    {l:'ROOM REVENUE',v:cur.rooms,b:bud?.rooms,p:prior?.rooms,pct:cur.rooms/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'F&B REVENUE',v:cur.fnb,b:bud?.fnb,p:prior?.fnb,pct:cur.fnb/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'MINOR OPERATED',v:cur.minor,b:bud?.minor,p:prior?.minor,pct:cur.minor/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'OTHER INCOME',v:cur.otherinc,b:bud?.otherinc,p:prior?.otherinc,pct:cur.otherinc/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'TOTAL REVENUE',v:cur.rev,b:bud?.rev,p:prior?.rev,pct:100,indent:0,bold:true,sep:true},
    {l:'Cost of Sales',v:-cur.cos,b:bud?-bud.cos:null,p:prior?-prior.cos:null,pct:cur.cos/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Dept Payroll',v:-cur.deptPay,b:bud?-bud.deptPay:null,p:prior?-prior.deptPay:null,pct:cur.deptPay/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Dept Other Exp',v:-cur.deptOther,b:bud?-bud.deptOther:null,p:prior?-prior.deptOther:null,pct:cur.deptOther/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'DEPT PROFIT',v:cur.deptProfit,b:bud?.deptProfit,p:prior?.deptProfit,pct:cur.deptProfit/cur.rev*100,indent:0,bold:true,sep:true},
    {l:'Overhead Payroll',v:-cur.ovhdPay,b:bud?-bud.ovhdPay:null,p:prior?-prior.ovhdPay:null,pct:cur.ovhdPay/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Overhead Other Exp',v:-cur.ovhdOther,b:bud?-bud.ovhdOther:null,p:prior?-prior.ovhdOther:null,pct:cur.ovhdOther/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'GROSS OPERATING PROFIT',v:cur.gop,b:bud?.gop,p:prior?.gop,pct:cur.gopMgn,indent:0,bold:true,sep:true,highlight:true},
    {l:'Incentive Fee',v:-cur.incentFee,b:bud?-bud.incentFee:null,p:prior?-prior.incentFee:null,pct:cur.incentFee/cur.rev*100,indent:1,neg:true},
    {l:'Management Fee',v:-cur.mgmtFee,b:bud?-bud.mgmtFee:null,p:prior?-prior.mgmtFee:null,pct:cur.mgmtFee/cur.rev*100,indent:1,neg:true},
    {l:'Depreciation & Amort.',v:-cur.deprTotal,b:bud?-bud.deprTotal:null,p:prior?-prior.deprTotal:null,pct:cur.deprTotal/cur.rev*100,indent:1,neg:true},
    {l:'Interest (Net)',v:cur.interest,b:bud?.interest,p:prior?.interest,pct:Math.abs(cur.interest)/cur.rev*100,indent:1},
    {l:'ROI Expense',v:-cur.roi,b:bud?-bud.roi:null,p:prior?-prior.roi:null,pct:cur.roi/cur.rev*100,indent:1,neg:true},
    {l:'Owning Company Exp',v:-cur.ownExp,b:bud?-bud.ownExp:null,p:prior?-prior.ownExp:null,pct:cur.ownExp/cur.rev*100,indent:1,neg:true},
    {l:'Other Non-Operating',v:-cur.otherNonOp,b:bud?-bud.otherNonOp:null,p:prior?-prior.otherNonOp:null,pct:cur.otherNonOp/cur.rev*100,indent:1,neg:true},
    {l:'Income Tax',v:-cur.tax,b:bud?-bud.tax:null,p:prior?-prior.tax:null,pct:0,indent:1,neg:true},
    {l:'NET OPERATING PROFIT',v:cur.nop,b:bud?.nop,p:prior?.nop,pct:cur.nopMgn,indent:0,bold:true,sep:true,highlight:true},
  ];

  const showBud = !!bud;
  const showPrior = !!prior;
  const colCount = 2 + (showBud?1:0) + (showPrior?1:0);

  return (
    <div style={{padding:24}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:T.text,fontFamily:'IBM Plex Mono,monospace'}}>
            PROFIT &amp; LOSS STATEMENT
          </div>
          <div style={{fontSize:11,color:T.muted,marginTop:2}}>
            {isAnnual?`Annual ${yr}`:`${period==='full'?'Full Year':period==='ytd'?'Year-to-Date':period.startsWith('m')?periodOptions.find(o=>o.v===period)?.l:period.toUpperCase()+' '+yr} · Rp Milyar`}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <PeriodSel yr={yr} setYr={v=>{setYr(v);setPeriod('full');}} period={period} setPeriod={setPeriod} years={YEAR_RANGE}/>
          {false&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer'}}>
              {periodOptions.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* KPI Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:20}}>
        {[
          {l:'Total Revenue',v:cur.rev,fmt:fC,color:ac},
          {l:'GOP',v:cur.gop,fmt:fC,color:cur.gop>=0?T.green:T.red},
          {l:'GOP Margin',v:cur.gopMgn,fmt:n=>`${n.toFixed(1)}%`,color:cur.gopMgn>=30?T.green:cur.gopMgn>=20?T.yellow:T.red},
          {l:'NOP',v:cur.nop,fmt:fC,color:cur.nop>=0?T.green:T.red},
          {l:'NOP Margin',v:cur.nopMgn,fmt:n=>`${n.toFixed(1)}%`,color:cur.nopMgn>=5?T.green:cur.nopMgn>=0?T.yellow:T.red},
        ].map(({l,v,fmt,color})=>(
          <div key={l} style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'12px 16px'}}>
            <div style={{fontSize:10,color:mu,textTransform:'uppercase',letterSpacing:1}}>{l}</div>
            <div style={{fontSize:18,fontWeight:700,color,marginTop:4,fontFamily:'IBM Plex Mono,monospace'}}>{fmt(v)}</div>
          </div>
        ))}
      </div>

      {/* P&L Table */}
      <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,overflow:'hidden',marginBottom:20}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{background:T.bg,borderBottom:`1px solid ${brd}`}}>
                <th style={{padding:'10px 16px',textAlign:'left',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>
                  {isAnnual?`${yr} Full Year`:'LINE ITEM'}
                </th>
                <th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>
                  {period==='full'?`ACTUAL ${yr}`:period==='ytd'?`YTD ACTUAL`:period.startsWith('m')?periodOptions.find(o=>o.v===period)?.l:'ACTUAL'}
                </th>
                <th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>%</th>
                {showBud&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>BUDGET</th>}
                {showBud&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>VAR</th>}
                {showPrior&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>{parseInt(yr)-1}</th>}
                {showPrior&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>VAR%</th>}
              </tr>
            </thead>
            <tbody>
              {rows.map((row,i)=>{
                const varBud = showBud&&row.b!=null?row.v-row.b:null;
                const varPrior = showPrior&&row.p!=null?(row.p!==0?(row.v-row.p)/Math.abs(row.p)*100:null):null;
                return (
                  <tr key={i} style={{
                    borderBottom:`1px solid ${row.sep?brd:'transparent'}`,
                    background: row.highlight?(cur.nop>=0&&row.l.includes('NET')||cur.gop>=0&&row.l.includes('GROSS'))?`${T.green}10`:`${T.red}08`:'transparent',
                  }}>
                    <td style={{padding:`${row.sep?'10px':'6px'} 16px`,paddingLeft:row.indent?32:16,
                      color:row.bold?tx:sb,fontWeight:row.bold?700:400,
                      fontFamily:row.bold?'IBM Plex Mono,monospace':'inherit',fontSize:row.bold?12:11}}>
                      {row.l}
                    </td>
                    <td style={{padding:`${row.sep?'10px':'6px'} 16px`,textAlign:'right',
                      color:row.bold?(row.v>=0?T.green:T.red):tx,fontWeight:row.bold?700:400,
                      fontFamily:'IBM Plex Mono,monospace',fontSize:row.bold?12:11}}>
                      {fC(row.v)}
                    </td>
                    <td style={{padding:'6px 16px',textAlign:'right',color:mu,fontSize:11}}>
                      {row.pct!=null?`${Math.abs(row.pct).toFixed(1)}%`:''}
                    </td>
                    {showBud&&<td style={{padding:'6px 16px',textAlign:'right',color:sb,fontFamily:'IBM Plex Mono,monospace',fontSize:11}}>
                      {row.b!=null?fC(row.b):'-'}
                    </td>}
                    {showBud&&<td style={{padding:'6px 16px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:11,
                      color:varBud!=null?(varBud>=0?T.green:T.red):mu}}>
                      {varBud!=null?fC(varBud):'-'}
                    </td>}
                    {showPrior&&<td style={{padding:'6px 16px',textAlign:'right',color:sb,fontFamily:'IBM Plex Mono,monospace',fontSize:11}}>
                      {row.p!=null?fC(row.p):'-'}
                    </td>}
                    {showPrior&&<td style={{padding:'6px 16px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:11,
                      color:varPrior!=null?(varPrior>=0?T.green:T.red):mu}}>
                      {varPrior!=null?`${varPrior>=0?'+':''}${varPrior.toFixed(1)}%`:'-'}
                    </td>}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Charts */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:11,color:mu,marginBottom:12,textTransform:'uppercase',letterSpacing:1}}>Revenue Trend</div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={revTrend} margin={{top:4,right:8,bottom:4,left:8}}>
              <CartesianGrid strokeDasharray="3 3" stroke={brd}/>
              <XAxis dataKey="name" tick={{fill:mu,fontSize:10}} tickLine={false}/>
              <YAxis tick={{fill:mu,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(1)}M`}/>
              <Tooltip contentStyle={{background:T.bg,border:`1px solid ${brd}`,borderRadius:6}} labelStyle={{color:tx}} formatter={(v,n)=>[`${v.toFixed(3)}M`,n]}/>
              <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10,color:sb}}/>
              <Bar dataKey="rev" fill={ac} name="Revenue" radius={[2,2,0,0]}/>
              <Bar dataKey="gop" fill={sc} name="GOP" radius={[2,2,0,0]}/>
              <Bar dataKey="nop" fill={T.purple||'#8B5CF6'} name="NOP" radius={[2,2,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:11,color:mu,marginBottom:12,textTransform:'uppercase',letterSpacing:1}}>{isAnnual?'Annual Margin Trend':'Monthly Margin Trend'}</div>
          {!isAnnual&&marginTrend.length>0?(
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={marginTrend} margin={{top:4,right:8,bottom:4,left:8}}>

                <ReferenceLine y={0} stroke={T.red} strokeDasharray="3 3"/>

            </ResponsiveContainer>
          ):(

                    </div>

    </div>
  );
}

function BSPage() {
  const [yr,setYr]=useState('2026');
  const [period,setPeriod]=useState('m2');

  // Resolve snapshot key based on year + period
  function snapKey(y, p) {
    const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    if(y==='2026'){
      if(p==='m1') return 'jan26';
      if(p==='m2') return 'feb26';
      return 'feb26';
    }
    if(MON_YEARS.includes(y)){
      // monthly
      const mi = p.startsWith('m') ? parseInt(p.slice(1))-1 : 11;
      if(p==='full') return ML2[11]+y.slice(2); // dec
      if(p.startsWith('q')) {
        const qEnd = {q1:2,q2:5,q3:8,q4:11}[p];
        return ML2[qEnd]+y.slice(2);
      }
      return ML2[mi]+y.slice(2);
    }
    // annual
    const yrMap = {'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16',
      '2017':'dec17','2018':'dec18','2019':'dec19','2020':'dec20',
      '2021':'dec21','2022':'dec22','2023':'dec23'};
    return yrMap[y]||'dec23';
  }

  function prevSnapKey(y, p) {
    const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    if(y==='2026'){
      if(p==='m1') return 'dec25';
      if(p==='m2') return 'jan26';
      return 'jan26';
    }
    if(MON_YEARS.includes(y)){
      const mi = p.startsWith('m') ? parseInt(p.slice(1))-1 : 11;
      if(p==='full'||p==='q4') {
        // prev = dec of prior year
        const py=String(parseInt(y)-1);
        return snapKey(py,'full');
      }
      if(p.startsWith('q')) {
        const qPrevEnd = {q2:2,q3:5,q4:8}[p];
        if(qPrevEnd!==undefined) return ML2[qPrevEnd]+y.slice(2);
        return snapKey(String(parseInt(y)-1),'full'); // q1 prev = dec prior year
      }
      if(mi===0) return snapKey(String(parseInt(y)-1),'full');
      return ML2[mi-1]+y.slice(2);
    }
    const py=String(parseInt(y)-1);
    const yrMap={'2012':null,'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16',
      '2017':'dec17','2018':'dec18','2019':'dec19','2020':'dec20',
      '2021':'dec21','2022':'dec22','2023':'dec23'};
    return yrMap[py]||null;
  }

  const sk  = snapKey(yr, period);
  const psk = prevSnapKey(yr, period);
  const rawSnap = BS_SNAPSHOTS[sk];
  const rawPrv  = psk ? BS_SNAPSHOTS[psk] : null;
  if(!rawSnap) return <div style={{padding:40,color:T.muted}}>Data tidak tersedia untuk periode ini.</div>;
  const bs  = bsCalc(rawSnap);
  const prv = rawPrv ? bsCalc(rawPrv) : bs;

  const isAnnualYr = !MON_YEARS.includes(yr);
  const periodLabel = isAnnualYr ? yr : (()=>{
    const ML2=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if(period==='full') return `Full Year ${yr}`;
    if(period.startsWith('q')) return `${period.toUpperCase()} ${yr}`;
    const mi=parseInt(period.slice(1))-1;
    return `${ML2[mi]} ${yr}`;
  })();

  const BSRow=({l,v,p,bold,indent,isLiab})=>(
    <tr>
      <td style={{padding:'5px 12px',paddingLeft:indent?28:12,color:bold?T.text:T.sub,fontSize:11,fontFamily:"'IBM Plex Sans'",fontWeight:bold?600:400}}>{l}</td>
      <td style={{padding:'5px 12px',textAlign:'right',color:bold?(v<0?T.red:T.text):T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:bold?600:400}}>{v!==undefined?fC(v):''}</td>
      <td style={{padding:'5px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{p!==undefined?fC(p):''}</td>
      <td style={{padding:'5px 12px',textAlign:'right',fontSize:10,fontFamily:"'IBM Plex Mono'",color:p!==undefined&&v!==undefined?clr(isLiab?-(v-p):v-p):T.muted}}>
        {p!==undefined&&v!==undefined&&p!==0?`${((v-p)/Math.abs(p)*100).toFixed(1)}%`:'-'}
      </td>
    </tr>
  );
  const Sec=({t})=><tr><td colSpan={4} style={{padding:'10px 12px 4px',color:T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{t}</td></tr>;
  const Div=()=><tr><td colSpan={4}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;

  const debtItems = [
    {l:'Current Ratio',v:(bs.tCA/bs.tCL).toFixed(2),c:bs.tCA/bs.tCL>=1.5?T.green:T.yellow},
    {l:'Quick Ratio',v:((bs.cash+bs.ar)/bs.tCL).toFixed(2),c:(bs.cash+bs.ar)/bs.tCL>=1?T.green:T.yellow},
    {l:'Debt/Equity',v:bs.tEq>0?(bs.dTMgmt/bs.tEq).toFixed(2):'N/A',c:T.yellow},
    {l:'Net Fixed Assets',v:fM(bs.netF),c:T.text},
  ];

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div><div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Balance Sheet</div><div style={{color:T.muted,fontSize:11}}>Statement of Financial Position · {periodLabel}</div></div>
        <PeriodSel yr={yr} setYr={setYr} period={period} setPeriod={setPeriod} years={YEAR_RANGE}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Card style={{padding:0}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:T.border}}>
              <th style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>ASSETS</th>
              <th style={{padding:'8px 12px',textAlign:'right',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}>{periodLabel}</th>
              <th style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{psk||'Prior'}</th>
              <th style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}> Δ%</th>
            </tr></thead>
            <tbody>
              <Sec t="CURRENT ASSETS"/>
              <BSRow l="Cash & Bank" v={bs.cash} p={prv.cash} indent/>
              <BSRow l="Short Term Investment" v={bs.stInv||0} p={prv.stInv||0} indent/>
              <BSRow l="Account Receivable" v={bs.ar} p={prv.ar} indent/>
              <BSRow l="Inventory" v={bs.inv} p={prv.inv} indent/>
              <BSRow l="Prepaid & Advance" v={bs.pre} p={prv.pre} indent/>
              <BSRow l="Total Current Assets" v={bs.tCA} p={prv.tCA} bold/>
              <Div/>
              <Sec t="NON-CURRENT ASSETS"/>
              <BSRow l="Fixed Assets (Gross)" v={bs.fixG} p={prv.fixG} indent/>
              <BSRow l="Accum. Depreciation" v={bs.accD} p={prv.accD} indent/>
              <BSRow l="Net Fixed Assets" v={bs.netF} p={prv.netF} indent bold/>
              <BSRow l="Intangible & Other" v={bs.otNA} p={prv.otNA} indent/>
              <Div/>
              <BSRow l="TOTAL ASSETS" v={bs.tA} p={prv.tA} bold/>
            </tbody>
          </table>
        </Card>
        <Card style={{padding:0}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:T.border}}>
              <th style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>LIABILITIES & EQUITY</th>
              <th style={{padding:'8px 12px',textAlign:'right',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}>{periodLabel}</th>
              <th style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{psk||'Prior'}</th>
              <th style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}> Δ%</th>
            </tr></thead>
            <tbody>
              <Sec t="CURRENT LIABILITIES"/>
              <BSRow l="Account Payable" v={bs.ap} p={prv.ap} indent isLiab/>
              <BSRow l="Accrued Expenses" v={bs.acc} p={prv.acc} indent isLiab/>
              <BSRow l="Advance Deposits" v={bs.advDep} p={prv.advDep} indent isLiab/>
              <BSRow l="Tax Payable" v={bs.taxPay} p={prv.taxPay} indent isLiab/>
              <BSRow l="Other Current Liabilities" v={bs.othCL} p={prv.othCL} indent isLiab/>
              <BSRow l="Total Current Liabilities" v={bs.tCL} p={prv.tCL} bold isLiab/>
              <Div/>
              <Sec t="LONG TERM LIABILITIES"/>
              <BSRow l="Due to Owner/Mgmt" v={bs.dTMgmt} p={prv.dTMgmt} indent isLiab/>
              <BSRow l="Total Liabilities" v={bs.tL} p={prv.tL} bold isLiab/>
              <Div/>
              <Sec t="EQUITY"/>
              <BSRow l="Share Capital" v={bs.pic} p={prv.pic} indent/>
              <BSRow l="Retained Earnings" v={bs.re} p={prv.re} indent/>
              <BSRow l="Total Equity" v={bs.tEq} p={prv.tEq} bold/>
              <Div/>
              <BSRow l="TOTAL LIABILITIES + EQUITY" v={bs.tLE} p={prv.tLE} bold/>
            </tbody>
          </table>
        </Card>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginTop:12}}>
        {debtItems.map((d,i)=>(
          <Card key={i} style={{padding:'12px 16px'}}>
            <div style={{color:T.muted,fontSize:10,marginBottom:4}}>{d.l}</div>
            <div style={{color:d.c,fontSize:20,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{d.v}</div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function CFPage() {
  const [yr,setYr]=useState('2026');
  const [period,setPeriod]=useState('m2');

  const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const MONTH_LABELS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const ANN_KEYS=['2013','2014','2015','2016','2017','2018','2019','2020','2021','2022','2023'];

  function getSnap(y, p) {
    if(y==='2026'){return p==='m1'?'jan26':'feb26';}
    if(MON_YEARS.includes(y)){
      const mi=p.startsWith('m')?parseInt(p.slice(1))-1:11;
      if(p==='full') return ML2[11]+y.slice(2);
      if(p.startsWith('q')){const qe={q1:2,q2:5,q3:8,q4:11}[p];return ML2[qe]+y.slice(2);}
      return ML2[mi]+y.slice(2);
    }
    const m={'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16','2017':'dec17',
      '2018':'dec18','2019':'dec19','2020':'dec20','2021':'dec21','2022':'dec22','2023':'dec23'};
    return m[y]||'dec23';
  }
  function getPrevSnap(y, p) {
    if(y==='2026'){return p==='m1'?'dec25':'jan26';}
    if(MON_YEARS.includes(y)){
      const mi=p.startsWith('m')?parseInt(p.slice(1))-1:11;
      if(p==='full'||p==='q4'){const py=String(parseInt(y)-1);return getSnap(py,'full');}
      if(p.startsWith('q')){const qpe={q2:2,q3:5,q4:8}[p];if(qpe!==undefined)return ML2[qpe]+y.slice(2);return getSnap(String(parseInt(y)-1),'full');}
      if(mi===0)return getSnap(String(parseInt(y)-1),'full');
      return ML2[mi-1]+y.slice(2);
    }
    const m={'2013':null,'2014':'dec13','2015':'dec14','2016':'dec15','2017':'dec16',
      '2018':'dec17','2019':'dec18','2020':'dec19','2021':'dec20','2022':'dec21','2023':'dec22'};
    return m[y]||null;
  }

  function calcCF(skNow, skPrev, pnlData) {
    const now  = BS_SNAPSHOTS[skNow];
    const prev = BS_SNAPSHOTS[skPrev];
    if(!now||!prev) return null;
    const bsN = bsCalc(now); const bsP = bsCalc(prev);

    // Operating
    const netInc     = pnlData ? pnlData.nop : 0;
    const depr       = pnlData ? pnlData.deprTotal : 0;
    const dAR        = -(bsN.ar   - bsP.ar);
    const dInv       = -(bsN.inv  - bsP.inv);
    const dPre       = -(bsN.pre  - bsP.pre);
    const dAP        =  (bsN.ap   - bsP.ap);
    const dAcc       =  (bsN.acc  - bsP.acc);
    const dAdvDep    =  ((bsN.advDep||0) - (bsP.advDep||0));
    const dTax       =  ((bsN.taxPay||0) - (bsP.taxPay||0));
    const dOthCL     =  ((bsN.othCL||0)  - (bsP.othCL||0));
    const opCF = netInc + depr + dAR + dInv + dPre + dAP + dAcc + dAdvDep + dTax + dOthCL;

    // Investing
    const dFixG   = -(bsN.fixG - bsP.fixG);
    const invCF   = dFixG;

    // Financing
    const dDTMgmt = -((bsN.dTMgmt||0) - (bsP.dTMgmt||0));
    const finCF   = dDTMgmt;

    const netCF = opCF + invCF + finCF;
    const begCash = bsP.cash;
    const endCash = bsN.cash;
    return { netInc,depr,dAR,dInv,dPre,dAP,dAcc,dAdvDep,dTax,dOthCL,opCF,dFixG,invCF,dDTMgmt,finCF,netCF,begCash,endCash };
  }

  // Get aggregate P&L for the selected period
  const isAnn = !MON_YEARS.includes(yr) && yr!=='2026';
  const pnlKeys = isAnn ? null : (() => {
    const base=yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
    const avail=base.filter(k=>TB[k]);
    if(period==='full') return avail;
    if(period.startsWith('q')){const qi={q1:[0,1,2],q2:[3,4,5],q3:[6,7,8],q4:[9,10,11]}[period];return qi.map(i=>base[i]).filter(k=>k&&TB[k]);}
    if(period.startsWith('m')){const mi=parseInt(period.slice(1))-1;return [base[mi]].filter(k=>k&&TB[k]);}
    return avail;
  })();
  const aggPnl = isAnn ? (ANN[yr]||null) : (pnlKeys&&pnlKeys.length ? aggKeys(pnlKeys) : null);

  const skNow  = getSnap(yr, period);
  const skPrev = getPrevSnap(yr, period);
  const cf = calcCF(skNow, skPrev, aggPnl);

  // Period label
  const periodLabel = isAnn ? yr : (()=>{
    if(period==='full') return `Full Year ${yr}`;
    if(period.startsWith('q')) return `${period.toUpperCase()} ${yr}`;
    const mi=parseInt(period.slice(1))-1;
    return `${MONTH_LABELS[mi]} ${yr}`;
  })();

  // Monthly trend for chart (2024/2025/2026)
  const trendData = MON_YEARS.includes(yr)||yr==='2026' ? (() => {
    const base=yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
    return base.filter(k=>TB[k]).map((k,i)=>{
      const mi=parseInt(k.slice(5))-1;
      const mn=ML2[mi]+yr.slice(2);
      const mp=i===0?getSnap(String(parseInt(yr)-1),'full'):ML2[mi-1]+yr.slice(2);
      const c=calcCF(mn,mp,pnl(TB[k]));
      return {name:MONTH_LABELS[mi],op:c?Math.round(c.opCF*1000):0,inv:c?Math.round(c.invCF*1000):0,fin:c?Math.round(c.finCF*1000):0,net:c?Math.round(c.netCF*1000):0};
    });
  })() : [];

  const CFRow=({l,v,indent,bold,isOut,note})=>(
    <tr>
      <td style={{padding:'4px 12px',paddingLeft:indent?28:12,color:bold?T.text:T.sub,fontSize:11,fontFamily:"'IBM Plex Sans'",fontWeight:bold?600:400}}>
        {l}{note&&<span style={{color:T.muted,fontSize:9,marginLeft:6}}>{note}</span>}
      </td>
      <td style={{padding:'4px 12px',textAlign:'right',color:v===undefined?T.muted:v>=0?(isOut?T.red:T.green):T.red,fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:bold?600:400}}>
        {v!==undefined?fC(v):'-'}
      </td>
    </tr>
  );
  const Sec=({t,c})=><tr><td colSpan={2} style={{padding:'8px 12px 3px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{t}</td></tr>;
  const Div=()=><tr><td colSpan={2}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Cash Flow Statement</div>
          <div style={{color:T.muted,fontSize:11}}>Indirect Method · {periodLabel}</div>
        </div>
        <PeriodSel yr={yr} setYr={setYr} period={period} setPeriod={setPeriod} years={YEAR_RANGE}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:12}}>
        <Card style={{padding:0}}>
          {!cf ? <div style={{padding:20,color:T.muted}}>Data tidak tersedia.</div> : (
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:T.border}}>
              <th colSpan={2} style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>CASH FLOW · {periodLabel}</th>
            </tr></thead>
            <tbody>
              <Sec t="OPERATING ACTIVITIES"/>
              <CFRow l="Net Income (Loss)" v={cf.netInc} indent bold/>
              <CFRow l="+ Depreciation" v={cf.depr} indent note="non-cash"/>
              <CFRow l="Δ Account Receivable" v={cf.dAR} indent/>
              <CFRow l="Δ Inventory" v={cf.dInv} indent/>
              <CFRow l="Δ Prepaid & Advance" v={cf.dPre} indent/>
              <CFRow l="Δ Account Payable" v={cf.dAP} indent/>
              <CFRow l="Δ Accrued Expenses" v={cf.dAcc} indent/>
              <CFRow l="Δ Advance Deposits" v={cf.dAdvDep} indent/>
              <CFRow l="Δ Tax Payable" v={cf.dTax} indent/>
              <CFRow l="Δ Other Current Liab" v={cf.dOthCL} indent/>
              <Div/>
              <CFRow l="Net Operating CF" v={cf.opCF} bold/>
              <Sec t="INVESTING ACTIVITIES"/>
              <CFRow l="Δ Fixed Assets (Capex)" v={cf.dFixG} indent isOut/>
              <CFRow l="Net Investing CF" v={cf.invCF} bold isOut/>
              <Sec t="FINANCING ACTIVITIES"/>
              <CFRow l="Δ Due to Owner/Mgmt" v={cf.dDTMgmt} indent/>
              <CFRow l="Net Financing CF" v={cf.finCF} bold/>
              <Div/>
              <CFRow l="NET CHANGE IN CASH" v={cf.netCF} bold/>
              <CFRow l="Beginning Cash" v={cf.begCash} indent/>
              <CFRow l="Ending Cash" v={cf.endCash} indent/>
            </tbody>
          </table>
          )}
        </Card>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {trendData.length>0 && (
          <Card>
            <div style={{color:T.text,fontSize:13,fontWeight:600,marginBottom:12}}>Monthly Cash Flow Trend — {yr}</div>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={trendData} barSize={14}>
                <CartesianGrid strokeDasharray="3 3" stroke={T.border}/>
                <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} stroke={T.border}/>
                <YAxis tick={{fill:T.muted,fontSize:9}} stroke={T.border} tickFormatter={v=>`${v>0?'+':''}${v}M`}/>
                <Tooltip contentStyle={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,fontSize:11}} formatter={(v,n)=>[`${v>0?'+':''}${v}M`,n]}/>
                <Legend wrapperStyle={{fontSize:10,color:T.muted}}/>
                <Bar dataKey="op" name="Operating" fill={T.green} stackId="a"/>
                <Bar dataKey="inv" name="Investing" fill={T.red} stackId="a"/>
                <Bar dataKey="fin" name="Financing" fill={T.yellow} stackId="a"/>
              </BarChart>
            </ResponsiveContainer>
          </Card>
          )}
          {cf && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
            {[
              {l:'Operating CF',v:cf.opCF,c:cf.opCF>=0?T.green:T.red},
              {l:'Investing CF',v:cf.invCF,c:cf.invCF>=0?T.green:T.red},
              {l:'Financing CF',v:cf.finCF,c:cf.finCF>=0?T.green:T.red},
              {l:'Net CF',v:cf.netCF,c:cf.netCF>=0?T.green:T.red},
              {l:'Beginning Cash',v:cf.begCash,c:T.text},
              {l:'Ending Cash',v:cf.endCash,c:T.text},
            ].map((d,i)=>(
              <Card key={i} style={{padding:'12px 16px'}}>
                <div style={{color:T.muted,fontSize:10,marginBottom:4}}>{d.l}</div>
                <div style={{color:d.c,fontSize:16,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(d.v)}</div>
              </Card>
            ))}
          </div>
          )}
        </div>
      </div>
    </div>
  );
}

// FINANCIAL KPI PAGE
// ══════════════════════════════════════════════════════════════════
function KPIPage() {
  const [yr,setYr]=useState('2025');
  const [period,setPeriod]=useState('full');

  const isAnn = !MON_YEARS.includes(yr) && yr!=='2026';
  const pnlKeys = isAnn ? null : (() => {
    const base=yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
    if(period==='full') return base.filter(k=>TB[k]);
    if(period.startsWith('q')){const qi={q1:[0,1,2],q2:[3,4,5],q3:[6,7,8],q4:[9,10,11]}[period];return qi.map(i=>base[i]).filter(k=>k&&TB[k]);}
    if(period.startsWith('m')){const mi=parseInt(period.slice(1))-1;return [base[mi]].filter(k=>k&&TB[k]);}
    return base.filter(k=>TB[k]);
  })();
  const cur = isAnn ? (ANN[yr]||pnl({})) : (pnlKeys&&pnlKeys.length ? aggKeys(pnlKeys) : pnl({}));

  const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  function bsSnap(y,p) {
    if(y==='2026') return p==='m1'?'jan26':'feb26';
    if(MON_YEARS.includes(y)){
      const mi=p.startsWith('m')?parseInt(p.slice(1))-1:11;
      if(p==='full'||p==='q4') return ML2[11]+y.slice(2);
      if(p.startsWith('q')){const qe={q1:2,q2:5,q3:8,q4:11}[p];return ML2[qe]+y.slice(2);}
      return ML2[mi]+y.slice(2);
    }
    const m={'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16','2017':'dec17',
      '2018':'dec18','2019':'dec19','2020':'dec20','2021':'dec21','2022':'dec22','2023':'dec23'};
    return m[y]||'dec23';
  }
  const bs = bsCalc(BS_SNAPSHOTS[bsSnap(yr,period)]||{});

  const safe = (n,d=1) => isFinite(n) && !isNaN(n) ? n.toFixed(d) : '—';
  const safeBool = (n,fn) => isFinite(n) && !isNaN(n) ? fn(n) : false;

  const curRat  = bs.tCL > 0 ? bs.tCA / bs.tCL : 0;
  const qkRat   = bs.tCL > 0 ? (bs.cash + bs.ar) / bs.tCL : 0;
  const cashRat = bs.tCL > 0 ? bs.cash / bs.tCL : 0;
  const deRat   = bs.tEq !== 0 ? bs.tL / bs.tEq : 0;
  const intCov  = (cur.interest||0) < 0 ? cur.gop / Math.abs(cur.interest) : 0;
  const roa     = bs.tA  > 0 ? cur.nop / bs.tA  * 100 : 0;
  const roe     = bs.tEq > 0 ? cur.nop / bs.tEq * 100 : 0;
  const ce      = (bs.tA - bs.tCL); const roce = ce > 0 ? cur.gop / ce * 100 : 0;

  const kpis = [
    {cat:'Liquidity',items:[
      {l:'Current Ratio', v:safe(curRat),  th:'> 1.5', ok:safeBool(curRat,n=>n>1.5),  unit:'x'},
      {l:'Quick Ratio',   v:safe(qkRat),   th:'> 1.0', ok:safeBool(qkRat,n=>n>1.0),   unit:'x'},
      {l:'Cash Ratio',    v:safe(cashRat), th:'> 0.5', ok:safeBool(cashRat,n=>n>0.5),  unit:'x'},
    ]},
    {cat:'Leverage',items:[
      {l:'Debt/Equity',      v:safe(deRat),  th:'< 5.0', ok:safeBool(deRat,n=>n<5.0),  unit:'x'},
      {l:'Due-to-Mgmt/Eq',  v:safe(bs.tEq>0?bs.dTMgmt/bs.tEq:0), th:'< 3.0', ok:safeBool(bs.tEq>0?bs.dTMgmt/bs.tEq:0,n=>n<3.0), unit:'x'},
      {l:'Interest Coverage',v:safe(intCov,1),th:'> 3.0', ok:safeBool(intCov,n=>n>3.0),unit:'x'},
    ]},
    {cat:'Profitability',items:[
      {l:'ROA', v:safe(roa,1), th:'> 5%',  ok:safeBool(roa,n=>n>5),  unit:'%'},
      {l:'ROE', v:safe(roe,1), th:'> 10%', ok:safeBool(roe,n=>n>10), unit:'%'},
      {l:'ROCE',v:safe(roce,1),th:'> 12%', ok:safeBool(roce,n=>n>12),unit:'%'},
    ]},
    {cat:'Margins',items:[
      {l:'GOP Margin',  v:safe(cur.gopMgn,1), th:'> 30%', ok:safeBool(cur.gopMgn,n=>n>30), unit:'%'},
      {l:'NOP Margin',  v:safe(cur.nopMgn,1), th:'> 10%', ok:safeBool(cur.nopMgn,n=>n>10), unit:'%'},
      {l:'Dept Margin', v:safe(cur.rev>0?(cur.deptProfit/cur.rev*100):0,1), th:'> 55%', ok:cur.rev>0&&(cur.deptProfit/cur.rev*100)>55, unit:'%'},
    ]},
    {cat:'Hotel KPIs',items:[
      {l:'Payroll Ratio',  v:safe(cur.payRat,1),  th:'< 35%', ok:safeBool(cur.payRat,n=>n<35),  unit:'%',inv:true},
      {l:'Overhead Ratio', v:safe(cur.utlRat,1),  th:'< 25%', ok:safeBool(cur.utlRat,n=>n<25),  unit:'%',inv:true},
      {l:'Dept Cost Ratio',v:safe(cur.mntRat,1),  th:'< 15%', ok:safeBool(cur.mntRat,n=>n<15),  unit:'%',inv:true},
    ]},
  ];

  // Monthly trend for selected year
  const trendBase = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:yr==='2024'?mKeys24:null;
  const trendData = trendBase ? trendBase.filter(k=>TB[k]).map((k,i)=>{
    const d=pnl(TB[k]);
    return {name:ML[parseInt(k.slice(5))-1]||k, payRat:+safe(d.payRat,1), netMgn:+safe(d.nopMgn,1), gopMgn:+safe(d.gopMgn,1)};
  }) : [];

  const periodLabel = isAnn ? yr : (period==='full'?`Full ${yr}`:period.startsWith('q')?`${period.toUpperCase()} ${yr}`:`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(period.slice(1))-1]} ${yr}`);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Financial KPIs & Ratios</div>
          <div style={{color:T.muted,fontSize:11}}>Automated ratio analysis · {periodLabel}</div>
        </div>
        <PeriodSel yr={yr} setYr={setYr} period={period} setPeriod={setPeriod} years={YEAR_RANGE}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:16}}>
        {kpis.map(cat=>cat.items.map(kpi=>(
          <Card key={kpi.l} style={{padding:'14px 16px',borderLeft:`3px solid ${kpi.ok?T.green:T.red}`}}>
            <div style={{color:T.muted,fontSize:9,letterSpacing:2,marginBottom:6,fontFamily:"'IBM Plex Mono'",textTransform:'uppercase'}}>{kpi.l}</div>
            <div style={{color:kpi.ok?T.green:T.red,fontSize:22,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{kpi.v}{kpi.unit}</div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
              <span style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>{kpi.th}</span>
              <span style={{fontSize:12}}>{kpi.ok?'✓':'✗'}</span>
            </div>
          </Card>
        )))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}}>
        <Card>
          <SectionTitle>Hotel KPI Trends — {yr}{!trendBase?' (annual only)':''}</SectionTitle>
          {trendData.length>0 ? (
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={trendData}>
              <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
              <XAxis dataKey="name" stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
              <YAxis stroke={T.muted} tick={{fontSize:9,fontFamily:"'IBM Plex Mono'"}} tickFormatter={v=>`${v}%`}/>
              <Tooltip content={<TT/>}/>
              <Legend iconType="circle" iconSize={6} wrapperStyle={{fontSize:10,fontFamily:"'IBM Plex Mono'"}}/>
              <Line type="monotone" dataKey="payRat" name="Payroll%" stroke={T.red}       strokeWidth={2} dot={false}/>
              <Line type="monotone" dataKey="gopMgn" name="GOP%"     stroke={T.secondary} strokeWidth={2} dot={false}/>
              <Line type="monotone" dataKey="netMgn" name="NOP%"     stroke={T.green}     strokeWidth={2} dot={false}/>
            </LineChart>
          </ResponsiveContainer>
          ) : <div style={{padding:30,textAlign:'center',color:T.muted,fontSize:11}}>Monthly trend tidak tersedia untuk periode annual ini.</div>}
        </Card>
        <Card>
          <SectionTitle>Score Card</SectionTitle>
          {kpis.map(cat=>(
            <div key={cat.cat} style={{marginBottom:10}}>
              <div style={{color:T.accent,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",marginBottom:4}}>{cat.cat}</div>
              <div style={{display:'flex',gap:4}}>
                {cat.items.map(k=>(
                  <div key={k.l} title={k.l} style={{flex:1,height:6,background:k.ok?T.green:T.red,borderRadius:2,opacity:0.8}}/>
                ))}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
                <span style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>Pass: {cat.items.filter(k=>k.ok).length}/{cat.items.length}</span>
                <span style={{color:cat.items.every(k=>k.ok)?T.green:T.yellow,fontSize:9,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{cat.items.every(k=>k.ok)?'✓ ALL OK':'⚠ REVIEW'}</span>
              </div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

function ForecastPage() {
  const [scenario,setScenario]=useState('base');
  const [revGrowth,setRevGrowth]=useState({conservative:4,base:8,optimistic:14});
  const [costInfl,setCostInfl]=useState({conservative:5,base:4,optimistic:3});
  const [horizon,setHorizon]=useState(12);
  const [tick,setTick]=useState(0); // force re-render on slider change

  const scenarios = {conservative:{name:'Conservative',color:T.yellow},base:{name:'Base Case',color:T.accent},optimistic:{name:'Optimistic',color:T.green}};
  const baseRaw = TB['2025-12']||{};
  const baseMonth = pnl(baseRaw);

  // Build forecast data - recomputed when tick changes
  const forecastData = Array.from({length:horizon},(_,i)=>{
    const mo=i+1;
    const row={name:ML[(i)%12]+(mo>12?' Y2':'')};
    Object.keys(scenarios).forEach(sc=>{
      const rg = Math.pow(1+revGrowth[sc]/100/12, mo);
      const ci = Math.pow(1+costInfl[sc]/100/12, mo);
      const rev = baseMonth.rev * rg;
      // Scale each revenue component proportionally
      const rooms = (baseRaw.rooms||0) * rg;
      const fnb   = (baseRaw.fnb||0) * rg;
      const minor = (baseRaw.minor||0) * rg;
      const otherinc = rev - rooms - fnb - minor;
      // Scale cost components
      const fPF = pnl({
        rooms, fnb, minor, otherinc,
        cos:      (baseRaw.cos||0)*ci,
        deptPay:  (baseRaw.deptPay||0)*ci,
        deptOther:(baseRaw.deptOther||0)*ci,
        ovhdPay:  (baseRaw.ovhdPay||0)*ci,
        ovhdOther:(baseRaw.ovhdOther||0)*ci,
        incentFee:(baseRaw.incentFee||0),
        mgmtFee:  (baseRaw.mgmtFee||0),
        deprTotal:(baseRaw.deprTotal||0),
        interest: (baseRaw.interest||0),
        roi:      (baseRaw.roi||0),
        otherNonOp:(baseRaw.otherNonOp||0),
        tax:0,
      });
      row[`${sc}Rev`]   = Math.round(fPF.rev*1000)/1000;
      row[`${sc}NP`]    = Math.round(fPF.nop*1000)/1000;
      row[`${sc}GOP`]   = Math.round(fPF.gop*1000)/1000;
      row[`${sc}GOPMgn`]= +fPF.gopMgn.toFixed(1);
      row[`${sc}NOPMgn`]= +fPF.nopMgn.toFixed(1);
    });
    return row;
  });

  const summary = {};
  Object.keys(scenarios).forEach(sc=>{
    summary[sc]={
      rev:forecastData.slice(0,12).reduce((s,r)=>s+(r[`${sc}Rev`]||0),0),
      np: forecastData.slice(0,12).reduce((s,r)=>s+(r[`${sc}NP`]||0),0),
      gop:forecastData.slice(0,12).reduce((s,r)=>s+(r[`${sc}GOP`]||0),0),
    };
  });

  const handleSlider = (type, sc, val) => {

          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Forecast Engine</div>

            <button key={h} onClick={()=>setHorizon(h)} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:horizon===h?T.accent:'transparent',color:horizon===h?'#080C12':T.sub,cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{h}M</button>

          <Card key={sc} style={{borderColor:scenario===sc?color:T.border,cursor:'pointer',borderWidth:scenario===sc?2:1}} onClick={()=>setScenario(sc)}>

            <div>

              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                <div><div style={{color:T.muted,fontSize:9}}>Proj Rev (12M)</div><div style={{color:T.text,fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(summary[sc]?.rev||0)}</div></div>
                <div><div style={{color:T.muted,fontSize:9}}>Proj NOP (12M)</div><div style={{color:(summary[sc]?.np||0)>=0?T.green:T.red,fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(summary[sc]?.np||0)}</div></div>
              </div>
            </div>
          </Card>
        ))}
      </div>

      {/* Chart */}
      <Card>
        <SectionTitle>Revenue & NOP Forecast — {horizon} Months from Dec 2025</SectionTitle>
        <ResponsiveContainer width="100%" height={260}>
