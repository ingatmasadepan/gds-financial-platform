const MON_YEARS  = ['2026','2025','2024']; // years with monthly TB data
function getKeys(yr,period='full'){
  if(!MON_YEARS.includes(yr)) return null; // annual only → use annPnl
  const base = yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;
  const avail = base.filter(k=>TB[k]);
  if(period==='full'||period==='ytd') return avail;
  if(period.startsWith('q')){
    const qi={'q1':[0,1,2],'q2':[3,4,5],'q3':[6,7,8],'q4':[9,10,11]}[period]||[];
    return qi.map(i=>base[i]).filter(k=>k&&TB[k]);
  }
  if(period.startsWith('m')){const i=parseInt(period.slice(1))-1;return [base[i]].filter(k=>k&&TB[k]);}
  return avail;
}
function getCur(yr,period='full'){
  if(!MON_YEARS.includes(yr)) return annPnl(parseInt(yr));
  const ks=getKeys(yr,period);
  return ks&&ks.length?aggKeys(ks):annPnl(parseInt(yr));
}
function getPeriodOpts(yr){
  if(!MON_YEARS.includes(yr)) return [{v:'full',l:`Full Year ${yr}`}];
  const base=yr==='2026'?mKeys26_ytd:yr==='2025'?mKeys25:mKeys24;

  return opts;
}

// ══════════════════════════════════════════════════════════════════
// P&L CALCULATION (Hotel USALI format)
// ══════════════════════════════════════════════════════════════════
function pnl(d) {
  if(!d) return {rev:0,rooms:0,fnb:0,minor:0,otherinc:0,cos:0,deptPay:0,deptOther:0,ovhdPay:0,ovhdOther:0,gop:0,nop:0,gopMgn:0,nopMgn:0,payRat:0,utlRat:0,mntRat:0,occ:0,arr:0,deprTotal:0,incentFee:0,mgmtFee:0,interest:0,roi:0,ownExp:0,otherNonOp:0,tax:0,deptProfit:0};
  const rev        = (d.rooms||0) + (d.fnb||0) + (d.minor||0) + (d.otherinc||0);
  const deptProfit = rev - (d.cos||0) - (d.deptPay||0) - (d.deptOther||0);
  const gop        = deptProfit - (d.ovhdPay||0) - (d.ovhdOther||0);
  const nonOp      = (d.incentFee||0)+(d.mgmtFee||0)+(d.deprTotal||0)+(d.interest||0)
                   + (d.roi||0)+(d.sinkFund||0)+(d.ownExp||0)+(d.otherNonOp||0);
  const nop        = gop - nonOp - (d.tax||0);
  return {
    ...d, rev, deptProfit, gop, nonOp, nop,
    gopMgn:  rev>0 ? gop/rev*100  : 0,
    nopMgn:  rev>0 ? nop/rev*100  : 0,
    cosRat:  rev>0 ? (d.cos||0)/rev*100 : 0,
    payRat:  rev>0 ? (d.deptPay||0)/rev*100 : 0,
    ovhdRat: rev>0 ? ((d.ovhdPay||0)+(d.ovhdOther||0))/rev*100 : 0,
    roomsMix:rev>0 ? (d.rooms||0)/rev*100 : 0,
    fnbMix:  rev>0 ? (d.fnb||0)/rev*100 : 0,
    utlRat:  rev>0 ? (d.ovhdOther||0)/rev*100 : 0,
    mntRat:  rev>0 ? (d.deptOther||0)/rev*100 : 0,
    np: nop, ebit: gop,
  };
}
function aggKeys(keys, src=TB) {
  const agg = {};
  keys.filter(k=>src[k]).forEach(k=>{
    Object.entries(src[k]).forEach(([f,v])=>{ agg[f]=(agg[f]||0)+v; });
  });
  return pnl(agg);
}
function annPnl(year) { return pnl(ANN[year]||{}); }
function bsCalc(snap) {
  const s = snap||{cash:0,ar:0,inv:0,pre:0,fixG:0,accD:0,otNA:0,ap:0,acc:0,advDep:0,taxPay:0,othCL:0,dTMgmt:0,pic:0,re:0};
  const stInv = 0; // Short-term investment already included in cash (113 prefix)
  const tCA  = s.cash + s.ar + s.inv + s.pre;
  const netF = s.fixG + s.accD; // accD is negative
  const tA   = tCA + netF + (s.otNA||0);
  const tCL  = s.ap + s.acc + (s.advDep||0) + (s.taxPay||0) + (s.othCL||0);
  const tL   = tCL + (s.dTMgmt||0);
  const tEq  = s.pic + s.re;
  const tLE  = tL + tEq;
  return { ...s, stInv, tCA, netF, tA, tCL, tL, tEq, tLE, ltD:s.dTMgmt||0, cLTD:s.othCL||0, dTax:0 };
}
let T = DARK;
const fM  = n => {
  if(n===undefined||n===null||isNaN(n)) return '-';
  const neg = n < 0;
  const a = Math.abs(n) * 1000; // convert Rp Milyar → Millions
  // 1 decimal if not whole, 0 if whole
  const dec = (a % 1 < 0.05 || a % 1 >= 0.95) ? 0 : 1;
  const fixed = dec === 1 ? Math.floor(a * 10) / 10 : Math.round(a);
  // Format with Indonesian thousand separator (.) and decimal (,)
  const parts = fixed.toFixed(dec).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  const s = (parts.length > 1 && parts[1] !== '0' ? parts[0] + ',' + parts[1] : parts[0]) + 'M';
  return neg ? `(${s})` : s;
};
const fP  = n => n===undefined?'-': `${n.toFixed(1)}%`;
const fC  = n => n<0?`(${fM(Math.abs(n))})`:`${fM(n)}`;
const clr = (n,th=T) => n>=0?th.green:th.red;

    </div>
  );
}

function snapKey(y, p) {
  const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  if(y==='2026'){
    if(p==='m1') return 'jan26';
    if(p==='m2') return 'feb26';
    return 'feb26';
  }
  if(MON_YEARS.includes(y)){
    const mi = p.startsWith('m') ? parseInt(p.slice(1))-1 : 11;
    if(p==='full') return ML2[11]+y.slice(2);
    if(p.startsWith('q')) {
      const qEnd = {q1:2,q2:5,q3:8,q4:11}[p];
      return ML2[qEnd]+y.slice(2);
    }
    return ML2[mi]+y.slice(2);
  }
  const yrMap={'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16',
    '2017':'dec17','2018':'dec18','2019':'dec19','2020':'dec20',
    '2021':'dec21','2022':'dec22','2023':'dec23'};
  return yrMap[y]||'dec23';
}

function prevSnapKey(y, p) {
  const ML2=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  if(y==='2026'){
    if(p==='m1') return 'dec25';
    if(p==='m2') return 'jan26';
    return 'jan26';
  }
  if(MON_YEARS.includes(y)){
    const mi = p.startsWith('m') ? parseInt(p.slice(1))-1 : 11;
    if(p==='full'||p==='q4'){
      const py=String(parseInt(y)-1);
      return snapKey(py,'full');
    }
    if(p.startsWith('q')){
      const qPrevEnd={q2:2,q3:5,q4:8}[p];
      if(qPrevEnd!==undefined) return ML2[qPrevEnd]+y.slice(2);
      return snapKey(String(parseInt(y)-1),'full');
    }
    if(mi===0) return snapKey(String(parseInt(y)-1),'full');
    return ML2[mi-1]+y.slice(2);
  }
  const py=String(parseInt(y)-1);
  const yrMap={'2012':null,'2013':'dec13','2014':'dec14','2015':'dec15','2016':'dec16',
    '2017':'dec17','2018':'dec18','2019':'dec19','2020':'dec20',
    '2021':'dec21','2022':'dec22','2023':'dec23'};
  return yrMap[py]||null;
}

      {/* TAB: STRUCTURE */}
      {activeTab==='structure'&&(

                    {revMixData.map((e,i)=><Cell key={i} fill={e.color}/>)}

                  <Tooltip formatter={v=>fM(v)}/>
                  <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>

          <Card>
            <SectionTitle>Expense Breakdown — {periodLabel}</SectionTitle>

                      <th key={h} style={{padding:'8px 12px',textAlign:h==='Kategori'?'left':'right',color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",textTransform:'uppercase'}}>{h}</th>
                    ))}

                </thead>
                <tbody>
                  {[
                    {l:'F&B Cost',          v:safe(cur.cos),                                      pv:prv?safe(prv.cos):null,      bg:false},
                    {l:'Dept Payroll',       v:safe(cur.deptPay),                                  pv:prv?safe(prv.deptPay):null,  bg:true},
                    {l:'Dept Other Expenses',v:safe(cur.deptOther),                                pv:prv?safe(prv.deptOther):null,bg:false},
                    {l:'Overhead Payroll',   v:safe(cur.ovhdPay),                                  pv:prv?safe(prv.ovhdPay):null,  bg:true},
                    {l:'Overhead Other Exp.',v:safe(cur.ovhdOther),                                pv:prv?safe(prv.ovhdOther):null,bg:false},
                    {l:'Mgmt & Incentive Fee',v:safe(cur.incentFee)+safe(cur.mgmtFee),             pv:prv?safe(prv.incentFee)+safe(prv.mgmtFee):null,bg:true},
                    {l:'Depreciation',       v:safe(cur.deprTotal),                                pv:prv?safe(prv.deprTotal):null,bg:false},
                    {l:'Interest & ROI',     v:safe(cur.interest)+safe(cur.roi),                   pv:prv?safe(prv.interest)+safe(prv.roi):null,bg:true},
                  ].map(r=>{
                    const pct=cur.rev>0?r.v/cur.rev*100:0;
                    const delta=(r.pv&&r.pv>0)?chg(r.v,r.pv):null;
                    return(
                      <tr key={r.l} style={{background:r.bg?T.card:'transparent',borderBottom:`1px solid ${T.border}22`}}>
                        <td style={{padding:'8px 12px',color:T.text,fontFamily:"'IBM Plex Sans'"}}>{r.l}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:T.red,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{fM(r.v)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{fP(pct)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:delta!=null?(delta>0?T.red:T.green):T.muted,fontFamily:"'IBM Plex Mono'",fontSize:10}}>
                          {delta!=null?(delta>0?'▲ ':'▼ ')+Math.abs(delta).toFixed(1)+'%':'—'}
                        </td>
                      </tr>
                    );
                  })}
                  <tr style={{borderTop:`2px solid ${T.border}`}}>
                    <td style={{padding:'9px 12px',color:T.text,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>TOTAL EXPENSES</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:T.red,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{fM(safe(cur.rev)-safe(cur.nop))}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{fP(cur.rev>0?(safe(cur.rev)-safe(cur.nop))/cur.rev*100:0)}</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}
function PLPage() {
  const [yr,setYr]=useState('2026');
  const [period,setPeriod]=useState('full');
  const c=T.card,brd=T.border,ac=T.accent,sc=T.secondary,tx=T.text,mu=T.muted,sb=T.sub;

  const isAnnual = parseInt(yr) < 2024;

  // Build period options
  const periodOptions = useMemo(()=>{
    if(isAnnual) return [{v:'full',l:`Full Year ${yr}`}];
    const mKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
    const opts=[{v:'full',l:`Full Year ${yr}`},{v:'ytd',l:`YTD ${yr}`}];
    mKeys.forEach((k,i)=>{ if(TB[k]) opts.push({v:`m${i+1}`,l:ML[i]+' '+yr}); });
    const qMap={Q1:[0,1,2],Q2:[3,4,5],Q3:[6,7,8],Q4:[9,10,11]};
    Object.entries(qMap).forEach(([q,idxs])=>{
      const qKeys=idxs.map(i=>`${yr}-${String(i+1).padStart(2,'0')}`).filter(k=>TB[k]);
      if(qKeys.length===3) opts.push({v:q.toLowerCase(),l:`${q} ${yr}`});
    });
    return opts;
  },[yr,isAnnual]);

  // When year changes, reset period
  const handleYrChange = (v)=>{ setYr(v); setPeriod('full'); };

  // Determine keys to aggregate
  const keys = useMemo(()=>{
    if(isAnnual) return null; // use annPnl
    const mKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
    if(period==='full') return mKeys.filter(k=>TB[k]);
    if(period==='ytd'){
      const avail=mKeys.filter(k=>TB[k]);
      return avail;
    }
    if(period==='q1') return mKeys.slice(0,3).filter(k=>TB[k]);
    if(period==='q2') return mKeys.slice(3,6).filter(k=>TB[k]);
    if(period==='q3') return mKeys.slice(6,9).filter(k=>TB[k]);
    if(period==='q4') return mKeys.slice(9,12).filter(k=>TB[k]);
    const mi=parseInt(period.replace('m',''))-1;
    return [mKeys[mi]].filter(k=>k&&TB[k]);
  },[yr,period,isAnnual]);

  const cur = useMemo(()=>{
    if(isAnnual) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnnual]);

  // Budget comparison (only for 2026 months)
  const bud = useMemo(()=>{
    if(yr!=='2026') return null;
    const bKeys = period==='full'?['2026-01','2026-02']:
                  period==='ytd'?['2026-01','2026-02']:
                  period==='m1'?['2026-01']:period==='m2'?['2026-02']:null;
    if(!bKeys) return null;
    const validKeys = bKeys.filter(k=>BUD26[k]);
    if(!validKeys.length) return null;
    return aggKeys(validKeys, BUD26);
  },[yr,period]);

  const prior = useMemo(()=>{
    const pyear = parseInt(yr)-1;
    if(isAnnual) return pyear>=2013?annPnl(pyear):null;
    if(period==='full'||period==='ytd'){
      if(parseInt(yr)===2025) return aggKeys(mKeys24);
      if(parseInt(yr)===2026) return aggKeys(mKeys25);
      return pyear>=2013?annPnl(pyear):null;
    }
    // Monthly prior year same month
    if(period.startsWith('m')&&parseInt(yr)>=2025){
      const mi=parseInt(period.replace('m',''))-1;
      const priorKey=`${pyear}-${String(mi+1).padStart(2,'0')}`;
      return TB[priorKey]?aggKeys([priorKey]):null;
    }
    return null;
  },[yr,period,isAnnual]);

  const trendKeys = yr==='2024'?mKeys24:yr==='2025'?mKeys25:['2026-01','2026-02'];
  const marginTrend = useMemo(()=> (!isAnnual?trendKeys.filter(k=>TB[k]):[]).map((k,i)=>{
    const d=pnl(TB[k]);
    return {name:ML[i],gopMgn:+d.gopMgn.toFixed(1),nopMgn:+d.nopMgn.toFixed(1)};
  }),[yr,isAnnual]);

  const revTrend = useMemo(()=>{
    if(isAnnual){
      return Object.entries(ANN).filter(([y])=>parseInt(y)<=parseInt(yr)).slice(-8).map(([y,d])=>{
        const v=pnl(d); return {name:y,rev:+v.rev.toFixed(3),gop:+v.gop.toFixed(3),nop:+v.nop.toFixed(3)};
      });
    }
    return trendKeys.filter(k=>TB[k]).map((k,i)=>{
      const d=pnl(TB[k]);
      return {name:ML[i],rev:+d.rev.toFixed(3),gop:+d.gop.toFixed(3),nop:+d.nop.toFixed(3)};
    });
  },[yr,isAnnual]);

  if(!cur) return <div style={{padding:40,color:T.muted}}>Loading...</div>;

  const rows=[
    {l:'ROOM REVENUE',v:cur.rooms,b:bud?.rooms,p:prior?.rooms,pct:cur.rooms/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'F&B REVENUE',v:cur.fnb,b:bud?.fnb,p:prior?.fnb,pct:cur.fnb/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'MINOR OPERATED',v:cur.minor,b:bud?.minor,p:prior?.minor,pct:cur.minor/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'OTHER INCOME',v:cur.otherinc,b:bud?.otherinc,p:prior?.otherinc,pct:cur.otherinc/cur.rev*100,indent:0,bold:false,sub:true},
    {l:'TOTAL REVENUE',v:cur.rev,b:bud?.rev,p:prior?.rev,pct:100,indent:0,bold:true,sep:true},
    {l:'Cost of Sales',v:-cur.cos,b:bud?-bud.cos:null,p:prior?-prior.cos:null,pct:cur.cos/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Dept Payroll',v:-cur.deptPay,b:bud?-bud.deptPay:null,p:prior?-prior.deptPay:null,pct:cur.deptPay/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Dept Other Exp',v:-cur.deptOther,b:bud?-bud.deptOther:null,p:prior?-prior.deptOther:null,pct:cur.deptOther/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'DEPT PROFIT',v:cur.deptProfit,b:bud?.deptProfit,p:prior?.deptProfit,pct:cur.deptProfit/cur.rev*100,indent:0,bold:true,sep:true},
    {l:'Overhead Payroll',v:-cur.ovhdPay,b:bud?-bud.ovhdPay:null,p:prior?-prior.ovhdPay:null,pct:cur.ovhdPay/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'Overhead Other Exp',v:-cur.ovhdOther,b:bud?-bud.ovhdOther:null,p:prior?-prior.ovhdOther:null,pct:cur.ovhdOther/cur.rev*100,indent:1,bold:false,neg:true},
    {l:'GROSS OPERATING PROFIT',v:cur.gop,b:bud?.gop,p:prior?.gop,pct:cur.gopMgn,indent:0,bold:true,sep:true,highlight:true},
    {l:'Incentive Fee',v:-cur.incentFee,b:bud?-bud.incentFee:null,p:prior?-prior.incentFee:null,pct:cur.incentFee/cur.rev*100,indent:1,neg:true},
    {l:'Management Fee',v:-cur.mgmtFee,b:bud?-bud.mgmtFee:null,p:prior?-prior.mgmtFee:null,pct:cur.mgmtFee/cur.rev*100,indent:1,neg:true},
    {l:'Depreciation & Amort.',v:-cur.deprTotal,b:bud?-bud.deprTotal:null,p:prior?-prior.deprTotal:null,pct:cur.deprTotal/cur.rev*100,indent:1,neg:true},
    {l:'Interest (Net)',v:cur.interest,b:bud?.interest,p:prior?.interest,pct:Math.abs(cur.interest)/cur.rev*100,indent:1},
    {l:'ROI Expense',v:-cur.roi,b:bud?-bud.roi:null,p:prior?-prior.roi:null,pct:cur.roi/cur.rev*100,indent:1,neg:true},
    {l:'Owning Company Exp',v:-cur.ownExp,b:bud?-bud.ownExp:null,p:prior?-prior.ownExp:null,pct:cur.ownExp/cur.rev*100,indent:1,neg:true},
    {l:'Other Non-Operating',v:-cur.otherNonOp,b:bud?-bud.otherNonOp:null,p:prior?-prior.otherNonOp:null,pct:cur.otherNonOp/cur.rev*100,indent:1,neg:true},
    {l:'Income Tax',v:-cur.tax,b:bud?-bud.tax:null,p:prior?-prior.tax:null,pct:0,indent:1,neg:true},
    {l:'NET OPERATING PROFIT',v:cur.nop,b:bud?.nop,p:prior?.nop,pct:cur.nopMgn,indent:0,bold:true,sep:true,highlight:true},
  ];

  const showBud = !!bud;
  const showPrior = !!prior;
  const colCount = 2 + (showBud?1:0) + (showPrior?1:0);

  return (
    <div style={{padding:24}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:T.text,fontFamily:'IBM Plex Mono,monospace'}}>
            PROFIT &amp; LOSS STATEMENT
          </div>
          <div style={{fontSize:11,color:T.muted,marginTop:2}}>
            {isAnnual?`Annual ${yr}`:`${period==='full'?'Full Year':period==='ytd'?'Year-to-Date':period.startsWith('m')?periodOptions.find(o=>o.v===period)?.l:period.toUpperCase()+' '+yr} · Rp Milyar`}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=>
              <option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnnual&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer'}}>
              {periodOptions.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* KPI Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:20}}>
        {[
          {l:'Total Revenue',v:cur.rev,fmt:fC,color:ac},
          {l:'GOP',v:cur.gop,fmt:fC,color:cur.gop>=0?T.green:T.red},
          {l:'GOP Margin',v:cur.gopMgn,fmt:n=>`${n.toFixed(1)}%`,color:cur.gopMgn>=30?T.green:cur.gopMgn>=20?T.yellow:T.red},
          {l:'NOP',v:cur.nop,fmt:fC,color:cur.nop>=0?T.green:T.red},
          {l:'NOP Margin',v:cur.nopMgn,fmt:n=>`${n.toFixed(1)}%`,color:cur.nopMgn>=5?T.green:cur.nopMgn>=0?T.yellow:T.red},
        ].map(({l,v,fmt,color})=>(
          <div key={l} style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'12px 16px'}}>
            <div style={{fontSize:10,color:mu,textTransform:'uppercase',letterSpacing:1}}>{l}</div>
            <div style={{fontSize:18,fontWeight:700,color,marginTop:4,fontFamily:'IBM Plex Mono,monospace'}}>{fmt(v)}</div>
          </div>
        ))}
      </div>

      {/* P&L Table */}
      <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,overflow:'hidden',marginBottom:20}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{background:T.bg,borderBottom:`1px solid ${brd}`}}>
                <th style={{padding:'10px 16px',textAlign:'left',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>
                  {isAnnual?`${yr} Full Year`:'LINE ITEM'}
                </th>
                <th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>
                  {period==='full'?`ACTUAL ${yr}`:period==='ytd'?`YTD ACTUAL`:period.startsWith('m')?periodOptions.find(o=>o.v===period)?.l:'ACTUAL'}
                </th>
                <th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>%</th>
                {showBud&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>BUDGET</th>}
                {showBud&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>VAR</th>}
                {showPrior&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>{parseInt(yr)-1}</th>}
                {showPrior&&<th style={{padding:'10px 16px',textAlign:'right',color:mu,fontWeight:500,fontSize:10,textTransform:'uppercase',letterSpacing:1}}>VAR%</th>}
              </tr>
            </thead>
            <tbody>
              {rows.map((row,i)=>{
                const varBud = showBud&&row.b!=null?row.v-row.b:null;
                const varPrior = showPrior&&row.p!=null?(row.p!==0?(row.v-row.p)/Math.abs(row.p)*100:null):null;
                return (
                  <tr key={i} style={{
                    borderBottom:`1px solid ${row.sep?brd:'transparent'}`,
                    background: row.highlight?(cur.nop>=0&&row.l.includes('NET')||cur.gop>=0&&row.l.includes('GROSS'))?`${T.green}10`:`${T.red}08`:'transparent',
                  }}>
                    <td style={{padding:`${row.sep?'10px':'6px'} 16px`,paddingLeft:row.indent?32:16,
                      color:row.bold?tx:sb,fontWeight:row.bold?700:400,
                      fontFamily:row.bold?'IBM Plex Mono,monospace':'inherit',fontSize:row.bold?12:11}}>
                      {row.l}
                    </td>
                    <td style={{padding:`${row.sep?'10px':'6px'} 16px`,textAlign:'right',
                      color:row.bold?(row.v>=0?T.green:T.red):tx,fontWeight:row.bold?700:400,
                      fontFamily:'IBM Plex Mono,monospace',fontSize:row.bold?12:11}}>

function BSPage() {
  const [yr, setYr]     = useState('2026');
  const [period, setPeriod] = useState('m2');

  // Period options per year
  const periodOpts = useMemo(() => {
    if (yr === '2026') return [
      {v:'m1', l:'Jan 2026'}, {v:'m2', l:'Feb 2026 (Latest)'},
    ];
    if (yr === '2025') return [{v:'full', l:'Dec 2025 (Year-End)'}];
    if (yr === '2024') return [{v:'full', l:'Dec 2024 (Year-End)'}];
    return [{v:'full', l:`Dec ${yr}`}];
  }, [yr]);

  // Auto-reset period when year changes
  const handleYrChange = (v) => {
    setYr(v);
    if (v === '2026') setPeriod('m2');
    else setPeriod('full');
  };

  // Map period to BS snapshot key
  const snapK = useMemo(() => {
    if (yr === '2026') return period === 'm1' ? 'jan26' : 'feb26';
    if (yr === '2025') return 'dec25';
    if (yr === '2024') return 'dec24';
    const y2 = yr.slice(2);
    return `dec${y2}`;
  }, [yr, period]);

  const prevK = useMemo(() => {
    if (yr === '2026') return period === 'm1' ? 'dec25' : 'jan26';
    if (yr === '2025') return 'dec24';
    if (yr === '2024') return 'dec23';
    const py = String(parseInt(yr) - 1).slice(2);
    return `dec${py}`;
  }, [yr, period]);

  const bs  = bsCalc(BS_SNAPSHOTS[snapK]  || BS_SNAPSHOTS['feb26']);
  const prv = bsCalc(BS_SNAPSHOTS[prevK]  || BS_SNAPSHOTS['dec25']);

  const BSRow = ({l,v,p,bold,indent,isLiab}) => {
    const chg = p != null && p !== 0 ? (v-p)/Math.abs(p)*100 : null;
    return (
      <tr>
        <td style={{padding:'5px 12px',paddingLeft:indent?28:12,color:bold?T.text:T.sub,fontSize:11,fontWeight:bold?600:400}}>{l}</td>
        <td style={{padding:'5px 12px',textAlign:'right',color:bold?(v<0?T.red:T.text):T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:bold?600:400}}>{fM(v)}</td>
        <td style={{padding:'5px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{p!=null?fM(p):''}</td>
        <td style={{padding:'5px 12px',textAlign:'right',fontSize:10,fontFamily:"'IBM Plex Mono'",
          color:chg!=null?clr(isLiab?-chg:chg):T.muted}}>

  const Sec = ({t,c}) => <tr><td colSpan={4} style={{padding:'10px 12px 4px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{t}</td></tr>;

  const TotalRow = ({l,v,p,color}) => (

function CFPage() {
  const [yr,setYr]         = useState('2025');
  const [period,setPeriod] = useState('full');

  const periodOpts = useMemo(() => getPeriodOpts(yr), [yr]);
  const handleYrChange = (v) => { setYr(v); setPeriod('full'); };

  const keys  = useMemo(() => getKeys(yr, period), [yr, period]);
  const isAnn = parseInt(yr) < 2024;

  const cur = useMemo(() => {
    if (isAnn) return annPnl(parseInt(yr));
    return keys && keys.length > 0 ? aggKeys(keys) : null;
  }, [yr, keys, isAnn]);

  // Pick BS snapshots based on period
  const bsNowKey = useMemo(() => snapKey(yr, period), [yr, period]);
  const bsPrvKey = useMemo(() => prevSnapKey(yr, period), [yr, period]);
  const bsNow = bsCalc(BS_SNAPSHOTS[bsNowKey] || BS_SNAPSHOTS['dec25']);
  const bsPrv = bsCalc(BS_SNAPSHOTS[bsPrvKey] || BS_SNAPSHOTS['dec24']);

  const cf = useMemo(() => {
    if (!cur) return null;
    const dAR  = bsNow.ar  - bsPrv.ar;
    const dInv = bsNow.inv - bsPrv.inv;
    const dPre = bsNow.pre - bsPrv.pre;
    const dAP  = bsNow.ap  - bsPrv.ap;
    const dAcc = bsNow.acc - bsPrv.acc;
    const ops  = cur.nop + cur.deprTotal - dAR - dInv - dPre + dAP + dAcc;
    const capex = -(bsNow.fixG - bsPrv.fixG);
    const fin   = -(bsNow.ltD  - bsPrv.ltD);
    const net   = ops + capex + fin;
    const bsCash = bsNow.cash;
    return { ops, dAR, dInv, dPre, dAP, dAcc, capex, fin, net, bsCash,
      dAP, dAcc, depAmort: cur.deprTotal, nop: cur.nop };
  }, [cur, bsNow, bsPrv]);

  const periodLabel = periodOpts.find(o=>o.v===period)?.l || period;

  // Monthly CF trend for chart
  const trendKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
  const cfTrend = useMemo(() => trendKeys.filter(k=>TB[k]).map((k,i)=>{
    const d = pnl(TB[k]);
    return {name:ML[i], ops: +(d.nop+d.deprTotal).toFixed(3), nop: +d.nop.toFixed(3)};
  }), [yr]);

  const CFR = ({l,v,indent,bold,isOut}) => (
    <tr>
      <td style={{padding:'5px 12px',paddingLeft:indent?32:12,color:bold?T.text:T.sub,fontSize:11,fontWeight:bold?600:400}}>{l}</td>
      <td style={{padding:'5px 12px',textAlign:'right',fontFamily:"'IBM Plex Mono'",fontSize:11,fontWeight:bold?600:400,
        color: bold ? (v>=0?T.green:T.red) : (isOut?(v>0?T.red:T.green):(v>=0?T.green:T.red))}}>{fC(v)}</td>
    </tr>
  );
  const Sec = ({t,c}) => <tr><td colSpan={2} style={{padding:'10px 12px 4px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{t}</td></tr>;
  const Hdiv = () => <tr><td colSpan={2}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;

  if (!cf) return <div style={{padding:40,color:T.muted}}>No data for selected period.</div>;

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>CASH FLOW STATEMENT</div>
          <div style={{color:T.muted,fontSize:11}}>Indirect Method · {periodLabel} · Rp Milyar</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn && (
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* Summary KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}} className="r-grid-4">
        {[
          {l:'Operating CF',  v:fC(cf.ops),  c:cf.ops>=0?T.green:T.red},
          {l:'Investing CF',  v:fC(cf.capex),c:cf.capex>=0?T.green:T.red},
          {l:'Financing CF',  v:fC(cf.fin),  c:cf.fin>=0?T.green:T.red},
          {l:'Net Cash Flow', v:fC(cf.net),  c:cf.net>=0?T.green:T.red},
        ].map(k=>(
          <div key={k.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 16px'}}>
            <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:1}}>{k.l}</div>
            <div style={{fontSize:18,fontWeight:700,color:k.c,marginTop:4,fontFamily:"'IBM Plex Mono'"}}>{k.v}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:12}}>
        {/* CF Statement */}
        <Card style={{padding:0}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:T.border}}>
                <th colSpan={2} style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}> CASH FLOW — {periodLabel}</th>
              </tr>
            </thead>
            <tbody>
              <Sec t="A. OPERATING ACTIVITIES" c={T.accent}/>
              <CFR l="Net Operating Profit"    v={cf.nop}     indent/>
              <CFR l="(+) Depreciation & Amort" v={cf.depAmort} indent/>
              <CFR l="(−) Increase in AR"       v={-cf.dAR}    indent isOut/>
              <CFR l="(−) Increase in Inventory" v={-cf.dInv}  indent isOut/>
              <CFR l="(−) Increase in Prepaid"  v={-cf.dPre}   indent isOut/>
              <CFR l="(+) Increase in AP"        v={cf.dAP}    indent/>
              <CFR l="(+) Increase in Accruals"  v={cf.dAcc}   indent/>
              <Hdiv/>
              <CFR l="NET OPERATING CASH FLOW" v={cf.ops} bold/>

              <Sec t="B. INVESTING ACTIVITIES" c={T.yellow}/>
              <CFR l="Capital Expenditure"     v={cf.capex}   indent isOut/>
              <Hdiv/>
              <CFR l="NET INVESTING CASH FLOW" v={cf.capex} bold/>

              <Sec t="C. FINANCING ACTIVITIES" c={T.purple||'#8B5CF6'}/>
              <CFR l="Net Debt Change"         v={cf.fin}    indent/>
              <Hdiv/>
              <CFR l="NET FINANCING CASH FLOW" v={cf.fin} bold/>

              <tr style={{background:`${T.accent}10`}}>
                <td style={{padding:'8px 12px',color:T.accent,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>NET CHANGE IN CASH</td>
                <td style={{padding:'8px 12px',textAlign:'right',color:cf.net>=0?T.green:T.red,fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fC(cf.net)}</td>
              </tr>
              <tr>
                <td style={{padding:'5px 12px',color:T.muted,fontSize:10}}>Ending Cash Balance</td>
                <td style={{padding:'5px 12px',textAlign:'right',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{fM(cf.bsCash)}</td>
              </tr>
            </tbody>
          </table>
        </Card>

        {/* Chart */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <SectionTitle>MONTHLY OPERATING CASH FLOW — {yr}</SectionTitle>
            <ResponsiveContainer width="100%" height={180}>
              <ComposedChart data={cfTrend} margin={{top:4,right:8,bottom:4,left:8}}>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
                <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(2)}M`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v.toFixed(3)}M`,n]}/>
                <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10}}/>
                <Bar dataKey="ops"  name="Op.CF"   fill={T.accent}   radius={[2,2,0,0]}/>
                <Line type="monotone" dataKey="nop" name="NOP" stroke={T.green} strokeWidth={2} dot={{r:3}}/>
                <ReferenceLine y={0} stroke={T.red} strokeDasharray="3 3"/>
              </ComposedChart>
            </ResponsiveContainer>
          </Card>
          <Card>
            <SectionTitle>CASH FLOW DRIVERS</SectionTitle>
            {[
              {l:'NOP contribution',  v:cf.nop,     c:T.green},
              {l:'D&A add-back',      v:cf.depAmort,c:T.accent},
              {l:'Working cap. movement', v:cf.dAP+cf.dAcc-cf.dAR-cf.dInv-cf.dPre, c:T.yellow},
              {l:'CAPEX',             v:cf.capex,   c:T.orange||'#F97316'},
              {l:'Financing',         v:cf.fin,     c:T.purple||'#8B5CF6'},
            ].map(d=>(
              <div key={d.l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.sub,fontSize:10}}>{d.l}</span>
                <span style={{color:d.c,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fC(d.v)}</span>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
}

// BUDGET CONTROL PAGE
// ══════════════════════════════════════════════════════════════════

function BudgetPage() {
  const [period, setPeriod] = useState('ytd');

  const periodOpts = [
    {v:'m1',  l:'Jan 2026'},
    {v:'m2',  l:'Feb 2026'},
    {v:'ytd', l:'YTD Jan-Feb 2026'},
  ];

  const budKeys = useMemo(() => {
    if (period==='m1') return ['2026-01'];
    if (period==='m2') return ['2026-02'];
    return ['2026-01','2026-02'];
  }, [period]);

  const actData = useMemo(() => aggKeys(budKeys), [budKeys]);
  const budData = useMemo(() => aggKeys(budKeys, BUD26), [budKeys]);

  const varAbs = (a, b) => a - b;
  const varPct = (a, b) => b !== 0 ? (a-b)/Math.abs(b)*100 : 0;
  const vc = (v) => v >= 0 ? T.green : T.red;
  const vci = (v) => v <= 0 ? T.green : T.red; // inverted (costs: lower=green)

  const rows = [
    {l:'ROOM REVENUE',       a:actData.rooms,    b:budData.rooms,    inv:false, sep:false, bold:false},
    {l:'F&B REVENUE',        a:actData.fnb,      b:budData.fnb,      inv:false, sep:false, bold:false},
    {l:'MINOR OPERATED',     a:actData.minor,    b:budData.minor,    inv:false, sep:false, bold:false},
    {l:'OTHER INCOME',       a:actData.otherinc, b:budData.otherinc, inv:false, sep:false, bold:false},
    {l:'TOTAL REVENUE',      a:actData.rev,      b:budData.rev,      inv:false, sep:true,  bold:true},
    {l:'Cost of Sales',      a:-actData.cos,     b:-budData.cos,     inv:true,  sep:false, bold:false, indent:1},
    {l:'Dept Payroll',       a:-actData.deptPay, b:-budData.deptPay, inv:true,  sep:false, bold:false, indent:1},
    {l:'Dept Other Exp',     a:-actData.deptOther,b:-budData.deptOther,inv:true,sep:false, bold:false, indent:1},
    {l:'DEPT PROFIT',        a:actData.deptProfit,b:budData.deptProfit,inv:false,sep:true, bold:true},
    {l:'Overhead Payroll',   a:-actData.ovhdPay, b:-budData.ovhdPay, inv:true,  sep:false, bold:false, indent:1},
    {l:'Overhead Other',     a:-actData.ovhdOther,b:-budData.ovhdOther,inv:true,sep:false, bold:false, indent:1},
    {l:'GROSS OP. PROFIT',   a:actData.gop,      b:budData.gop,      inv:false, sep:true,  bold:true, highlight:true},
    {l:'Mgmt & Incentive Fee',a:-(actData.incentFee+actData.mgmtFee), b:-(budData.incentFee+budData.mgmtFee), inv:true, sep:false, bold:false, indent:1},
    {l:'Depreciation',       a:-actData.deprTotal,b:-budData.deprTotal,inv:true,sep:false, bold:false, indent:1},
    {l:'Interest & Other',   a:actData.interest, b:budData.interest, inv:false, sep:false, bold:false, indent:1},
    {l:'Non-Op Expenses',    a:-(actData.roi+actData.ownExp+actData.otherNonOp), b:-(budData.roi+budData.ownExp+budData.otherNonOp), inv:true, sep:false, bold:false, indent:1},
    {l:'NET OP. PROFIT',     a:actData.nop,      b:budData.nop,      inv:false, sep:true,  bold:true, highlight:true},
  ];

  const chartData = ML.slice(0,2).map((m,i) => {
    const k = `2026-0${i+1}`;
    const a = TB[k]   ? pnl(TB[k])    : null;
    const b = BUD26[k] ? pnl(BUD26[k]) : null;
    return {
      name: m,
      actRev: a ? +a.rev.toFixed(3)  : null,
      budRev: b ? +b.rev.toFixed(3)  : null,
      actGOP: a ? +a.gop.toFixed(3)  : null,
      budGOP: b ? +b.gop.toFixed(3)  : null,
      actNOP: a ? +a.nop.toFixed(3)  : null,
      budNOP: b ? +b.nop.toFixed(3)  : null,
      revVar: a&&b ? +(a.rev-b.rev).toFixed(3) : null,
    };
  });

  const insights = [
    {sev:'warning', msg:`Revenue YTD: Actual ${fM(actData.rev)} vs Budget ${fM(budData.rev)} — ${varPct(actData.rev,budData.rev).toFixed(1)}% variance`},
    {sev: actData.gop >= budData.gop ? 'success' : 'danger', msg:`GOP YTD: Actual ${fM(actData.gop)} vs Budget ${fM(budData.gop)} — ${varPct(actData.gop,budData.gop).toFixed(1)}% variance`},
    {sev:'info', msg:`Payroll ratio YTD: ${actData.payRat?.toFixed(1)||'—'}% vs Budget ${budData.payRat?.toFixed(1)||'—'}%`},
    {sev: actData.nop >= budData.nop ? 'success':'danger', msg:`NOP YTD: Actual ${fM(actData.nop)} vs Budget ${fM(budData.nop)} — ${varPct(actData.nop,budData.nop).toFixed(1)}% variance`},
  ];
  const sevColor = {warning:T.yellow, info:T.accent, danger:T.red, success:T.green};

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>BUDGET CONTROL</div>
          <div style={{color:T.muted,fontSize:11}}>Actual vs Budget · 2026 · Rp Milyar</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {periodOpts.map(o=>(
            <button key={o.v} onClick={()=>setPeriod(o.v)}
              style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${period===o.v?T.accent:T.border}`,
                background:period===o.v?`${T.accent}20`:'transparent',color:period===o.v?T.accent:T.sub,
                cursor:'pointer',fontSize:11,fontFamily:"'IBM Plex Mono'"}}>
              {o.l}
            </button>
          ))}
        </div>
      </div>

      {/* Insights */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:16}} className="r-grid-2">
        {insights.map((ins,i)=>(
          <div key={i} style={{background:`${sevColor[ins.sev]}10`,border:`1px solid ${sevColor[ins.sev]}30`,
            borderRadius:8,padding:'10px 14px',display:'flex',gap:10,alignItems:'center'}}>
            <span style={{fontSize:16}}>{ins.sev==='warning'?'⚠️':ins.sev==='danger'?'🔴':ins.sev==='success'?'✅':'ℹ️'}</span>
            <span style={{color:T.sub,fontSize:11}}>{ins.msg}</span>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:12}}>
        {/* Budget Table */}
        <Card style={{padding:0}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
            <thead>
              <tr style={{background:T.border}}>
                <th style={{padding:'8px 12px',textAlign:'left',color:T.muted,fontSize:9,letterSpacing:1}}>LINE ITEM</th>
                <th style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1}}>ACTUAL</th>
                <th style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1}}>BUDGET</th>
                <th style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1}}>VAR</th>
                <th style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontSize:9,letterSpacing:1}}>VAR%</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((row,i)=>{
                const v = varAbs(row.a, row.b);
                const vp = varPct(row.a, row.b);
                const col = row.inv ? vci(v) : vc(v);
                return (
                  <tr key={i} style={{
                    borderBottom:`1px solid ${row.sep?T.border:'transparent'}`,
                    background: row.highlight ? `${col}08` : 'transparent',
                  }}>
                    <td style={{padding:`${row.sep?'8px':'5px'} 12px`,paddingLeft:row.indent?28:12,
                      color:row.bold?T.text:T.sub,fontWeight:row.bold?700:400,
                      fontFamily:row.bold?"'IBM Plex Mono'":'inherit',fontSize:row.bold?11:10}}>
                      {row.l}
                    </td>
                    <td style={{padding:'5px 12px',textAlign:'right',fontFamily:"'IBM Plex Mono'",fontWeight:row.bold?700:400}}>{fC(row.a)}</td>
                    <td style={{padding:'5px 12px',textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{fC(row.b)}</td>
                    <td style={{padding:'5px 12px',textAlign:'right',color:col,fontFamily:"'IBM Plex Mono'",fontWeight:row.bold?700:400}}>{fC(v)}</td>
                    <td style={{padding:'5px 12px',textAlign:'right',color:col,fontFamily:"'IBM Plex Mono'"}}>{vp.toFixed(1)}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Card>

        {/* Charts */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <SectionTitle>REVENUE: ACTUAL vs BUDGET</SectionTitle>
            <ResponsiveContainer width="100%" height={160}>
              <BarChart data={chartData} margin={{top:4,right:8,bottom:4,left:8}}>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
                <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(1)}M`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v?.toFixed(3)}M`,n]}/>
                <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:9}}/>
                <Bar dataKey="actRev" name="Actual Rev"  fill={T.accent}    radius={[2,2,0,0]}/>
                <Bar dataKey="budRev" name="Budget Rev"  fill={`${T.accent}40`} radius={[2,2,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>
          <Card>
            <SectionTitle>GOP & NOP: ACTUAL vs BUDGET</SectionTitle>
            <ResponsiveContainer width="100%" height={160}>
              <BarChart data={chartData} margin={{top:4,right:8,bottom:4,left:8}}>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
                <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(2)}M`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v?.toFixed(3)}M`,n]}/>
                <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:9}}/>
                <Bar dataKey="actGOP" name="Act GOP"  fill={T.secondary}       radius={[2,2,0,0]}/>
                <Bar dataKey="budGOP" name="Bud GOP"  fill={`${T.secondary}40`} radius={[2,2,0,0]}/>
                <Bar dataKey="actNOP" name="Act NOP"  fill={T.green}            radius={[2,2,0,0]}/>
                <Bar dataKey="budNOP" name="Bud NOP"  fill={`${T.green}40`}     radius={[2,2,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>
        </div>
      </div>
    </div>
  );
}

// KPI PAGE
// ══════════════════════════════════════════════════════════════════

function KPIPage() {
  const [yr,setYr]         = useState('2025');
  const [period,setPeriod] = useState('full');

  const periodOpts = useMemo(()=>getPeriodOpts(yr),[yr]);
  const handleYrChange = (v)=>{setYr(v);setPeriod('full');};

  const isAnn = parseInt(yr)<2024;
  const keys  = useMemo(()=>getKeys(yr,period),[yr,period]);
  const cur   = useMemo(()=>{
    if(isAnn) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnn]);

  const bsKey = useMemo(()=>snapKey(yr,period),[yr,period]);
  const bs    = bsCalc(BS_SNAPSHOTS[bsKey]||BS_SNAPSHOTS['dec25']);

  const periodLabel = periodOpts.find(o=>o.v===period)?.l||period;

  const kpis = useMemo(()=>{
    if(!cur) return [];
    const ebitda = cur.gop;
    return [
      {cat:'Liquidity', color:T.accent, items:[
        {l:'Current Ratio',    v:(bs.tCA/bs.tCL).toFixed(2),    unit:'x', ok:bs.tCA/bs.tCL>1.5,  tgt:'>1.5'},
        {l:'Quick Ratio',      v:((bs.cash+bs.ar)/bs.tCL).toFixed(2), unit:'x', ok:(bs.cash+bs.ar)/bs.tCL>1.0, tgt:'>1.0'},
        {l:'Cash Ratio',       v:(bs.cash/bs.tCL).toFixed(2),   unit:'x', ok:bs.cash/bs.tCL>0.5,  tgt:'>0.5'},
        {l:'Working Capital',  v:fM(bs.tCA-bs.tCL),             unit:'M', ok:bs.tCA>bs.tCL,        tgt:'>0'},
      ]},
      {cat:'Profitability', color:T.green, items:[
        {l:'GOP Margin',       v:cur.gopMgn.toFixed(1),         unit:'%', ok:cur.gopMgn>30,        tgt:'>30%'},
        {l:'NOP Margin',       v:cur.nopMgn.toFixed(1),         unit:'%', ok:cur.nopMgn>5,         tgt:'>5%'},
        {l:'EBITDA Margin',    v:(ebitda/cur.rev*100).toFixed(1),unit:'%', ok:ebitda/cur.rev>0.30,  tgt:'>30%'},
        {l:'Net Profit Margin',v:(cur.nop/cur.rev*100).toFixed(1),unit:'%',ok:cur.nop/cur.rev>0.05,tgt:'>5%'},
      ]},
      {cat:'Leverage', color:T.yellow, items:[
        {l:'Debt/Equity',      v:(bs.tL/Math.max(bs.tEq,0.001)).toFixed(2),unit:'x',ok:bs.tL/Math.max(bs.tEq,0.001)<1.0,tgt:'<1.0'},
        {l:'LT Debt/Equity',   v:(bs.ltD/Math.max(bs.tEq,0.001)).toFixed(2),unit:'x',ok:bs.ltD/Math.max(bs.tEq,0.001)<0.5,tgt:'<0.5'},
        {l:'LT Debt/Assets',   v:(bs.ltD/Math.max(bs.tA,0.001)*100).toFixed(1),unit:'%',ok:bs.ltD/Math.max(bs.tA,0.001)<0.3,tgt:'<30%'},
        {l:'Equity Ratio',     v:(bs.tEq/Math.max(bs.tA,0.001)*100).toFixed(1),unit:'%',ok:bs.tEq/Math.max(bs.tA,0.001)>0.4,tgt:'>40%'},
      ]},
      {cat:'Returns', color:T.secondary, items:[
        {l:'ROA',              v:(cur.nop/Math.max(bs.tA,0.001)*100).toFixed(1),unit:'%',ok:cur.nop/Math.max(bs.tA,0.001)>0.05,tgt:'>5%'},
        {l:'ROE',              v:(cur.nop/Math.max(bs.tEq,0.001)*100).toFixed(1),unit:'%',ok:cur.nop/Math.max(bs.tEq,0.001)>0.10,tgt:'>10%'},
        {l:'Asset Turnover',   v:(cur.rev/Math.max(bs.tA,0.001)).toFixed(2),unit:'x',ok:cur.rev/Math.max(bs.tA,0.001)>0.5,tgt:'>0.5'},
        {l:'EBITDA/Assets',    v:(ebitda/Math.max(bs.tA,0.001)*100).toFixed(1),unit:'%',ok:ebitda/Math.max(bs.tA,0.001)>0.08,tgt:'>8%'},
      ]},
      {cat:'Hotel Operations', color:T.orange||'#F97316', items:[
        {l:'Payroll Ratio',    v:cur.payRat?.toFixed(1)||'—',  unit:'%', ok:(cur.payRat||99)<35,   tgt:'<35%', inv:true},
        {l:'Utility Ratio',    v:cur.utlRat?.toFixed(1)||'—',  unit:'%', ok:(cur.utlRat||99)<7,    tgt:'<7%',  inv:true},
        {l:'Maintenance Ratio',v:cur.mntRat?.toFixed(1)||'—',  unit:'%', ok:(cur.mntRat||99)<4,    tgt:'<4%',  inv:true},
        {l:'Occupancy',        v:cur.occ?.toFixed(1)||'—',     unit:'%', ok:(cur.occ||0)>55,       tgt:'>55%'},
      ]},
    ];
  },[cur,bs]);

  // Trend data for selected year
  const trendKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
  const trendData = useMemo(()=>trendKeys.filter(k=>TB[k]).map((k,i)=>{
    const d=pnl(TB[k]);
    return {name:ML[i],gopMgn:+d.gopMgn.toFixed(1),nopMgn:+d.nopMgn.toFixed(1),payRat:+d.payRat.toFixed(1)};
  }),[yr]);

  if(!cur) return <div style={{padding:40,color:T.muted}}>No data.</div>;
  const okCount  = kpis.flatMap(c=>c.items).filter(i=>i.ok).length;
  const allCount = kpis.flatMap(c=>c.items).length;

  return (

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>FINANCIAL KPIs</div>
          <div style={{color:T.muted,fontSize:11}}>Ratio Analysis · {periodLabel} · {okCount}/{allCount} KPIs on target</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn && (
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* KPI scorecard */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}} className="r-grid-4">
        {[
          {l:'On Target',  v:okCount,         c:T.green},
          {l:'Needs Watch',v:allCount-okCount,c:T.red},
          {l:'GOP Margin', v:`${cur.gopMgn.toFixed(1)}%`, c:cur.gopMgn>30?T.green:T.red},
        ].map(k=>(
          <div key={k.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 16px'}}>
            <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:1}}>{k.l}</div>
            <div style={{fontSize:24,fontWeight:700,color:k.c,marginTop:4,fontFamily:"'IBM Plex Mono'"}}>{k.v}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}}>
        {/* KPI Grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
          {kpis.map(cat=>(
            <Card key={cat.cat}>
              <div style={{color:cat.color,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",fontWeight:600,marginBottom:10}}>{cat.cat.toUpperCase()}</div>

                <div key={item.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                  <div>
                    <div style={{color:T.sub,fontSize:10}}>{item.l}</div>

                    <span style={{fontSize:12}}>{item.ok?'✅':'⚠️'}</span>
                  </div>

              ))}

          ))}
        </div>

        {/* Trend chart */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <SectionTitle>MARGIN TREND — {yr}</SectionTitle>

              <LineChart data={trendData} margin={{top:4,right:8,bottom:4,left:8}}>

// FORECAST ENGINE
// ══════════════════════════════════════════════════════════════════

function ForecastPage() {
  const [scenario,  setScenario]  = useState('base');
  const [horizon,   setHorizon]   = useState(12);
  const [revGrowth, setRevGrowth] = useState({conservative:3, base:8, optimistic:15});
  const [costInfl,  setCostInfl]  = useState({conservative:6, base:4, optimistic:2});

  const scenarios = {
    conservative:{name:'Conservative', color:T.yellow,  desc:'Slow recovery, cost pressure'},
    base:         {name:'Base Case',   color:T.accent,  desc:'Moderate growth, stable costs'},
    optimistic:   {name:'Optimistic',  color:T.green,   desc:'Strong demand, efficiency gains'},
  };

  // Use YTD 2026 as base for rolling forecast
  const basePeriod = useMemo(()=>{
    const ytd = aggKeys(['2026-01','2026-02']);
    const perMo = {};
    Object.keys(ytd).forEach(k=>{ perMo[k] = ytd[k]/2; });
    return perMo;
  },[]);

  // Build seasonal weights from 2025 monthly data
  const seasonalWeights = useMemo(()=>{
    const total = aggKeys(mKeys25).rev || 1;
    return mKeys25.map(k => TB[k] ? pnl(TB[k]).rev / (total/12) : 1.0);
  },[]);

  const forecastData = useMemo(()=>{
    const startMo = 3; // forecast from March 2026
    return Array.from({length:horizon},(_,i)=>{
      const moIdx = (startMo + i - 1) % 12;
      const yr    = Math.floor((startMo + i - 1) / 12);
      const seasonal = seasonalWeights[moIdx] || 1;
      const label = ML[moIdx] + (yr>0?' Y2':'');
      const row = {name: label};
      Object.keys(scenarios).forEach(sc=>{
        const annGrowth = revGrowth[sc]/100;
        const annCost   = costInfl[sc]/100;
        const periods   = i + 1;
        const growthFactor = Math.pow(1+annGrowth, periods/12);
        const costFactor   = Math.pow(1+annCost,   periods/12);
        const rev = basePeriod.rev * growthFactor * seasonal;
        const cos = basePeriod.cos * costFactor;
        const dPay= basePeriod.deptPay * costFactor;
        const dOth= basePeriod.deptOther * costFactor;
        const oPay= basePeriod.ovhdPay * costFactor;
        const oOth= basePeriod.ovhdOther * costFactor;
        const dp  = basePeriod.deprTotal || 0;
        const it  = basePeriod.incentFee+basePeriod.mgmtFee || 0;
        const gop = rev - cos - dPay - dOth - oPay - oOth;
        const nop = gop - dp - it - (basePeriod.roi||0) - (basePeriod.ownExp||0);
        row[`${sc}Rev`]  = +rev.toFixed(3);
        row[`${sc}GOP`]  = +gop.toFixed(3);
        row[`${sc}NOP`]  = +nop.toFixed(3);
      });
      return row;
    });
  },[horizon,revGrowth,costInfl,seasonalWeights,basePeriod]);

  const annualSummary = useMemo(()=>{
    const first12 = forecastData.slice(0,Math.min(12,horizon));
    const result={};
    Object.keys(scenarios).forEach(sc=>{
      result[sc]={
        rev: first12.reduce((s,r)=>s+(r[`${sc}Rev`]||0),0),
        gop: first12.reduce((s,r)=>s+(r[`${sc}GOP`]||0),0),
        nop: first12.reduce((s,r)=>s+(r[`${sc}NOP`]||0),0),
      };
    });
    return result;
  },[forecastData,horizon]);

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>FORECAST ENGINE</div>
          <div style={{color:T.muted,fontSize:11}}>Scenario-based · Base: YTD 2026 avg · From Mar 2026</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {[12,24].map(h=>(
            <button key={h} onClick={()=>setHorizon(h)}
              style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,
                background:horizon===h?T.accent:'transparent',color:horizon===h?'#080C12':T.sub,
                cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>
              {h}M
            </button>
          ))}
        </div>
      </div>

      {/* Scenario cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}} className="r-grid-4">
        {Object.entries(scenarios).map(([sc,{name,color,desc}])=>(
          <Card key={sc} onClick={()=>setScenario(sc)}
            style={{cursor:'pointer',borderColor:scenario===sc?color:T.border,borderWidth:scenario===sc?2:1}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{color:scenario===sc?color:T.sub,fontWeight:700,fontSize:12,fontFamily:"'IBM Plex Mono'"}}>{name}</span>
              {scenario===sc && <span style={{color,fontSize:10}}>● ACTIVE</span>}
            </div>
            <div style={{color:T.muted,fontSize:10,marginBottom:10}}>{desc}</div>
            <div style={{display:'flex',gap:8,marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{color:T.muted,fontSize:9}}>Rev Growth/yr</div>
                <div style={{color,fontSize:14,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{revGrowth[sc]}%</div>
              </div>
              <div style={{flex:1}}>
                <div style={{color:T.muted,fontSize:9}}>Cost Infl/yr</div>
                <div style={{color:T.yellow,fontSize:14,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{costInfl[sc]}%</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4,marginTop:6,paddingTop:6,borderTop:`1px solid ${T.border}`}}>
              {['rev','gop','nop'].map(k=>(
                <div key={k}>
                  <div style={{color:T.muted,fontSize:8}}>{k.toUpperCase()} 12M</div>
                  <div style={{color,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(annualSummary[sc]?.[k]||0)}</div>
                </div>
              ))}
            </div>
            {scenario===sc && (
              <div style={{display:'flex',gap:6,marginTop:10}}>
                <div style={{flex:1}}>
                  <div style={{color:T.muted,fontSize:9,marginBottom:4}}>Rev% ▲▼</div>
                  <input type="range" min={0} max={25} value={revGrowth[sc]}
                    onChange={e=>setRevGrowth(prev=>({...prev,[sc]:+e.target.value}))}
                    style={{width:'100%',accentColor:color}}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{color:T.muted,fontSize:9,marginBottom:4}}>Cost% ▲▼</div>
                  <input type="range" min={0} max={15} value={costInfl[sc]}
                    onChange={e=>setCostInfl(prev=>({...prev,[sc]:+e.target.value}))}
                    style={{width:'100%',accentColor:T.yellow}}/>
                </div>
              </div>
            )}
          </Card>
        ))}
      </div>

      {/* Forecast Chart */}
      <div style={{display:'grid',gridTemplateColumns:'3fr 1fr',gap:12}}>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <SectionTitle>REVENUE FORECAST — ALL SCENARIOS ({horizon}M)</SectionTitle>
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={forecastData} margin={{top:4,right:8,bottom:4,left:8}}>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false} interval={Math.floor(horizon/8)}/>
                <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(2)}M`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v?.toFixed(3)}M`,n]}/>
                <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:9}}/>
                {Object.entries(scenarios).map(([sc,{name,color}])=>(
                  <Line key={sc} type="monotone" dataKey={`${sc}Rev`} name={name} stroke={color}
                    strokeWidth={scenario===sc?2.5:1} strokeDasharray={sc==='conservative'?'4 2':sc==='optimistic'?'6 2':undefined}
                    dot={false}/>
                ))}
              </LineChart>
            </ResponsiveContainer>
          </Card>
          <Card>
            <SectionTitle>NOP FORECAST — ACTIVE SCENARIO: {scenarios[scenario].name.toUpperCase()}</SectionTitle>
            <ResponsiveContainer width="100%" height={180}>
              <ComposedChart data={forecastData} margin={{top:4,right:8,bottom:4,left:8}}>
                <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false} interval={Math.floor(horizon/8)}/>
                <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(2)}M`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v?.toFixed(3)}M`,n]}/>
                <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:9}}/>
                <Bar  dataKey={`${scenario}GOP`} name="GOP"  fill={`${T.accent}70`}  radius={[2,2,0,0]}/>
                <Line type="monotone" dataKey={`${scenario}NOP`} name="NOP" stroke={scenarios[scenario].color} strokeWidth={2} dot={false}/>
                <ReferenceLine y={0} stroke={T.red} strokeDasharray="3 3"/>
              </ComposedChart>
            </ResponsiveContainer>
          </Card>
        </div>
        {/* Summary table */}
        <Card>
          <SectionTitle>12-MONTH SUMMARY</SectionTitle>
          {Object.entries(scenarios).map(([sc,{name,color}])=>(
            <div key={sc} style={{marginBottom:16,padding:'10px',borderRadius:8,background:`${color}08`,border:`1px solid ${color}20`}}>
              <div style={{color,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'",marginBottom:6}}>{name}</div>
              {['rev','gop','nop'].map(k=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{color:T.muted,fontSize:10}}>{k.toUpperCase()}</span>
                  <span style={{color:k==='nop'?color:T.text,fontSize:11,fontWeight:k==='nop'?700:400,fontFamily:"'IBM Plex Mono'"}}>{fM(annualSummary[sc]?.[k]||0)}</span>
                </div>
              ))}
              <div style={{marginTop:6,paddingTop:6,borderTop:`1px solid ${color}20`}}>
                <span style={{color:T.muted,fontSize:9}}>NOP Margin: </span>
                <span style={{color,fontSize:10,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{annualSummary[sc]?.rev?((annualSummary[sc].nop/annualSummary[sc].rev)*100).toFixed(1):0}%</span>
              </div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

// AI INTELLIGENCE PAGE
// ══════════════════════════════════════════════════════════════════

function AIPage() {
  const [yr,setYr]         = useState('2026');
  const [period,setPeriod] = useState('m2');
  const [running,setRunning] = useState(false);
  const [generated,setGenerated] = useState(true);

  const periodOpts = useMemo(()=>getPeriodOpts(yr),[yr]);
  const handleYrChange = (v)=>{setYr(v);setPeriod('full');setGenerated(false);};

  const isAnn = parseInt(yr)<2024;
  const keys  = useMemo(()=>getKeys(yr,period),[yr,period]);
  const cur   = useMemo(()=>{
    if(isAnn) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnn]);

  const bsKey = useMemo(()=>snapKey(yr,period),[yr,period]);
  const bs    = bsCalc(BS_SNAPSHOTS[bsKey]||BS_SNAPSHOTS['feb26']);
  const bud   = yr==='2026'&&!isAnn ? aggKeys(keys,BUD26) : null;
  const prior = useMemo(()=>{
    if(isAnn) return annPnl(parseInt(yr)-1);
    const py=String(parseInt(yr)-1);
    const pKeys=getKeys(py,period);
    return pKeys&&pKeys.length?aggKeys(pKeys):null;
  },[yr,period,isAnn]);

  const periodLabel = periodOpts.find(o=>o.v===period)?.l||period;

  const insights = useMemo(()=>{
    if(!cur) return [];
    const list=[];
    // Performance
    const revVsBud = bud ? (cur.rev-bud.rev)/Math.max(bud.rev,0.001)*100 : null;
    const revVsPrior = prior ? (cur.rev-prior.rev)/Math.max(prior.rev,0.001)*100 : null;
    list.push({
      sev: cur.gopMgn>30?'success':cur.gopMgn>20?'info':'warning',
      cat:'Performance',
      title:`GOP Margin: ${cur.gopMgn.toFixed(1)}%`,
      msg: `Gross Operating Profit margin ${cur.gopMgn>30?'above':'below'} 30% threshold.${revVsPrior!=null?' Revenue '+( revVsPrior>=0?'up':'down')+' '+Math.abs(revVsPrior).toFixed(1)+'% vs prior period.':''} ${cur.gopMgn<20?'Immediate cost review recommended.':cur.gopMgn<30?'Monitor closely.':'Performance within target.'}`
    });
    // Revenue vs budget
    if(revVsBud!==null) list.push({
      sev: revVsBud>=-5?'info':'warning',
      cat:'Budget Variance',
      title:`Revenue ${revVsBud>=0?'+':''}${revVsBud.toFixed(1)}% vs Budget`,
      msg: `Actual revenue ${fM(cur.rev)} vs budget ${fM(bud.rev)}. ${Math.abs(revVsBud)<5?'Within acceptable variance band.':revVsBud<0?'Underperformance requires corrective action — review room rate strategy and F&B pricing.':'Positive variance. Review whether budget was set conservatively.'}`
    });
    // Cost anomaly
    const payRat = cur.payRat||0;
    list.push({
      sev: payRat<32?'success':payRat<38?'info':'warning',
      cat:'Cost Anomaly',
      title:`Payroll Ratio: ${payRat.toFixed(1)}%`,
      msg: `Departmental payroll at ${payRat.toFixed(1)}% of revenue. ${payRat>38?'ALERT: Significantly above 35% benchmark. Review staffing level vs. occupancy. Consider flex staffing model.':payRat>32?'Above optimal range. Monitor closely against occupancy correlation.':'Well controlled payroll. Consistent with high efficiency operation.'}`
    });
    // Liquidity
    const cr = bs.tCA/Math.max(bs.tCL,0.001);
    list.push({
      sev: cr>1.5?'success':cr>1.0?'info':'warning',
      cat:'Liquidity Risk',
      title:`Current Ratio: ${cr.toFixed(2)}x`,
      msg: `Current assets ${fM(bs.tCA)} vs current liabilities ${fM(bs.tCL)}. Working capital: ${fM(bs.tCA-bs.tCL)}. ${cr<1.0?'RISK: Current ratio below 1.0. Immediate liquidity management required.':cr<1.5?'Adequate but tight. Maintain cash position; avoid large unplanned capex.':'Healthy liquidity position supports operational flexibility.'}`
    });
    // Margin trend
    if(prior) {
      const gopDelta = cur.gopMgn - (prior.gopMgn||0);
      list.push({
        sev: gopDelta>=0?'success':'warning',
        cat:'Margin Trend',
        title:`GOP Margin ${gopDelta>=0?'improved':'declined'} ${Math.abs(gopDelta).toFixed(1)}pp`,
        msg: `Compared to prior period: GOP ${gopDelta>=0?'+':''}${gopDelta.toFixed(1)}pp, NOP ${(cur.nopMgn-(prior.nopMgn||0))>=0?'+':''}${(cur.nopMgn-(prior.nopMgn||0)).toFixed(1)}pp. ${gopDelta<-5?'Significant margin compression — investigate revenue mix and cost drivers.':gopDelta<0?'Mild compression. Review utility and overhead costs.':'Margin improvement reflects operational efficiency or revenue growth.'}`
      });
    }
    // NOP
    list.push({
      sev: cur.nop>0?'success':cur.nopMgn>-10?'warning':'danger',
      cat: cur.nop>0?'Profit':'Profit Alert',
      title:`NOP: ${fM(cur.nop)} (${cur.nopMgn.toFixed(1)}% margin)`,
      msg: `${cur.nop>0?`Net Operating Profit positive at ${fM(cur.nop)}.`:`Net Operating Loss of ${fM(Math.abs(cur.nop))}.`} ${cur.nop<0?'Non-operating charges (depreciation, management fees, financing) exceed GOP. Review debt structure and fee arrangements.':'Below-the-line charges absorbed. Consider debt refinancing to improve NOP margin.'}`
    });
    return list;
  },[cur,bs,bud,prior,yr,period]);

  const sevColor={'danger':T.red,'warning':T.yellow,'info':T.accent,'success':T.green};
  const sevIcon ={'danger':'🔴','warning':'⚠️','info':'💡','success':'✅'};

  const runAnalysis = () => {
    setRunning(true);
    setTimeout(()=>{setRunning(false);setGenerated(true);},1200);
  };

  const counts = {
    critical: insights.filter(a=>a.sev==='danger').length,
    warning:  insights.filter(a=>a.sev==='warning').length,
    info:     insights.filter(a=>a.sev==='info').length,
    success:  insights.filter(a=>a.sev==='success').length,
  };

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>AI INTELLIGENCE</div>
          <div style={{color:T.muted,fontSize:11}}>Automated financial insights · {periodLabel}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn && (
            <select value={period} onChange={e=>{setPeriod(e.target.value);setGenerated(false);}}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
          <button onClick={runAnalysis} disabled={running}
            style={{padding:'6px 16px',borderRadius:6,border:'none',
              background:running?T.border:T.accent,color:running?T.muted:'#080C12',
              cursor:running?'not-allowed':'pointer',fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
            {running?'Analyzing…':'▶ Run Analysis'}
          </button>
        </div>
      </div>

      {/* Summary strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}} className="r-grid-4">
        {[['🔴','Critical',counts.critical,T.red],['⚠️','Warnings',counts.warning,T.yellow],['💡','Insights',counts.info,T.accent],['✅','Positive',counts.success,T.green]].map(([ic,l,n,c])=>(
          <div key={l} style={{background:`${c}10`,border:`1px solid ${c}30`,borderRadius:8,padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:22}}>{ic}</span>
            <div>
              <div style={{color:T.muted,fontSize:9,textTransform:'uppercase',letterSpacing:1}}>{l}</div>
              <div style={{color:c,fontSize:22,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{n}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Insight cards */}
      {!cur ? (
        <div style={{padding:40,textAlign:'center',color:T.muted}}>No data for selected period.</div>
      ) : !generated ? (
        <div style={{padding:40,textAlign:'center',color:T.muted}}>
          <div style={{fontSize:32,marginBottom:12}}>🤖</div>
          <div>Select period and click <b style={{color:T.accent}}>Run Analysis</b></div>
        </div>
      ) : running ? (
        <div style={{padding:40,textAlign:'center',color:T.muted}}>
          <div style={{fontSize:32,marginBottom:12,animation:'spin 1s linear infinite'}}>⚙️</div>
          <div style={{color:T.accent}}>Analyzing financial data…</div>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
          {insights.map((ins,i)=>(
            <div key={i} style={{background:`${sevColor[ins.sev]}08`,border:`1px solid ${sevColor[ins.sev]}25`,
              borderRadius:10,padding:'14px 16px',borderLeft:`3px solid ${sevColor[ins.sev]}`}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:16}}>{sevIcon[ins.sev]}</span>
                <span style={{color:sevColor[ins.sev],fontSize:9,fontFamily:"'IBM Plex Mono'",letterSpacing:2,fontWeight:700}}>{ins.cat.toUpperCase()}</span>
              </div>
              <div style={{color:T.text,fontSize:12,fontWeight:600,marginBottom:6}}>{ins.title}</div>
              <div style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{ins.msg}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function generateReportHTML(selPeriod, selReport, theme) {
  var keys = selPeriod==='2025'?mKeys25:selPeriod==='2024'?mKeys24:['2026-01','2026-02'];
  var d    = aggKeys(keys);
  var bsKey   = selPeriod==='2025'?2025:selPeriod==='2024'?2024:'feb26';
  var bsPrvKey= selPeriod==='2025'?2024:selPeriod==='2024'?2023:2025;
  var bs  = bsCalc(BS_SNAPSHOTS[bsKey]);
  var bsp = bsCalc(BS_SNAPSHOTS[bsPrvKey]);
  var isDark = theme==='dark';
  var ops = d.np+d.dp+Math.round(d.it*0.3)-(bs.ar-bsp.ar)-(bs.inv-bsp.inv)+(bs.ap-bsp.ap)+(bs.acc-bsp.acc);
  var inv2= -(bs.fixG-bsp.fixG)||-(keys.length*80);
  var fin2= -(bsp.ltD-bs.ltD)-Math.round(d.np*0.4);
  var netCF=ops+inv2+fin2;
  var budKeys=selPeriod==='2026'?['2026-01','2026-02']:null;
  var bud=budKeys?aggKeys(budKeys,BUD26):null;

  var bg  =isDark?'#080C12':'#ffffff';
  var card=isDark?'#0D1520':'#f8fafc';
  var bdr =isDark?'#1A2535':'#e2e8f0';
  var txt =isDark?'#E2E8F0':'#0f172a';
  var sub =isDark?'#94A3B8':'#475569';
  var acc =isDark?'#00D4FF':'#0086A8';
  var grn =isDark?'#22C55E':'#16A34A';
  var red =isDark?'#EF4444':'#DC2626';
  var yel =isDark?'#EAB308':'#CA8A04';
  var hdr =isDark?'#0D1520':'#1e293b';
  var totRowBg=isDark?'rgba(0,212,255,0.08)':'#f0f9ff';
  var secRowBg=isDark?'#080C12':card;

  function fV(v){
    if(v===undefined||v===null) return '-';
    var a=Math.abs(v);
    var s=a>=1000?(a/1000).toFixed(2)+'B':a.toFixed(0)+'M';
    return v<0?'('+s+')':s;
  }
  function fPct(v){ return v!==undefined?v.toFixed(1)+'%':'-'; }
  function vPct(a,b){ return b&&b!==0?((a-b)/Math.abs(b)*100).toFixed(1)+'%':'-'; }
  function gc(v,pos){ return (pos?v>=0:v<=0)?grn:red; }

  var dateStr = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
