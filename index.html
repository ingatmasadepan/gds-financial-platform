}


function AIPage({ tbVersion=0 }) {
  // ── Period state ──────────────────────────────────────────────
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [yr,      setYr]      = useState('2026');
  const [period,  setPeriod]  = useState('m2');
  const [running, setRunning] = useState(false);
  const [generated, setGenerated] = useState(true);
  const [activeTab, setActiveTab] = useState('summary');

  // ── Executive Summary state (editable + saveable) ─────────────
  const [execText,     setExecText]     = useState('');
  const [execEdited,   setExecEdited]   = useState('');
  const [execSaved,    setExecSaved]    = useState({});   // {periodKey: text}
  const [execDirty,    setExecDirty]    = useState(false);
  const [execEditMode, setExecEditMode] = useState(false);

  // ── Period resolution ─────────────────────────────────────────
  const periodOpts = useMemo(() => getPeriodOpts(yr), [yr]);
  const handleYrChange = (v) => { setYr(v); setPeriod('full'); setGenerated(false); };

  const isAnn   = parseInt(yr) < 2024;
  const keys    = useMemo(() => getKeys(yr, period),    [yr, period]);
  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l || period;
  const periodKey   = `${yr}-${period}`;

  // ── Current P&L ───────────────────────────────────────────────
  const cur = useMemo(() => {
    if (isAnn) return annPnl(parseInt(yr));
    return keys && keys.length > 0 ? aggKeys(keys) : null;
  }, [yr, keys, isAnn]);

  // ── Balance Sheet ─────────────────────────────────────────────
  const bsKey = useMemo(() => snapKey(yr, period),     [yr, period]);
  const bsPrvKey = useMemo(() => prevSnapKey(yr, period), [yr, period]);
  const bs    = useMemo(() => bsCalc(BS_SNAPSHOTS[bsKey]    || BS_SNAPSHOTS['feb26']), [bsKey]);
  const bsPrv = useMemo(() => bsCalc(BS_SNAPSHOTS[bsPrvKey] || BS_SNAPSHOTS['dec25']), [bsPrvKey]);

  // ── Budget ────────────────────────────────────────────────────
  const bud = useMemo(() => {
    if (yr === '2026' && !isAnn && keys && keys.length) return aggKeys(keys, BUD26);
    return null;
  }, [yr, isAnn, keys]);

  // ── Prior year same period ────────────────────────────────────
  const prior = useMemo(() => {
    if (isAnn) return annPnl(parseInt(yr) - 1);
    const py = String(parseInt(yr) - 1);
    const pKeys = getKeys(py, period);
    if (pKeys && pKeys.length) return aggKeys(pKeys);
    if (parseInt(py) >= 2013) return annPnl(parseInt(py));
    return null;
  }, [yr, period, isAnn]);

  // ── Cash Flow (derived inline, read-only) ────────────────────
  const cf = useMemo(() => {
    if (!cur || !bs || !bsPrv) return null;
    const dAR  = bs.ar  - bsPrv.ar;
    const dInv = bs.inv - bsPrv.inv;
    const dPre = bs.pre - bsPrv.pre;
    const dAP  = bs.ap  - bsPrv.ap;
    const dAcc = bs.acc - bsPrv.acc;
    const wcNet = -dAR - dInv - dPre + dAP + dAcc;
    const ops   = (cur.nop || 0) + (cur.deprTotal || 0) + wcNet;
    const capex = -(bs.fixG - bsPrv.fixG);
    const fin   = -((bs.ltD || 0) - (bsPrv.ltD || 0));
    const net   = ops + capex + fin;
    return { ops, capex, fin, net, wcNet, cashEnd: bs.cash, cashStart: bsPrv.cash };
  }, [cur, bs, bsPrv]);

  // ── Macro signals ─────────────────────────────────────────────
  const macro = useMemo(() => {
    const src = (typeof window !== 'undefined' && window.__GDS_MACRO_SIGNALS) || null;
    if (!src) return { biRate: 5.75, inflation: 2.84, usdIdr: 16250, sentiment: 'Neutral', intlArr: 18.2, gdp: 5.11 };
    return {
      biRate:    (src.monetary&&src.monetary[0]&&src.monetary[0].num)  || 5.75,
      inflation: (src.monetary&&src.monetary[1]&&src.monetary[1].num)  || 2.84,
      usdIdr:    (src.monetary&&src.monetary[2]&&src.monetary[2].num)  || 16250,
      intlArr:   (src.tourism&&src.tourism[0]&&src.tourism[0].num)   || 18.2,
      gdp:       (src.economic&&src.economic[0]&&src.economic[0].num)  || 5.11,
      sentiment: (typeof window !== 'undefined' && window.__GDS_MACRO_SENTIMENT) || 'Neutral',
    };
  }, [generated]); // refreshes on Run Analysis

  // ────────────────────────────────────────────────────────────────
  // COMPUTED RATIOS
  // ────────────────────────────────────────────────────────────────
  const ratios = useMemo(() => {
    if (!cur) return {};
    const cr    = bs.tCA / Math.max(bs.tCL, 0.001);
    const de    = bs.tL  / Math.max(bs.tEq, 0.001);
    const roa   = cur.nop / Math.max(bs.tA, 0.001) * 100;
    const ic    = cur.gop / Math.max(Math.abs(cur.interest || 0.001), 0.001);
    const revVsBud   = bud  ? (cur.rev - bud.rev)   / Math.max(bud.rev,   0.001) * 100 : null;
    const revVsPrior = prior ? (cur.rev - prior.rev) / Math.max(prior.rev, 0.001) * 100 : null;
    const gopDelta   = prior ? cur.gopMgn - (prior.gopMgn || 0) : null;
    const nopDelta   = prior ? cur.nopMgn - (prior.nopMgn || 0) : null;
    return { cr, de, roa, ic, revVsBud, revVsPrior, gopDelta, nopDelta };
  }, [cur, bs, bud, prior]);

  // ────────────────────────────────────────────────────────────────
  // EXECUTIVE SUMMARY GENERATOR
  // ────────────────────────────────────────────────────────────────
  const buildExecSummary = useCallback(() => {
    if (!cur) return '';
    const { cr, de, roa, revVsBud, revVsPrior, gopDelta } = ratios;
    const revDir = revVsPrior != null ? (revVsPrior >= 0 ? `grew ${revVsPrior.toFixed(1)}%` : `declined ${Math.abs(revVsPrior).toFixed(1)}%`) : 'was recorded';
    const gopCond = cur.gopMgn >= 35 ? 'strong' : cur.gopMgn >= 28 ? 'moderate' : 'pressured';
    const nopCond = cur.nop >= 0 ? `positive at ${fM(cur.nop)}` : `a loss of ${fM(Math.abs(cur.nop))}`;
    const liqCond = cr >= 1.5 ? 'healthy' : cr >= 1.0 ? 'adequate' : 'tight';
    const budPhrase = revVsBud != null
      ? `Revenue ${revVsBud >= 0 ? 'exceeded' : 'missed'} budget by ${Math.abs(revVsBud).toFixed(1)}%, `
      : '';
    const macroPhrase = macro.usdIdr > 16200
      ? 'IDR depreciation pressure and rising energy costs warrant cost monitoring. '
      : 'External macro conditions remain broadly stable. ';
    const trendPhrase = gopDelta != null
      ? `GOP margin ${gopDelta >= 0 ? 'improved' : 'declined'} ${Math.abs(gopDelta).toFixed(1)}pp versus prior period. `
      : '';

    return (
      `Grand Darmo Suite by Amithya recorded total revenue of ${fM(cur.rev)} for ${periodLabel}, ` +
      `of which rooms contributed ${fM(cur.rooms)} (${cur.roomsMix.toFixed(0)}% mix) ` +
      `and F&B contributed ${fM(cur.fnb)} (${cur.fnbMix.toFixed(0)}% mix). ` +
      `Revenue ${revDir} versus the prior comparable period. ` +
      `${budPhrase}` +
      `Gross Operating Profit stood at ${fM(cur.gop)} — a ${gopCond} ${cur.gopMgn.toFixed(1)}% margin. ` +
      `${trendPhrase}` +
      `Net Operating Profit was ${nopCond} (${cur.nopMgn.toFixed(1)}% margin). ` +
      `Payroll ratio of ${cur.payRat.toFixed(1)}% was ${cur.payRat <= 35 ? 'within' : 'above'} the 35% benchmark. ` +
      `Balance Sheet reflects total assets of ${fM(bs.tA)}, with ${liqCond} liquidity (current ratio ${cr.toFixed(2)}x) ` +
      `and D/E ratio of ${de.toFixed(2)}x. ` +
      `ROA of ${roa.toFixed(1)}% indicates ${roa > 5 ? 'adequate' : 'pressured'} asset utilisation. ` +
      `${macroPhrase}` +
      `International tourism growth of ${macro.intlArr}% and BI rate held at ${macro.biRate}% provide a supportive demand environment for the hospitality sector.`
    );
  }, [cur, bs, bud, prior, ratios, macro, periodLabel]);

  // ── Auto-generate summary on period change ────────────────────
  useEffect(() => {
    if (!cur) return;
    const text = buildExecSummary();
    setExecText(text);
    if (execSaved[periodKey]) {
      setExecEdited(execSaved[periodKey]);
    } else {
      setExecEdited(text);
    }
    setExecDirty(false);
    setExecEditMode(false);
  }, [periodKey, generated]);

  // Expose to Reports module via window store
  useEffect(() => {
    const final = execSaved[periodKey] || execText;
    if (typeof window !== 'undefined') {
      window.__GDS_AI_SUMMARY = window.__GDS_AI_SUMMARY || {};
      window.__GDS_AI_SUMMARY[periodKey] = final;
    }
  }, [execSaved, execText, periodKey]);

  const handleSaveExec = () => {
    setExecSaved(prev => ({ ...prev, [periodKey]: execEdited }));
    setExecDirty(false);
    setExecEditMode(false);
    if (typeof window !== 'undefined') {
      window.__GDS_AI_SUMMARY = window.__GDS_AI_SUMMARY || {};
      window.__GDS_AI_SUMMARY[periodKey] = execEdited;
    }
  };
  const handleResetExec = () => {
    setExecEdited(execText);
    setExecDirty(false);
    setExecEditMode(false);
  };

  // ────────────────────────────────────────────────────────────────
  // KEY FINANCIAL INSIGHTS
  // ────────────────────────────────────────────────────────────────
  const insights = useMemo(() => {
    if (!cur) return [];
    const list = [];
    const { cr, de, roa, revVsBud, revVsPrior, gopDelta, nopDelta } = ratios;

    // 1. Revenue performance
    list.push({
      sev: revVsPrior == null ? 'info' : revVsPrior >= 5 ? 'success' : revVsPrior >= -5 ? 'info' : 'warning',
      cat: 'Revenue Performance',
      title: `Total Revenue: ${fM(cur.rev)}${revVsPrior != null ? ` (${revVsPrior >= 0 ? '+' : ''}${revVsPrior.toFixed(1)}% vs prior)` : ''}`,
      msg: `Rooms: ${fM(cur.rooms)} (${cur.roomsMix.toFixed(0)}%), F&B: ${fM(cur.fnb)} (${cur.fnbMix.toFixed(0)}%). ` +
        (revVsBud != null ? `Budget variance: ${revVsBud >= 0 ? '+' : ''}${revVsBud.toFixed(1)}% — ${Math.abs(revVsBud) < 5 ? 'within acceptable range' : revVsBud < 0 ? 'underperformance requires corrective action on rate strategy and F&B pricing' : 'positive outperformance, consider budget revision'}. ` : '') +
        (revVsPrior != null ? `YoY movement: ${revVsPrior >= 0 ? 'growth trajectory positive' : 'revenue contraction — review demand drivers and pricing strategy'}.` : ''),
    });

    // 2. GOP Margin
    list.push({
      sev: cur.gopMgn >= 35 ? 'success' : cur.gopMgn >= 25 ? 'info' : cur.gopMgn >= 15 ? 'warning' : 'danger',
      cat: 'Profitability',
      title: `GOP Margin: ${cur.gopMgn.toFixed(1)}%${gopDelta != null ? ` (${gopDelta >= 0 ? '+' : ''}${gopDelta.toFixed(1)}pp)` : ''}`,
      msg: `Gross Operating Profit: ${fM(cur.gop)} on revenue of ${fM(cur.rev)}. ` +
        (gopDelta != null ? `Margin ${gopDelta >= 0 ? 'expanded' : 'compressed'} ${Math.abs(gopDelta).toFixed(1)}pp versus prior period. ` : '') +
        (cur.gopMgn < 25 ? 'Below 25% threshold — investigate overhead cost structure and revenue mix. Immediate review of variable cost drivers recommended.' :
         cur.gopMgn < 35 ? 'Below 35% target. Monitor overhead recovery and room revenue optimisation.' :
         'GOP margin above 35% target. Operational efficiency performing well.'),
    });

    // 3. NOP
    list.push({
      sev: cur.nop > 0 ? 'success' : cur.nopMgn > -10 ? 'warning' : 'danger',
      cat: cur.nop >= 0 ? 'Net Profit' : 'Profit Alert',
      title: `NOP: ${fM(cur.nop)} (${cur.nopMgn.toFixed(1)}% margin)${nopDelta != null ? ` | ${nopDelta >= 0 ? '+' : ''}${nopDelta.toFixed(1)}pp` : ''}`,
      msg: `${cur.nop >= 0 ? `Net Operating Profit of ${fM(cur.nop)} after all non-operating charges.` : `Net Operating Loss of ${fM(Math.abs(cur.nop))} — non-operating charges exceed GOP.`} ` +
        `Non-op items: depreciation ${fM(cur.deprTotal)}, mgmt fees ${fM(cur.mgmtFee)}, incentive fees ${fM(cur.incentFee)}, ROI/financing ${fM(cur.roi)}. ` +
        (cur.nop < 0 ? 'Review non-operating structure — debt refinancing or fee renegotiation may improve NOP.' : 'Below-the-line charges well absorbed.'),
    });

    // 4. Cost structure — payroll
    list.push({
      sev: cur.payRat < 32 ? 'success' : cur.payRat < 38 ? 'info' : 'warning',
      cat: 'Cost Structure',
      title: `Payroll Ratio: ${cur.payRat.toFixed(1)}% | CoS: ${cur.cosRat.toFixed(1)}% | Overhead: ${cur.ovhdRat.toFixed(1)}%`,
      msg: `Departmental payroll at ${cur.payRat.toFixed(1)}% of revenue (benchmark: 35%). ` +
        `Cost of Sales at ${cur.cosRat.toFixed(1)}% and overhead at ${cur.ovhdRat.toFixed(1)}%. ` +
        (cur.payRat > 38 ? 'ALERT: Payroll significantly above benchmark. Review staffing vs. occupancy correlation. Consider flex staffing model and shift optimisation.' :
         cur.payRat > 32 ? 'Above optimal range. Monitor closely — consider staffing efficiencies during low occupancy periods.' :
         'Cost ratios well controlled. Maintain discipline as occupancy varies.'),
    });

    // 5. Liquidity
    list.push({
      sev: cr >= 1.5 ? 'success' : cr >= 1.0 ? 'info' : 'danger',
      cat: 'Liquidity & Working Capital',
      title: `Current Ratio: ${cr.toFixed(2)}x | Cash: ${fM(bs.cash)} | Working Capital: ${fM(bs.tCA - bs.tCL)}`,
      msg: `Current assets ${fM(bs.tCA)} vs current liabilities ${fM(bs.tCL)}. ` +
        (cf ? `Operating cash flow: ${fM(cf.ops)} | Capex: ${fM(cf.capex)} | Net cash movement: ${fM(cf.net)}. ` : '') +
        (cr < 1.0 ? 'RISK: Current ratio below 1.0 — immediate liquidity management required. Prioritise receivable collection and defer non-critical payables.' :
         cr < 1.5 ? 'Adequate but tight. Maintain cash position; avoid unplanned capex. Monitor advance deposit drawdowns.' :
         'Healthy liquidity. Current ratio above 1.5x provides adequate operational buffer.'),
    });

    // 6. Leverage
    list.push({
      sev: de < 1 ? 'success' : de < 2.5 ? 'info' : 'warning',
      cat: 'Financial Health',
      title: `D/E Ratio: ${de.toFixed(2)}x | ROA: ${roa.toFixed(1)}% | Total Assets: ${fM(bs.tA)}`,
      msg: `Total liabilities ${fM(bs.tL)} vs equity ${fM(bs.tEq)}. Return on Assets: ${roa.toFixed(1)}%. ` +
        `Long-term debt to management: ${fM(bs.ltD || 0)}. ` +
        (de > 3 ? 'High leverage. Debt servicing capacity under pressure — review financing structure urgently.' :
         de > 1.5 ? 'Moderate leverage. Monitor debt coverage — maintain GOP above debt service requirements.' :
         'Conservative leverage position. Financial structure stable.'),
    });

    // 7. Margin trend (if prior available)
    if (prior && gopDelta != null) {
      list.push({
        sev: gopDelta >= 2 ? 'success' : gopDelta >= 0 ? 'info' : gopDelta > -5 ? 'warning' : 'danger',
        cat: 'Trend Analysis',
        title: `GOP ${gopDelta >= 0 ? '▲' : '▼'} ${Math.abs(gopDelta).toFixed(1)}pp | NOP ${nopDelta >= 0 ? '▲' : '▼'} ${Math.abs(nopDelta || 0).toFixed(1)}pp vs Prior`,
        msg: `Prior period revenue: ${fM(prior.rev)}, GOP: ${fM(prior.gop)} (${prior.gopMgn.toFixed(1)}%), NOP: ${fM(prior.nop)} (${prior.nopMgn.toFixed(1)}%). ` +
          `Current period: Revenue ${fM(cur.rev)}, GOP ${fM(cur.gop)}, NOP ${fM(cur.nop)}. ` +
          (gopDelta < -5 ? 'Significant margin compression — investigate revenue mix shift and cost escalation drivers.' :
           gopDelta < 0 ? 'Mild margin compression. Review utility and overhead costs for quick wins.' :
           'Positive margin trajectory. Maintain cost discipline to sustain improvement.'),
      });
    }

    // 8. Macro context
    list.push({
      sev: macro.usdIdr > 16500 ? 'warning' : macro.inflation > 4 ? 'warning' : 'info',
      cat: 'External Macro Context',
      title: `Macro: BI ${macro.biRate}% | USD/IDR ${macro.usdIdr.toLocaleString('id-ID')} | CPI ${macro.inflation}% | Tourism +${macro.intlArr}%`,
      msg: `BI rate at ${macro.biRate}% — ${macro.biRate <= 5.75 ? 'stable financing environment' : 'elevated rate increases borrowing cost'}. ` +
        `USD/IDR at ${macro.usdIdr.toLocaleString('id-ID')} — ${macro.usdIdr > 16200 ? 'IDR weakness increases imported F&B and FF&E costs by est. 5–8%' : 'exchange rate broadly manageable'}. ` +
        `CPI at ${macro.inflation}% is ${macro.inflation <= 3.5 ? 'within target, limiting domestic cost pressure' : 'elevated — monitor domestic input cost pass-through'}. ` +
        `International arrivals +${macro.intlArr}% YoY supports hotel demand outlook.`,
    });

    return list;
  }, [cur, bs, bud, prior, cf, ratios, macro, periodLabel]);

  // ────────────────────────────────────────────────────────────────
  // RISK DETECTION
  // ────────────────────────────────────────────────────────────────
  const risks = useMemo(() => {
    if (!cur) return [];
    const { cr, de, roa, revVsBud } = ratios;
    const r = [];
    if (cur.gopMgn < 25)      r.push({ level:'CRITICAL', icon:'🔴', title:'Low GOP Margin',       detail:`GOP at ${cur.gopMgn.toFixed(1)}% — below 25% minimum. Revenue recovery or cost reduction required urgently.` });
    if (cur.nop < 0)           r.push({ level:'CRITICAL', icon:'🔴', title:'Net Operating Loss',    detail:`NOP negative at ${fM(cur.nop)}. Non-operating charges (${fM(cur.deprTotal)} depr + ${fM(cur.mgmtFee)} fees) exceed GOP.` });
    if (cr < 1.0)              r.push({ level:'CRITICAL', icon:'🔴', title:'Liquidity Shortfall',   detail:`Current ratio ${cr.toFixed(2)}x. Current liabilities exceed current assets by ${fM(bs.tCL - bs.tCA)}.` });
    if (cur.payRat > 40)       r.push({ level:'HIGH',     icon:'🟠', title:'Payroll Ratio Critical', detail:`Payroll at ${cur.payRat.toFixed(1)}% of revenue — significantly above 35% benchmark. Flex staffing review required.` });
    if (de > 3)                r.push({ level:'HIGH',     icon:'🟠', title:'High Financial Leverage',detail:`D/E ratio ${de.toFixed(2)}x. Debt servicing capacity may be stressed at current GOP levels.` });
    if (revVsBud !== null && revVsBud < -10) r.push({ level:'HIGH', icon:'🟠', title:'Budget Underperformance', detail:`Revenue ${Math.abs(revVsBud).toFixed(1)}% below budget. Corrective action on pricing and occupancy required.` });
    if (cur.gopMgn >= 25 && cur.gopMgn < 30) r.push({ level:'MEDIUM', icon:'🟡', title:'GOP Margin Below Target', detail:`GOP at ${cur.gopMgn.toFixed(1)}% — below 30% operational target. Monitor overhead and utility costs.` });
    if (cr >= 1.0 && cr < 1.3) r.push({ level:'MEDIUM', icon:'🟡', title:'Tight Liquidity',        detail:`Current ratio ${cr.toFixed(2)}x — adequate but limited buffer. Avoid large unplanned capital outflows.` });
    if (cur.payRat > 35 && cur.payRat <= 40) r.push({ level:'MEDIUM', icon:'🟡', title:'Elevated Payroll Ratio', detail:`Payroll at ${cur.payRat.toFixed(1)}% — above 35% benchmark. Review staffing mix and occupancy correlation.` });
    if (macro.usdIdr > 16500)  r.push({ level:'MEDIUM', icon:'🟡', title:'Currency Risk',           detail:`USD/IDR at ${macro.usdIdr.toLocaleString('id-ID')} — elevated FX exposure on imported goods and FF&E procurement.` });
    if (roa < 2)               r.push({ level:'LOW',     icon:'🔵', title:'Low Asset Utilisation',  detail:`ROA at ${roa.toFixed(1)}% — below 3% threshold. Review asset productivity and consider capex rationalisation.` });
    if (r.length === 0)        r.push({ level:'CLEAR',   icon:'✅', title:'No Material Risks Detected', detail:'All key financial thresholds within acceptable ranges for the selected period.' });
    return r;
  }, [cur, bs, ratios, macro]);

  // ────────────────────────────────────────────────────────────────
  // STRATEGIC RECOMMENDATIONS
  // ────────────────────────────────────────────────────────────────
  const recommendations = useMemo(() => {
    if (!cur) return [];
    const { cr, de, revVsBud, revVsPrior } = ratios;
    const recs = [];

    // Revenue
    if (cur.gopMgn < 30 || (revVsPrior != null && revVsPrior < 0)) {
      recs.push({ icon:'💰', area:'Revenue Optimisation', priority:'HIGH',
        actions: [
          `Review ADR strategy — current room revenue mix at ${cur.roomsMix.toFixed(0)}% of total. Explore dynamic pricing in high-demand windows.`,
          `Activate F&B promotional packages to drive ancillary revenue. Current F&B mix at ${cur.fnbMix.toFixed(0)}%.`,
          `Explore corporate account acquisition and MICE segment targeting in Surabaya market.`,
        ]
      });
    }

    // Cost control
    if (cur.payRat > 35) {
      recs.push({ icon:'✂️', area:'Cost Control — Payroll', priority:cur.payRat > 40 ? 'HIGH' : 'MEDIUM',
        actions: [
          `Implement flex staffing model aligned to occupancy bands. Review minimum cover ratios per department.`,
          `Analyse overtime trends — identify peak vs off-peak staffing mismatches.`,
          `Target payroll ratio below 35% through natural attrition and scheduling optimisation.`,
        ]
      });
    }

    // Working capital
    if (cr < 1.3) {
      recs.push({ icon:'💧', area:'Working Capital Management', priority:'HIGH',
        actions: [
          `Accelerate accounts receivable collection — review aging report for overdue corporate accounts.`,
          `Monitor advance deposit drawdowns — ensure deposit liabilities are adequately covered.`,
          `Defer non-critical capital expenditure until liquidity improves above 1.5x current ratio.`,
        ]
      });
    }

    // Macro-driven
    if (macro.usdIdr > 16200) {
      recs.push({ icon:'🌍', area:'Macro Risk Mitigation', priority:'MEDIUM',
        actions: [
          `Audit imported F&B ingredients — identify substitution opportunities with local suppliers.`,
          `Lock forward pricing on key imported supplies where contractually possible.`,
          `Review energy consumption by department — target 5–8% utility cost reduction to offset IDR impact.`,
        ]
      });
    }

    // Always: revenue if occupancy low (proxy: payRat high = low rev base)
    recs.push({ icon:'📈', area:'Operational Excellence', priority:'STANDARD',
      actions: [
        `Maintain GOP margin discipline — benchmark vs Surabaya market RevPAR growth (+${macro.intlArr > 10 ? '9.1' : '5'}%).`,
        `Leverage international tourism growth (+${macro.intlArr}%) with targeted package offerings and OTA optimisation.`,
        `Conduct quarterly review of non-operating charges — management fees, incentives, and financing costs represent ${fM((cur.incentFee||0)+(cur.mgmtFee||0)+(cur.roi||0))} this period.`,
      ]
    });

    return recs;
  }, [cur, bs, ratios, macro]);

  // ────────────────────────────────────────────────────────────────
  // AI-generated suggested actions (for Action Tracker integration)
  const suggestedActions = useMemo(() => {
    if (!cur || !bs) return [];
    return buildSuggestedActions(cur, bs, ratios, macro, bud);
  }, [cur, bs, ratios, macro, bud]);

  const [actionToast, setActionToast] = useState(null);

  const handleCreateAction = useCallback((action) => {
    const newAction = {
      ...action,
      id: Date.now(),
      createdAt: new Date().toLocaleDateString('id-ID'),
    };
    window.__GDS_ACTIONS = [newAction, ...(window.__GDS_ACTIONS || [])];
    setActionToast('✦ Action "' + action.title.slice(0,30) + '…" added to Action Tracker');
    setTimeout(() => setActionToast(null), 3000);
  }, []);

  // UI HELPERS
  // ────────────────────────────────────────────────────────────────
  const sevColor  = { danger:T.red, warning:T.yellow, info:T.accent, success:T.green };
  const sevIcon   = { danger:'🔴', warning:'⚠️', info:'💡', success:'✅' };
  const riskColor = { CRITICAL:T.red, HIGH:T.orange, MEDIUM:T.yellow, LOW:T.accent, CLEAR:T.green };
  const prioColor = { HIGH:T.red, MEDIUM:T.yellow, STANDARD:T.accent };

  const counts = {
    critical: insights.filter(a=>a.sev==='danger').length,
    warning:  insights.filter(a=>a.sev==='warning').length,
    info:     insights.filter(a=>a.sev==='info').length,
    success:  insights.filter(a=>a.sev==='success').length,
  };

  const runAnalysis = () => {
    setRunning(true);
    setTimeout(() => { setRunning(false); setGenerated(g => !g); }, 1000);
  };

  const TAB = (t, label) => (
    <button key={t} onClick={()=>setActiveTab(t)}
      style={{ padding:'6px 13px', borderRadius:6, border:'none', cursor:'pointer',
        fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono'",
        background: activeTab===t ? T.accent : T.border,
        color: activeTab===t ? '#080C12' : T.muted }}>
      {label}
    </button>
  );

  // ────────────────────────────────────────────────────────────────
  // RENDER
  // ────────────────────────────────────────────────────────────────
  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>AI INTELLIGENCE</div>
          <div style={{color:T.muted,fontSize:11}}>Financial analysis engine · {periodLabel}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn && (
            <select value={period} onChange={e=>{setPeriod(e.target.value);setGenerated(g=>!g);}}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
          <button onClick={runAnalysis} disabled={running}
            style={{padding:'6px 16px',borderRadius:6,border:'none',
              background:running?T.border:T.accent,color:running?T.muted:'#080C12',
              cursor:running?'not-allowed':'pointer',fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
            {running?'Analyzing…':'▶ Run Analysis'}
          </button>
        </div>
      </div>

      {/* ── KPI Strip ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14}} className="r-grid-4">
        {[
          ['🔴','Critical', counts.critical, T.red],
          ['⚠️','Warnings', counts.warning,  T.yellow],
          ['💡','Insights', counts.info,     T.accent],
          ['✅','Positive', counts.success,  T.green],
        ].map(([icon,l,n,c])=>(
          <div key={l} style={{background:`${c}10`,border:`1px solid ${c}30`,borderRadius:8,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:20}}>{icon}</span>
            <div>
              <div style={{color:T.muted,fontSize:9,textTransform:'uppercase',letterSpacing:1}}>{l}</div>
              <div style={{color:c,fontSize:20,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{n}</div>
            </div>
          </div>
        ))}
      </div>

      {/* ── Tabs ── */}
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        {TAB('summary',  '📋 Executive Summary')}
        {TAB('insights', '💡 Key Insights')}
        {TAB('risks',    '⚠️ Risk Detection')}
        {TAB('recs',     '🎯 Recommendations')}
      </div>

      {!cur ? (
        <div style={{padding:40,textAlign:'center',color:T.muted,background:T.card,borderRadius:12,border:`1px solid ${T.border}`}}>
          No data available for the selected period.
        </div>
      ) : running ? (
        <div style={{padding:40,textAlign:'center',color:T.muted,background:T.card,borderRadius:12,border:`1px solid ${T.border}`}}>
          <div style={{fontSize:32,marginBottom:12}}>⚙️</div>
          <div style={{color:T.accent,fontFamily:"'IBM Plex Mono'",fontSize:12}}>Analyzing financial data…</div>
        </div>
      ) : (
        <>
          {/* ══ TAB: EXECUTIVE SUMMARY ══ */}
          {activeTab==='summary' && (
            <div>
              <Card>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{color:T.text,fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>EXECUTIVE FINANCIAL SUMMARY</div>
                    <div style={{color:T.muted,fontSize:10,marginTop:2}}>{periodLabel} · Auto-generated · Editable</div>
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    {execEditMode ? (
                      <>
                        <button onClick={handleSaveExec}
                          style={{padding:'5px 12px',borderRadius:5,border:'none',background:T.green,color:'#fff',
                            fontSize:10,fontWeight:700,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                          💾 Save
                        </button>
                        <button onClick={handleResetExec}
                          style={{padding:'5px 12px',borderRadius:5,border:`1px solid ${T.border}`,background:'none',
                            color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                          ↺ Reset
                        </button>
                      </>
                    ) : (
                      <button onClick={()=>setExecEditMode(true)}
                        style={{padding:'5px 12px',borderRadius:5,border:`1px solid ${T.border}`,background:'none',
                          color:T.sub,fontSize:10,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
                        ✏️ Edit
                      </button>
                    )}
                    {execSaved[periodKey] && (
                      <span style={{fontSize:9,color:T.green,fontFamily:"'IBM Plex Mono'",padding:'5px 8px',
                        background:`${T.green}15`,borderRadius:5,border:`1px solid ${T.green}30`}}>✓ Saved</span>
                    )}
                  </div>
                </div>

                {execEditMode ? (
                  <textarea
                    value={execEdited}
                    onChange={e=>{setExecEdited(e.target.value);setExecDirty(true);}}
                    style={{width:'100%',minHeight:160,background:T.bg,border:`1px solid ${T.accent}`,
                      borderRadius:8,padding:'12px',color:T.text,fontSize:12,lineHeight:1.8,
                      fontFamily:'inherit',outline:'none',resize:'vertical'}}
                  />
                ) : (
                  <div style={{color:T.sub,fontSize:12,lineHeight:1.9,padding:'4px 0',
                    borderLeft:`3px solid ${T.accent}`,paddingLeft:14}}>
                    {execEdited || execText}
                  </div>
                )}

                <div style={{marginTop:12,display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}} className="r-grid-5">
                  {[
                    {l:'Revenue',   v:fM(cur.rev),        c:T.accent},
                    {l:'GOP',       v:`${cur.gopMgn.toFixed(1)}%`, c:cur.gopMgn>=30?T.green:T.yellow},
                    {l:'NOP',       v:fM(cur.nop),        c:cur.nop>=0?T.green:T.red},
                    {l:'Curr.Ratio',v:`${(ratios.cr!=null?ratios.cr:0).toFixed(2)}x`, c:ratios.cr>=1.5?T.green:ratios.cr>=1?T.yellow:T.red},
                    {l:'ROA',       v:`${(ratios.roa!=null?ratios.roa:0).toFixed(1)}%`, c:ratios.roa>=5?T.green:T.yellow},
                  ].map(k=>(
                    <div key={k.l} style={{background:T.bg,borderRadius:6,padding:'8px 10px',border:`1px solid ${T.border}`,textAlign:'center'}}>
                      <div style={{fontSize:9,color:T.muted,marginBottom:3,letterSpacing:1}}>{k.l}</div>
                      <div style={{fontSize:13,fontWeight:700,color:k.c,fontFamily:"'IBM Plex Mono'"}}>{k.v}</div>
                    </div>
                  ))}
                </div>

                {execSaved[periodKey] && (
                  <div style={{marginTop:10,fontSize:10,color:T.muted,fontFamily:"'IBM Plex Mono'",
                    padding:'6px 10px',background:`${T.green}08`,borderRadius:6,border:`1px solid ${T.green}20`}}>
                    ✓ Custom summary saved — this version will be used in board reports for {periodLabel}.
                  </div>
                )}
              </Card>
            </div>
          )}

          {/* ══ TAB: KEY INSIGHTS ══ */}
          {activeTab==='insights' && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
              {insights.map((ins,i)=>(
                <div key={i} style={{background:`${sevColor[ins.sev]}07`,border:`1px solid ${sevColor[ins.sev]}25`,
                  borderRadius:10,padding:'14px 16px',borderLeft:`3px solid ${sevColor[ins.sev]}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <span style={{fontSize:15}}>{sevIcon[ins.sev]}</span>
                    <span style={{color:sevColor[ins.sev],fontSize:9,fontFamily:"'IBM Plex Mono'",letterSpacing:2,fontWeight:700}}>
                      {ins.cat.toUpperCase()}
                    </span>
                  </div>
                  <div style={{color:T.text,fontSize:12,fontWeight:600,marginBottom:6}}>{ins.title}</div>

// ── Classify signal based on value & thresholds ──
function classifySignal(key, value) {
  const rules = {
    biRate:      v => v <= 5.5 ? 'Positive' : v <= 6.0 ? 'Stable' : v <= 6.5 ? 'Caution' : 'Risk',
    inflation:   v => v <= 2.5 ? 'Positive' : v <= 3.5 ? 'Stable' : v <= 4.5 ? 'Caution' : 'Risk',
    usdIdr:      v => v <= 15500 ? 'Positive' : v <= 16000 ? 'Stable' : v <= 16500 ? 'Caution' : 'Risk',
    gdp:         v => v >= 5.5 ? 'Positive' : v >= 4.5 ? 'Stable' : v >= 3.0 ? 'Caution' : 'Risk',
    consConf:    v => v >= 130 ? 'Positive' : v >= 110 ? 'Stable' : v >= 90 ? 'Caution' : 'Risk',
    fuel:        v => v <= 3.0 ? 'Positive' : v <= 5.0 ? 'Stable' : v <= 8.0 ? 'Caution' : 'Risk',
    intlArr:     v => v >= 15 ? 'Positive' : v >= 8 ? 'Stable' : v >= 0 ? 'Caution' : 'Risk',
    domTravel:   v => v >= 10 ? 'Positive' : v >= 5 ? 'Stable' : v >= 0 ? 'Caution' : 'Risk',
    natOcc:      v => v >= 65 ? 'Positive' : v >= 55 ? 'Stable' : v >= 45 ? 'Caution' : 'Risk',
    surabayaAdr: v => v >= 8 ? 'Positive' : v >= 4 ? 'Stable' : v >= 0 ? 'Caution' : 'Risk',
    revpar:      v => v >= 8 ? 'Positive' : v >= 4 ? 'Stable' : v >= 0 ? 'Caution' : 'Risk',
    supply:      v => v <= 2.0 ? 'Positive' : v <= 4.0 ? 'Stable' : v <= 7.0 ? 'Caution' : 'Risk',
  };
  const fn = rules[key];
  if (!fn) return 'Stable';
  return fn(value);
}

function classColor(cls, T) {
  return cls==='Positive'?T.green : cls==='Stable'?T.accent : cls==='Caution'?T.yellow : T.red;
}
function classBg(cls, T) {
  const c = classColor(cls,T);
  return `${c}12`;
}
function classBorder(cls, T) {
  const c = classColor(cls,T);
  return `${c}30`;
}
function classIcon(cls) {
  return cls==='Positive'?'✅' : cls==='Stable'?'🔵' : cls==='Caution'?'⚠️' : '🔴';
}

// ── Mini sparkline using SVG ──
function MiniSparkline({data, color, width=120, height=36}) {
  if (!data || data.length < 2) return null;
  const vals = data.map(d=>d.v);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v,i)=>{
    const x = (i/(vals.length-1))*(width-4)+2;
    const y = height-2 - ((v-min)/range)*(height-4);
    return `${x},${y}`;
  }).join(' ');
  const lastV = vals[vals.length-1];
  const prevV = vals[vals.length-2];
  const isUp = lastV >= prevV;
  const lineColor = isUp ? color : '#EF4444';
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      <polyline points={pts} fill="none" stroke={lineColor} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.8"/>
      {/* last dot */}
      {(() => {
        const lx = parseFloat(pts.split(' ').pop().split(',')[0]);
        const ly = parseFloat(pts.split(' ').pop().split(',')[1]);
        return <circle cx={lx} cy={ly} r="2.5" fill={lineColor}/>;
      })()}
    </svg>
  );
}

                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                        <span style={{color:T.text,fontSize:11,fontWeight:600}}>{item.l}</span>
                        <div style={{display:'flex',gap:6,alignItems:'center'}}>
                          <span style={{color:cc,fontSize:13,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{item.display}</span>
                          <span style={{color:cc,fontSize:11}}>{item.trend}</span>
                        </div>
                      </div>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <span style={{color:T.muted,fontSize:10,flex:1,lineHeight:1.4}}>{item.note}</span>
                        <span style={{color:cc,fontSize:9,fontFamily:"'IBM Plex Mono'",padding:'2px 6px',
                          borderRadius:4,background:classBg(cls,T),marginLeft:8,whiteSpace:'nowrap',fontWeight:700,border:`1px solid ${classBorder(cls,T)}`}}>{cls}</span>

                      <div style={{color:T.muted,fontSize:9,marginTop:3}}>Source: {item.src}</div>
                    </div>
                  </div>
                );
              })}
            </Card>
          ))}
        </div>
      )}

      {/* ══ TAB: TRENDS ══ */}
      {activeTab==='trends' && (
        <div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}} className="r-grid-2">
            {[
              {title:'USD/IDR Exchange Rate', data:MACRO_TREND_DATA.usdIdr, key:'usdIdr', unit:'IDR',
               note:'IDR has depreciated ~2.8% since Jan 2025. Continues to pressure imported cost categories.',
               color:'#EAB308'},
              {title:'Inflation (CPI) Trend', data:MACRO_TREND_DATA.inflation, key:'inflation', unit:'%',
               note:'CPI remains below BI target band (2.5–4.5%). Domestic cost environment broadly stable.',
               color:'#00D4FF'},
              {title:'Int\'l Tourism Arrivals', data:MACRO_TREND_DATA.tourism, key:'tourism', unit:'jt',
               note:'Monthly international arrivals growing steadily. Positive demand signal for hospitality sector.',
               color:'#22C55E'},
            ].map(({title,data,key,unit,note,color})=>{
              const vals = data.map(d=>d.v);
              const first = vals[0], last = vals[vals.length-1];
              const chg = ((last-first)/first*100).toFixed(1);
              const isUp = last >= first;
              return (
                <Card key={key}>
                  <div style={{marginBottom:8}}>
                    <div style={{color:T.text,fontSize:12,fontWeight:700}}>{title}</div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
                      <span style={{color:color,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{last.toLocaleString('id-ID')}{unit==='%'?'%':''}</span>
                      <span style={{color:isUp?(key==='usdIdr'?T.red:T.green):T.green,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>
                        {isUp?'↑':' ↓'}{Math.abs(chg)}%
                      </span>
                    </div>
                  </div>
                  <div style={{padding:'8px 0'}}>
                    <MiniSparkline data={data} color={color} width={200} height={48}/>
                    <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
                      <span style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>{data[0].mo}</span>
                      <span style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>{data[data.length-1].mo}</span>
                    </div>
                  </div>
                  <div style={{color:T.muted,fontSize:10,lineHeight:1.5,marginTop:4,borderTop:`1px solid ${T.border}`,paddingTop:8}}>{note}</div>
                </Card>
              );
            })}
          </div>

          {/* Trend table */}
          <Card>
            <SectionTitle>INDICATOR TREND SUMMARY (JAN 2025 – FEB 2026)</SectionTitle>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr style={{background:T.border}}>
                    {['Month','USD/IDR','CPI %','Int\'l Tourism (jt)'].map((h,i)=>(
                      <th key={i} style={{padding:'7px 10px',textAlign:i===0?'left':'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {MACRO_TREND_DATA.usdIdr.map((row,i)=>{
                    const idr   = row.v;
                    const cpi   = MACRO_TREND_DATA.inflation[i]&&MACRO_TREND_DATA.inflation[i].v;
                    const tour  = MACRO_TREND_DATA.tourism[i]&&MACRO_TREND_DATA.tourism[i].v;
                    const prevIdr = i>0?MACRO_TREND_DATA.usdIdr[i-1].v:idr;
                    return (
                      <tr key={i} style={{borderBottom:`1px solid ${T.border}`,background:i%2===0?'transparent':`${T.accent}04`}}>
                        <td style={{padding:'5px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{row.mo}</td>
                        <td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'IBM Plex Mono'",color:idr>prevIdr?T.red:T.green}}>{idr.toLocaleString('id-ID')}</td>
                        <td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'IBM Plex Mono'",color:cpi<=2.5?T.green:cpi<=3.5?T.accent:T.yellow}}>{(cpi!=null?cpi:0).toFixed(2)}%</td>
                        <td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'IBM Plex Mono'",color:T.green}}>{(tour!=null?tour:0).toFixed(2)} jt</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}

      {/* ══ TAB: BUSINESS IMPACT ══ */}
      {activeTab==='impact' && (
        <div>
          <Card style={{marginBottom:12}}>
            <SectionTitle>EXTERNAL ENVIRONMENT — BUSINESS IMPACT ASSESSMENT</SectionTitle>
            <div style={{color:T.muted,fontSize:11,lineHeight:1.6,marginBottom:4}}>
              How current macroeconomic conditions may affect Grand Darmo Suite operations and financial performance.
            </div>
          </Card>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
            {IMPACTS.map((imp,i)=>{
              const c = impactColor(imp.severity);
              return (
                <div key={i} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,
                  padding:'14px 16px',borderLeft:`3px solid ${c}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <span style={{fontSize:18}}>{imp.icon}</span>
                    <div>
                      <div style={{color:T.text,fontSize:12,fontWeight:700}}>{imp.title}</div>
                      <span style={{fontSize:9,padding:'2px 7px',borderRadius:4,fontWeight:700,fontFamily:"'IBM Plex Mono'",
                        background:`${c}15`,color:c,textTransform:'uppercase'}}>{imp.severity}</span>
                    </div>
                  </div>
                  <div style={{color:T.sub,fontSize:11,lineHeight:1.65}}>{imp.body}</div>
                </div>
              );
            })}
          </div>

          {/* Macro summary for AI/Reports */}
          <Card style={{marginTop:12}}>
            <SectionTitle>MACRO INTELLIGENCE SUMMARY</SectionTitle>
            <div style={{color:T.sub,fontSize:11,lineHeight:1.8}}>
              {`Macro sentiment is currently `}<span style={{color:sentimentColor,fontWeight:700}}>{sentiment}</span>
              {` with ${posCount} positive signals and ${riskCount} risk signals across monetary, tourism, economic, and hospitality dimensions. `}
              {`BI rate held at ${(classified.monetary&&classified.monetary[0]&&classified.monetary[0].display)||'5.75%'}, keeping financing costs stable. `}
              {`CPI at ${(classified.monetary&&classified.monetary[1]&&classified.monetary[1].display)||'2.84%'} remains within target band, supporting domestic cost management. `}
              {`USD/IDR at ${(classified.monetary&&classified.monetary[2]&&classified.monetary[2].display)||'16,250'} creates moderate pressure on imported goods and FF&E. `}
              {`International tourism growth of ${(classified.tourism&&classified.tourism[0]&&classified.tourism[0].display)||'+18.2%'} and domestic travel recovery of ${(classified.tourism&&classified.tourism[1]&&classified.tourism[1].display)||'+8.5%'} provide a strong demand environment. `}
              {`Surabaya hospitality market shows RevPAR growth of ${(classified.hospitality&&classified.hospitality[1]&&classified.hospitality[1].display)||'+9.1%'} with limited new supply (+${(classified.hospitality&&classified.hospitality[2]&&classified.hospitality[2].display)||'1.8%'}), creating a favorable competitive landscape. `}
              {`Management should monitor USD/IDR and energy costs closely while capitalizing on tourism demand momentum.`}
            </div>
          </Card>
        </div>
      )}

      {/* Footer */}
      <div style={{textAlign:'center',color:T.muted,fontSize:10,marginTop:14,fontFamily:"'IBM Plex Mono'",
        padding:'8px',borderTop:`1px solid ${T.border}`}}>
        {lastUpdate ? `Last Updated: ${lastUpdate}` : 'Baseline data · Mar 2026'} · Macro Radar · Indicative intelligence for management use only
      </div>
    </div>
  );
}

// GENERATE REPORT HTML — Board-quality financial report
// ══════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
// generateReportHTML — Professional board report generator
// selSections: array of section IDs, or 'board' for full pack
// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
// FINANCIAL ACTION TRACKER MODULE
// ══════════════════════════════════════════════════════════════════
window.__GDS_ACTIONS = window.__GDS_ACTIONS || [];

const ACTION_KPIS = ['Revenue','Payroll Ratio','GOP Margin','NOP Margin','Cash Flow','Cost of Sales','Occupancy','ADR','RevPAR','Current Ratio','D/E Ratio'];
const ACTION_PRIORITIES = ['Critical','High','Medium','Low'];
const ACTION_STATUSES = ['Open','In Progress','Completed'];

const STATUS_COLOR = {
  'Open':        '#EF4444',
  'In Progress': '#EAB308',
  'Completed':   '#22C55E',
};
const PRIORITY_COLOR = {
  'Critical': '#EF4444',
  'High':     '#F97316',
  'Medium':   '#EAB308',
  'Low':      '#00D4FF',
};

function ActionTrackerPage({ currentUser }) {
  const [actions,    setActions]    = useState(window.__GDS_ACTIONS || []);
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [modal,      setModal]      = useState(null); // 'add'|'edit'|'delete'|'view'
  const [selected,   setSelected]   = useState(null);
  const [filterStatus, setFilterStatus] = useState('All');
  const [filterPriority, setFilterPriority] = useState('All');
  const [filterKPI,    setFilterKPI]    = useState('All');
  const [searchQ,    setSearchQ]    = useState('');
  const [sortField,  setSortField]  = useState('deadline');
  const [toast,      setToast]      = useState(null);
  const [activeView, setActiveView] = useState('board'); // 'board'|'list'|'dashboard'

  const emptyForm = {
    title:'', description:'', kpi:'Revenue', responsible:'', priority:'High',
    deadline:'', status:'Open', notes:'', source:'Manual',
  };
  const [form, setForm] = useState({...emptyForm});

  const persist = (updated) => {
    window.__GDS_ACTIONS = updated;
    setActions([...updated]);
  };

  const showToast = (msg, type='success') => {
    setToast({msg,type}); setTimeout(()=>setToast(null),2800);
  };

  const openAdd = (prefill={}) => {
    setForm({...emptyForm, ...prefill, id: Date.now(), createdAt: new Date().toLocaleDateString('id-ID')});
    setModal('add');
  };

  const handleSave = () => {
    if (!form.title.trim()) { showToast('Judul action wajib diisi','error'); return; }
    if (!form.responsible.trim()) { showToast('Responsible person wajib diisi','error'); return; }
    if (!form.deadline) { showToast('Deadline wajib diisi','error'); return; }
    if (modal==='add') {
      const newActions = [...actions, {...form, id:Date.now(), createdAt:new Date().toLocaleDateString('id-ID')}];
      persist(newActions); showToast('Action berhasil ditambahkan');
    } else {
      const updated = actions.map(a => a.id===selected.id ? {...form} : a);
      persist(updated); showToast('Action berhasil diupdate');
    }
    setModal(null); setSelected(null);
  };

  const handleDelete = () => {
    persist(actions.filter(a=>a.id!==selected.id));
    showToast('Action dihapus','info'); setModal(null); setSelected(null);
  };

  const updateStatus = (id, status) => {
    persist(actions.map(a => a.id===id ? {...a, status, completedAt: status==='Completed'?new Date().toLocaleDateString('id-ID'):undefined} : a));
  };

  // Filter & sort
  const today = new Date(); today.setHours(0,0,0,0);
  const isOverdue = (a) => a.status!=='Completed' && a.deadline && new Date(a.deadline) < today;

  const filtered = useMemo(() => {
    return actions
      .filter(a => filterStatus==='All' || a.status===filterStatus)
      .filter(a => filterPriority==='All' || a.priority===filterPriority)
      .filter(a => filterKPI==='All' || a.kpi===filterKPI)
      .filter(a => !searchQ || a.title.toLowerCase().includes(searchQ.toLowerCase()) || a.responsible.toLowerCase().includes(searchQ.toLowerCase()))
      .sort((a,b) => {
        if (sortField==='deadline') return (a.deadline||'9999') > (b.deadline||'9999') ? 1:-1;
        if (sortField==='priority') return ACTION_PRIORITIES.indexOf(a.priority) - ACTION_PRIORITIES.indexOf(b.priority);
        return 0;
      });
  }, [actions, filterStatus, filterPriority, filterKPI, searchQ, sortField]);

  // Dashboard counts
  const counts = useMemo(() => ({
    total:     actions.length,
    open:      actions.filter(a=>a.status==='Open').length,
    inProgress:actions.filter(a=>a.status==='In Progress').length,
    completed: actions.filter(a=>a.status==='Completed').length,
    overdue:   actions.filter(a=>isOverdue(a)).length,
    critical:  actions.filter(a=>a.priority==='Critical'&&a.status!=='Completed').length,
  }), [actions]);

  const completionRate = actions.length ? Math.round(counts.completed/actions.length*100) : 0;

  const CARD_STYLE = (active) => ({
    padding:'6px 14px', borderRadius:6, border:'none', cursor:'pointer',
    fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono'",
    background: active ? T.accent : T.border,
    color: active ? '#080C12' : T.muted,
  });

  const INPUT_STYLE = {
    width:'100%', background:T.bg, border:`1px solid ${T.border}`, borderRadius:6,
    padding:'8px 10px', color:T.text, fontSize:12, fontFamily:'inherit', outline:'none',
    boxSizing:'border-box',
  };
  const LABEL_STYLE = {color:T.muted, fontSize:9, letterSpacing:2, textTransform:'uppercase', fontFamily:"'IBM Plex Mono'", marginBottom:5, display:'block'};

  // ── Board view columns ─────────────────────────────────────────
  const boardCols = ACTION_STATUSES.map(status => ({
    status,
    items: filtered.filter(a=>a.status===status),
    color: STATUS_COLOR[status],
  }));

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',top:20,right:24,zIndex:9999,padding:'10px 18px',borderRadius:8,
          background:toast.type==='error'?T.red:toast.type==='info'?T.accent:T.green,
          color:'#fff',fontSize:12,fontFamily:"'IBM Plex Mono'",fontWeight:700,
          boxShadow:'0 4px 20px rgba(0,0,0,0.3)',animation:'slideIn 0.2s ease'}}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{t('act_title')}</div>
          <div style={{color:T.muted,fontSize:11}}>Insights → Actions → Results · {counts.total} total actions · {completionRate}% completed</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {['dashboard','board','list'].map(v=>(
            <button key={v} style={CARD_STYLE(activeView===v)} onClick={()=>setActiveView(v)}>
              {v==='dashboard'?'📊':v==='board'?'🗂':'📋'} {v.charAt(0).toUpperCase()+v.slice(1)}
            </button>
          ))}
          <button onClick={()=>openAdd()}
            style={{padding:'8px 16px',borderRadius:7,border:'none',
              background:'linear-gradient(135deg,#00D4FF,#00897B)',color:'#080C12',
              fontSize:12,fontWeight:800,fontFamily:"'IBM Plex Mono'",cursor:'pointer'}}>
            + New Action
          </button>
        </div>
      </div>

      {/* ══ DASHBOARD VIEW ══ */}
      {activeView==='dashboard' && (
        <div>
          {/* KPI Strip */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:16}} className="r-grid-4">
            {[
              {l:'Total',    v:counts.total,     c:T.accent},
              {l:'Open',     v:counts.open,      c:T.red},
              {l:'In Progress',v:counts.inProgress,c:T.yellow},
              {l:'Completed',v:counts.completed, c:T.green},
              {l:'Overdue',  v:counts.overdue,   c:'#F97316'},
              {l:'Critical', v:counts.critical,  c:T.red},
            ].map(k=>(
              <div key={k.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,
                padding:'12px 14px',borderTop:`2px solid ${k.c}`}}>
                <div style={{fontSize:9,color:T.muted,letterSpacing:1,textTransform:'uppercase',fontFamily:"'IBM Plex Mono'",marginBottom:4}}>{k.l}</div>
                <div style={{fontSize:22,fontWeight:700,color:k.c,fontFamily:"'IBM Plex Mono'"}}>{k.v}</div>
              </div>
            ))}
          </div>

          {/* Progress bar */}
          <Card style={{marginBottom:14,padding:'14px 18px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{color:T.text,fontSize:12,fontWeight:700}}>Overall Completion Rate</span>
              <span style={{color:T.green,fontSize:16,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{completionRate}%</span>
            </div>
            <div style={{height:10,background:T.border,borderRadius:5,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${completionRate}%`,borderRadius:5,
                background:'linear-gradient(90deg,#00D4FF,#22C55E)',transition:'width 0.5s'}}/>
            </div>
            <div style={{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}}>
              {ACTION_STATUSES.map(s=>{
                const n=actions.filter(a=>a.status===s).length;
                const pct=actions.length?Math.round(n/actions.length*100):0;
                return <span key={s} style={{fontSize:10,color:STATUS_COLOR[s],fontFamily:"'IBM Plex Mono'"}}>
                  {s}: {n} ({pct}%)
                </span>;
              })}
            </div>
          </Card>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">
            {/* By KPI */}
            <Card style={{padding:'14px 16px'}}>
              <SectionTitle>ACTIONS BY KPI</SectionTitle>
              {ACTION_KPIS.filter(k=>actions.some(a=>a.kpi===k)).map(kpi=>{
                const total=actions.filter(a=>a.kpi===kpi).length;
                const done=actions.filter(a=>a.kpi===kpi&&a.status==='Completed').length;
                return (
                  <div key={kpi} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:10,color:T.sub}}>{kpi}</span>
                      <span style={{fontSize:10,color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{done}/{total}</span>
                    </div>
                    <div style={{height:5,background:T.border,borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${total?done/total*100:0}%`,background:T.green,borderRadius:3}}/>
                    </div>
                  </div>
                );
              })}
              {!actions.some(()=>true) && <div style={{color:T.muted,fontSize:11,textAlign:'center',padding:'20px 0'}}>Belum ada actions</div>}
            </Card>

            {/* By Priority */}
            <Card style={{padding:'14px 16px'}}>
              <SectionTitle>PRIORITY BREAKDOWN</SectionTitle>
              {ACTION_PRIORITIES.map(p=>{
                const open=actions.filter(a=>a.priority===p&&a.status!=='Completed').length;
                const done=actions.filter(a=>a.priority===p&&a.status==='Completed').length;
                const c=PRIORITY_COLOR[p];
                return (
                  <div key={p} style={{display:'flex',alignItems:'center',gap:12,padding:'7px 0',borderBottom:`1px solid ${T.border}`}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:c,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:11,color:T.sub}}>{p}</span>
                    <span style={{fontSize:10,fontFamily:"'IBM Plex Mono'",color:c,fontWeight:700}}>{open} open</span>
                    <span style={{fontSize:10,fontFamily:"'IBM Plex Mono'",color:T.green}}>{done} done</span>
                  </div>
                );
              })}
            </Card>
          </div>

          {/* Overdue alert */}
          {counts.overdue>0 && (
            <div style={{marginTop:12,padding:'12px 16px',background:`${T.red}0d`,borderRadius:9,
              border:`1px solid ${T.red}30`,borderLeft:`3px solid ${T.red}`}}>
              <div style={{color:T.red,fontSize:12,fontWeight:700,marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>
                ⚠ {counts.overdue} Action Overdue
              </div>
              {actions.filter(a=>isOverdue(a)).map(a=>(
                <div key={a.id} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',
                  borderBottom:`1px solid ${T.red}15`,fontSize:11,color:T.sub}}>
                  <span>{a.title}</span>
                  <span style={{color:T.red,fontFamily:"'IBM Plex Mono'"}}>{a.deadline} · {a.responsible}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ══ BOARD VIEW ══ */}
      {activeView==='board' && (
        <div>
          {/* Filters */}
          <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
            <input placeholder="🔍 Cari action..." value={searchQ} onChange={e=>setSearchQ(e.target.value)}
              style={{...INPUT_STYLE, width:'100%', padding:'6px 10px'}}/>
            {[
              {label:'Status', val:filterStatus, set:setFilterStatus, opts:['All',...ACTION_STATUSES]},
              {label:'Priority',val:filterPriority,set:setFilterPriority,opts:['All',...ACTION_PRIORITIES]},
            ].map(f=>(
              <select key={f.label} value={f.val} onChange={e=>f.set(e.target.value)}
                style={{...INPUT_STYLE,width:'auto',padding:'6px 10px'}}>
                {f.opts.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            ))}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}} className="r-grid-3">
            {boardCols.map(col=>(
              <div key={col.status}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',

// ── Detect period from filename ───────────────────────────────────
function detectPeriodFromFilename(name) {
  const upper = name.toUpperCase();
  // Patterns: TB_2026_01, TB_202601, 2026-01, Jan2026, January2026
  const patterns = [
    /TB[_\-]?(\d{4})[_\-]?(\d{2})/i,
    /(\d{4})[_\-](\d{2})/,
    /(\d{4})(\d{2})(?!\d)/,
  ];
  for (const p of patterns) {
    const m = name.match(p);
    if (m) {
      const yr = m[1], mo = m[2].padStart(2,'0');
      if (parseInt(yr) >= 2013 && parseInt(yr) <= 2030 && parseInt(mo) >= 1 && parseInt(mo) <= 12) {
        return { year: yr, month: mo, key: `${yr}-${mo}`, label: `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]} ${yr}` };
      }
    }
  }
  // Month name patterns
  const months = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  for (const [mn, mo] of Object.entries(months)) {
    const re = new RegExp(`(${mn}\\w*)[\\.\\s_\\-]*(\\d{4})|(\\d{4})[\\.\\s_\\-]*(${mn}\\w*)`, 'i');
    const m = name.match(re);
    if (m) {
      const yr = m[2]||m[3];
      return { year: yr, month: mo, key: `${yr}-${mo}`, label: `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]} ${yr}` };
    }
  }
  return null;
}

// ── Parse CSV ─────────────────────────────────────────────────────
function parseCSV(text) {
  // Proper CSV parser — handles quoted fields with embedded commas
  function splitCSVLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; } // escaped quote
        else inQ = !inQ;
      } else if ((ch === ',' || ch === ';' || ch === '\t') && !inQ) {
        result.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    result.push(cur.trim());
    return result;
  }
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.replace(/^\"|"$/g,'').toLowerCase().trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = splitCSVLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = vals[i] !== undefined ? vals[i].replace(/^\"|"$/g,'') : ''; });
    return row;
  });
}
// ── Parse number from string ──────────────────────────────────────
// Handles: integers, decimals, scientific notation (5.68e+8 → 568000000),
//          accounting negatives (126,478.73) → positive debit value,
//          comma-separated thousands, spaces, SheetJS CSV output formats
function parseNum(v) {
  if (v===undefined||v===null||v==='') return 0;
  let s = String(v).trim();
  // Accounting format parentheses: (1,234.56) → -1234.56  
  if (s.startsWith('(') && s.endsWith(')')) s = '-' + s.slice(1,-1);
  // Remove thousand-separator commas and whitespace
  s = s.replace(/,/g,'').replace(/\s/g,'');
  // parseFloat handles scientific notation natively: 5.68e+8 → 568000000
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// ── Map rows → TB data object ─────────────────────────────────────
function mapRowsToTB(rows) {
  const ACCT_RE = /^\d{3}-\d{2}-\d{3,}$/;
  let codeCol = null, debitCol = null, creditCol = null, descCol = null;

  // Strategy 1: named headers
  const firstKeys = Object.keys(rows[0] || {}).map(k => k.toLowerCase());
  const findNamed = (...cands) => { for(const c of cands){ const f=firstKeys.find(k=>k.includes(c)); if(f) return f; } return null; };
  if (firstKeys.some(k => ['account','kode','code','acc'].some(c => k.includes(c)))) {
    codeCol   = findNamed('account no','account','kode','code','acc','no','nomor');
    debitCol  = findNamed('net change','total debit','debit','dr','debet','net');
    creditCol = findNamed('total credit','credit','cr','kredit');
    descCol   = findNamed('desc','description','name','keterangan','nama','uraian');
  }

  // Strategy 2: SheetJS numeric-keyed rows
  if (!codeCol) {
    const colAcctCount = {}, colNumCount = {};
    const sampleRows = rows.slice(0, Math.min(rows.length, 600));
    sampleRows.forEach(row => {
      Object.entries(row).forEach(([col, val]) => {
        const s = String(val || '').trim();
        if (ACCT_RE.test(s)) colAcctCount[col] = (colAcctCount[col]||0) + 1;
        if (/^\d{4,}(\.\d+)?$/.test(s) && parseFloat(s) > 100) colNumCount[col] = (colNumCount[col]||0) + 1;
      });
    });
    const acctEntries = Object.entries(colAcctCount).sort((a,b)=>b[1]-a[1]);
    if (acctEntries.length > 0) codeCol = acctEntries[0][0];
    const numEntries = Object.entries(colNumCount)
      .filter(([col]) => col !== codeCol)
      .sort((a,b) => parseInt(a[0])-parseInt(b[0]));
    if (codeCol) {
      const codeColIdx = parseInt(codeCol);
      descCol = String(codeColIdx + 1);
      const numAfterCode = numEntries.filter(([col])=>parseInt(col)>codeColIdx);
      if (numAfterCode.length >= 1) debitCol  = numAfterCode[0][0];
      if (numAfterCode.length >= 2) creditCol = numAfterCode[1][0];
      if (codeCol === '1') { debitCol = '14'; creditCol = '11'; } // VHP TB: col14=Net Change, col11=Total Credit
    }
  }

  if (!codeCol) return { tb:{}, totalDebit:0, totalCredit:0, unmapped:[] };

  // Parse number preserving sign — VHP uses parentheses for negatives: (6,580,523.05)
  const parseNumSigned = (v) => {
    if (v === null || v === undefined || v === '') return 0;
    const s = String(v).replace(/[,\s]/g,'').replace(/^\((.+)\)$/, '-$1');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  };

  const BS_PREFIXES = new Set([
    '110','111','112','113','120','121','122','130','140','141','142',
    '150','160','170','180','190','193','200','210','220','230','240',
    '250','260','270','280','290','300','310','320','330','340','350',
  ]);

  let totalDebit = 0, totalCredit = 0;
  const tb = {};
  const unmapped = [];

  rows.forEach(row => {
    let code   = codeCol ? String(row[codeCol]||'').trim() : '';
    const desc = descCol ? String(row[descCol]||'').trim() : '';
    if (!code || code.length < 3) return;
    if (/^\d+$/.test(code)) return;

    // Use absolute values for D/C validation totals only
    const debitAbs  = Math.abs(parseNumSigned(debitCol  ? row[debitCol]  : 0));
    const creditAbs = Math.abs(parseNumSigned(creditCol ? row[creditCol] : 0));
    totalDebit  += debitAbs;
    totalCredit += creditAbs;

    const pfx3 = code.length >= 3 ? code.substring(0, 3) : '';
    if (BS_PREFIXES.has(pfx3)) return;

    // Net change value (signed) — this is the key value for all P&L accounts
    const netChange = parseNumSigned(debitCol ? row[debitCol] : 0);

    // ── 800-xx-xxx non-operating ─────────────────────────────
    if (pfx3 === '800') {
      const field = TB_800_MAP[code] || 'otherNonOp';
      // Use signed net change directly:
      // positive = expense (debit > credit), negative = income (credit > debit)
      tb[field] = (tb[field] || 0) + netChange / 1e9;
      return;
    }

    // ── 900-xx-xxx statistics ────────────────────────────────
    if (pfx3 === '900') {
      const STAT_MAP = {
        '900-14-060': 'avail',
        '900-14-110': 'occ',
        '900-14-290': 'arr',
        '900-14-320': 'fbCover',
      };
      const statField = STAT_MAP[code];
      if (statField) {
        const rawVal = Math.abs(netChange);
        if (rawVal > 0) tb[statField] = rawVal;
      }
      return;
    }

    // ── Standard P&L mapping ─────────────────────────────────
    const mapping = TB_FIELD_MAP[pfx3];
    if (mapping) {
      // Use signed net change directly — VHP TB net change column is already signed
      // Revenue: positive (credit-dominant) → stored positive ✓
      // Expense: positive (debit-dominant) → stored positive ✓
      // Contra (distribution): negative → reduces parent field ✓
      tb[mapping] = (tb[mapping] || 0) + netChange / 1e9;
    } else if (code && desc) {
      unmapped.push({ code, desc, debit: debitAbs, credit: creditAbs });
    }
  });

  // Post-process OCC: convert room count → percentage
  if (tb.avail && tb.avail > 0 && tb.occ && tb.occ > 1) {
    tb.occ = Math.round(tb.occ / tb.avail * 1000) / 10;
  }

  return { tb, totalDebit, totalCredit, unmapped };
}

// ── Validate balance ──────────────────────────────────────────────
function validateBalance(totalDebit, totalCredit) {
  const diff = Math.abs(totalDebit - totalCredit);
  const threshold = Math.max(totalDebit, totalCredit) * 0.001; // 0.1% tolerance
  return { balanced: diff <= threshold, diff, totalDebit, totalCredit };
}

function TBImportPage({ currentUser, onImportDone }) {
  const [step,         setStep]         = useState('upload');   // upload|preview|confirm|result
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [file,         setFile]         = useState(null);
  const [fileName,     setFileName]     = useState('');
  const [fileSize,     setFileSize]     = useState(0);
  const [rawRows,      setRawRows]      = useState([]);
  const [parsedTB,     setParsedTB]     = useState(null);
  const [validation,   setValidation]   = useState(null);
  const [detectedPeriod, setDetectedPeriod] = useState(null);
  const [manualYear,   setManualYear]   = useState('2026');
  const [manualMonth,  setManualMonth]  = useState('02');
  const [useManual,    setUseManual]    = useState(false);
  const [periodConflict, setPeriodConflict] = useState(false);
  const [conflictChoice, setConflictChoice] = useState(null); // 'replace'|'cancel'
  const [importing,    setImporting]    = useState(false);
  const [importLog,    setImportLog]    = useState(window.__GDS_TB_IMPORT_LOG || []);
  const [parseError,   setParseError]   = useState('');
  const [unmapped,     setUnmapped]     = useState([]);
  const [dragOver,     setDragOver]     = useState(false);
  const [activeTab,    setActiveTab]    = useState('import');   // import|history|mapping

  const ML12 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const effectivePeriod = useMemo(() => {
    if (useManual || !detectedPeriod) {
      const key = `${manualYear}-${manualMonth}`;
      return { year: manualYear, month: manualMonth, key, label: `${ML12[parseInt(manualMonth)-1]} ${manualYear}` };
    }
    return detectedPeriod;
  }, [useManual, manualYear, manualMonth, detectedPeriod]);

  // Re-check period conflict whenever effectivePeriod changes (e.g. user overrides manually)
  useEffect(() => {
    if (step === 'preview' || step === 'confirm') {
      const tbRef = window.__TB_REF;
      const exists = !!(tbRef && tbRef[effectivePeriod.key]);
      setPeriodConflict(exists);
      setConflictChoice(null);
    }
  }, [effectivePeriod.key, step]);
  const processFile = useCallback(async (f) => {
    setParseError('');
    setStep('upload');
    setFile(f);
    setFileName(f.name);
    setFileSize(f.size);

    const detected = detectPeriodFromFilename(f.name);
    setDetectedPeriod(detected);
    setUseManual(!detected);

    try {
      const text = await f.text();
      let rows = [];

      if (f.name.toLowerCase().endsWith('.csv') || f.type.includes('csv')) {
        rows = parseCSV(text);
      } else if (f.name.match(/\.xlsx?$/i)) {
        // For XLS/XLSX: try parsing as CSV first (some tools export xlsx as csv)
        // Real XLSX needs SheetJS — try to use it if available
        if (typeof XLSX !== 'undefined') {
          const ab = await f.arrayBuffer();
          const wb = XLSX.read(ab, {type:'array'});
          const ws = wb.Sheets[wb.SheetNames[0]];
          // Use sheet_to_json with header:1 → array of arrays (no header assumption)
          const aoaRaw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
          // Find the header row: scan for row containing 'Account No'
          let hdrIdx = -1;
          for (let ri = 0; ri < Math.min(aoaRaw.length, 400); ri++) {
            const rowVals = aoaRaw[ri].map(v => String(v||'').toLowerCase().trim());
            if (rowVals.some(v => v === 'account no' || v === 'account' || v === 'kode akun')) {
              hdrIdx = ri; break;
            }
          }
          if (hdrIdx >= 0) {
            const hdrs = aoaRaw[hdrIdx].map(v => String(v||'').toLowerCase().trim());
            rows = aoaRaw.slice(hdrIdx + 1).map(rowArr => {
              const obj = {};
              hdrs.forEach((h, ci) => { obj[h] = rowArr[ci] !== undefined ? String(rowArr[ci]) : ''; });
              return obj;
            });
          } else {
            // Fallback: use sheet_to_csv
            const csv = XLSX.utils.sheet_to_csv(ws);
            rows = parseCSV(csv);
          }
        } else {
          // Fallback: try as text
          rows = parseCSV(text);
          if (!rows.length) {
            setParseError('File Excel memerlukan library SheetJS. Coba export sebagai CSV terlebih dahulu.');
            return;
          }
        }
      } else {
        rows = parseCSV(text);
      }

      if (!rows.length) {
        setParseError('File tidak dapat dibaca atau kosong. Pastikan format kolom benar.');
        return;
      }

      setRawRows(rows);
      const { tb, totalDebit, totalCredit, unmapped: um } = mapRowsToTB(rows);
      setParsedTB(tb);
      setUnmapped(um);
      const val = validateBalance(totalDebit, totalCredit);
      setValidation(val);

      // Check period conflict — use window.__TB_REF which points to actual TB object
      const pKey = detected ? detected.key : `${manualYear}-${manualMonth}`;
      const tbRef = window.__TB_REF;
      const exists = !!(tbRef && tbRef[pKey]);
      setPeriodConflict(exists);
      setConflictChoice(null);
      setStep('preview');
    } catch(err) {
      setParseError('Error membaca file: ' + err.message);
    }
  }, [manualYear, manualMonth]);

  const handleDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (f) processFile(f);

    setImporting(true);

        const tbTarget = window.__TB_REF;

        // Preserve operational metrics (avail/occ/arr):

        if (tbTarget && tbTarget[pKey]) {

          if (!tbData.arr)     tbData.arr     = tbTarget[pKey].arr;
          if (!tbData.fbCover) tbData.fbCover = tbTarget[pKey].fbCover;
        }
        // Ensure sinkFund is 0 if not present (legacy field, no longer used)
        if (!tbData.sinkFund) tbData.sinkFund = 0;

        // Mutate the actual TB object directly — same object all modules read from
        if (tbTarget) {
          tbTarget[pKey] = tbData;
        }

        const logEntry = {

          rows:        rawRows.length,
          balanced:    (validation&&validation.balanced),
          totalDebit:  (validation&&validation.totalDebit),
          totalCredit: (validation&&validation.totalCredit),
          action:      periodConflict ? 'REVISI' : 'NEW',
          status:      'SUCCESS',
        };
        window.__GDS_TB_IMPORT_LOG = [logEntry, ...(window.__GDS_TB_IMPORT_LOG||[])].slice(0,50);
        setImportLog([...window.__GDS_TB_IMPORT_LOG]);

        // Trigger recalculation — fires onImportDone callback which increments recalcKey in App
        // This causes all data-dependent modules to re-mount and re-read the updated TB
        window.__GDS_RECALC_PERIOD = effectivePeriod.key;
        setImporting(false);
        setStep('result');
        // Call parent callback AFTER state update — setTimeout ensures render cycle completes
        setTimeout(() => { if (onImportDone) onImportDone(); }, 50);
      } catch(err) {
        setImporting(false);
        setParseError('Import gagal: ' + err.message);
        setStep('preview');
      }
    }, 1200);
  };

  const handleReset = () => {
    setStep('upload');
    setFile(null);
    setFileName('');
    setRawRows([]);
    setParsedTB(null);
    setValidation(null);
    setDetectedPeriod(null);
    setParseError('');
    setUnmapped([]);
    setConflictChoice(null);
    setPeriodConflict(false);
  };

  // ── UI helpers ────────────────────────────────────────────────
  const safe = n => (n===undefined||n===null||isNaN(n))?0:n;
  const fB = n => { const a=Math.abs(n)*1000; return n<0?`(${a>=1?a.toFixed(1)+'M':(a*1000).toFixed(0)+'K'})`:(a>=1?a.toFixed(1)+'M':(a*1000).toFixed(0)+'K'); };
  const fIDR = n => { const a=Math.abs(n); return (a>=1e9?(a/1e9).toFixed(2)+'B':a>=1e6?(a/1e6).toFixed(1)+'M':a>=1e3?(a/1e3).toFixed(0)+'K':a.toFixed(0))+' IDR'; };

  const TAB = (k,l,ic) => (
    <button onClick={()=>setActiveTab(k)}
      style={{padding:'7px 16px',borderRadius:6,border:'none',cursor:'pointer',
        fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'",
        background:activeTab===k?T.accent:T.border,
        color:activeTab===k?'#080C12':T.muted}}>
      {ic} {l}
    </button>
  );

  const STEP_INDICATOR = () => {
    const steps = [
      {k:'upload',  n:1, l:'Upload File'},
      {k:'preview', n:2, l:'Preview & Validate'},
      {k:'confirm', n:3, l:'Confirm Import'},
      {k:'result',  n:4, l:'Done'},
    ];
    const idx = steps.findIndex(s=>s.k===step);
    return (
      <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:20}}>
        {steps.map((s,i)=>(
          <React.Fragment key={s.k}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'",flexShrink:0,
                background:i<idx?T.green:i===idx?T.accent:T.border,
                color:i<=idx?'#080C12':T.muted}}>

              </div>
              <span style={{fontSize:10,fontFamily:"'IBM Plex Mono'",color:i===idx?T.text:i<idx?T.green:T.muted,whiteSpace:'nowrap'}}>{s.l}</span>
            </div>
            {i<steps.length-1 && (
              <div style={{flex:1,height:2,background:i<idx?T.green:T.border,margin:'0 8px',minWidth:16}}/>
            )}
          </React.Fragment>
        ))}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════════

      </div>

      {/* ══ TAB: IMPORT ══ */}
      {activeTab==='import' && (
        <div style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:16}} className="r-grid-2">
          {/* LEFT: Main import flow */}
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <STEP_INDICATOR/>

            {/* ── STEP: UPLOAD ── */}
            {step==='upload' && (
              <Card>
                <div style={{color:T.muted,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",marginBottom:14,textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}>

                  <div style={{fontSize:40,marginBottom:12}}>📂</div>
