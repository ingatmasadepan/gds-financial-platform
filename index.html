      </Card>
    </div>
  );
}

function AIPage() {
  const avgRev25 = aggKeys(mKeys25).rev/12;
  const avgPay25 = aggKeys(mKeys25).deptPay/12;

  const alerts = mKeys25.map(k=>{
    const d=pnl(TB[k]); const m=k.slice(5);
    const results=[];
    if(d.rev < avgRev25*0.88) results.push({sev:'warning',type:'Revenue Drop',msg:`Revenue ${fM(d.rev)} — ${((avgRev25-d.rev)/avgRev25*100).toFixed(1)}% below 2025 average. Possible low occupancy or seasonal dip.`});
    if(d.deptPay > avgPay25*1.08) results.push({sev:'critical',type:'Cost Spike',msg:`Payroll ${fM(d.deptPay)} — ${((d.pa-avgPay25)/Math.max(avgPay25,0.001)*100).toFixed(1)}% above avg. Review staffing level vs occupancy.`});
    if(d.gopMgn < 35)       results.push({sev:'info',type:'Margin Watch',msg:`EBITDA Margin ${fP(d.gopMgn)} — below 35% threshold. Monitor OpEx.`});
    return results.map(r=>({...r,period:k,month:ML[parseInt(m)-1]+' 2025'}));
  }).flat().slice(0,8);

  // Feb 2026 anomalies
  const feb26=pnl(TB['2026-02']);
  const feb26Bud=pnl(BUD26['2026-02']);
  const extraAlerts=[
    {sev:'warning',type:'Budget Variance',period:'2026-02',month:'Feb 2026',msg:`Revenue ${fM(feb26.rev)} vs Budget ${fM(feb26Bud.rev)} — ${((feb26.rev-feb26Bud.rev)/feb26Bud.rev*100).toFixed(1)}% variance. Monitor Jan–Feb seasonality.`},
    {sev:'info',type:'Payroll Ratio',period:'2026-02',month:'Feb 2026',msg:`Payroll ratio ${fP(feb26.payRat)} — within normal range. Continue monitoring vs. budget target <32%.`},
    {sev:'success',type:'Cost Control',period:'2026-01',month:'Jan 2026',msg:`Total expenses Jan 2026: ${fM(pnl(TB['2026-01']).cos)} — controlled. D/E ratio improving year-on-year.`},
  ];
  const allAlerts=[...alerts,...extraAlerts];
  const sevColor2={'critical':T.red,'warning':T.yellow,'info':T.accent,'success':T.green};
  const sevIcon ={'critical':'🔴','warning':'⚠️','info':'💡','success':'✅'};

  const anomalyCount={critical:allAlerts.filter(a=>a.sev==='critical').length,warning:allAlerts.filter(a=>a.sev==='warning').length,info:allAlerts.filter(a=>a.sev==='info').length,success:allAlerts.filter(a=>a.sev==='success').length};

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>AI Financial Intelligence</div>
        <div style={{color:T.muted,fontSize:11}}>Automated anomaly detection & financial insights · 2025–2026</div>
      </div>
      {/* Summary row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        {[['🔴','Critical',anomalyCount.critical,T.red],['⚠','Warning',anomalyCount.warning,T.yellow],['💡','Insights',anomalyCount.info,T.accent],['✅','Positive',anomalyCount.success,T.green]].map(([ic,l,n,c])=>(
          <Card key={l} style={{padding:'14px',borderLeft:`3px solid ${c}`,display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:24}}>{ic}</span>
            <div>
              <div style={{color:c,fontSize:20,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{n}</div>
              <div style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{l}</div>
            </div>
          </Card>
        ))}
      </div>
      {/* Alerts */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {allAlerts.map((a,i)=>(
          <Card key={i} style={{borderLeft:`3px solid ${sevColor2[a.sev]||T.muted}`,padding:'14px 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:14}}>{sevIcon[a.sev]||'ℹ'}</span>
                <span style={{color:sevColor2[a.sev],fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{a.type}</span>
              </div>
              <span style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{a.month}</span>
            </div>
            <p style={{color:T.sub,fontSize:11,fontFamily:"'IBM Plex Sans'",lineHeight:1.5,margin:0}}>{a.msg}</p>
          </Card>
        ))}
      </div>
    </div>
  );
}

// REPORT GENERATOR (plain JS — outside JSX to avoid Babel issues)
// ══════════════════════════════════════════════════════════════════
function generateReportHTML(selPeriod, selReport, isDarkMode) {
  // ── Resolve period keys ───────────────────────────────────────────
  var isMonthly = selPeriod.length === 7;  // e.g. '2025-03'
  var isAnn     = !isMonthly;
  var yr        = isMonthly ? selPeriod.slice(0,4) : selPeriod;
  var mi        = isMonthly ? parseInt(selPeriod.slice(5))-1 : 11;
  var MONTH_LABELS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var MONTH_SHORT  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var ML2 = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];

  function getAnnKeys(y) {
    if(y==='2024') return mKeys24;
    if(y==='2025') return mKeys25;
    if(y==='2026') return mKeys26_ytd;
    return null; // 2013-2023: use ANN data
  }

  var pnlKeys, d, periodLabel, periodSub;
  if(isMonthly) {
    pnlKeys    = [selPeriod];
    d          = TB[selPeriod] ? pnl(TB[selPeriod]) : pnl({});
    periodLabel= MONTH_LABELS[mi]+' '+yr;
    periodSub  = 'Monthly Financial Statement';
  } else {
    pnlKeys = getAnnKeys(yr);
    d = pnlKeys ? aggKeys(pnlKeys) : (ANN[yr] ? pnl(ANN[yr]) : pnl({}));
    periodLabel = yr === '2026' ? 'Year 2026 (YTD Jan–Feb)' : 'Full Year '+yr;
    periodSub   = 'Annual Financial Statement';
  }

  // ── Balance Sheet keys ───────────────────────────────────────────
  function bsKey(y, mo) {
    var ANNMAP = {2013:'dec13',2014:'dec14',2015:'dec15',2016:'dec16',2017:'dec17',
      2018:'dec18',2019:'dec19',2020:'dec20',2021:'dec21',2022:'dec22',2023:'dec23'};
    if(parseInt(y) < 2024) return ANNMAP[parseInt(y)];
    if(y==='2026') return mo===0?'jan26':'feb26';
    return ML2[mo]+y.slice(2);
  }
  function bsPrevKey(y, mo) {
    var ANNMAP = {2012:null,2013:null,2014:'dec13',2015:'dec14',2016:'dec15',2017:'dec16',
      2018:'dec17',2019:'dec18',2020:'dec19',2021:'dec20',2022:'dec21',2023:'dec22'};
    if(parseInt(y) < 2024) return ANNMAP[parseInt(y)];
    if(isMonthly && mo===0) {
      if(y==='2024') return 'dec23';
      if(y==='2025') return 'dec24';
      if(y==='2026') return 'dec25';
    }
    if(isMonthly) return ML2[mo-1]+y.slice(2);
    if(y==='2024') return 'dec23';
    if(y==='2025') return 'dec24';
    if(y==='2026') return 'dec25';
    return null;
  }
  var bsNowKey  = isMonthly ? bsKey(yr,mi) : bsKey(yr,11);
  var bsPrvKey  = isMonthly ? bsPrevKey(yr,mi) : bsPrevKey(yr,11);
  var bs  = bsCalc(BS_SNAPSHOTS[bsNowKey]  || {cash:0,ar:0,inv:0,pre:0,fixG:0,accD:0,otNA:0,ap:0,acc:0,advDep:0,taxPay:0,dTMgmt:0,othCL:0,pic:0,re:0});
  var bsp = bsCalc(BS_SNAPSHOTS[bsPrvKey]  || {cash:0,ar:0,inv:0,pre:0,fixG:0,accD:0,otNA:0,ap:0,acc:0,advDep:0,taxPay:0,dTMgmt:0,othCL:0,pic:0,re:0});

  // ── Cash Flow ────────────────────────────────────────────────────
  var cfNetInc  = d.nop;
  var cfDepr    = d.deprTotal||0;
  var cfDAR     = -(bs.ar   - bsp.ar);
  var cfDInv    = -(bs.inv  - bsp.inv);
  var cfDPre    = -(bs.pre  - bsp.pre);
  var cfDAP     =  (bs.ap   - bsp.ap);
  var cfDAcc    =  (bs.acc  - bsp.acc);
  var cfDDep    =  ((bs.advDep||0) - (bsp.advDep||0));
  var cfDTax    =  ((bs.taxPay||0) - (bsp.taxPay||0));
  var cfOpCF    = cfNetInc+cfDepr+cfDAR+cfDInv+cfDPre+cfDAP+cfDAcc+cfDDep+cfDTax;
  var cfInvCF   = -(bs.fixG - bsp.fixG);
  var cfFinCF   = -((bs.dTMgmt||0) - (bsp.dTMgmt||0));
  var cfNet     = cfOpCF+cfInvCF+cfFinCF;

  // ── Helpers ──────────────────────────────────────────────────────
  var today = new Date();
  var months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  var dateStr = today.getDate()+' '+months[today.getMonth()]+' '+today.getFullYear();

  function fV(n, decimals) {
    if(n===undefined||n===null||isNaN(n)||!isFinite(n)) return '—';
    var abs=Math.abs(n); var neg=n<0;
    var m=abs*1000; // B→M
    var s;
    if(abs<0.001) return '—';
    if(m>=1000)      s=(m/1000).toFixed(1)+'B';
    else if(m>=100)  s=Math.round(m)+'M';
    else if(m>=10)   s=m.toFixed(1)+'M';
    else             s=m.toFixed(2)+'M';
    return (neg?'('+s+')':s);
  }
  function fPct(n) {
    if(!isFinite(n)||isNaN(n)) return '—';
    return (n>=0?'':'')+n.toFixed(1)+'%';
  }
  function clrN(n) { return n>=0?'#10B981':'#EF4444'; }
  function clrNeg(n) { return n<=0?'#10B981':'#EF4444'; } // lower is better

  // ── Theme ────────────────────────────────────────────────────────
  var isDark = isDarkMode;
  var C = isDark ? {
    bg:'#080C12', card:'#0D1520', border:'#1A2535', borderLight:'#243044',
    accent:'#00D4FF', accent2:'#00897B', text:'#E2E8F0', muted:'#4A5568',
    sub:'#94A3B8', green:'#10B981', red:'#EF4444', yellow:'#EAB308',
    row1:'#0D1520', row2:'#0A111C', rowHdr:'rgba(0,212,255,0.08)',
    print:'#080C12'
  } : {
    bg:'#FFFFFF', card:'#F8FAFC', border:'#E2E8F0', borderLight:'#CBD5E1',
    accent:'#0369A1', accent2:'#047857', text:'#0F172A', muted:'#94A3B8',
    sub:'#475569', green:'#16A34A', red:'#DC2626', yellow:'#CA8A04',
    row1:'#FFFFFF', row2:'#F8FAFC', rowHdr:'#EFF6FF',
    print:'#FFFFFF'
  };

  // ── CSS ──────────────────────────────────────────────────────────
  var css = `
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:${C.bg};color:${C.text};font-size:12px;line-height:1.5}
    .page{max-width:900px;margin:0 auto;padding:48px 40px}
    .cover{background:${isDark?'linear-gradient(135deg,#060A10 0%,#0D1F35 50%,#06161E 100%)':'linear-gradient(135deg,#0F172A 0%,#1E3A5F 50%,#0C2340 100%)'};color:#E2E8F0;padding:60px 56px;margin-bottom:0;position:relative;overflow:hidden}
    .cover-accent{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#00D4FF,#00897B,#00D4FF)}
    .cover h1{font-size:34px;font-weight:800;letter-spacing:-0.5px;color:#FFFFFF;margin-bottom:8px;line-height:1.1}
    .cover .sub{font-size:12px;color:#94A3B8;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;font-family:'JetBrains Mono',monospace}
    .cover .period{font-size:14px;color:#00D4FF;font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-bottom:4px}
    .cover .hotel{font-size:11px;color:#64748B;letter-spacing:4px;text-transform:uppercase;margin-bottom:48px}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:32px}
    .kpi-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:16px 20px}
    .kpi-box .lbl{font-size:9px;letter-spacing:3px;color:#64748B;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
    .kpi-box .val{font-size:24px;font-weight:700;color:#FFFFFF;font-family:'JetBrains Mono',monospace;line-height:1}
    .kpi-box .chg{font-size:10px;color:#94A3B8;margin-top:4px;font-family:'JetBrains Mono',monospace}
    .cover-footer{margin-top:48px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center}
    .cover-footer .lft{font-size:10px;color:#4A5568;font-family:'JetBrains Mono',monospace}
    .cover-footer .rgt{font-size:10px;color:#00D4FF;font-family:'JetBrains Mono',monospace;letter-spacing:2px}

    .section{padding:40px 40px 32px;border-bottom:1px solid ${C.border}}
    .section:last-child{border-bottom:none}
    .sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:24px}
    .sec-num{width:28px;height:28px;border-radius:50%;background:${isDark?'rgba(0,212,255,0.15)':'#EFF6FF'};border:1px solid ${isDark?'rgba(0,212,255,0.3)':'#BAE6FD'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${C.accent};font-family:'JetBrains Mono',monospace;flex-shrink:0}
    .sec-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${C.accent};font-family:'JetBrains Mono',monospace}
    .sec-sub{font-size:10px;color:${C.muted};font-family:'JetBrains Mono',monospace;margin-left:auto}

    table{width:100%;border-collapse:collapse;margin-bottom:8px}
    thead th{padding:9px 14px;text-align:right;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:${C.muted};font-family:'JetBrains Mono',monospace;font-weight:600;border-bottom:2px solid ${C.border};background:${C.card}}
    thead th:first-child{text-align:left}
    tbody tr:nth-child(odd){background:${C.row1}}
    tbody tr:nth-child(even){background:${C.row2}}
    td{padding:8px 14px;text-align:right;font-size:11px;font-family:'JetBrains Mono',monospace;color:${C.sub};border-bottom:1px solid ${isDark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)'}}
    td:first-child{text-align:left;font-family:'Inter',sans-serif;color:${C.text};padding-left:14px}
    td.indent{padding-left:28px;color:${C.sub}}
    td.section-row{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:${C.accent};font-weight:600;padding:12px 14px 6px;background:${C.rowHdr};border-bottom:1px solid ${C.border}}
    td.section-row-span{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:${C.accent};font-weight:600;padding:12px 14px 6px;background:${C.rowHdr}}
    tr.total-row td{font-weight:700;color:${C.text};background:${C.rowHdr};border-top:2px solid ${C.border};border-bottom:2px solid ${C.border};font-size:12px}
    tr.total-row td:first-child{font-family:'Inter',sans-serif}
    tr.subtotal-row td{font-weight:600;color:${C.text};border-top:1px solid ${C.border};font-size:11px}
    .pos{color:${C.green}!important}
    .neg{color:${C.red}!important}
    .neutral{color:${C.text}!important}

    .exec-card{background:${C.card};border:1px solid ${C.border};border-radius:10px;padding:20px 24px;margin-bottom:12px;border-left:4px solid ${C.accent}}
    .exec-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid ${isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.05)'}}
    .exec-row:last-child{border-bottom:none}
    .exec-lbl{font-size:11px;color:${C.text};font-weight:500}
    .exec-val{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:600}
    .exec-sub{font-size:10px;color:${C.muted};margin-top:2px}

    .ratio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
    .ratio-card{background:${C.card};border:1px solid ${C.border};border-radius:8px;padding:14px 16px}
    .ratio-lbl{font-size:9px;letter-spacing:2px;color:${C.muted};text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
    .ratio-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
    .ratio-thr{font-size:9px;color:${C.muted};font-family:'JetBrains Mono',monospace;margin-top:3px}

    .footer-bar{background:${isDark?'#06090E':'#0F172A'};color:#4A5568;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
    .footer-bar span{color:#00D4FF}

    @media print{
      body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .page-break{page-break-before:always}
      .no-break{page-break-inside:avoid}
    }
  `;

  // ── Revenue breakdown ────────────────────────────────────────────
  var totRev    = d.rev||0;
  var revRooms  = d.rooms||0;
  var revFnB    = d.fnb||0;
  var revMinor  = d.minor||0;
  var revOther  = d.otherinc||0;
  var deptProfit= d.deptProfit||0;
  var gop       = d.gop||0;
  var nop       = d.nop||0;
  var cos       = d.cos||0;
  var deptPay   = d.deptPay||0;
  var deptOther = d.deptOther||0;
  var ovhdPay   = d.ovhdPay||0;
  var ovhdOther = d.ovhdOther||0;
  var incentFee = d.incentFee||0;
  var mgmtFee   = d.mgmtFee||0;
  var ownExp    = d.ownExp||0;
  var depr      = d.deprTotal||0;
  var interest  = d.interest||0;
  var roi       = d.roi||0;
  var gopMgn    = d.gopMgn||0;
  var nopMgn    = d.nopMgn||0;

  // Occupancy (monthly only)
  var occ   = isMonthly && TB[selPeriod] ? TB[selPeriod].occ : null;
  var avail = isMonthly && TB[selPeriod] ? TB[selPeriod].avail : null;
  var arr   = isMonthly && TB[selPeriod] ? TB[selPeriod].arr : null;
  var occPct= occ&&avail ? (occ/avail*100).toFixed(1)+'%' : '—';
  var arrFmt= arr ? Math.round(arr).toLocaleString('id-ID') : '—';
  var revPAR= occ&&revRooms ? fV(revRooms/occ*1e9) : '—';
  var trevPAR= occ&&totRev ? fV(totRev/occ*1e9) : '—';

  // ── BUD comparison (2026 only) ────────────────────────────────────
  var hasBud = false, bud = null;
  if(isMonthly && yr==='2026' && BUD26[selPeriod]) {
    hasBud = true;
    bud = pnl(BUD26[selPeriod]);
  }

  // ── Helper to build table row ─────────────────────────────────────
  function row(label, amt, pct, indent, cls, bAmt, bPct) {
    var indCls = indent ? 'class="indent"' : '';
    var amtCls = cls || '';
    var variance = (hasBud && bAmt!==undefined) ? amt - bAmt : null;
    var varStr = variance!==null ? `<td class="${variance>=0?'pos':'neg'}" style="width:80px">${fV(variance)}</td>` : '';
    var budCol  = hasBud ? `<td style="width:90px;color:${C.muted}">${bAmt!==undefined?fV(bAmt):'—'}</td>
                            <td style="width:60px;color:${C.muted}">${bPct!==undefined?fPct(bPct):'—'}</td>` : '';
    return `<tr>
      <td ${indCls}>${label}</td>
      <td class="${amtCls}" style="width:110px">${fV(amt)}</td>
      <td style="width:70px;color:${C.muted}">${pct!==undefined?fPct(pct):'—'}</td>
      ${budCol}${varStr}
    </tr>`;
  }
  function secRow(label, cols) {
    return `<tr><td colspan="${cols||3}" class="section-row">${label}</td></tr>`;
  }
  function totRow(label, amt, pct, cls, bAmt) {
    var amtCls = cls || (amt>=0?'pos':'neg');
    var variance = (hasBud && bAmt!==undefined) ? amt - bAmt : null;
    var varStr = variance!==null ? `<td class="${variance>=0?'pos':'neg'}">${fV(variance)}</td>` : '';
    var budCol  = hasBud ? `<td>${bAmt!==undefined?fV(bAmt):'—'}</td><td>—</td>` : '';
    return `<tr class="total-row">
      <td>${label}</td>
      <td class="${amtCls}">${fV(amt)}</td>
      <td>${pct!==undefined?fPct(pct):'—'}</td>
      ${budCol}${varStr}
    </tr>`;
  }
  function subRow(label, amt, pct, cls) {
    return `<tr class="subtotal-row">
      <td>${label}</td>
      <td class="${cls||''}">${fV(amt)}</td>
      <td>${pct!==undefined?fPct(pct):'—'}</td>
      ${hasBud?'<td>—</td><td>—</td><td>—</td>':''}
    </tr>`;
  }

  var colSpan = hasBud ? 6 : 3;
  var tblHdr = hasBud
    ? `<thead><tr>
        <th style="text-align:left">Account</th>
        <th>Actual (M IDR)</th><th>% Rev</th>
        <th>Budget (M IDR)</th><th>% Rev</th>
        <th>Variance</th>
       </tr></thead>`
    : `<thead><tr>
        <th style="text-align:left">Account</th>
        <th>Amount (M IDR)</th>
        <th>% Revenue</th>
       </tr></thead>`;

  // ── Build sections ────────────────────────────────────────────────

  // SECTION 1 - EXECUTIVE SUMMARY
  var covKPIs = `
    <div class="kpi-grid">
      <div class="kpi-box">
        <div class="lbl">Total Revenue</div>
        <div class="val">${fV(totRev)}</div>
        <div class="chg">IDR</div>
      </div>
      <div class="kpi-box">
        <div class="lbl">GOP</div>
        <div class="val" style="color:${clrN(gop)}">${fV(gop)}</div>
        <div class="chg">${fPct(gopMgn)} margin</div>
      </div>
      <div class="kpi-box">
        <div class="lbl">Net Profit</div>
        <div class="val" style="color:${clrN(nop)}">${fV(nop)}</div>
        <div class="chg">${fPct(nopMgn)} margin</div>
      </div>
      <div class="kpi-box">
        <div class="lbl">Occupancy</div>
        <div class="val">${isMonthly ? occPct : fPct(d.occ||0)}</div>
        <div class="chg">${isMonthly ? 'ARR '+arrFmt : 'Annual avg'}</div>
      </div>
    </div>`;

  var execSummary = `
    <div class="section no-break">
      <div class="sec-hdr">
        <div class="sec-num">1</div>
        <div class="sec-title">Executive Summary</div>
        <div class="sec-sub">${periodLabel}</div>
      </div>
      <div class="exec-card" style="border-left-color:${C.accent}">
        <div class="exec-row"><span class="exec-lbl">Total Revenue</span><span class="exec-val" style="color:${C.accent}">${fV(totRev)} <span style="font-size:10px;color:${C.muted}">IDR</span></span></div>
        <div class="exec-row"><span class="exec-lbl">— Rooms (${fPct(totRev>0?revRooms/totRev*100:0)})</span><span class="exec-val">${fV(revRooms)}</span></div>
        <div class="exec-row"><span class="exec-lbl">— Food & Beverage (${fPct(totRev>0?revFnB/totRev*100:0)})</span><span class="exec-val">${fV(revFnB)}</span></div>
        <div class="exec-row"><span class="exec-lbl">— Minor Outlets & Other (${fPct(totRev>0?(revMinor+revOther)/totRev*100:0)})</span><span class="exec-val">${fV(revMinor+revOther)}</span></div>
      </div>
      <div class="exec-card" style="border-left-color:${gopMgn>=30?C.green:C.yellow}">
        <div class="exec-row"><span class="exec-lbl">Gross Operating Profit (GOP)</span><span class="exec-val" style="color:${clrN(gop)}">${fV(gop)}</span></div>
        <div class="exec-row"><span class="exec-lbl">GOP Margin</span><span class="exec-val" style="color:${clrN(gopMgn)}">${fPct(gopMgn)} <span style="font-size:10px;color:${C.muted}">benchmark &gt;30%</span></span></div>
        <div class="exec-row"><span class="exec-lbl">Payroll Ratio</span><span class="exec-val" style="color:${clrNeg(d.payRat||0)}">${fPct(d.payRat||0)}</span></div>
      </div>
      <div class="exec-card" style="border-left-color:${nop>=0?C.green:C.red}">
        <div class="exec-row"><span class="exec-lbl">Net Operating Profit (NOP)</span><span class="exec-val" style="color:${clrN(nop)}">${fV(nop)}</span></div>
        <div class="exec-row"><span class="exec-lbl">NOP Margin</span><span class="exec-val" style="color:${clrN(nopMgn)}">${fPct(nopMgn)} <span style="font-size:10px;color:${C.muted}">benchmark &gt;10%</span></span></div>
        ${isMonthly?`<div class="exec-row"><span class="exec-lbl">OCC / ARR / RevPAR</span><span class="exec-val">${occPct} · Rp${arrFmt} · ${revPAR}</span></div>`:''}
      </div>
      <div class="exec-card" style="border-left-color:${C.sub}">
        <div class="exec-row"><span class="exec-lbl">Total Assets</span><span class="exec-val">${fV(bs.tA)}</span></div>
        <div class="exec-row"><span class="exec-lbl">Total Liabilities</span><span class="exec-val" style="color:${C.red}">${fV(bs.tL)}</span></div>
        <div class="exec-row"><span class="exec-lbl">Total Equity</span><span class="exec-val" style="color:${clrN(bs.tEq)}">${fV(bs.tEq)}</span></div>
      </div>
    </div>`;

  // SECTION 2 - P&L
  var plSection = `
    <div class="section page-break no-break">
      <div class="sec-hdr">
        <div class="sec-num">2</div>
        <div class="sec-title">Profit & Loss Statement</div>
        <div class="sec-sub">${periodLabel}</div>
      </div>
      <table>
        ${tblHdr}
        <tbody>
          ${secRow('REVENUE', colSpan)}
          ${row('Room Revenue', revRooms, totRev>0?revRooms/totRev*100:0, true)}
          ${row('Food & Beverage Revenue', revFnB, totRev>0?revFnB/totRev*100:0, true)}
          ${row('Minor Outlets', revMinor, totRev>0?revMinor/totRev*100:0, true)}
          ${row('Other Income', revOther, totRev>0?revOther/totRev*100:0, true)}
          ${totRow('TOTAL REVENUE', totRev, 100, 'neutral')}

          ${secRow('COST & EXPENSES', colSpan)}
          ${row('Cost of Sales (F&B)', cos, totRev>0?cos/totRev*100:0, true, 'neg')}
          ${row('Departmental Payroll', deptPay, totRev>0?deptPay/totRev*100:0, true, 'neg')}
          ${row('Departmental Other Expenses', deptOther, totRev>0?deptOther/totRev*100:0, true, 'neg')}
          ${subRow('Departmental Profit', deptProfit, totRev>0?deptProfit/totRev*100:0, deptProfit>=0?'pos':'neg')}

          ${secRow('OVERHEAD EXPENSES', colSpan)}
          ${row('Overhead Payroll', ovhdPay, totRev>0?ovhdPay/totRev*100:0, true, 'neg')}
          ${row('Overhead Other Expenses', ovhdOther, totRev>0?ovhdOther/totRev*100:0, true, 'neg')}
          ${totRow('GROSS OPERATING PROFIT (GOP)', gop, gopMgn, gop>=0?'pos':'neg')}

          ${secRow('NON-OPERATING EXPENSES', colSpan)}
          ${row('Management Fee', mgmtFee, totRev>0?mgmtFee/totRev*100:0, true, 'neg')}
          ${row('Incentive Fee', incentFee, totRev>0?incentFee/totRev*100:0, true, 'neg')}
          ${row('Owner Expenses', ownExp, totRev>0?ownExp/totRev*100:0, true, 'neg')}
          ${row('Depreciation & Amortisation', depr, totRev>0?depr/totRev*100:0, true, 'neg')}
          ${row('Interest & Bank Charges', interest, totRev>0?interest/totRev*100:0, true, interest<=0?'pos':'neg')}
          ${row('Return on Investment (ROI)', roi, totRev>0?roi/totRev*100:0, true, 'neg')}
          ${totRow('NET OPERATING PROFIT (NOP)', nop, nopMgn, nop>=0?'pos':'neg')}
        </tbody>
      </table>
      ${isMonthly ? `
      <div style="margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${[['OCC Rate',occPct,C.accent],['ARR','Rp '+arrFmt,C.text],['RevPAR',revPAR,C.text],['TRevPAR',trevPAR,C.text]].map(([l,v,c])=>`
          <div style="background:${C.card};border:1px solid ${C.border};border-radius:8px;padding:12px 14px">
            <div style="font-size:9px;letter-spacing:2px;color:${C.muted};text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px">${l}</div>
            <div style="font-size:16px;font-weight:700;color:${c};font-family:'JetBrains Mono',monospace">${v}</div>
          </div>`).join('')}
      </div>` : ''}
    </div>`;

  // SECTION 3 - BALANCE SHEET
  var bsSection = `
    <div class="section page-break no-break">
      <div class="sec-hdr">
        <div class="sec-num">3</div>
        <div class="sec-title">Balance Sheet</div>
        <div class="sec-sub">As of end of ${periodLabel}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div>
          <table>
            <thead><tr><th style="text-align:left">Assets</th><th>Amount (M IDR)</th><th>vs Prior</th></tr></thead>
            <tbody>
              ${secRow('CURRENT ASSETS')}
              ${row('Cash & Bank', bs.cash, undefined, true, bs.cash>=bsp.cash?'pos':'neg')}
              ${row('Account Receivable', bs.ar, undefined, true, bs.ar<=bsp.ar?'pos':'neg')}
              ${row('Inventory', bs.inv, undefined, true)}
              ${row('Prepaid & Advances', bs.pre, undefined, true)}
              ${subRow('Total Current Assets', bs.tCA, undefined, 'neutral')}
              ${secRow('NON-CURRENT ASSETS')}
              ${row('Fixed Assets (Gross)', bs.fixG, undefined, true)}
              ${row('Accum. Depreciation', bs.accD, undefined, true, 'neg')}
              ${row('Net Fixed Assets', bs.netF, undefined, true, bs.netF>=0?'neutral':'neg')}
              ${row('Intangible & Other', bs.otNA, undefined, true)}
              ${totRow('TOTAL ASSETS', bs.tA, undefined, 'neutral')}
            </tbody>
          </table>
        </div>
        <div>
          <table>
            <thead><tr><th style="text-align:left">Liabilities & Equity</th><th>Amount (M IDR)</th><th>vs Prior</th></tr></thead>
            <tbody>
              ${secRow('CURRENT LIABILITIES')}
              ${row('Account Payable', bs.ap, undefined, true, 'neg')}
              ${row('Accrued Expenses', bs.acc, undefined, true, 'neg')}
              ${row('Advance Deposits', bs.advDep||0, undefined, true, 'neg')}
              ${row('Tax Payable', bs.taxPay||0, undefined, true, 'neg')}
              ${row('Other Current Liab.', bs.othCL||0, undefined, true, 'neg')}
              ${subRow('Total Current Liabilities', bs.tCL, undefined, 'neg')}
              ${secRow('LONG TERM')}
              ${row('Due to Owner / Mgmt', bs.dTMgmt||0, undefined, true, 'neg')}
              ${subRow('Total Liabilities', bs.tL, undefined, 'neg')}
              ${secRow('EQUITY')}
              ${row('Share Capital', bs.pic, undefined, true)}
              ${row('Retained Earnings', bs.re, undefined, true, bs.re>=0?'pos':'neg')}
              ${totRow('TOTAL LIAB. + EQUITY', bs.tLE||bs.tL+bs.tEq, undefined, 'neutral')}
            </tbody>
          </table>
        </div>
      </div>
      <div style="margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${[
          ['Current Ratio', bs.tCL>0?(bs.tCA/bs.tCL).toFixed(2):'—', bs.tCL>0&&bs.tCA/bs.tCL>=1.5?C.green:C.yellow],
          ['Quick Ratio', bs.tCL>0?((bs.cash+bs.ar)/bs.tCL).toFixed(2):'—', bs.tCL>0&&(bs.cash+bs.ar)/bs.tCL>=1?C.green:C.yellow],
          ['Debt / Equity', bs.tEq>0?(bs.tL/bs.tEq).toFixed(2):'—', C.yellow],
          ['Net Fixed Assets', fV(bs.netF), bs.netF>=0?C.green:C.red],
        ].map(([l,v,c])=>`
          <div class="ratio-card">
            <div class="ratio-lbl">${l}</div>
            <div class="ratio-val" style="color:${c}">${v}</div>
          </div>`).join('')}
      </div>
    </div>`;

  // SECTION 4 - CASH FLOW
  function cfRow(l, v, indent) {
    return `<tr>
      <td ${indent?'class="indent"':''}>${l}</td>
      <td style="color:${v>=0?C.green:C.red};width:110px">${fV(v)}</td>
    </tr>`;
  }
  var cfSection = `
    <div class="section page-break no-break">
      <div class="sec-hdr">
        <div class="sec-num">4</div>
        <div class="sec-title">Cash Flow Statement</div>
        <div class="sec-sub">Indirect Method · ${periodLabel}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <table>
          <thead><tr><th style="text-align:left">Description</th><th>Amount (M IDR)</th></tr></thead>
          <tbody>
            <tr><td colspan="2" class="section-row">OPERATING ACTIVITIES</td></tr>
            ${cfRow('Net Income (Loss)', cfNetInc, true)}
            ${cfRow('+ Depreciation & Amortisation', cfDepr, true)}
            ${cfRow('Δ Account Receivable', cfDAR, true)}
            ${cfRow('Δ Inventory', cfDInv, true)}
            ${cfRow('Δ Prepaid Expenses', cfDPre, true)}
            ${cfRow('Δ Account Payable', cfDAP, true)}
            ${cfRow('Δ Accrued Expenses', cfDAcc, true)}
            ${cfRow('Δ Advance Deposits', cfDDep, true)}
            ${cfRow('Δ Tax Payable', cfDTax, true)}
            <tr class="subtotal-row"><td>Net Operating CF</td><td style="color:${clrN(cfOpCF)}">${fV(cfOpCF)}</td></tr>
            <tr><td colspan="2" class="section-row">INVESTING ACTIVITIES</td></tr>
            ${cfRow('Δ Fixed Assets (Capital Expenditure)', cfInvCF, true)}
            <tr class="subtotal-row"><td>Net Investing CF</td><td style="color:${clrN(cfInvCF)}">${fV(cfInvCF)}</td></tr>
            <tr><td colspan="2" class="section-row">FINANCING ACTIVITIES</td></tr>
            ${cfRow('Δ Due to Owner / Management', cfFinCF, true)}
            <tr class="subtotal-row"><td>Net Financing CF</td><td style="color:${clrN(cfFinCF)}">${fV(cfFinCF)}</td></tr>
            <tr class="total-row"><td>NET CHANGE IN CASH</td><td style="color:${clrN(cfNet)}">${fV(cfNet)}</td></tr>

        </div>
      </div>
    </div>`;

  // ── Assemble by report type ────────────────────────────────────────
  var body = '';
  if(selReport==='pl')     body = execSummary + plSection;
  else if(selReport==='bs') body = execSummary + bsSection;
  else if(selReport==='cf') body = execSummary + cfSection;

      <div class="sec-hdr"><div class="sec-num">2</div><div class="sec-title">Financial KPI Dashboard</div></div>
      <div class="ratio-grid">
        ${[
          ['GOP Margin', fPct(gopMgn), gopMgn>=30?C.green:C.yellow, 'Target > 30%'],
          ['NOP Margin', fPct(nopMgn), nopMgn>=10?C.green:C.red, 'Target > 10%'],
          ['Payroll Ratio', fPct(d.payRat||0), (d.payRat||0)<=35?C.green:C.red, 'Target < 35%'],
          ['Current Ratio', bs.tCL>0?(bs.tCA/bs.tCL).toFixed(2)+'x':'—', bs.tCL>0&&bs.tCA/bs.tCL>=1.5?C.green:C.yellow, 'Target > 1.5x'],
          ['Quick Ratio', bs.tCL>0?((bs.cash+bs.ar)/bs.tCL).toFixed(2)+'x':'—', bs.tCL>0&&(bs.cash+bs.ar)/bs.tCL>=1?C.green:C.yellow, 'Target > 1.0x'],
          ['OCC Rate', isMonthly?occPct:'—', C.accent, 'Monthly only'],
        ].map(([l,v,c,t])=>`
          <div class="ratio-card">
            <div class="ratio-lbl">${l}</div>

            <div class="ratio-thr">${t}</div>

    </div>`;
  else body = execSummary + plSection + bsSection + cfSection; // board pack

  var cover = `
    <div class="cover">
      <div class="cover-accent"></div>
      <div class="hotel">Grand Darmo Suite · Surabaya · Amithya Hotels</div>
      <h1>Financial Intelligence<br>Report</h1>
      <div class="period">PERIOD: ${periodLabel.toUpperCase()}</div>
      <div style="font-size:10px;color:#64748B;margin-top:4px;font-family:'JetBrains Mono',monospace">PREPARED BY: Financial Controller &nbsp;·&nbsp; ${periodSub.toUpperCase()}</div>

      <div class="cover-footer">

  return `<!DOCTYPE html><html><head>
    <meta charset="utf-8">
    <title>GDS Financial Report — ${periodLabel}</title>

function ReportsPage({dark=true}) {
  const [selYr,   setSelYr]   = useState('2026');
  const [selMon,  setSelMon]  = useState('m2');
  const [selReport,setSelReport] = useState('board');
  const isDarkMode = dark;

  // Resolve period key (annual: '2025', monthly: '2025-03')
  const ML_KEYS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  function resolvePeriod(y, m) {
    if(!MON_YEARS.includes(y) && y!=='2026') return y; // annual
    if(m==='full') return y; // full year agg
    if(m.startsWith('q')) {
      // For report, use last month of quarter
      const qEnd = {q1:'03',q2:'06',q3:'09',q4:'12'}[m];
      return `${y}-${qEnd}`;
    }
    const mi = parseInt(m.slice(1));
    return `${y}-${String(mi).padStart(2,'0')}`;
  }
  const selPeriod = resolvePeriod(selYr, selMon);
  const periodLabel = (() => {
    if(!MON_YEARS.includes(selYr) && selYr!=='2026') return selYr;
    if(selMon==='full') return `Full Year ${selYr}`;
    if(selMon.startsWith('q')) return `${selMon.toUpperCase()} ${selYr}`;
    const mi = parseInt(selMon.slice(1))-1;
    return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mi]} ${selYr}`;
  })();

  const reports = [
    {id:'pl',    name:'Profit & Loss',    icon:'≋', desc:'Full P&L with margins & ratios'},
    {id:'bs',    name:'Balance Sheet',    icon:'◫', desc:'Statement of financial position'},
    {id:'cf',    name:'Cash Flow',        icon:'⟲', desc:'Indirect method cash flow'},
    {id:'kpi',   name:'KPI Dashboard',   icon:'◈', desc:'Financial ratios & scorecard'},
    {id:'budget',name:'Budget vs Actual', icon:'⊞', desc:'2026 variance analysis'},
    {id:'board', name:'Board Pack',       icon:'⊟', desc:'Complete executive report pack'},
  ];

  const handleExport = () => {
    var rHtml = generateReportHTML(selPeriod, selReport, isDarkMode);
    var w = window.open('','_blank','width=1100,height=900');
    if(w){ w.document.write(rHtml); w.document.close(); }
    else alert('Pop-up diblokir. Mohon izinkan pop-up untuk site ini.');
  };

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Report Generator</div>
        <div style={{color:T.muted,fontSize:11}}>Professional financial statements · Board-ready · Export to PDF</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:16}}>
        <div>
          {/* Report type grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
            {reports.map(r=>(
              <Card key={r.id} onClick={()=>setSelReport(r.id)}
                style={{cursor:'pointer',borderColor:selReport===r.id?T.accent:T.border,borderWidth:selReport===r.id?2:1,padding:'16px',transition:'all 0.15s'}}>
                <div style={{display:'flex',gap:10,marginBottom:8}}>
                  <span style={{color:T.accent,fontSize:18}}>{r.icon}</span>
                  <span style={{color:T.text,fontSize:12,fontWeight:600,fontFamily:"'IBM Plex Sans'"}}>{r.name}</span>
                </div>
                <p style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Sans'",margin:0,lineHeight:1.4}}>{r.desc}</p>
                {selReport===r.id&&<div style={{marginTop:8}}><Chip color={T.accent}>SELECTED</Chip></div>}
              </Card>
            ))}
          </div>
          {/* Period selector */}
          <Card>
            <div style={{color:T.text,fontSize:12,fontWeight:600,marginBottom:12}}>Periode Laporan</div>
            <PeriodSel yr={selYr} setYr={setSelYr} period={selMon} setPeriod={setSelMon} years={YEAR_RANGE}/>
            <div style={{marginTop:10,padding:'10px 14px',background:T.bg,borderRadius:6,border:`1px solid ${T.border}`}}>
              <span style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>SELECTED PERIOD: </span>
              <span style={{color:T.accent,fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{periodLabel}</span>
              <span style={{color:T.muted,fontSize:10,marginLeft:8,fontFamily:"'IBM Plex Mono'"}}>[{selPeriod}]</span>
            </div>
          </Card>
        </div>
        <Card>
          <SectionTitle>Export Settings</SectionTitle>
          <div style={{marginBottom:12}}>
            <label style={{color:T.muted,fontSize:10,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>REPORT TYPE</label>
            <select value={selReport} onChange={e=>setSelReport(e.target.value)}
              style={{width:'100%',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:'8px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {reports.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{color:T.muted,fontSize:10,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>REPORT THEME</label>
            <div style={{display:'flex',gap:6}}>
              {[['dark','◑ Dark'],['light','☀ Light']].map(([v,l])=>(
                <div key={v} style={{flex:1,padding:'8px',background:(v==='dark')===isDarkMode?T.accent:'transparent',border:`1px solid ${(v==='dark')===isDarkMode?T.accent:T.border}`,borderRadius:6,color:(v==='dark')===isDarkMode?'#080C12':T.sub,cursor:'default',fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:600,textAlign:'center'}}>{l}</div>
              ))}
            </div>
            <div style={{marginTop:6,color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'"}}>Theme follows main app toggle ☝</div>
          </div>
          <div style={{marginBottom:12,padding:'10px 12px',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}}>
            <div style={{color:T.muted,fontSize:9,marginBottom:4,fontFamily:"'IBM Plex Mono'",letterSpacing:1}}>PREVIEW</div>
            <div style={{color:T.text,fontSize:11,fontWeight:600}}>{reports.find(r=>r.id===selReport)?.name}</div>
            <div style={{color:T.accent,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{periodLabel}</div>
            <div style={{color:T.muted,fontSize:10,marginTop:2}}>{isDarkMode?'Dark':'Light'} Theme</div>
          </div>
          <button onClick={handleExport}
            style={{width:'100%',background:'linear-gradient(135deg,#00D4FF,#00897B)',border:'none',borderRadius:8,padding:'14px',color:'#080C12',fontSize:13,fontWeight:700,cursor:'pointer',letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>
            ⊟ GENERATE REPORT
          </button>
          <div style={{marginTop:8,color:T.muted,fontSize:9,textAlign:'center',fontFamily:"'IBM Plex Mono'",lineHeight:1.6}}>Opens in new tab<br/>Ctrl+P / Cmd+P → Save as PDF</div>
        </Card>
      </div>
    </div>
  );
}

  MASTER: ['dashboard','pl','bs','cf','budget','kpi','forecast','ai','macro','reports','users'],
  OWNER:  ['dashboard','pl','bs','cf','forecast','ai','macro','reports'],
  GM:     ['dashboard','pl','budget','kpi','macro'],
  HOD:    ['dashboard','kpi'],
};

const LS_KEY = 'gds_users_v1';

const DEFAULT_USERS = [
  { id:'u1', username:'sanda',   password:'accurate26',       role:'MASTER', name:'System Administrator', active:true, createdAt:'2026-01-01' },
  { id:'u2', username:'owning',  password:'gdsowning26',      role:'OWNER',  name:'Property Owner',       active:true, createdAt:'2026-01-01' },
  { id:'u3', username:'gm',      password:'gdsgm26',          role:'GM',     name:'General Manager',      active:true, createdAt:'2026-01-01' },
  { id:'u4', username:'hod',     password:'oneteamonespirit', role:'HOD',    name:'Head of Department',   active:true, createdAt:'2026-01-01' },
];

function loadUsers() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if(saved) {
      const parsed = JSON.parse(saved);
      if(Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return DEFAULT_USERS;
}

function saveUsers(users) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(users)); } catch(e) {}
}

function UserManagementPage({ currentUser }) {
  const [users, setUsers]         = useState(loadUsers);
  const [modal, setModal]         = useState(null); // 'add' | 'edit' | 'password' | 'delete'
  const [selected, setSelected]   = useState(null);
  const [toast, setToast]         = useState(null);
  const [form, setForm]           = useState({});
  const [showPw, setShowPw]       = useState(false);

  const ROLES = ['MASTER','OWNER','GM','HOD'];
  const ROLE_COLORS = { MASTER:'#00D4FF', OWNER:'#D4A847', GM:'#00897B', HOD:'#8B5CF6' };

  function showToast(msg, type='success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function persist(updated) {
    setUsers(updated);
    saveUsers(updated);
  }

  function openAdd() {
    setForm({ username:'', password:'', name:'', role:'GM', active:true });
    setModal('add');
    setShowPw(false);
  }

  function openEdit(u) {
    setSelected(u);
    setForm({ username:u.username, name:u.name, role:u.role, active:u.active });
    setModal('edit');
  }

  function openPassword(u) {
    setSelected(u);
    setForm({ password:'' });
    setModal('password');
    setShowPw(false);
  }

  function openDelete(u) {
    setSelected(u);
    setModal('delete');
  }

  function handleAdd() {
    if (!form.username.trim() || !form.password.trim() || !form.name.trim()) {
      showToast('Semua field wajib diisi.', 'error'); return;
    }
    if (users.find(u => u.username === form.username.trim())) {
      showToast('Username sudah dipakai.', 'error'); return;
    }
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const newUser = {
      id: 'u' + Date.now(),
      username:  form.username.trim().toLowerCase(),
      password:  form.password,
      name:      form.name.trim(),
      role:      form.role,
      active:    true,
      createdAt: new Date().toISOString().slice(0,10),
    };
    persist([...users, newUser]);
    setModal(null);
    showToast(`User "${newUser.username}" berhasil ditambahkan.`);
  }

  function handleEdit() {
    if (!form.name.trim()) { showToast('Nama tidak boleh kosong.', 'error'); return; }
    if (selected.username === currentUser.username && form.role !== 'MASTER') {
      showToast('Tidak bisa mengubah role akun sendiri.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id
      ? { ...u, name:form.name.trim(), role:form.role, active:form.active }
      : u
    );
    persist(updated);
    setModal(null);
    showToast('User berhasil diupdate.');
  }

  function handlePassword() {
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id ? { ...u, password:form.password } : u);
    persist(updated);
    setModal(null);
    showToast(`Password "${selected.username}" berhasil diganti.`);
  }

  function handleDelete() {
    if (selected.username === currentUser.username) {
      showToast('Tidak bisa menghapus akun sendiri.', 'error'); setModal(null); return;
    }
    persist(users.filter(u => u.id !== selected.id));
    setModal(null);
    showToast(`User "${selected.username}" dihapus.`);
  }

  function toggleActive(u) {
    if (u.username === currentUser.username) { showToast('Tidak bisa menonaktifkan akun sendiri.', 'error'); return; }
    const updated = users.map(x => x.id === u.id ? { ...x, active: !x.active } : x);
    persist(updated);
    showToast(`${u.username} ${!u.active ? 'diaktifkan' : 'dinonaktifkan'}.`);
  }

  const inp = {
    background: T.bg, border:`1px solid ${T.border}`, borderRadius:6,
    color: T.text, padding:'9px 12px', fontSize:12, width:'100%',
    fontFamily:"'IBM Plex Mono',monospace", outline:'none',
  };
  const btn = (color, bg) => ({
    background: bg||'transparent', border:`1px solid ${color}`, borderRadius:6,
    color, padding:'7px 14px', fontSize:11, cursor:'pointer',
    fontFamily:"'IBM Plex Mono',monospace", fontWeight:600,
  });

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', top:20, right:24, zIndex:9999, background: toast.type==='error'?T.red:T.green, color:'#fff', padding:'10px 20px', borderRadius:8, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", boxShadow:'0 4px 20px rgba(0,0,0,0.4)' }}>
          {toast.type==='error' ? '✕ ' : '✓ '}{toast.msg}
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <div style={{ color:T.text, fontSize:18, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>User Management</div>
          <div style={{ color:T.muted, fontSize:11, marginTop:4 }}>{users.length} user terdaftar · Disimpan di browser</div>
        </div>
        <button onClick={openAdd} style={{ ...btn(T.accent), background:`${T.accent}22`, padding:'9px 20px', fontSize:12 }}>
          + Tambah User
        </button>
      </div>

      {/* Role Legend */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {ROLES.map(r => (
          <div key={r} style={{ display:'flex', alignItems:'center', gap:6, background:T.card, border:`1px solid ${T.border}`, borderRadius:6, padding:'5px 12px' }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:ROLE_COLORS[r] }}/>
            <span style={{ color:T.sub, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{r}</span>
            <span style={{ color:T.muted, fontSize:9 }}>— {ROLE_PAGES[r].length} modul</span>
          </div>
        ))}
      </div>

      {/* User Table */}
      <Card style={{ padding:0, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${T.border}` }}>
              {['USERNAME','NAMA','ROLE','STATUS','DIBUAT','AKSI'].map(h => (
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:T.muted, fontSize:9, letterSpacing:2, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map((u, i) => (
              <tr key={u.id} style={{ borderBottom: i<users.length-1?`1px solid ${T.border}`:'none', background: u.username===currentUser.username?`${T.accent}08`:'transparent' }}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:28, height:28, borderRadius:6, background:`${ROLE_COLORS[u.role]}22`, border:`1px solid ${ROLE_COLORS[u.role]}44`, display:'flex', alignItems:'center', justifyContent:'center', color:ROLE_COLORS[u.role], fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>
                      {u.username[0].toUpperCase()}
                    </div>
                    <span style={{ color:T.text, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>
                      {u.username}
                      {u.username===currentUser.username && <span style={{ color:T.accent, fontSize:9, marginLeft:6 }}>▶ ANDA</span>}
                    </span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.sub, fontSize:12, fontFamily:"'IBM Plex Sans',sans-serif" }}>{u.name}</td>
                <td style={{ padding:'13px 16px' }}>
                  <Chip color={ROLE_COLORS[u.role]}>{u.role}</Chip>

                <td style={{ padding:'13px 16px' }}>
                  <div onClick={() => toggleActive(u)} style={{ cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5, background: u.active?`${T.green}22`:`${T.red}22`, border:`1px solid ${u.active?T.green:T.red}44`, borderRadius:20, padding:'3px 10px' }}>
                    <div style={{ width:6, height:6, borderRadius:'50%', background: u.active?T.green:T.red }}/>
                    <span style={{ color: u.active?T.green:T.red, fontSize:9, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{u.active?'AKTIF':'NONAKTIF'}</span>

                </td>
                <td style={{ padding:'13px 16px', color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{u.createdAt}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={() => openEdit(u)} style={{ ...btn(T.accent), padding:'4px 10px', fontSize:10 }} title="Edit profil">✎ Edit</button>
                    <button onClick={() => openPassword(u)} style={{ ...btn(T.yellow), padding:'4px 10px', fontSize:10 }} title="Ganti password">🔑 PW</button>
                    {u.username !== currentUser.username && (
                      <button onClick={() => openDelete(u)} style={{ ...btn(T.red), padding:'4px 10px', fontSize:10 }} title="Hapus user">✕</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      <div style={{ marginTop:12, color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>
        ⓘ Data user tersimpan di localStorage browser ini. Bersih saat clear browser data.

      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}>

                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>USERNAME</div>
                  <input style={inp} value={form.username} onChange={e=>setForm({...form,username:e.target.value.toLowerCase().replace(/\s/g,'')})} placeholder="cth: finance_mgr" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="cth: Budi Santoso" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD</div>
                  <div style={{ position:'relative' }}>
                    <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" />
                    <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                  </div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE & AKSES MODUL</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleAdd} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan User</button>
              </div>
            </>}

            {/* EDIT USER */}
            {modal === 'edit' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>✎ Edit User — {selected?.username}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}
                    disabled={selected?.username === currentUser.username}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:8, letterSpacing:1 }}>STATUS</div>
                  <div style={{ display:'flex', gap:10 }}>
                    {[true,false].map(v=>(
                      <button key={String(v)} onClick={()=>setForm({...form,active:v})}
                        style={{ ...btn(v?T.green:T.red), background:form.active===v?(v?`${T.green}22`:`${T.red}22`):'transparent', flex:1 }}>
                        {v?'✓ AKTIF':'✕ NONAKTIF'}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleEdit} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan Perubahan</button>
              </div>
            </>}

            {/* CHANGE PASSWORD */}
            {modal === 'password' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:6 }}>🔑 Ganti Password</div>
              <div style={{ color:T.muted, fontSize:11, marginBottom:20 }}>User: <span style={{ color:T.accent }}>{selected?.username}</span></div>
              <div>
                <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD BARU</div>
                <div style={{ position:'relative' }}>
                  <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" autoFocus />
                  <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                </div>
                {form.password.length > 0 && form.password.length < 6 && (
                  <div style={{ color:T.red, fontSize:10, marginTop:4 }}>Terlalu pendek — minimal 6 karakter</div>
                )}
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handlePassword} style={{ ...btn(T.yellow), background:`${T.yellow}22` }}>Ganti Password</button>
              </div>
            </>}

            {/* DELETE */}
            {modal === 'delete' && <>
              <div style={{ color:T.red, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:8 }}>✕ Hapus User</div>
              <div style={{ color:T.sub, fontSize:12, marginBottom:20, lineHeight:1.6 }}>
                Yakin hapus user <span style={{ color:T.accent, fontFamily:"'IBM Plex Mono',monospace" }}>{selected?.username}</span> ({selected?.name})?<br/>
                <span style={{ color:T.red, fontSize:11 }}>Tindakan ini tidak bisa dibatalkan.</span>
              </div>
              <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleDelete} style={{ ...btn(T.red), background:`${T.red}22` }}>Ya, Hapus</button>
              </div>
            </>}

          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════
function App() {
  const [user,setUser]=useState(null);
  const [dark,setDark]=useState(true);
  const [page,setPage]=useState('dashboard');
  T = dark?DARK:LIGHT;

  if(!user) return <LoginPage onLogin={u=>{setUser(u);setPage(u.pages[0]||'dashboard');}}/>;

  const pageMap = {
    dashboard:<DashboardPage/>,
    pl:<PLPage/>,
    bs:<BSPage/>,
    cf:<CFPage/>,
    budget:<BudgetPage/>,
    kpi:<KPIPage/>,
    forecast:<ForecastPage/>,
    ai:<AIPage/>,
    macro:<MacroPage/>,
    reports:<ReportsPage dark={dark}/>,
    users:<UserManagementPage currentUser={user}/>,
  };

  return (
    <div style={{display:'flex',background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'IBM Plex Sans',sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:#080C12}
        ::-webkit-scrollbar-thumb{background:#1A2535;border-radius:3px}
        input[type=range]{height:4px;cursor:pointer}
        select option{background:#0D1520;color:#E2E8F0}
        @media print{
          body{background:#fff!important;color:#000!important}
          #root>div>div:first-child{display:none!important}
          *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
      `}</style>
      <Sidebar user={user} active={page} setPage={p=>user.pages.includes(p)?setPage(p):null} dark={dark}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',maxHeight:'100vh'}}>
        <TopBar page={page} dark={dark} setDark={setDark} onLogout={()=>setUser(null)}/>
        <main style={{flex:1,overflow:'auto',padding:'24px',background:T.bg}}>
          {pageMap[page]||<DashboardPage/>}
        </main>
      </div>
    </div>
  );
}


const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(App));
  </script>
  <script>
    function setBar(p,m){document.getElementById('bar').style.width=p+'%';if(m)document.getElementById('status').textContent=m;}
    function hide(){var e=document.getElementById('loading');e.style.opacity='0';setTimeout(function(){e.style.display='none'},500);}
    function err(m){document.getElementById('status').style.color='#EF4444';document.getElementById('status').textContent=m;console.error('GDS:',m);}
    window.addEventListener('load',function(){
      setBar(30,'Memeriksa library...');
      try{
        if(!window.React) return err('React gagal dimuat');
        if(!window.ReactDOM) return err('ReactDOM gagal dimuat');
        if(!window.Recharts) return err('Recharts gagal dimuat');
        if(!window.Babel) return err('Babel gagal dimuat');
        setBar(60,'Kompilasi JSX...');
        var src=document.getElementById('app-src').textContent;
        var out=Babel.transform(src,{presets:['react']});
        setBar(90,'Menjalankan...');
        setTimeout(function(){
          try{eval(out.code);setBar(100);hide();}
          catch(e){err('Runtime: '+e.message);console.error(e);}
        },100);
      }catch(e){err('Compile: '+e.message);console.error(e);}
    });
  </script>
</body>
