function BudgetPage({ tbVersion=0 }) {
  const [lang]     = React.useContext(LangContext);
  const [view,     setView]     = useState('summary');   // 'summary'|'fullyr'|'dept'
  const [period,   setPeriod]   = useState('ytd');       // 'm1'..'m12'|'q1'..'q4'|'ytd'|'full'
  const [rfEdits,  setRfEdits]  = useState({});          // re-forecast manual overrides per month per field
  const [rfMode,   setRfMode]   = useState(false);       // toggle re-forecast edit mode

  const MO_KEYS = Array.from({length:12},(_,i)=>`2026-${String(i+1).padStart(2,'0')}`);
  const latestActual = mKeys26_ytd.filter(k=>TB[k]).length; // 2 = Feb

  // ── Period options ──────────────────────────────────────────────
  const periodOpts = [
    {v:'m1',l:'Jan'},{v:'m2',l:'Feb'},{v:'m3',l:'Mar'},{v:'m4',l:'Apr'},
    {v:'m5',l:'May'},{v:'m6',l:'Jun'},{v:'m7',l:'Jul'},{v:'m8',l:'Aug'},
    {v:'m9',l:'Sep'},{v:'m10',l:'Oct'},{v:'m11',l:'Nov'},{v:'m12',l:'Dec'},
    {v:'q1',l:'Q1'},{v:'q2',l:'Q2'},{v:'q3',l:'Q3'},{v:'q4',l:'Q4'},
    {v:'ytd',l:'YTD'},{v:'full',l:'Full Year'},
  ];

  const getKeys = (p) => {
    if(p.startsWith('m')){ const i=parseInt(p.slice(1))-1; return [MO_KEYS[i]]; }
    if(p==='q1') return MO_KEYS.slice(0,3);
    if(p==='q2') return MO_KEYS.slice(3,6);
    if(p==='q3') return MO_KEYS.slice(6,9);
    if(p==='q4') return MO_KEYS.slice(9,12);
    if(p==='ytd') return MO_KEYS.slice(0,latestActual);
    return MO_KEYS; // full
  };

  const periodKeys  = useMemo(()=>getKeys(period),[period]);
  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l||period;

  // ── Aggregate actuals, budget, re-forecast ──────────────────────
  const act = useMemo(()=>aggKeys(periodKeys.filter(k=>TB[k])),[periodKeys,tbVersion]);
  const bud = useMemo(()=>aggKeys(periodKeys.filter(k=>BUD26[k]),BUD26),[periodKeys]);

  // Re-forecast = budget + manual overrides, applied month by month
  const rfc = useMemo(()=>{
    // Try to get base from Forecast Engine saved data
    const fcSaved = (() => { try { return JSON.parse(localStorage.getItem('gds_forecast_v3')||'{}'); } catch(e){return {};} })();
    const rfcKeys = periodKeys.filter(k=>BUD26[k]);
    if(!rfcKeys.length) return pnl({});
    const agg={};
    rfcKeys.forEach(k=>{
      const mo=parseInt(k.split('-')[1]);
      const base = pnl(BUD26[k]); // start from budget
      // Apply manual overrides if any
      const ov = rfEdits[k]||{};
      // Apply Forecast Engine data if available (for forecast months only)
      const isFcMonth = !TB[k]; // no actual yet
      const fcRow = isFcMonth && fcSaved.monthly ? fcSaved.monthly[mo] : null;
      const fields = ['rooms','fnb','minor','otherinc','cosFnb','cosMinor',
        'roomsPay','fnbPay','minorPay','roomsOther','fnbOther','minorOther',
        'agPay','hrdPay','smPay','pomecPay','agOther','hrdOther','smOther','pomecOther','energy',
        'incentFee','mgmtFee','roi','depr','amor','ownExp','otherNonOp','occ','arr'];
      fields.forEach(f=>{
        const val = ov[f] != null ? ov[f] :
                    (fcRow && fcRow['used'+f.charAt(0).toUpperCase()+f.slice(1)] != null ? fcRow['used'+f.charAt(0).toUpperCase()+f.slice(1)] : base[f]||0);
        agg[f] = (agg[f]||0) + (typeof val==='number'?val:0);
      });
    });
    return pnl(agg);
  },[periodKeys,rfEdits,tbVersion]);

  // ── Helpers ─────────────────────────────────────────────────────
  const varAbs=(a,b)=>a-b;
  const varPct=(a,b)=>b!==0?(a-b)/Math.abs(b)*100:0;

  // Traffic light
  const tl=(vp,inv,thresholds=[5,10])=>{
    const bad=inv?vp>0:vp<0;
    if(!bad) return T.green;
    const abs=Math.abs(vp);
    if(abs<=thresholds[0]) return T.green;
    if(abs<=thresholds[1]) return T.yellow;
    return T.red;
  };

  // Format variance with sign
  const fVar=(v,color)=>(
    <span style={{color:color||T.text,fontFamily:"'IBM Plex Mono'",fontSize:11,fontWeight:600}}>
      {v>=0?'+':''}{fM(v)}
    </span>
  );
  const fVarPct=(vp,color)=>(
    <span style={{color:color||T.text,fontFamily:"'IBM Plex Mono'",fontSize:10}}>
      {vp>=0?'+':''}{vp.toFixed(1)}%
    </span>
  );

  // ── P&L rows (granular USALI) ────────────────────────────────────
  const buildRows = (a,b,r) => [
    // REVENUE
    {l:'— REVENUE —', sec:true},
    {l:'Room Revenue',    a:a.rooms,    b:b.rooms,    r:r.rooms,    inv:false, indent:1},
    {l:'Food & Beverage', a:a.fnb,      b:b.fnb,      r:r.fnb,      inv:false, indent:1},
    {l:'Minor Operated',  a:a.minor,    b:b.minor,    r:r.minor,    inv:false, indent:1},
    {l:'Other Income',    a:a.otherinc, b:b.otherinc, r:r.otherinc, inv:false, indent:1},
    {l:'TOTAL REVENUE',   a:a.rev,      b:b.rev,      r:r.rev,      inv:false, bold:true, sep:true},
    // COST OF SALES
    {l:'— COST OF SALES —', sec:true},
    {l:'F&B Cost',         a:a.cosFnb,   b:b.cosFnb,   r:r.cosFnb,   inv:true, indent:1},
    {l:'Minor Cost',       a:a.cosMinor, b:b.cosMinor, r:r.cosMinor, inv:true, indent:1},
    {l:'TOTAL CoS',        a:a.cos,      b:b.cos,      r:r.cos,      inv:true, bold:true, sep:true},
    // DEPT PAYROLL
    {l:'— DEPT PAYROLL —', sec:true},
    {l:'Rooms Payroll',   a:a.roomsPay, b:b.roomsPay, r:r.roomsPay, inv:true, indent:1},
    {l:'F&B Payroll',     a:a.fnbPay,   b:b.fnbPay,   r:r.fnbPay,   inv:true, indent:1},
    {l:'Minor Payroll',   a:a.minorPay, b:b.minorPay, r:r.minorPay, inv:true, indent:1},
    {l:'TOTAL Dept Pay',  a:a.deptPay,  b:b.deptPay,  r:r.deptPay,  inv:true, bold:true, sep:true},
    // DEPT OTHER
    {l:'— DEPT OTHER EXP —', sec:true},
    {l:'Rooms Other',     a:a.roomsOther, b:b.roomsOther, r:r.roomsOther, inv:true, indent:1},
    {l:'F&B Other',       a:a.fnbOther,   b:b.fnbOther,   r:r.fnbOther,   inv:true, indent:1},
    {l:'Minor Other',     a:a.minorOther, b:b.minorOther, r:r.minorOther, inv:true, indent:1},
    {l:'TOTAL Dept Other',a:a.deptOther,  b:b.deptOther,  r:r.deptOther,  inv:true, bold:true, sep:true},
    {l:'DEPT PROFIT',     a:a.deptProfit, b:b.deptProfit, r:r.deptProfit, inv:false, bold:true, sep:true, highlight:true},
    // OVERHEAD PAYROLL
    {l:'— OVERHEAD PAYROLL —', sec:true},
    {l:'Admin & General', a:a.agPay,    b:b.agPay,    r:r.agPay,    inv:true, indent:1},
    {l:'Human Resources', a:a.hrdPay,   b:b.hrdPay,   r:r.hrdPay,   inv:true, indent:1},
    {l:'Sales & Marketing',a:a.smPay,   b:b.smPay,    r:r.smPay,    inv:true, indent:1},
    {l:'Engineering',     a:a.pomecPay, b:b.pomecPay, r:r.pomecPay, inv:true, indent:1},
    {l:'TOTAL Ovhd Pay',  a:a.ovhdPay,  b:b.ovhdPay,  r:r.ovhdPay,  inv:true, bold:true, sep:true},
    // OVERHEAD OTHER
    {l:'— OVERHEAD OTHER —', sec:true},
    {l:'Admin & General', a:a.agOther,    b:b.agOther,    r:r.agOther,    inv:true, indent:1},
    {l:'Human Resources', a:a.hrdOther,   b:b.hrdOther,   r:r.hrdOther,   inv:true, indent:1},
    {l:'Sales & Marketing',a:a.smOther,   b:b.smOther,    r:r.smOther,    inv:true, indent:1},
    {l:'Engineering',     a:a.pomecOther, b:b.pomecOther, r:r.pomecOther, inv:true, indent:1},
    {l:'Energy Cost',     a:a.energy,     b:b.energy,     r:r.energy,     inv:true, indent:1},
    {l:'TOTAL Ovhd Other',a:a.ovhdOther,  b:b.ovhdOther,  r:r.ovhdOther,  inv:true, bold:true, sep:true},
    {l:'GROSS OP. PROFIT',a:a.gop,   b:b.gop,   r:r.gop,   inv:false, bold:true, sep:true, highlight:true},
    // NON-OPERATING
    {l:'— NON-OPERATING —', sec:true},
    {l:'Incentive Fee',   a:a.incentFee, b:b.incentFee, r:r.incentFee, inv:true, indent:1},
    {l:'Management Fee',  a:a.mgmtFee,   b:b.mgmtFee,   r:r.mgmtFee,   inv:true, indent:1},
    {l:'Land Tax (PBB)',  a:a.landTax,   b:b.landTax,   r:r.landTax,   inv:true, indent:1},
    {l:'Insurance',       a:a.insur,     b:b.insur,     r:r.insur,     inv:true, indent:1},
    {l:'Depreciation',    a:a.depr,      b:b.depr,      r:r.depr,      inv:true, indent:1},
    {l:'Amortization',    a:a.amor,      b:b.amor,      r:r.amor,      inv:true, indent:1},
    {l:'Interest',        a:a.interest,  b:b.interest,  r:r.interest,  inv:true, indent:1},
    {l:'ROI Expenses',    a:a.roi,       b:b.roi,       r:r.roi,       inv:true, indent:1},
    {l:'Owning Co Exp',   a:a.ownExp,    b:b.ownExp,    r:r.ownExp,    inv:true, indent:1},
    {l:'Others NonOp',    a:a.otherNonOp,b:b.otherNonOp,r:r.otherNonOp,inv:true, indent:1},
    {l:'TOTAL NonOp',     a:a.nonOp,     b:b.nonOp,     r:r.nonOp,     inv:true, bold:true, sep:true},
    {l:'OWNER SHARE PROFIT',a:a.nop,    b:b.nop,       r:r.nop,       inv:false, bold:true, sep:true, highlight:true},
  ];

  const rows = useMemo(()=>buildRows(act,bud,rfc),[act,bud,rfc]);

  // ── Full-year monthly data ───────────────────────────────────────
  const fullYrData = useMemo(()=>MO_KEYS.map((k,i)=>{
    const a  = TB[k]    ? pnl(TB[k])    : null;
    const b  = BUD26[k] ? pnl(BUD26[k]) : null;
    const isAct = !!a;
    // Re-forecast: actual if exists, else from saved FC or budget
    const fcSaved = (() => { try { return JSON.parse(localStorage.getItem('gds_forecast_v3')||'{}'); } catch(e){return {};} })();
    const mo=i+1;
    const fcRow = !isAct && fcSaved.monthly ? fcSaved.monthly[mo] : null;
    const rEd = rfEdits[k]||{};
    let rfcRev = rEd.rev != null ? rEd.rev : ((fcRow&&fcRow.usedRev) != null ? fcRow.usedRev : ((b&&b.rev)||0));
    let rfcNop = rEd.nop != null ? rEd.nop : ((fcRow&&fcRow.usedNOP) != null ? fcRow.usedNOP : ((b&&b.nop)||0));
    let rfcOcc = rEd.occ != null ? rEd.occ : ((fcRow&&fcRow.usedOcc) != null ? fcRow.usedOcc : ((b&&b.occ)||0));
    return {
      name:ML[i], k, mo, isAct,
      actRev:(a&&a.rev),   budRev:(b&&b.rev),   rfcRev,
      actGOP:(a&&a.gop),   budGOP:(b&&b.gop),
      actNOP:(a&&a.nop),   budNOP:(b&&b.nop),   rfcNop,
      actOcc:a?( TB[k]&&TB[k].avail>0?TB[k].occ/TB[k].avail*100:a.occ ) :null,
      budOcc:(b&&b.occ),   rfcOcc,
      actArr:a?TB[k]&&TB[k].arr:null, budArr:b?BUD26[k]&&BUD26[k].arr:null,
    };
  }),[tbVersion, rfEdits]);

  // Alerts: dept over budget > threshold
  const alerts = useMemo(()=>{
    const out=[];
    const checks=[
      {l:'Room Revenue',  a:act.rooms,    b:bud.rooms,    inv:false, thr:5},
      {l:'F&B Revenue',   a:act.fnb,      b:bud.fnb,      inv:false, thr:5},
      {l:'Total Revenue', a:act.rev,      b:bud.rev,      inv:false, thr:3},
      {l:'A&G Payroll',   a:act.agPay,    b:bud.agPay,    inv:true,  thr:10},
      {l:'S&M Payroll',   a:act.smPay,    b:bud.smPay,    inv:true,  thr:10},
      {l:'Energy Cost',   a:act.energy,   b:bud.energy,   inv:true,  thr:8},
      {l:'GOP',           a:act.gop,      b:bud.gop,      inv:false, thr:5},
      {l:'NOP',           a:act.nop,      b:bud.nop,      inv:false, thr:5},
    ];
    checks.forEach(c=>{
      if(!c.b||Math.abs(c.b)<0.0001) return;
      const vp=varPct(c.a,c.b);
      const bad=c.inv?vp>0:vp<0;
      if(bad && Math.abs(vp)>c.thr) out.push({...c,vp,sev:Math.abs(vp)>15?'danger':'warning'});
    });
    return out;
  },[act,bud]);

  // ── Variance driver narrative ────────────────────────────────────
  const narrative = useMemo(()=>{
    const lines=[];
    const rv=varAbs(act.rev,bud.rev), rvp=varPct(act.rev,bud.rev);
    const gv=varAbs(act.gop,bud.gop), nv=varAbs(act.nop,bud.nop);
    lines.push({sev:Math.abs(rvp)<=5?'success':Math.abs(rvp)<=10?'warning':'danger',
      msg:`Revenue ${rv>=0?'exceeded':'missed'} budget by ${fM(Math.abs(rv))} (${rvp>=0?'+':''}${rvp.toFixed(1)}%). `+
      `Primary drivers: Room ${varAbs(act.rooms,bud.rooms)>=0?'+':''}${fM(varAbs(act.rooms,bud.rooms))}, `+
      `F&B ${varAbs(act.fnb,bud.fnb)>=0?'+':''}${fM(varAbs(act.fnb,bud.fnb))}.`});
    const payV=varAbs(act.deptPay,bud.deptPay), payPR=act.payRat-bud.payRat;
    lines.push({sev:payV<=0?'success':Math.abs(payPR)>3?'danger':'warning',
      msg:`Dept Payroll ${payV<=0?'under':'over'} budget by ${fM(Math.abs(payV))}. `+
      `Payroll ratio: ${(act.payRat||0).toFixed(1)}% actual vs ${(bud.payRat||0).toFixed(1)}% budget (${payPR>=0?'+':''}${payPR.toFixed(1)}pp). `+
      `Energy: ${varAbs(act.energy,bud.energy)>=0?'+':''}${fM(varAbs(act.energy,bud.energy))}.`});
    lines.push({sev:gv>=0?'success':Math.abs(varPct(act.gop,bud.gop))<=10?'warning':'danger',
      msg:`GOP ${gv>=0?'above':'below'} budget by ${fM(Math.abs(gv))}. `+
      `GOP margin: ${act.gopMgn.toFixed(1)}% vs budget ${bud.gopMgn.toFixed(1)}% (${(act.gopMgn-bud.gopMgn)>=0?'+':''}${(act.gopMgn-bud.gopMgn).toFixed(1)}pp).`});
    lines.push({sev:nv>=0?'success':'danger',
      msg:`NOP ${nv>=0?'above':'below'} budget by ${fM(Math.abs(nv))}. `+
      `NOP margin: ${act.nopMgn.toFixed(1)}% vs budget ${bud.nopMgn.toFixed(1)}%.`+
      (act.nop<0&&bud.nop>0?' ⚠ Budget was positive NOP — shortfall creates net loss.':'')});
    return lines;
  },[act,bud]);

  const sevColor={danger:T.red,warning:T.yellow,success:T.green};
  const sevIcon ={danger:'🔴',warning:'⚠️',success:'✅'};

  // OCC comparison
  const actOcc = latestActual>0
    ? periodKeys.filter(k=>TB[k]).map(k=>TB[k].avail>0?TB[k].occ/TB[k].avail*100:(TB[k].occ>0&&TB[k].occ<=100?TB[k].occ:0)).reduce((a,b)=>a+b,0)/Math.max(periodKeys.filter(k=>TB[k]).length,1)
    : null;
  const budOcc = bud.occ||0;
  const actArr = periodKeys.filter(k=>TB[k]).map(k=>TB[k].arr||0).reduce((a,b)=>a+b,0)/Math.max(periodKeys.filter(k=>TB[k]).length,1);
  const budArr = periodKeys.filter(k=>BUD26[k]).map(k=>BUD26[k].arr||0).reduce((a,b)=>a+b,0)/Math.max(periodKeys.filter(k=>BUD26[k]).length,1);
  const actRevPAR = periodKeys.filter(k=>TB[k]).length>0 ? act.rooms*1e9/periodKeys.filter(k=>TB[k]).map(k=>TB[k].avail||0).reduce((a,b)=>a+b,0)||0 : null;
  const budRevPAR = budArr*(budOcc/100);

  return (
    <div>
    {/* ── Header ── */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
      <div>
        <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>BUDGET CONTROL</div>
        <div style={{color:T.muted,fontSize:11}}>Actual vs Budget vs Re-Forecast · 2026 · {periodLabel} · Rp Milyar</div>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
        {/* Period quick tabs */}
        {[{v:'ytd',l:'YTD'},{v:'m1',l:'Jan'},{v:'m2',l:'Feb'},{v:'q1',l:'Q1'},{v:'full',l:'Full Year'}].map(o=>(
          <button key={o.v} onClick={()=>setPeriod(o.v)}
            style={{padding:'5px 12px',borderRadius:6,border:`1px solid ${period===o.v?T.accent:T.border}`,
            background:period===o.v?`${T.accent}20`:'transparent',color:period===o.v?T.accent:T.sub,
            cursor:'pointer',fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:period===o.v?700:400}}>
            {o.l}
          </button>
        ))}
        {/* Full period dropdown */}
        <select value={period} onChange={e=>setPeriod(e.target.value)}
          style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'5px 8px',color:T.text,fontSize:11,outline:'none'}}>
          {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
        {/* View tabs */}
        {[{v:'summary',l:'📊 Summary'},{v:'dept',l:'📋 Detail'},{v:'fullyr',l:'📅 Full Year'}].map(o=>(
          <button key={o.v} onClick={()=>setView(o.v)}
            style={{padding:'5px 12px',borderRadius:6,border:`1px solid ${view===o.v?T.secondary:T.border}`,
            background:view===o.v?`${T.secondary}20`:'transparent',color:view===o.v?T.secondary:T.sub,
            cursor:'pointer',fontSize:11,fontFamily:"'IBM Plex Mono'"}}>
            {o.l}
          </button>
        ))}
        <button onClick={()=>setRfMode(m=>!m)}
          style={{padding:'5px 12px',borderRadius:6,border:`1px solid ${rfMode?'#C084FC':T.border}`,
          background:rfMode?'#C084FC20':'transparent',color:rfMode?'#C084FC':T.sub,
          cursor:'pointer',fontSize:11,fontFamily:"'IBM Plex Mono'"}}>
          {rfMode?'✏️ RF Edit ON':'✏️ Re-Forecast'}
        </button>
      </div>
    </div>

    {/* ── Alerts ── */}
    {alerts.length>0&&(
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
        {alerts.map((a,i)=>(
          <div key={i} style={{background:`${sevColor[a.sev]}15`,border:`1px solid ${sevColor[a.sev]}40`,
            borderRadius:6,padding:'6px 12px',fontSize:10,color:sevColor[a.sev],fontFamily:"'IBM Plex Mono'"}}>
            {a.sev==='danger'?'🔴':'⚠️'} {a.l}: {a.vp>=0?'+':''}{a.vp.toFixed(1)}%
          </div>
        ))}
      </div>
    )}

    {/* ── KPI strip ── */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,marginBottom:14}} className="r-grid-4">
      {[
        {l:'Revenue Var',   v:varAbs(act.rev,bud.rev),   pct:varPct(act.rev,bud.rev),   inv:false},
        {l:'GOP Var',       v:varAbs(act.gop,bud.gop),   pct:varPct(act.gop,bud.gop),   inv:false},
        {l:'NOP Var',       v:varAbs(act.nop,bud.nop),   pct:varPct(act.nop,bud.nop),   inv:false},
        {l:'OCC Δ (pp)',    v:null, pct:actOcc!=null?actOcc-budOcc:0, isRatio:true, unit:'pp'},
        {l:'ARR Δ (Rp)',    v:null, pct:actArr-budArr, isRatio:true, isAbs:true, unit:''},
        {l:'Payroll Δ (pp)',v:null, pct:(act.payRat||0)-(bud.payRat||0), isRatio:true, inv:true, unit:'pp'},
        {l:'Energy Δ',      v:varAbs(act.energy,bud.energy), pct:varPct(act.energy,bud.energy), inv:true},
      ].map((k,i)=>{
        const col=k.isRatio?(k.inv?(k.pct>0?T.red:k.pct<-3?T.yellow:T.green):(k.pct>=0?T.green:k.pct>=-5?T.yellow:T.red)):tl(k.pct,k.inv);
        return (
          <div key={i} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,
            padding:'10px 12px',borderLeft:`3px solid ${col}`}}>
            <div style={{fontSize:8,color:T.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>{k.l}</div>
            {!k.isRatio&&<div style={{fontSize:14,fontWeight:700,color:col,fontFamily:"'IBM Plex Mono'"}}>{fM(k.v)}</div>}
            <div style={{fontSize:k.isRatio?13:10,fontWeight:k.isRatio?700:400,color:col,fontFamily:"'IBM Plex Mono'"}}>
              {k.isAbs?(k.pct>=0?'+':'')+Math.round(k.pct).toLocaleString('id-ID'):(k.pct>=0?'+':'')+k.pct.toFixed(1)}{k.isAbs?'':k.unit||'%'}
            </div>
          </div>
        );
      })}
    </div>

    {/* ── OCC / ARR / RevPAR strip ── */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}} className="r-grid-3">
      {[
        {l:'Occupancy',icon:'🏨',act:actOcc!=null?`${actOcc.toFixed(1)}%`:'—',bud:`${budOcc.toFixed(1)}%`,
          col:actOcc!=null?tl(actOcc-budOcc,false,[2,5]):T.muted},
        {l:'ARR (Rp)',  icon:'💰',act:actArr>0?Math.round(actArr).toLocaleString('id-ID'):'—',
          bud:Math.round(budArr).toLocaleString('id-ID'),
          col:actArr>0?tl(actArr-budArr,false,[5000,20000]):T.muted},

function KPIPage({ tbVersion=0 }) {
  const [yr,setYr]         = useState('2026');
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [period,setPeriod] = useState('m2');

  const periodOpts = useMemo(()=>getPeriodOpts(yr),[yr,tbVersion]);
  const handleYrChange = (v)=>{setYr(v);setPeriod('full');};

  const isAnn = parseInt(yr)<2024;

  // ── Current period data ──────────────────────────────────────────
  const keys = useMemo(()=>getKeys(yr,period),[yr,period,tbVersion]);
  const cur  = useMemo(()=>{
    if(isAnn) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnn,tbVersion]);

  const bsKey = useMemo(()=>snapKey(yr,period),    [yr,period]);
  const bs    = useMemo(()=>bsCalc(BS_SNAPSHOTS[bsKey]||BS_SNAPSHOTS['dec25']),[bsKey,tbVersion]);

  // ── Prior period data (for trend) ────────────────────────────────
  const prevPeriod = useMemo(()=>{
    if(isAnn||period==='full'||period==='ytd') return null;
    if(period.startsWith('m')){
      const mi=parseInt(period.slice(1));
      if(mi<=1) return null;
      return `m${mi-1}`;
    }
    if(period.startsWith('q')){
      const qn=parseInt(period.slice(1));
      return qn>1?`q${qn-1}`:null;
    }
    return null;
  },[period,isAnn,tbVersion]);

  const prevKeys = useMemo(()=>prevPeriod?getKeys(yr,prevPeriod):null,[yr,prevPeriod,tbVersion]);
  const prev     = useMemo(()=>{
    if(prevKeys&&prevKeys.length) return aggKeys(prevKeys);
    if(!prevPeriod&&!isAnn){
      // full year: compare to prior year
      const py=parseInt(yr)-1;
      if(py>=2013) return annPnl(py);
    }
    return null;
  },[prevKeys,prevPeriod,yr,isAnn,tbVersion]);

  const prevBsKey = useMemo(()=>prevPeriod?snapKey(yr,prevPeriod):null,[yr,prevPeriod,tbVersion]);
  const prevBs    = useMemo(()=>{
    if(prevBsKey) return bsCalc(BS_SNAPSHOTS[prevBsKey]||BS_SNAPSHOTS['dec25']);
    // full year: prior year BS
    const py=String(parseInt(yr)-1);
    const k=snapKey(py,'full');
    return bsCalc(BS_SNAPSHOTS[k]||BS_SNAPSHOTS['dec25']);
  },[prevBsKey,yr,tbVersion]);

  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l||period;

  // ── Validation helper ────────────────────────────────────────────
  const validate = (v, min, max, label) => {
    if(v===null||v===undefined||isNaN(v)) return {val:'—', warn:false};
    if(v<min||v>max) return {val:`${v.toFixed(1)}% ⚠`, warn:true, msg:`${label} out of range [${min}–${max}%]`};
    return {val:v.toFixed(1), warn:false};
  };

  // ── Trend arrow ──────────────────────────────────────────────────
  const trend = (cur, prev, inv=false) => {
    if(prev==null||cur==null) return {icon:'→', color:T.muted, label:'—'};
    const diff = cur - prev;
    const better = inv ? diff<=-0.3 : diff>=0.3;
    const worse  = inv ? diff>=0.3  : diff<=-0.3;
    if(better) return {icon:'↑', color:T.green,  label:`↑ +${Math.abs(diff).toFixed(1)}`};
    if(worse)  return {icon:'↓', color:T.red,    label:`↓ -${Math.abs(diff).toFixed(1)}`};
    return      {icon:'→', color:T.muted, label:'→ stable'};
  };

  // ── Health classification (3-tier) ───────────────────────────────
  const health = (v, thresholds) => {
    // thresholds: [{min, max, level}] or [{val, level}] for single-sided
    // level: 'green','yellow','red'
    for(const t of thresholds){
      if(t.min!==undefined && t.max!==undefined && v>=t.min && v<=t.max) return t.level;
      if(t.min!==undefined && t.max===undefined && v>=t.min) return t.level;
      if(t.max!==undefined && t.min===undefined && v<=t.max) return t.level;
    }
    return 'red';
  };
  const hColor = (level) => ({green:T.green, yellow:T.yellow, red:T.red}[level]||T.muted);
  const hIcon  = (level) => ({green:'✅', yellow:'⚠️', red:'🔴'}[level]||'—');

  // ── All KPI definitions ──────────────────────────────────────────
  const kpiData = useMemo(()=>{
    if(!cur) return null;

    const tCA=bs.tCA, tCL=Math.max(bs.tCL,0.001), tA=Math.max(bs.tA,0.001), tEq=Math.max(bs.tEq,0.001);
    const cr=(tCA/tCL), qr=((bs.cash+bs.ar)/tCL), cashr=(bs.cash/tCL);
    const de=(bs.tL/tEq), ltde=(bs.ltD/tEq), ltda=(bs.ltD/tA);
    const eqR=(bs.tEq/tA);
    const roa=(cur.nop/tA*100), roe=(cur.nop/tEq*100);
    const at=(cur.rev/tA);
    // Occupancy: ANN has occ in %, TB monthly has occ=room nights, avail=available nights
    const occPct = isAnn
      ? (cur.occ!=null ? Math.min(Math.max(cur.occ,0),100) : null)
      : (cur.avail>0 ? Math.min(cur.occ/cur.avail*100,100) : null);
    const prevOccPct = prev
      ? (isAnn
          ? (prev.occ!=null ? Math.min(Math.max(prev.occ,0),100) : null)
          : (prev.avail>0 ? Math.min(prev.occ/prev.avail*100,100) : null))
      : null;

    // Prev period equivalents
    const pCR = prev&&prevBs ? prevBs.tCA/Math.max(prevBs.tCL,0.001) : null;
    const pQR = prev&&prevBs ? (prevBs.cash+prevBs.ar)/Math.max(prevBs.tCL,0.001) : null;
    const pROA= prev&&prevBs ? prev.nop/Math.max(prevBs.tA,0.001)*100 : null;
    const pROE= prev&&prevBs ? prev.nop/Math.max(prevBs.tEq,0.001)*100 : null;
    const pDE = prev&&prevBs ? prevBs.tL/Math.max(prevBs.tEq,0.001) : null;

    const cats = [
      {
        cat:'Liquidity', color:T.accent, icon:'💧',
        items:[
          {l:'Current Ratio',    val:cr,              fmt:v=>v.toFixed(2)+'x',   prev:pCR,
           hlth:health(cr,   [{min:1.5,level:'green'},{min:1.2,max:1.499,level:'yellow'},{max:1.199,level:'red'}]),
           tgt:'≥1.5x', tgtN:1.5, inv:false, unit:'x'},
          {l:'Quick Ratio',      val:qr,              fmt:v=>v.toFixed(2)+'x',   prev:pQR,
           hlth:health(qr,   [{min:1.0,level:'green'},{min:0.7,max:0.999,level:'yellow'},{max:0.699,level:'red'}]),
           tgt:'≥1.0x', tgtN:1.0, inv:false, unit:'x'},
          {l:'Cash Ratio',       val:cashr,           fmt:v=>v.toFixed(2)+'x',   prev:null,
           hlth:health(cashr,[{min:0.5,level:'green'},{min:0.3,max:0.499,level:'yellow'},{max:0.299,level:'red'}]),
           tgt:'≥0.5x', tgtN:0.5, inv:false, unit:'x'},
          {l:'Working Capital',  val:bs.tCA-bs.tCL,   fmt:v=>fM(v),              prev:prev&&prevBs?prevBs.tCA-prevBs.tCL:null,
           hlth:(bs.tCA-bs.tCL)>0?'green':'red', tgt:'>0', tgtN:0, inv:false, unit:'M'},
        ]
      },
      {
        cat:'Profitability', color:T.green, icon:'📈',
        items:[
          {l:'GOP Margin',       val:cur.gopMgn,      fmt:v=>v.toFixed(1)+'%',   prev:(prev&&prev.gopMgn),
           hlth:health(cur.gopMgn,[{min:30,level:'green'},{min:20,max:29.9,level:'yellow'},{max:19.9,level:'red'}]),
           tgt:'≥30%', tgtN:30, inv:false, unit:'%'},
          {l:'NOP Margin',       val:cur.nopMgn,      fmt:v=>v.toFixed(1)+'%',   prev:(prev&&prev.nopMgn),
           hlth:health(cur.nopMgn,[{min:5,level:'green'},{min:0,max:4.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'≥5%', tgtN:5, inv:false, unit:'%'},
          {l:'EBITDA Margin',    val:cur.rev>0?cur.gop/cur.rev*100:0, fmt:v=>v.toFixed(1)+'%', prev:prev&&prev.rev>0?prev.gop/prev.rev*100:null,
           hlth:health(cur.rev>0?cur.gop/cur.rev*100:0,[{min:30,level:'green'},{min:20,max:29.9,level:'yellow'},{max:19.9,level:'red'}]),
           tgt:'≥30%', tgtN:30, inv:false, unit:'%'},
          {l:'Net Profit Margin',val:cur.rev>0?cur.nop/cur.rev*100:0, fmt:v=>v.toFixed(1)+'%', prev:prev&&prev.rev>0?prev.nop/prev.rev*100:null,
           hlth:health(cur.rev>0?cur.nop/cur.rev*100:0,[{min:5,level:'green'},{min:0,max:4.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'≥5%', tgtN:5, inv:false, unit:'%'},
        ]
      },
      {
        cat:'Leverage', color:T.yellow, icon:'🏦',
        items:[
          {l:'Debt / Equity',    val:de,   fmt:v=>v.toFixed(2)+'x', prev:pDE,
           hlth:health(de,  [{max:0.8,level:'green'},{min:0.8,max:1.2,level:'yellow'},{min:1.201,level:'red'}]),
           tgt:'<1.0x', tgtN:1.0, inv:true, unit:'x'},
          {l:'LT Debt / Equity', val:ltde, fmt:v=>v.toFixed(2)+'x', prev:null,
           hlth:health(ltde,[{max:0.5,level:'green'},{min:0.5,max:0.8,level:'yellow'},{min:0.801,level:'red'}]),
           tgt:'<0.5x', tgtN:0.5, inv:true, unit:'x'},
          {l:'LT Debt / Assets', val:ltda*100, fmt:v=>v.toFixed(1)+'%', prev:null,
           hlth:health(ltda*100,[{max:25,level:'green'},{min:25,max:40,level:'yellow'},{min:40.01,level:'red'}]),
           tgt:'<30%', tgtN:30, inv:true, unit:'%'},
          {l:'Equity Ratio',     val:eqR*100, fmt:v=>v.toFixed(1)+'%', prev:null,
           hlth:health(eqR*100,[{min:50,level:'green'},{min:35,max:49.9,level:'yellow'},{max:34.9,level:'red'}]),
           tgt:'>40%', tgtN:40, inv:false, unit:'%'},
        ]
      },
      {
        cat:'Returns', color:T.secondary, icon:'💰',
        items:[
          {l:'Return on Assets',  val:roa, fmt:v=>v.toFixed(1)+'%', prev:pROA,
           hlth:health(roa, [{min:5,level:'green'},{min:0,max:4.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'>5%', tgtN:5, inv:false, unit:'%'},
          {l:'Return on Equity',  val:roe, fmt:v=>v.toFixed(1)+'%', prev:pROE,
           hlth:health(roe, [{min:10,level:'green'},{min:0,max:9.9,level:'yellow'},{max:-0.001,level:'red'}]),
           tgt:'>10%', tgtN:10, inv:false, unit:'%'},
          {l:'Asset Turnover',    val:at,  fmt:v=>v.toFixed(2)+'x', prev:null,
           hlth:health(at,  [{min:0.5,level:'green'},{min:0.3,max:0.499,level:'yellow'},{max:0.299,level:'red'}]),
           tgt:'>0.5x', tgtN:0.5, inv:false, unit:'x'},
          {l:'EBITDA / Assets',   val:cur.gop/tA*100, fmt:v=>v.toFixed(1)+'%', prev:null,
           hlth:health(cur.gop/tA*100,[{min:8,level:'green'},{min:3,max:7.9,level:'yellow'},{max:2.9,level:'red'}]),
           tgt:'>8%', tgtN:8, inv:false, unit:'%'},
        ]
      },
      {
        cat:'Hotel Operations', color:T.orange||'#F97316', icon:'🏨',
        items:[
          {l:'Payroll Ratio',    val:cur.payRat||0, fmt:v=>v.toFixed(1)+'%', prev:(prev&&prev.payRat),
           hlth:health(cur.payRat||0,[{max:32,level:'green'},{min:32,max:38,level:'yellow'},{min:38.01,level:'red'}]),
           tgt:'<35%', tgtN:35, inv:true, unit:'%'},
          {l:'Utility Ratio',    val:cur.utlRat||0, fmt:v=>v.toFixed(1)+'%', prev:(prev&&prev.utlRat),
           hlth:health(cur.utlRat||0,[{max:6,level:'green'},{min:6,max:9,level:'yellow'},{min:9.01,level:'red'}]),
           tgt:'<7%', tgtN:7, inv:true, unit:'%'},
          {l:'Maint. Ratio',     val:cur.mntRat||0, fmt:v=>v.toFixed(1)+'%', prev:(prev&&prev.mntRat),
           hlth:health(cur.mntRat||0,[{max:3,level:'green'},{min:3,max:5,level:'yellow'},{min:5.01,level:'red'}]),
           tgt:'<4%', tgtN:4, inv:true, unit:'%'},
          {l:'Occupancy',        val:occPct,        fmt:v=>v!=null?v.toFixed(1)+'%':'—', prev:prevOccPct,
           hlth:occPct!=null?health(occPct,[{min:65,level:'green'},{min:50,max:64.9,level:'yellow'},{max:49.9,level:'red'}]):'yellow',
           tgt:'>55%', tgtN:55, inv:false, unit:'%'},
        ]
      },
    ];
    return cats;
  },[cur,bs,prev,prevBs]);

  // ── Health Score ─────────────────────────────────────────────────
  const healthScore = useMemo(()=>{
    if(!kpiData) return null;
    const score = (items) => {
      const g=items.filter(i=>i.hlth==='green').length;
      const y=items.filter(i=>i.hlth==='yellow').length;
      const r=items.filter(i=>i.hlth==='red').length;
      const total=items.length;
      const pct=Math.round((g*100+y*50)/Math.max(total*100,1)*100);
      const level=pct>=75?'green':pct>=50?'yellow':'red';
      return {g,y,r,pct,level};
    };
    const liq  = score(kpiData[0].items);
    const prof = score(kpiData[1].items);
    const ops  = score(kpiData[4].items);
    const all  = kpiData.flatMap(c=>c.items);
    const total= score(all);
    return {liq,prof,ops,total,
      okCount:all.filter(i=>i.hlth==='green').length,
      warnCount:all.filter(i=>i.hlth==='yellow').length,
      redCount:all.filter(i=>i.hlth==='red').length,
      allCount:all.length};
  },[kpiData]);

  // ── KPI Insights ─────────────────────────────────────────────────
  const kpiInsights = useMemo(()=>{
    if(!cur||!kpiData) return [];
    const lines=[];
    const gopMgn=cur.gopMgn, nopMgn=cur.nopMgn, payRat=cur.payRat||0;
    const cr=bs.tCA/Math.max(bs.tCL,0.001);

    if(nopMgn<0)
      lines.push({sev:'red', msg:`NOP margin is negative at ${nopMgn.toFixed(1)}%. Revenue of ${fM(cur.rev)} is insufficient to cover below-the-line charges. Review debt service and depreciation load.`});
    else if(nopMgn<5)
      lines.push({sev:'yellow', msg:`NOP margin of ${nopMgn.toFixed(1)}% is below the 5% target. Monitor non-operating expenses to protect bottom-line profitability.`});
    else
      lines.push({sev:'green', msg:`NOP margin of ${nopMgn.toFixed(1)}% is on target. Profitability is tracking within the healthy range.`});

    if(gopMgn<20)
      lines.push({sev:'red', msg:`GOP margin ${gopMgn.toFixed(1)}% — critical. Operating cost structure is consuming most revenue. Prioritise cost reduction across dept payroll and overhead.`});
    else if(gopMgn<30)
      lines.push({sev:'yellow', msg:`GOP margin ${gopMgn.toFixed(1)}% is below 30% benchmark. Operational efficiency needs improvement — review overhead and department expenses.`});

    if(payRat>38)
      lines.push({sev:'red', msg:`Payroll ratio ${payRat.toFixed(1)}% is critically above 35% target. Staffing cost relative to revenue is unsustainable — review headcount vs occupancy.`});
    else if(payRat>35)
      lines.push({sev:'yellow', msg:`Payroll ratio ${payRat.toFixed(1)}% exceeds 35% target. Consider productivity review or flex staffing model tied to occupancy levels.`});

    if(cr<1.2)
      lines.push({sev:'red', msg:`Current ratio ${cr.toFixed(2)}x is below 1.2 — liquidity risk. Current liabilities ${fM(bs.tCL)} exceed current assets. Monitor cash flow weekly.`});
    else if(cr<1.5)
      lines.push({sev:'yellow', msg:`Current ratio ${cr.toFixed(2)}x is adequate but below 1.5x target. Maintain cash position and avoid large unplanned expenditures.`});

    if(prev){
      const gopTrend=cur.gopMgn-(prev.gopMgn||0);
      const nopTrend=cur.nopMgn-(prev.nopMgn||0);
      if(Math.abs(gopTrend)>=2||Math.abs(nopTrend)>=2)
        lines.push({sev:gopTrend>=0?'green':'yellow',
          msg:`vs Prior period: GOP margin ${gopTrend>=0?'improved':'declined'} ${Math.abs(gopTrend).toFixed(1)}pp, NOP margin ${nopTrend>=0?'improved':'declined'} ${Math.abs(nopTrend).toFixed(1)}pp.`});
    }
    return lines.slice(0,5);
  },[cur,bs,kpiData,prev]);

  // ── Trend chart ───────────────────────────────────────────────────
  const trendKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
  const trendData = useMemo(()=>(!isAnn?trendKeys.filter(k=>TB[k]):[]).map((k,i)=>{
    const d=pnl(TB[k]);
    return {name:ML[i],gopMgn:+d.gopMgn.toFixed(1),nopMgn:+d.nopMgn.toFixed(1),payRat:+d.payRat.toFixed(1),utlRat:+d.utlRat.toFixed(1)};
  }),[yr,isAnn,tbVersion]);

  if(!cur||!kpiData||!healthScore)
    return <div style={{padding:40,color:T.muted,textAlign:'center'}}>No data for selected period.</div>;

  const scoreColor = (pct) => pct>=75?T.green:pct>=50?T.yellow:T.red;

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>FINANCIAL KPI MONITOR</div>
          <div style={{color:T.muted,fontSize:11}}>Health Dashboard · {periodLabel} · {healthScore.okCount}/{healthScore.allCount} green</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* ── Financial Health Scorecard ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}} className="r-grid-4">
        {[
          {l:'Overall Health', s:healthScore.total, icon:'🏥'},
          {l:'Liquidity Score',s:healthScore.liq,   icon:'💧'},
          {l:'Profitability',  s:healthScore.prof,  icon:'📈'},
          {l:'Operations',     s:healthScore.ops,   icon:'🏨'},
        ].map(({l,s,icon})=>(
          <div key={l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',
            borderLeft:`3px solid ${scoreColor(s.pct)}`}}>
            <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>{icon} {l}</div>
            <div style={{fontSize:22,fontWeight:800,color:scoreColor(s.pct),fontFamily:"'IBM Plex Mono'"}}>{s.pct}%</div>
            <div style={{height:4,background:T.border,borderRadius:2,overflow:'hidden',marginTop:4}}>
              <div style={{width:`${s.pct}%`,height:'100%',background:scoreColor(s.pct),borderRadius:2}}/>
            </div>
            <div style={{fontSize:9,color:T.muted,marginTop:3}}>
              🟢{s.g} 🟡{s.y} 🔴{s.r}
            </div>
          </div>
        ))}
      </div>

      {/* ── KPI Grid + right panel ── */}
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:14}} className="r-grid-2">

        {/* KPI Cards */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}} className="r-grid-2">
          {kpiData.map(cat=>(
            <Card key={cat.cat}>
              <div style={{color:cat.color,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",fontWeight:700,marginBottom:10}}>
                {cat.icon} {cat.cat.toUpperCase()}
              </div>
              {cat.items.map(item=>{
                const t = trend(item.val, item.prev, item.inv);
                const hc= hColor(item.hlth);
                const hi= hIcon(item.hlth);
                const dispVal = (validate&&validate.warn)
                  ? <span style={{color:T.yellow}}>{item.fmt(item.val)} ⚠</span>
                  : <span>{item.fmt(item.val)}</span>;
                return (
                  <div key={item.l} style={{padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div style={{flex:1}}>
                        <div style={{color:T.sub,fontSize:10}}>{item.l}</div>
                        <div style={{color:T.muted,fontSize:8,marginTop:1}}>Target: {item.tgt}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{display:'flex',alignItems:'center',gap:5}}>
                          <span style={{color:hc,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{dispVal}</span>
                          <span style={{fontSize:11}}>{hi}</span>
                        </div>
                        {item.prev!=null&&(
                          <div style={{fontSize:8,color:t.color,fontFamily:"'IBM Plex Mono'",marginTop:1}}>
                            {t.label}
                          </div>
                        )}
                      </div>
                    </div>
                    {/* Mini progress bar: actual vs target */}
                    {item.unit!=='M'&&item.unit!=='x'&&typeof item.val==='number'&&(
                      <div style={{height:3,background:T.border,borderRadius:2,overflow:'hidden',marginTop:4}}>
                        <div style={{
                          width:`${Math.min(item.inv?Math.max(0,100-(item.val/item.tgtN*100-100)):Math.min(item.val/item.tgtN*100,120),100)}%`,
                          height:'100%',background:hc,borderRadius:2
                        }}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </Card>
          ))}
        </div>

        {/* Right: trend chart + health check */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Card>
            <SectionTitle>MARGIN TREND — {yr}</SectionTitle>
            {trendData.length>0?(
              <ResponsiveContainer width="100%" height={180}>
                <LineChart data={trendData} margin={{top:4,right:8,bottom:4,left:8}}>
                  <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                  <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
                  <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/>
                  <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v}%`,n]}/>
                  <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9}}/>
                  <Line isAnimationActive={false} type="monotone" dataKey="gopMgn" stroke={T.green}  name="GOP%"     strokeWidth={2} dot={{r:3}}/>
                  <Line isAnimationActive={false} type="monotone" dataKey="nopMgn" stroke={T.secondary} name="NOP%" strokeWidth={2} dot={{r:3}}/>
                  <Line isAnimationActive={false} type="monotone" dataKey="payRat" stroke={T.red}    name="Payroll%" strokeWidth={1.5} dot={{r:3}} strokeDasharray="4 2"/>
                  <ReferenceLine y={30} stroke={T.green}  strokeDasharray="3 3" label={{value:'30%',fill:T.muted,fontSize:8,position:'right'}}/>
                  <ReferenceLine y={35} stroke={T.yellow} strokeDasharray="3 3" label={{value:'35%',fill:T.muted,fontSize:8,position:'right'}}/>
                  <ReferenceLine y={0}  stroke={T.red}    strokeDasharray="3 3"/>
                </LineChart>
              </ResponsiveContainer>
            ):(
              <div style={{height:180,display:'flex',alignItems:'center',justifyContent:'center',color:T.muted,fontSize:11}}>
                No monthly trend for annual view
              </div>
            )}
          </Card>

          <Card>
            <SectionTitle>QUICK HEALTH CHECK</SectionTitle>
            {[
              {l:'Revenue',    v:fM(cur.rev),  ok:cur.rev>0,      lvl:cur.rev>0?'green':'red'},
              {l:'GOP',        v:fM(cur.gop),  ok:cur.gop>0,      lvl:cur.gopMgn>=30?'green':cur.gopMgn>=20?'yellow':'red'},
              {l:'NOP',        v:fM(cur.nop),  ok:cur.nop>0,      lvl:cur.nopMgn>=5?'green':cur.nopMgn>=0?'yellow':'red'},
              {l:'Cash (BS)',  v:fM(bs.cash),  ok:bs.cash>0,      lvl:bs.cash>1?'green':bs.cash>0?'yellow':'red'},
              {l:'WC',         v:fM(bs.tCA-bs.tCL), ok:bs.tCA>bs.tCL, lvl:bs.tCA-bs.tCL>0.5?'green':bs.tCA>bs.tCL?'yellow':'red'},
              {l:'D/E Ratio',  v:(bs.tL/Math.max(bs.tEq,0.001)).toFixed(2)+'x', ok:bs.tL/Math.max(bs.tEq,0.001)<1, lvl:bs.tL/Math.max(bs.tEq,0.001)<0.8?'green':bs.tL/Math.max(bs.tEq,0.001)<1.2?'yellow':'red'},
            ].map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.sub,fontSize:10}}>{r.l}</span>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{color:hColor(r.lvl),fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{r.v}</span>
                  <span style={{fontSize:10}}>{hIcon(r.lvl)}</span>
                </div>
              </div>
            ))}
          </Card>
        </div>
      </div>

      {/* ── KPI Insight Summary ── */}
      {kpiInsights.length>0&&(
        <Card>
          <SectionTitle>KPI HEALTH INSIGHTS — {periodLabel}</SectionTitle>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:8}}>
            {kpiInsights.map((ins,i)=>{
              const c={red:T.red,yellow:T.yellow,green:T.green}[ins.sev]||T.accent;
              const icon={red:'🔴',yellow:'⚠️',green:'✅'}[ins.sev]||'💡';
              return (
                <div key={i} style={{display:'flex',gap:10,padding:'10px 14px',
                  background:`${c}08`,borderRadius:8,borderLeft:`3px solid ${c}`}}>
                  <span style={{fontSize:16,lineHeight:1.5}}>{icon}</span>
                  <span style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{ins.msg}</span>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

function ForecastPage({ tbVersion=0 }) {
  const [lang]       = React.useContext(LangContext);
  const [baseYear,   setBaseYear]   = useState('2025');
  const [activeView, setActiveView] = useState('chart');
  const [savedFcst,  setSavedFcst]  = useState(null);
  const [saveStatus, setSaveStatus] = useState('');
  // "Used Forecast" custom assumptions
  const [usedGrowth, setUsedGrowth] = useState(8);
  const [usedCost,   setUsedCost]   = useState(4);
  const [usedName,   setUsedName]   = useState('My Forecast');
  const [activeScenario, setActiveScenario] = useState('used'); // for chart focus

  const FC_KEY = 'gds_forecast_v3';

  // Load saved forecast
  useEffect(()=>{
    try {
      const r = localStorage.getItem(FC_KEY);
      if(r){
        const p = JSON.parse(r);
        setSavedFcst(p);
        if(p.usedGrowth!=null) setUsedGrowth(p.usedGrowth);
        if(p.usedCost  !=null) setUsedCost(p.usedCost);
        if(p.usedName  !=null) setUsedName(p.usedName);
        if(p.baseYear  !=null) setBaseYear(p.baseYear);
      }
    } catch(e){}
  },[]);

  // Reference scenarios (auto, read-only)
  const refScenarios = {
    conservative: {name:'Conservative', color:T.yellow,  revGrowth:3,  costInfl:6},
    base:         {name:'Base Case',    color:T.accent,  revGrowth:8,  costInfl:4},
    optimistic:   {name:'Optimistic',   color:T.green,   revGrowth:15, costInfl:2},
  };

  // Actual months
  const actualKeys = mKeys26_ytd.filter(k=>TB[k]);
  const latestMo   = actualKeys.length;

  // Base period: avg monthly from selected base year, via pnl()
  const basePeriod = useMemo(()=>{
    let src;
    if(baseYear==='2024') src = mKeys24.filter(k=>TB[k]);
    else if(baseYear==='2025') src = mKeys25.filter(k=>TB[k]);
    else {
      const ann = pnl(ANN[parseInt(baseYear)]||{});
      const out={};
      Object.keys(ann).forEach(k=>{ out[k]=typeof ann[k]==='number'?ann[k]/12:ann[k]; });
      out.occ=ann.occ; out.arr=ann.arr;
      return out;
    }
    if(!src.length) return pnl({});
    const n=src.length;
    const rawSum={};
    src.forEach(k=>{
      Object.entries(TB[k]).forEach(([f,v])=>{ rawSum[f]=(rawSum[f]||0)+(typeof v==='number'?v:0); });
    });
    const rawAvg={};
    Object.keys(rawSum).forEach(k=>{ rawAvg[k]=rawSum[k]/n; });
    const base=pnl(rawAvg);
    base.occ = src.map(k=>{ const d=TB[k]; return d.avail>0?d.occ/d.avail*100:(d.occ>0&&d.occ<=100?d.occ:0); }).reduce((a,b)=>a+b,0)/n;
    base.arr = rawAvg.arr||0;
    return base;
  },[baseYear, tbVersion]);

  // Seasonal weights: rev + cost + occ (from base year monthly data)
  const seasonalWeights = useMemo(()=>{
    const srcKeys = baseYear==='2024'?mKeys24 : baseYear==='2025'?mKeys25 : mKeys24;
    const avail=srcKeys.filter(k=>TB[k]);
    if(!avail.length) return Array(12).fill({rev:1,cost:1,occ:1});
    const n=avail.length;
    const totalRev  = avail.map(k=>pnl(TB[k]).rev).reduce((a,b)=>a+b,0);
    const totalCost = avail.map(k=>{ const d=pnl(TB[k]); return d.cos+d.deptPay+d.deptOther+d.ovhdPay+d.ovhdOther; }).reduce((a,b)=>a+b,0);
    const avgRev=totalRev/n, avgCost=totalCost/n;
    const occArr=avail.map(k=>{ const d=TB[k]; return d.avail>0?d.occ/d.avail*100:(d.occ>0&&d.occ<=100?d.occ:0); });
    const avgOcc=occArr.reduce((a,b)=>a+b,0)/n;
    return Array.from({length:12},(_,i)=>{
      const k=srcKeys[i];
      if(!k||!TB[k]) return {rev:1,cost:1,occ:1};
      const d=pnl(TB[k]);
      const revW  = avgRev >0?d.rev/avgRev:1;
      const tc    = d.cos+d.deptPay+d.deptOther+d.ovhdPay+d.ovhdOther;
      const costW = avgCost>0?tc/avgCost:1;
      const moOcc = TB[k].avail>0?TB[k].occ/TB[k].avail*100:(TB[k].occ||0);
      const occW  = avgOcc>0?moOcc/avgOcc:1;
      return {rev:revW,cost:costW,occ:occW};
    });
  },[baseYear, tbVersion]);

  // Fixed charges (flat per month, not scaled)
  const fixedCharges = useMemo(()=>({
    depr:       basePeriod.deprTotal||(basePeriod.depr||0)+(basePeriod.amor||0),
    incentFee:  basePeriod.incentFee||0,
    mgmtFee:    basePeriod.mgmtFee||0,
    roi:        basePeriod.roi||0,
    roiSub:     basePeriod.roiSub||0,
    landTax:    basePeriod.landTax||0,
    insur:      basePeriod.insur||0,
    ownExp:     basePeriod.ownExp||0,
    otherNonOp: basePeriod.otherNonOp||0,
  }),[basePeriod]);

  // Budget monthly
  const budMonthly = useMemo(()=>
    Array.from({length:12},(_,i)=>{ const k=`2026-${String(i+1).padStart(2,'0')}`; return BUD26[k]?pnl(BUD26[k]):null; })
  ,[]);

  // Core forecast calculation per growth/cost assumption
  const calcForecast = (rg, ci) => {
    const rows=[];
    for(let mo=1;mo<=12;mo++){
      const moIdx=mo-1;
      const k=`2026-${String(mo).padStart(2,'0')}`;
      const isActual=TB[k]!=null;
      const row={name:ML[moIdx], mo, isActual};
      const sw=seasonalWeights[moIdx]||{rev:1,cost:1,occ:1};
      const b=budMonthly[moIdx];
      if(b){ row.budRev=+b.rev.toFixed(4); row.budGOP=+b.gop.toFixed(4); row.budNOP=+b.nop.toFixed(4); row.budOcc=+(b.occ||0).toFixed(1); }
      if(isActual){
        const d=pnl(TB[k]);
        row.actRev=+d.rev.toFixed(4); row.actGOP=+d.gop.toFixed(4); row.actNOP=+d.nop.toFixed(4);
        row.actOCF=+(d.nop+(d.deprTotal||0)).toFixed(4);
        const occPct=TB[k].avail>0?TB[k].occ/TB[k].avail*100:(TB[k].occ>0&&TB[k].occ<=100?TB[k].occ:0);
        row.actOcc=+occPct.toFixed(1);
      }
      const fcPeriod=isActual?0:mo-latestMo;
      const gf=fcPeriod>0?Math.pow(1+rg/100,fcPeriod/12):1;
      const cf=fcPeriod>0?Math.pow(1+ci/100,fcPeriod/12):1;
      const rev   = basePeriod.rev*gf*sw.rev;
      const cos   = (basePeriod.cos||0)*cf*sw.cost;
      const dPay  = (basePeriod.deptPay||0)*cf*sw.cost;
      const dOth  = (basePeriod.deptOther||0)*cf*sw.cost;
      const oPay  = (basePeriod.ovhdPay||0)*cf*sw.cost;
      const oOth  = (basePeriod.ovhdOther||0)*cf*sw.cost;
      const fx    = fixedCharges;
      const gop   = rev-cos-dPay-dOth-oPay-oOth;
      const nonOp = fx.depr+fx.incentFee+fx.mgmtFee+fx.roi+fx.roiSub+fx.landTax+fx.insur+fx.ownExp+fx.otherNonOp;
      const nop   = gop-nonOp;
      const occBase=basePeriod.occ||0;
      const projOcc=Math.min(Math.max(occBase*sw.occ*(fcPeriod>0?1+rg/100*0.5*fcPeriod/12:1),0),100);
      row.fcRev=+rev.toFixed(4); row.fcGOP=+gop.toFixed(4); row.fcNOP=+nop.toFixed(4);
      row.fcOCF=+(nop+fx.depr).toFixed(4); row.fcOcc=+projOcc.toFixed(1);
      rows.push(row);
    }
    return rows;
  };

  // Calculate all 4 scenario datasets
  const refData = useMemo(()=>({
    conservative: calcForecast(refScenarios.conservative.revGrowth, refScenarios.conservative.costInfl),
    base:         calcForecast(refScenarios.base.revGrowth,         refScenarios.base.costInfl),
    optimistic:   calcForecast(refScenarios.optimistic.revGrowth,   refScenarios.optimistic.costInfl),
  }),[basePeriod, seasonalWeights, fixedCharges, latestMo]);

  const usedData = useMemo(()=>
    calcForecast(usedGrowth, usedCost)
  ,[usedGrowth, usedCost, basePeriod, seasonalWeights, fixedCharges, latestMo]);

  // Annual summaries
  const annSum = (rows) => ({
    rev: rows.reduce((s,r)=>s+(r.isActual?r.actRev||0:r.fcRev||0),0),
    gop: rows.reduce((s,r)=>s+(r.isActual?r.actGOP||0:r.fcGOP||0),0),
    nop: rows.reduce((s,r)=>s+(r.isActual?r.actNOP||0:r.fcNOP||0),0),
    ocf: rows.reduce((s,r)=>s+(r.isActual?r.actOCF||0:r.fcOCF||0),0),
    occ: rows.reduce((s,r)=>s+(r.isActual?r.actOcc||0:r.fcOcc||0),0)/12,
  });

  const summaries = useMemo(()=>({
    conservative: annSum(refData.conservative),
    base:         annSum(refData.base),
    optimistic:   annSum(refData.optimistic),
    used:         annSum(usedData),
    budget: {
      rev: budMonthly.reduce((s,b)=>s+((b&&b.rev)||0),0),
      gop: budMonthly.reduce((s,b)=>s+((b&&b.gop)||0),0),
      nop: budMonthly.reduce((s,b)=>s+((b&&b.nop)||0),0),
      occ: budMonthly.reduce((s,b)=>s+((b&&b.occ)||0),0)/12,
    },
  }),[refData, usedData, budMonthly]);

  // Merge chart data (actual + all forecasts per month)
  const chartData = useMemo(()=>usedData.map((r,i)=>({
    name: r.name, mo: r.mo, isActual: r.isActual,
    actRev: r.actRev, actGOP: r.actGOP, actNOP: r.actNOP, actOCF: r.actOCF, actOcc: r.actOcc,
    budRev: r.budRev, budOcc: r.budOcc,
    conRev: refData.conservative[i].fcRev, conNOP: refData.conservative[i].fcNOP, conOcc: refData.conservative[i].fcOcc,
    baseRev:refData.base[i].fcRev,         baseNOP:refData.base[i].fcNOP,         baseOcc:refData.base[i].fcOcc,
    optRev: refData.optimistic[i].fcRev,   optNOP: refData.optimistic[i].fcNOP,   optOcc: refData.optimistic[i].fcOcc,
    usedRev:r.fcRev, usedGOP:r.fcGOP, usedNOP:r.fcNOP, usedOCF:r.fcOCF, usedOcc:r.fcOcc,
  })),[refData, usedData]);

  // Save
  const handleSave = () => {
    setSaveStatus('saving');
    const s=summaries.used;
    const payload={
      savedAt:new Date().toISOString(), savedBy:'Financial Controller',
      version:((savedFcst&&savedFcst.version)||0)+1,
      baseYear, usedGrowth, usedCost, usedName,
      annSummary: summaries,
      monthly: usedData.reduce((obj,r)=>{obj[r.mo]=r;return obj;},{}),
    };
    try {
      localStorage.setItem(FC_KEY, JSON.stringify(payload));
      setSavedFcst(payload);
      // Sync to Dashboard FORECAST_SC_REF
      if(window.FORECAST_SC_REF){
        const mk=(sc)=>summaries[sc];
        window.FORECAST_SC_REF['A_Base']=[{year:2026,
          occ:+(mk('base').occ||55).toFixed(1), gopPct:mk('base').rev>0?(mk('base').gop/mk('base').rev*100).toFixed(1):33,
          rev:+(mk('base').rev||0).toFixed(3), gop:+(mk('base').gop||0).toFixed(3), nop:+(mk('base').nop||0).toFixed(3)}];
        window.FORECAST_SC_REF['B_Optimistic']=[{year:2026,
          occ:+(mk('optimistic').occ||58).toFixed(1),
          rev:+(mk('optimistic').rev||0).toFixed(3), gop:+(mk('optimistic').gop||0).toFixed(3), nop:+(mk('optimistic').nop||0).toFixed(3)}];
        window.FORECAST_SC_REF['C_Pessimistic']=[{year:2026,
          occ:+(mk('conservative').occ||46).toFixed(1),
          rev:+(mk('conservative').rev||0).toFixed(3), gop:+(mk('conservative').gop||0).toFixed(3), nop:+(mk('conservative').nop||0).toFixed(3)}];
      }
      setSaveStatus('saved');
      // Trigger App to re-render all modules with new forecast data
      try { window.dispatchEvent(new CustomEvent('gds-forecast-saved')); } catch(e){}
      setTimeout(()=>setSaveStatus(''),3000);
    } catch(e){ setSaveStatus(''); }
  };

  const fmtDate=(iso)=>iso?new Date(iso).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}):'';

  const SCENARIO_TABS = [
    {k:'conservative', label:'Conservative', color:T.yellow},
    {k:'base',         label:'Base Case',    color:T.accent},
    {k:'optimistic',   label:'Optimistic',   color:T.green},
    {k:'used',         label:usedName||'Used Forecast', color:'#C084FC'},
  ];
  const activeColor = (SCENARIO_TABS.find(t=>t.k===activeScenario)||{}).color||T.accent;

  // Summary card helper
  const SumCard = ({label, val, bud, color, fmt='M'}) => {
    const diff=(val!=null&&bud!=null)?val-bud:null;
    return (
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 14px'}}>
        <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>{label}</div>
        <div style={{fontSize:15,fontWeight:700,color:color||T.text,fontFamily:"'IBM Plex Mono'"}}>
          {fmt==='%'?`${(val||0).toFixed(1)}%`:fM(val||0)}
        </div>
        {bud!=null&&<div style={{fontSize:9,color:T.muted}}>Bud: {fmt==='%'?`${bud.toFixed(1)}%`:fM(bud)}</div>}
        {diff!=null&&<div style={{fontSize:9,color:diff>=0?T.green:T.red}}>{diff>=0?'▲':'▼'} {fmt==='%'?`${Math.abs(diff).toFixed(1)}pp`:fM(Math.abs(diff))}</div>}
      </div>
    );
  };

  return (
    <div>
    {/* ── Header ── */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <div>
        <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>FORECAST ENGINE</div>
        <div style={{color:T.muted,fontSize:11}}>2026 · Actual Jan–{ML[latestMo-1]} + Forecast {ML[latestMo]}–Dec · Base: {baseYear}</div>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'",letterSpacing:1}}>BASE YEAR</span>
          <select value={baseYear} onChange={e=>setBaseYear(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.accent,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2023','2024','2025'].map(y=><option key={y} value={y}>{y} Avg</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:4}}>
          {['chart','table'].map(v=>(
            <button key={v} onClick={()=>setActiveView(v)}
              style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${activeView===v?T.accent:T.border}`,
              background:activeView===v?`${T.accent}20`:'transparent',color:activeView===v?T.accent:T.sub,
              cursor:'pointer',fontSize:11,fontFamily:"'IBM Plex Mono'"}}>
              {v==='chart'?'📊 Chart':'📋 Table'}
            </button>
          ))}
        </div>
        <button onClick={handleSave} disabled={saveStatus==='saving'}
          style={{padding:'7px 16px',borderRadius:6,border:'none',
          background:saveStatus==='saved'?T.green:'#C084FC',
          color:'#080C12',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
          {saveStatus==='saving'?'⟳ Saving…':saveStatus==='saved'?'✓ Saved':'💾 Save Used Forecast'}
        </button>
      </div>
    </div>

    {/* ── Saved banner ── */}
    {savedFcst&&(
      <div style={{background:`${'#C084FC'}10`,border:`1px solid ${'#C084FC'}30`,borderRadius:8,
        padding:'8px 16px',marginBottom:14,display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{color:'#C084FC',fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>💾 SAVED: {savedFcst.usedName}</span>
        <span style={{color:T.muted,fontSize:10}}>v{savedFcst.version} · {fmtDate(savedFcst.savedAt)}</span>
        <span style={{color:T.muted,fontSize:10}}>Rev Growth: {savedFcst.usedGrowth}% · Cost: {savedFcst.usedCost}%</span>
        <span style={{color:T.green,fontSize:10}}>✓ Synced to Dashboard</span>
      </div>
    )}

    {/* ── 4 Scenario Cards ── */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}} className="r-grid-2">

      {/* Reference scenarios (read-only) */}
      {Object.entries(refScenarios).map(([sc,cfg])=>{
        const sm=summaries[sc];
        const isActive=activeScenario===sc;
        return (
          <Card key={sc} onClick={()=>setActiveScenario(sc)}
            style={{cursor:'pointer',borderColor:isActive?cfg.color:T.border,borderWidth:isActive?2:1,padding:'14px 16px',opacity:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{color:isActive?cfg.color:T.sub,fontWeight:700,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{cfg.name}</span>
              <span style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'",padding:'1px 6px',borderRadius:3,background:`${T.border}`}}>REF</span>
            </div>
            <div style={{color:T.muted,fontSize:9,marginBottom:10}}>
              Rev +{cfg.revGrowth}% · Cost +{cfg.costInfl}%/yr
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
              {[['Rev',(sm&&sm.rev),'M'],['NOP',(sm&&sm.nop),'M'],['OCC',(sm&&sm.occ),'%'],['GOP%',(sm&&sm.rev)>0?(sm.gop/sm.rev*100):0,'%']].map(([k,v,fmt])=>(
                <div key={k}>
                  <div style={{color:T.muted,fontSize:7}}>{k}</div>
                  <div style={{color:(k==='NOP'?((v||0)>=0?cfg.color:T.red):T.text),fontSize:10,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
                    {fmt==='%'?`${(v||0).toFixed(1)}%`:fM(v||0)}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        );
      })}

      {/* Used Forecast (editable) */}
      {(()=>{
        const sm=summaries.used;
        const isActive=activeScenario==='used';
        const purple='#C084FC';
        return (
          <Card onClick={()=>setActiveScenario('used')}
            style={{cursor:'pointer',borderColor:isActive?purple:T.border,borderWidth:isActive?2:1,
              padding:'14px 16px',background:isActive?`${purple}05`:T.card}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <input value={usedName} onChange={e=>setUsedName(e.target.value)}
                onClick={e=>e.stopPropagation()}
                style={{background:'transparent',border:'none',color:isActive?purple:T.text,
                  fontWeight:700,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none',width:'70%'}}
                placeholder="My Forecast"/>
              <span style={{color:purple,fontSize:9,fontFamily:"'IBM Plex Mono'",padding:'1px 6px',borderRadius:3,background:`${purple}20`,fontWeight:700}}>ACTIVE</span>
            </div>
            {/* Sliders */}
            <div style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                <span style={{color:T.muted,fontSize:8}}>Rev Growth/yr</span>
                <span style={{color:purple,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{usedGrowth}%</span>
              </div>
              <input type="range" min={-10} max={30} value={usedGrowth}
                onChange={e=>setUsedGrowth(+e.target.value)} onClick={e=>e.stopPropagation()}
                style={{width:'100%',accentColor:purple,height:4}}/>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                <span style={{color:T.muted,fontSize:8}}>Cost Inflation/yr</span>
                <span style={{color:T.yellow,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{usedCost}%</span>
              </div>
              <input type="range" min={0} max={15} value={usedCost}
                onChange={e=>setUsedCost(+e.target.value)} onClick={e=>e.stopPropagation()}
                style={{width:'100%',accentColor:T.yellow,height:4}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,paddingTop:6,borderTop:`1px solid ${T.border}`}}>
              {[['Rev',(sm&&sm.rev),'M'],['NOP',(sm&&sm.nop),'M'],['OCC',(sm&&sm.occ),'%'],['GOP%',(sm&&sm.rev)>0?(sm.gop/sm.rev*100):0,'%']].map(([k,v,fmt])=>(
                <div key={k}>
                  <div style={{color:T.muted,fontSize:7}}>{k}</div>
                  <div style={{color:(k==='NOP'?((v||0)>=0?purple:T.red):T.text),fontSize:10,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>
                    {fmt==='%'?`${(v||0).toFixed(1)}%`:fM(v||0)}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        );
      })()}
    </div>

    {/* ── KPI Strip — Used Forecast ── */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,marginBottom:14}} className="r-grid-3">
      <SumCard label="FY Rev (Used)"  val={(summaries.used&&summaries.used.rev)}  bud={(summaries.budget&&summaries.budget.rev)}  color='#C084FC'/>
      <SumCard label="FY GOP (Used)"  val={(summaries.used&&summaries.used.gop)}  bud={(summaries.budget&&summaries.budget.gop)}  color={T.secondary}/>
      <SumCard label="FY NOP (Used)"  val={(summaries.used&&summaries.used.nop)}  bud={(summaries.budget&&summaries.budget.nop)}  color={(summaries.used&&summaries.used.nop)>=0?T.green:T.red}/>
      <SumCard label="Avg OCC (Used)" val={(summaries.used&&summaries.used.occ)}  bud={(summaries.budget&&summaries.budget.occ)}  color={T.yellow} fmt="%"/>
      <SumCard label="Op. CF (Used)"  val={(summaries.used&&summaries.used.ocf)}  bud={null} color={(summaries.used&&summaries.used.ocf)>=0?T.green:T.red}/>
      <SumCard label="NOP Margin"     val={(summaries.used&&summaries.used.rev)>0?(summaries.used.nop/summaries.used.rev*100):0} bud={null} color={T.muted} fmt="%"/>
    </div>

    {/* ── Tab to focus chart ── */}
    <div style={{display:'flex',gap:6,marginBottom:12}}>
      <span style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono'",alignSelf:'center'}}>CHART FOCUS:</span>
      {SCENARIO_TABS.map(({k,label,color})=>(
        <button key={k} onClick={()=>setActiveScenario(k)}
          style={{padding:'4px 12px',borderRadius:5,border:`1px solid ${activeScenario===k?color:T.border}`,
          background:activeScenario===k?`${color}20`:'transparent',
          color:activeScenario===k?color:T.sub,
          cursor:'pointer',fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:activeScenario===k?700:400}}>
          {label}
        </button>
      ))}
    </div>

    {activeView==='chart' ? (
    <div style={{display:'grid',gridTemplateColumns:'3fr 1fr',gap:12,marginBottom:14}} className="r-grid-2">
      <div style={{display:'flex',flexDirection:'column',gap:12}}>

        {/* Revenue Chart — all 4 scenarios */}
        <Card>
          <SectionTitle>REVENUE 2026 — ACTUAL vs ALL SCENARIOS</SectionTitle>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={chartData} margin={{top:4,right:8,bottom:4,left:8}}>
              <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
              <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
              <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false}
                tickFormatter={v=>`${(v*1000).toFixed(0)}M`} domain={['auto','auto']}/>
              <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}}
                formatter={(v,n)=>[v!=null?fM(v):'—',n]}/>
              <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:9}}/>
              <Bar isAnimationActive={false} dataKey="actRev"  name="Actual"       fill={T.accent}       radius={[2,2,0,0]}/>
              <Bar isAnimationActive={false} dataKey="budRev"  name="Budget"       fill={`${T.accent}20`} radius={[2,2,0,0]}/>
              <Line isAnimationActive={false} type="monotone" dataKey="conRev"  name="Conservative"
                stroke={T.yellow}
                strokeWidth={activeScenario==='conservative'?3:1}
                strokeOpacity={activeScenario==='conservative'||activeScenario===null?1:activeScenario==='used'?0.2:0.4}
                strokeDasharray={activeScenario==='conservative'?'0':'4 3'} dot={false}/>
              <Line isAnimationActive={false} type="monotone" dataKey="baseRev" name="Base Case"
                stroke={T.accent}
                strokeWidth={activeScenario==='base'?3:1}
                strokeOpacity={activeScenario==='base'||activeScenario===null?1:activeScenario==='used'?0.2:0.4}
                strokeDasharray={activeScenario==='base'?'0':'4 3'} dot={false}/>
              <Line isAnimationActive={false} type="monotone" dataKey="optRev"  name="Optimistic"
                stroke={T.green}
                strokeWidth={activeScenario==='optimistic'?3:1}
                strokeOpacity={activeScenario==='optimistic'||activeScenario===null?1:activeScenario==='used'?0.2:0.4}
                strokeDasharray={activeScenario==='optimistic'?'0':'4 3'} dot={false}/>
              <Line isAnimationActive={false} type="monotone" dataKey="usedRev" name="Used Forecast"
                stroke="#C084FC"
                strokeWidth={activeScenario==='used'?3:2}
                strokeOpacity={1} dot={false}/>
            </ComposedChart>
          </ResponsiveContainer>
        </Card>

        {/* OCC Chart */}
        <Card>
          <SectionTitle>OCCUPANCY % — ACTUAL vs FORECAST vs BUDGET</SectionTitle>
          <ResponsiveContainer width="100%" height={160}>
            <ComposedChart data={chartData} margin={{top:4,right:8,bottom:4,left:8}}>
              <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
              <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
              <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false}
                tickFormatter={v=>`${v.toFixed(0)}%`} domain={[0,100]}/>
              <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}}
                formatter={(v,n)=>[v!=null?`${v.toFixed(1)}%`:'—',n]}/>
              <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:9}}/>
              <Line isAnimationActive={false} type="monotone" dataKey="actOcc"  name="Actual OCC"    stroke={T.yellow} strokeWidth={2.5} dot={{r:3,fill:T.yellow}}/>
              <Line isAnimationActive={false} type="monotone" dataKey="budOcc"  name="Budget OCC"    stroke={T.muted}  strokeWidth={1} strokeDasharray="3 3" dot={false}/>
              <Line isAnimationActive={false} type="monotone" dataKey="conOcc"  name="Conservative"
                stroke={T.yellow} strokeWidth={activeScenario==='conservative'?2.5:1}
                strokeOpacity={activeScenario==='conservative'?1:0.3}
                strokeDasharray="4 3" dot={false}/>
              <Line isAnimationActive={false} type="monotone" dataKey="baseOcc" name="Base Case"
                stroke={T.accent} strokeWidth={activeScenario==='base'?2.5:1}
                strokeOpacity={activeScenario==='base'?1:0.3}
                strokeDasharray="4 3" dot={false}/>

                <td style={{padding:'6px 8px',textAlign:'right',fontFamily:"'IBM Plex Mono'",fontWeight:700,color:chartData.reduce((s,r)=>s+(r.actNOP||0),0)>=0?T.green:T.red}}>{fM(chartData.reduce((s,r)=>s+(r.actNOP||0),0))}</td>
                <td style={{padding:'6px 8px',textAlign:'right',fontFamily:"'IBM Plex Mono'",fontWeight:700,color:(summaries.used&&summaries.used.nop)>=0?'#C084FC':T.red}}>{fM((summaries.used&&summaries.used.nop)||0)}</td>
                <td style={{padding:'6px 8px',textAlign:'right',fontFamily:"'IBM Plex Mono'",color:T.yellow}}>{(chartData.reduce((s,r)=>s+(r.actOcc||0),0)/Math.max(latestMo,1)).toFixed(1)}%</td>
                <td style={{padding:'6px 8px',textAlign:'right',fontFamily:"'IBM Plex Mono'",color:'#C084FC',fontWeight:700}}>{((summaries.used&&summaries.used.occ)||0).toFixed(1)}%</td>
                <td style={{padding:'6px 8px',textAlign:'right',fontFamily:"'IBM Plex Mono'",color:T.muted}}>{((summaries.budget&&summaries.budget.occ)||0).toFixed(1)}%</td>

        </div>
      </Card>
    </div>
    )}

    {/* ── Insight ── */}
    <Card>
      <SectionTitle>FORECAST INSIGHT — USED: {usedName.toUpperCase()}</SectionTitle>
      <div style={{color:T.sub,fontSize:12,lineHeight:1.8}}>
        {(()=>{
          const s=summaries.used; if(!s) return '';
          const nopMgn=s.rev>0?(s.nop/s.rev*100):0;
          const bDiff=(summaries.budget&&summaries.budget.rev)>0?(s.rev-summaries.budget.rev)/summaries.budget.rev*100:0;
          const baseDiff=(summaries.base&&summaries.base.rev)>0?(s.rev-summaries.base.rev)/summaries.base.rev*100:0;

            `vs Budget: ${bDiff>=0?'above':'below'} by ${Math.abs(bDiff).toFixed(1)}%. `+
            `vs Base Case: ${baseDiff>=0?'above':'below'} by ${Math.abs(baseDiff).toFixed(1)}%. `+
