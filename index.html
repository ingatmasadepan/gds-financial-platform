    +'<tr><td class="ind">Depreciation &amp; Amortisation</td><td class="red">('+fV(d.dp)+')</td><td class="red">'+fPct(d.dp/d.rev*100)+'</td></tr>'
    +'<tr class="sub2"><td class="bold">EBIT</td><td>'+fV(d.ebit)+'</td><td>'+fPct(d.ebit/d.rev*100)+'</td></tr>'
    +'<tr><td class="ind">Interest Expense</td><td class="red">('+fV(d.it)+')</td><td class="red">'+fPct(d.it/d.rev*100)+'</td></tr>'
    +'<tr class="sub2"><td class="bold">Earnings Before Tax</td><td>'+fV(d.ebt)+'</td><td>'+fPct(d.ebt/d.rev*100)+'</td></tr>'
    +'<tr><td class="ind">Income Tax (22%)</td><td class="red">('+fV(d.tax)+')</td><td class="red">'+fPct(d.tax/d.rev*100)+'</td></tr>'
    +'<tr class="tr"><td class="bold acc">NET PROFIT</td><td class="grn" style="font-size:14px">'+fV(d.nop)+'</td><td class="grn">'+fPct(d.nopMgn)+'</td></tr>'
    +'</tbody></table>';
  }

  // ── Balance Sheet section ──
  var bsHTML = '';
  if(showBS){
    var bsChk = Math.abs(bs.tA-(bs.tL+bs.tEq))<1;
    bsHTML = '<h2>Balance Sheet &mdash; '+perLabel+'</h2>'
    +'<table><thead><tr><th>Account</th><th>Current (M IDR)</th><th>Prior (M IDR)</th><th>Change</th></tr></thead><tbody>'
    +'<tr class="sr"><td colspan="4">ASSETS &mdash; CURRENT</td></tr>'
    +'<tr><td class="ind">Cash &amp; Equivalents</td><td>'+fV(bs.cash)+'</td><td>'+fV(bsp.cash)+'</td><td style="color:'+(bs.cash>=bsp.cash?grn:red)+'">'+vPct(bs.cash,bsp.cash)+'</td></tr>'
    +'<tr><td class="ind">Accounts Receivable</td><td>'+fV(bs.ar)+'</td><td>'+fV(bsp.ar)+'</td><td>'+vPct(bs.ar,bsp.ar)+'</td></tr>'
    +'<tr><td class="ind">Inventories</td><td>'+fV(bs.inv)+'</td><td>'+fV(bsp.inv)+'</td><td>'+vPct(bs.inv,bsp.inv)+'</td></tr>'
    +'<tr><td class="ind">Prepaid &amp; Others</td><td>'+fV(bs.pre)+'</td><td>'+fV(bsp.pre)+'</td><td>'+vPct(bs.pre,bsp.pre)+'</td></tr>'
    +'<tr class="sub2"><td class="bold">Total Current Assets</td><td class="bold">'+fV(bs.tCA)+'</td><td>'+fV(bsp.tCA)+'</td><td style="color:'+(bs.tCA>=bsp.tCA?grn:red)+'">'+vPct(bs.tCA,bsp.tCA)+'</td></tr>'
    +'<tr class="sr"><td colspan="4">ASSETS &mdash; NON-CURRENT</td></tr>'
    +'<tr><td class="ind">Fixed Assets (Gross)</td><td>'+fV(bs.fixG)+'</td><td>'+fV(bsp.fixG)+'</td><td>'+vPct(bs.fixG,bsp.fixG)+'</td></tr>'
    +'<tr><td class="ind">Accum. Depreciation</td><td class="red">('+fV(bs.accD)+')</td><td class="red">('+fV(bsp.accD)+')</td><td>-</td></tr>'
    +'<tr><td class="ind bold">Net Fixed Assets</td><td class="bold">'+fV(bs.netF)+'</td><td>'+fV(bsp.netF)+'</td><td>'+vPct(bs.netF,bsp.netF)+'</td></tr>'
    +'<tr><td class="ind">Other Non-Current Assets</td><td>'+fV(bs.otNA)+'</td><td>'+fV(bsp.otNA)+'</td><td>-</td></tr>'
    +'<tr class="tr"><td class="bold acc">TOTAL ASSETS</td><td class="acc" style="font-size:14px">'+fV(bs.tA)+'</td><td>'+fV(bsp.tA)+'</td><td style="color:'+(bs.tA>=bsp.tA?grn:red)+'">'+vPct(bs.tA,bsp.tA)+'</td></tr>'
    +'<tr class="sr"><td colspan="4">LIABILITIES &mdash; CURRENT</td></tr>'
    +'<tr><td class="ind">Accounts Payable</td><td>'+fV(bs.ap)+'</td><td>'+fV(bsp.ap)+'</td><td>'+vPct(bs.ap,bsp.ap)+'</td></tr>'
    +'<tr><td class="ind">Accrued Expenses</td><td>'+fV(bs.acc)+'</td><td>'+fV(bsp.acc)+'</td><td>'+vPct(bs.acc,bsp.acc)+'</td></tr>'
    +'<tr><td class="ind">Current Portion LT Debt</td><td>'+fV(bs.cLTD)+'</td><td>'+fV(bsp.cLTD)+'</td><td>'+vPct(bs.cLTD,bsp.cLTD)+'</td></tr>'
    +'<tr class="sub2"><td class="bold">Total Current Liabilities</td><td class="bold">'+fV(bs.tCL)+'</td><td>'+fV(bsp.tCL)+'</td><td>'+vPct(bs.tCL,bsp.tCL)+'</td></tr>'
    +'<tr class="sr"><td colspan="4">LIABILITIES &mdash; LONG-TERM</td></tr>'
    +'<tr><td class="ind">Long-term Debt</td><td>'+fV(bs.ltD)+'</td><td>'+fV(bsp.ltD)+'</td><td style="color:'+(bs.ltD<=bsp.ltD?grn:red)+'">'+vPct(bs.ltD,bsp.ltD)+'</td></tr>'
    +'<tr><td class="ind">Deferred Tax Liability</td><td>'+fV(bs.dTax)+'</td><td>'+fV(bsp.dTax)+'</td><td>'+vPct(bs.dTax,bsp.dTax)+'</td></tr>'
    +'<tr class="sub2"><td class="bold">Total Liabilities</td><td class="bold">'+fV(bs.tL)+'</td><td>'+fV(bsp.tL)+'</td><td>'+vPct(bs.tL,bsp.tL)+'</td></tr>'
    +'<tr class="sr"><td colspan="4">EQUITY</td></tr>'
    +'<tr><td class="ind">Paid-in Capital</td><td>'+fV(bs.pic)+'</td><td>'+fV(bsp.pic)+'</td><td>-</td></tr>'
    +'<tr><td class="ind">Retained Earnings</td><td>'+fV(bs.re)+'</td><td>'+fV(bsp.re)+'</td><td style="color:'+(bs.re>=bsp.re?grn:red)+'">'+vPct(bs.re,bsp.re)+'</td></tr>'
    +'<tr class="tr"><td class="bold acc">TOTAL EQUITY</td><td class="acc" style="font-size:14px">'+fV(bs.tEq)+'</td><td>'+fV(bsp.tEq)+'</td><td style="color:'+(bs.tEq>=bsp.tEq?grn:red)+'">'+vPct(bs.tEq,bsp.tEq)+'</td></tr>'
    +'<tr><td colspan="2" style="font-size:11px;color:'+sub+';padding:6px 12px">Check: Assets = Liabilities + Equity</td>'
    +'<td colspan="2" style="text-align:right;color:'+(bsChk?grn:red)+';font-weight:700">'+(bsChk?'&#10003; BALANCED':'&#10007; CHECK ERROR')+'</td></tr>'
    +'</tbody></table>';
  }

  // ── Cash Flow section ──
  var cfHTML = '';
  if(showCF){
    cfHTML = '<h2>Cash Flow Statement &mdash; '+perLabel+' (Indirect Method)</h2>'
    +'<table><thead><tr><th>Description</th><th>Amount (M IDR)</th></tr></thead><tbody>'
    +'<tr class="sr"><td colspan="2">A. OPERATING ACTIVITIES</td></tr>'
    +'<tr><td class="ind">Net Profit</td><td class="grn">'+fV(d.nop)+'</td></tr>'
    +'<tr><td class="ind">Add: Depreciation &amp; Amortisation</td><td>'+fV(d.dp)+'</td></tr>'
    +'<tr><td class="ind">Add: Interest (non-cash portion)</td><td>'+fV(Math.round(d.it*0.3))+'</td></tr>'
    +'<tr><td class="ind">Change in Accounts Receivable</td><td style="color:'+(-(bs.ar-bsp.ar)>=0?grn:red)+'">'+fV(-(bs.ar-bsp.ar))+'</td></tr>'
    +'<tr><td class="ind">Change in Inventories</td><td style="color:'+(-(bs.inv-bsp.inv)>=0?grn:red)+'">'+fV(-(bs.inv-bsp.inv))+'</td></tr>'
    +'<tr><td class="ind">Change in Accounts Payable</td><td style="color:'+((bs.ap-bsp.ap)>=0?grn:red)+'">'+fV(bs.ap-bsp.ap)+'</td></tr>'
    +'<tr><td class="ind">Change in Accrued Expenses</td><td style="color:'+((bs.acc-bsp.acc)>=0?grn:red)+'">'+fV(bs.acc-bsp.acc)+'</td></tr>'
    +'<tr class="tr"><td class="bold">Net Cash from Operating</td><td style="color:'+(ops>=0?grn:red)+';font-weight:700">'+fV(Math.round(ops))+'</td></tr>'
    +'<tr class="sr"><td colspan="2">B. INVESTING ACTIVITIES</td></tr>'
    +'<tr><td class="ind">Capital Expenditure</td><td class="red">'+fV(Math.round(inv2))+'</td></tr>'
    +'<tr class="tr"><td class="bold">Net Cash from Investing</td><td style="color:'+(inv2>=0?grn:red)+';font-weight:700">'+fV(Math.round(inv2))+'</td></tr>'
    +'<tr class="sr"><td colspan="2">C. FINANCING ACTIVITIES</td></tr>'
    +'<tr><td class="ind">Long-term Debt Repayment</td><td class="red">'+fV(-(bsp.ltD-bs.ltD))+'</td></tr>'
    +'<tr><td class="ind">Dividends Paid (40% of Net Profit)</td><td class="red">'+fV(-Math.round(d.np*0.4))+'</td></tr>'
    +'<tr class="tr"><td class="bold">Net Cash from Financing</td><td style="color:'+(fin2>=0?grn:red)+';font-weight:700">'+fV(Math.round(fin2))+'</td></tr>'
    +'<tr style="background:'+(isDark?'rgba(0,212,255,0.10)':'#dbeafe')+'"><td class="bold acc" style="font-size:13px">NET CHANGE IN CASH</td><td style="color:'+(netCF>=0?grn:red)+';font-weight:700;font-size:13px">'+fV(Math.round(netCF))+'</td></tr>'
    +'<tr><td class="ind">Opening Cash Balance</td><td>'+fV(bsp.cash)+'</td></tr>'
    +'<tr class="tr"><td class="bold acc">CLOSING CASH BALANCE</td><td class="acc bold">'+fV(bs.cash)+'</td></tr>'
    +'</tbody></table>';
  }

  // ── KPI section ──
  var kpiHTML = '';
  if(showKPI){
    var cr=(bs.tCA/bs.tCL); var qr=(bs.cash+bs.ar)/bs.tCL; var cashr=bs.cash/bs.tCL;
    var de=bs.tL/bs.tEq; var ic=d.gop/(d.interest||1);
    var roa=d.nop/bs.tA*100; var roe=d.nop/bs.tEq*100;
    kpiHTML = '<h2>Financial KPIs &amp; Ratios &mdash; '+perLabel+'</h2>'
    +'<table><thead><tr><th>KPI</th><th>Value</th><th>Benchmark</th><th>Status</th></tr></thead><tbody>'
    +'<tr class="sr"><td colspan="4">LIQUIDITY</td></tr>'
    +'<tr><td>Current Ratio</td><td class="bold">'+cr.toFixed(2)+'x</td><td>&gt; 1.5x</td><td style="color:'+(cr>1.5?grn:red)+'">'+(cr>1.5?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>Quick Ratio</td><td class="bold">'+qr.toFixed(2)+'x</td><td>&gt; 1.0x</td><td style="color:'+(qr>1.0?grn:red)+'">'+(qr>1.0?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>Cash Ratio</td><td class="bold">'+cashr.toFixed(2)+'x</td><td>&gt; 0.5x</td><td style="color:'+(cashr>0.5?grn:red)+'">'+(cashr>0.5?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr class="sr"><td colspan="4">LEVERAGE</td></tr>'
    +'<tr><td>Debt to Equity</td><td class="bold">'+de.toFixed(2)+'x</td><td>&lt; 0.8x</td><td style="color:'+(de<0.8?grn:red)+'">'+(de<0.8?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>Interest Coverage (EBIT/Interest)</td><td class="bold">'+ic.toFixed(1)+'x</td><td>&gt; 3.0x</td><td style="color:'+(ic>3.0?grn:red)+'">'+(ic>3.0?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr class="sr"><td colspan="4">PROFITABILITY</td></tr>'
    +'<tr><td>Return on Assets (ROA)</td><td class="bold">'+roa.toFixed(1)+'%</td><td>&gt; 8%</td><td style="color:'+(roa>8?grn:red)+'">'+(roa>8?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>Return on Equity (ROE)</td><td class="bold">'+roe.toFixed(1)+'%</td><td>&gt; 15%</td><td style="color:'+(roe>15?grn:red)+'">'+(roe>15?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>Gross Margin</td><td class="bold">'+fPct(d.gopMgn)+'</td><td>&gt; 80%</td><td style="color:'+(d.gopMgn>80?grn:red)+'">'+(d.gopMgn>80?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>EBITDA Margin</td><td class="bold">'+fPct(d.gopMgn)+'</td><td>&gt; 30%</td><td style="color:'+(d.gopMgn>30?grn:red)+'">'+(d.gopMgn>30?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>Net Profit Margin</td><td class="bold">'+fPct(d.nopMgn)+'</td><td>&gt; 15%</td><td style="color:'+(d.nopMgn>15?grn:red)+'">'+(d.nopMgn>15?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr class="sr"><td colspan="4">HOTEL OPERATIONAL</td></tr>'
    +'<tr><td>Payroll Ratio</td><td class="bold">'+fPct((d.deptPay/d.rev*100))+'</td><td>&lt; 35%</td><td style="color:'+((d.deptPay/d.rev*100)<35?grn:red)+'">'+((d.deptPay/d.rev*100)<35?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>Utility Ratio</td><td class="bold">'+fPct((d.ovhdOther/d.rev*100))+'</td><td>&lt; 7%</td><td style="color:'+((d.ovhdOther/d.rev*100)<7?grn:red)+'">'+((d.ovhdOther/d.rev*100)<7?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'<tr><td>Maintenance Ratio</td><td class="bold">'+fPct(((d.deptOther||0)/d.rev*100))+'</td><td>&lt; 4%</td><td style="color:'+(((d.deptOther||0)/d.rev*100)<4?grn:red)+'">'+(((d.deptOther||0)/d.rev*100)<4?'&#10003; PASS':'&#10007; FAIL')+'</td></tr>'
    +'</tbody></table>';
  }

  // ── Budget vs Actual section ──
  var budHTML = '';
  if(showBud&&bud){
    var rows=[
      ['Total Revenue',d.rev,bud.rev,true],
      ['Room Revenue',d.rooms,bud.rooms,true],
      ['F&B Revenue',d.fnb,bud.fnb,true],
      ['CoS',-d.cos,-bud.cos,false],
      ['Dept Payroll',-d.deptPay,-bud.deptPay,false],
      ['Overhead',-d.ovhdOther,-bud.ovhdOther,false],
      ['GOP',d.gop,bud.gop,true],
      ['NOP',d.nop,bud.nop,true]
    ];
    budHTML = '<h2>Budget vs Actual &mdash; YTD 2026 (Jan&ndash;Feb)</h2>'
    +'<table><thead><tr><th>Account</th><th>Actual (M IDR)</th><th>Budget (M IDR)</th><th>Variance</th><th>Var %</th></tr></thead><tbody>';
    rows.forEach(function(r){
      var vv=r[1]-r[2]; var ok=r[3]?vv>=0:vv<=0;
      var vp=r[2]!==0?(vv/Math.abs(r[2])*100).toFixed(1)+'%':'-';
      budHTML+='<tr><td>'+r[0]+'</td><td class="bold">'+fV(r[1])+'</td><td>'+fV(r[2])+'</td>'
        +'<td style="color:'+(ok?grn:red)+'">'+fV(vv)+'</td>'
        +'<td style="color:'+(ok?grn:red)+'">'+vp+'</td></tr>';
    });
    budHTML+='</tbody></table>';
  }

  return '<!DOCTYPE html><html lang="id"><head>'
    +'<meta charset="UTF-8"/><meta name="viewport" content="width=device-width"/>'
    +'<title>GDS Financial Report &mdash; '+perLabel+'</title>'
    +'<style>'+css+'</style></head><body>'
    +'<div class="cover">'
    +'<div style="font-size:10px;letter-spacing:4px;color:#64748B;margin-bottom:10px">GRAND DARMO SUITE &middot; SURABAYA</div>'
    +'<h1>FINANCIAL INTELLIGENCE REPORT</h1>'
    +'<div class="csub">PERIOD: '+perLabel+' &nbsp;&middot;&nbsp; PREPARED BY: FINANCIAL CONTROLLER</div>'
    +'<div class="meta">'
    +'<div class="meta-item"><div class="mlabel">TOTAL REVENUE</div><div class="mvalue">'+fV(d.rev)+'</div></div>'
    +'<div class="meta-item"><div class="mlabel">EBITDA</div><div class="mvalue">'+fV(d.gop)+'</div></div>'
    +'<div class="meta-item"><div class="mlabel">NET PROFIT</div><div class="mvalue">'+fV(d.nop)+'</div></div>'
    +'</div>'
    +'<div style="margin-top:20px;font-size:10px;color:#243044">Generated: '+dateStr+' &nbsp;&middot;&nbsp; GDS Financial Intelligence Platform &nbsp;&middot;&nbsp; CONFIDENTIAL</div>'
    +'</div>'
    +'<div class="page">'
    +'<h2>Executive Summary</h2>'
    +'<div class="ins good">Revenue '+perLabel+': <strong>'+fV(d.rev)+'</strong> &mdash; Rooms '+fV(d.rooms)+' ('+fPct(d.rooms/d.rev*100)+'%), F&amp;B '+fV(d.fnb)+', Other '+fV(d.minor)+'</div>'
    +'<div class="ins '+(d.gopMgn>30?'good':'warn')+'">EBITDA: <strong>'+fV(d.gop)+'</strong> ('+fPct(d.gopMgn)+' margin) &mdash; Benchmark: &gt;30%</div>'
    +'<div class="ins '+(d.nopMgn>15?'good':'warn')+'">Net Profit: <strong>'+fV(d.nop)+'</strong> ('+fPct(d.nopMgn)+' margin) &mdash; Tax: '+fV(d.tax)+'</div>'
    +'<div class="ins">Balance Sheet: Total Assets <strong>'+fV(bs.tA)+'</strong> &middot; Equity <strong>'+fV(bs.tEq)+'</strong> &middot; D/E '+( bs.tL/bs.tEq).toFixed(2)+'x</div>'
    +plHTML+bsHTML+cfHTML+kpiHTML+budHTML
    +'<div class="footer">'
    +'<span>Grand Darmo Suite by Amithya &middot; Surabaya &middot; <strong>CONFIDENTIAL</strong></span>'
    +'<span>GDS Financial Intelligence Platform &middot; '+dateStr+'</span>'
    +'</div>'
    +'</div>'
    +'<script>window.onload=function(){setTimeout(function(){window.print()},800)}<\/script>'
    +'</body></html>';
}

// REPORTS PAGE
// ══════════════════════════════════════════════════════════════════
function ReportsPage() {
  const [selPeriod,setSelPeriod]=useState('2025');
  const [selReport,setSelReport]=useState('board');
  const [theme,setTheme]=useState('dark');

  const reports = [
    {id:'pl',    name:'Profit & Loss',   icon:'≋', desc:'Full income statement with margins'},
    {id:'bs',    name:'Balance Sheet',   icon:'◫', desc:'Statement of financial position'},
    {id:'cf',    name:'Cash Flow',       icon:'⟲', desc:'Indirect method cash flow'},
    {id:'kpi',   name:'KPI Summary',     icon:'◈', desc:'All financial ratios & scorecard'},
    {id:'budget',name:'Budget vs Actual',icon:'⊞', desc:'2026 variance analysis'},
    {id:'board', name:'Board Pack',      icon:'⊟', desc:'Full executive report — all sections'},
  ];

  const handleExport = () => {
    var html = generateReportHTML(selPeriod, selReport, theme);
    var w = window.open('','_blank','width=1000,height=800');
    if(w){ w.document.write(html); w.document.close(); }
    else alert('Pop-up diblokir. Mohon izinkan pop-up untuk site ini.');
  };

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Sans'"}}>Report Generator</div>
        <div style={{color:T.muted,fontSize:11}}>Professional financial reports · Board-meeting ready · Print to PDF</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}}>
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:12}}>
            {reports.map(r=>(
              <Card key={r.id} onClick={()=>setSelReport(r.id)} style={{cursor:'pointer',borderColor:selReport===r.id?T.accent:T.border,borderWidth:selReport===r.id?2:1,padding:'16px',transition:'all 0.15s'}}>
                <div style={{display:'flex',gap:10,marginBottom:8}}>
                  <span style={{color:T.accent,fontSize:18}}>{r.icon}</span>
                  <span style={{color:T.text,fontSize:12,fontWeight:600,fontFamily:"'IBM Plex Sans'"}}>{r.name}</span>
                </div>
                <p style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Sans'",margin:0,lineHeight:1.4}}>{r.desc}</p>
                {selReport===r.id&&<div style={{marginTop:8}}><Chip color={T.accent}>SELECTED</Chip></div>}
              </Card>
            ))}
          </div>
        </div>
        <Card>
          <SectionTitle>Export Settings</SectionTitle>
          <div style={{marginBottom:12}}>
            <label style={{color:T.muted,fontSize:10,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>REPORT TYPE</label>
            <select value={selReport} onChange={e=>setSelReport(e.target.value)} style={{width:'100%',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:'8px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {reports.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{color:T.muted,fontSize:10,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>PERIOD</label>
            <select value={selPeriod} onChange={e=>setSelPeriod(e.target.value)} style={{width:'100%',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:'8px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=><option key={y} value={y}>{y==='2026'?'2026 (YTD Feb)':y}</option>)}
            </select>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{color:T.muted,fontSize:10,letterSpacing:2,display:'block',marginBottom:6,fontFamily:"'IBM Plex Mono'"}}>REPORT THEME</label>
            <div style={{display:'flex',gap:6}}>
              {[['dark','◑ Dark'],['light','☀ Light']].map(([v,l])=>(
                <button key={v} onClick={()=>setTheme(v)} style={{flex:1,padding:'8px',background:theme===v?T.accent:'transparent',border:`1px solid ${theme===v?T.accent:T.border}`,borderRadius:6,color:theme===v?'#080C12':T.sub,cursor:'pointer',fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{l}</button>
              ))}
            </div>
          </div>
          <button onClick={handleExport} style={{width:'100%',background:'linear-gradient(135deg,#00D4FF,#00897B)',border:'none',borderRadius:8,padding:'13px',color:'#080C12',fontSize:13,fontWeight:700,cursor:'pointer',letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>⊟ GENERATE & PRINT</button>
          <div style={{marginTop:10,color:T.muted,fontSize:9,textAlign:'center',fontFamily:"'IBM Plex Mono'",lineHeight:1.6}}>Opens in new tab → browser print dialog<br/>Save as PDF via print settings</div>
        </Card>
      </div>
    </div>
  );
}

// USER MANAGEMENT PAGE (MASTER only)
// ══════════════════════════════════════════════════════════════════
const ROLE_PAGES = {
  MASTER: ['dashboard','pl','bs','cf','budget','kpi','forecast','ai','macro','reports','users'],
  OWNER:  ['dashboard','pl','bs','cf','forecast','ai','macro','reports'],
  GM:     ['dashboard','budget','kpi','macro'],
  HOD:    ['dashboard','kpi'],
};

const LS_KEY = 'gds_users_v1';

function loadUsers() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  // Default users — first load
  return [
    { id:'u1', username:'sanda',   password:'accurate26',       role:'MASTER', name:'System Administrator', active:true, createdAt:'2026-01-01' },
    { id:'u2', username:'owning',  password:'gdsowning26',      role:'OWNER',  name:'Property Owner',       active:true, createdAt:'2026-01-01' },
    { id:'u3', username:'gm',      password:'gdsgm26',          role:'GM',     name:'General Manager',      active:true, createdAt:'2026-01-01' },
    { id:'u4', username:'hod',     password:'oneteamonespirit', role:'HOD',    name:'Head of Department',   active:true, createdAt:'2026-01-01' },
  ];
}

function saveUsers(users) {
  localStorage.setItem(LS_KEY, JSON.stringify(users));
}

function UserManagementPage({ currentUser }) {
  const [users, setUsers]         = useState(loadUsers);
  const [modal, setModal]         = useState(null); // 'add' | 'edit' | 'password' | 'delete'
  const [selected, setSelected]   = useState(null);
  const [toast, setToast]         = useState(null);
  const [form, setForm]           = useState({});
  const [showPw, setShowPw]       = useState(false);

  const ROLES = ['MASTER','OWNER','GM','HOD'];
  const ROLE_COLORS = { MASTER:'#00D4FF', OWNER:'#D4A847', GM:'#00897B', HOD:'#8B5CF6' };

  function showToast(msg, type='success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function persist(updated) {
    setUsers(updated);
    saveUsers(updated);
  }

  function openAdd() {
    setForm({ username:'', password:'', name:'', role:'GM', active:true });
    setModal('add');
    setShowPw(false);
  }

  function openEdit(u) {
    setSelected(u);
    setForm({ username:u.username, name:u.name, role:u.role, active:u.active });
    setModal('edit');
  }

  function openPassword(u) {
    setSelected(u);
    setForm({ password:'' });
    setModal('password');
    setShowPw(false);
  }

  function openDelete(u) {
    setSelected(u);
    setModal('delete');
  }

  function handleAdd() {
    if (!form.username.trim() || !form.password.trim() || !form.name.trim()) {
      showToast('Semua field wajib diisi.', 'error'); return;
    }
    if (users.find(u => u.username === form.username.trim())) {
      showToast('Username sudah dipakai.', 'error'); return;
    }
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const newUser = {
      id: 'u' + Date.now(),
      username:  form.username.trim().toLowerCase(),
      password:  form.password,
      name:      form.name.trim(),
      role:      form.role,
      active:    true,
      createdAt: new Date().toISOString().slice(0,10),
    };
    persist([...users, newUser]);
    setModal(null);
    showToast(`User "${newUser.username}" berhasil ditambahkan.`);
  }

  function handleEdit() {
    if (!form.name.trim()) { showToast('Nama tidak boleh kosong.', 'error'); return; }
    if (selected.username === currentUser.username && form.role !== 'MASTER') {
      showToast('Tidak bisa mengubah role akun sendiri.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id
      ? { ...u, name:form.name.trim(), role:form.role, active:form.active }
      : u
    );
    persist(updated);
    setModal(null);
    showToast('User berhasil diupdate.');
  }

  function handlePassword() {
    if (form.password.length < 6) {
      showToast('Password minimal 6 karakter.', 'error'); return;
    }
    const updated = users.map(u => u.id === selected.id ? { ...u, password:form.password } : u);
    persist(updated);
    setModal(null);
    showToast(`Password "${selected.username}" berhasil diganti.`);
  }

  function handleDelete() {
    if (selected.username === currentUser.username) {
      showToast('Tidak bisa menghapus akun sendiri.', 'error'); setModal(null); return;
    }
    persist(users.filter(u => u.id !== selected.id));
    setModal(null);
    showToast(`User "${selected.username}" dihapus.`);
  }

  function toggleActive(u) {
    if (u.username === currentUser.username) { showToast('Tidak bisa menonaktifkan akun sendiri.', 'error'); return; }
    const updated = users.map(x => x.id === u.id ? { ...x, active: !x.active } : x);
    persist(updated);
    showToast(`${u.username} ${!u.active ? 'diaktifkan' : 'dinonaktifkan'}.`);
  }

  const inp = {
    background: T.bg, border:`1px solid ${T.border}`, borderRadius:6,
    color: T.text, padding:'9px 12px', fontSize:12, width:'100%',
    fontFamily:"'IBM Plex Mono',monospace", outline:'none',
  };
  const btn = (color, bg) => ({
    background: bg||'transparent', border:`1px solid ${color}`, borderRadius:6,
    color, padding:'7px 14px', fontSize:11, cursor:'pointer',
    fontFamily:"'IBM Plex Mono',monospace", fontWeight:600,
  });

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', top:20, right:24, zIndex:9999, background: toast.type==='error'?T.red:T.green, color:'#fff', padding:'10px 20px', borderRadius:8, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", boxShadow:'0 4px 20px rgba(0,0,0,0.4)' }}>
          {toast.type==='error' ? '✕ ' : '✓ '}{toast.msg}
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <div style={{ color:T.text, fontSize:18, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>User Management</div>
          <div style={{ color:T.muted, fontSize:11, marginTop:4 }}>{users.length} user terdaftar · Disimpan di browser</div>
        </div>
        <button onClick={openAdd} style={{ ...btn(T.accent), background:`${T.accent}22`, padding:'9px 20px', fontSize:12 }}>
          + Tambah User
        </button>
      </div>

      {/* Role Legend */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {ROLES.map(r => (
          <div key={r} style={{ display:'flex', alignItems:'center', gap:6, background:T.card, border:`1px solid ${T.border}`, borderRadius:6, padding:'5px 12px' }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:ROLE_COLORS[r] }}/>
            <span style={{ color:T.sub, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{r}</span>
            <span style={{ color:T.muted, fontSize:9 }}>— {ROLE_PAGES[r].length} modul</span>
          </div>
        ))}
      </div>

      {/* User Table */}
      <Card style={{ padding:0, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${T.border}` }}>
              {['USERNAME','NAMA','ROLE','STATUS','DIBUAT','AKSI'].map(h => (
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:T.muted, fontSize:9, letterSpacing:2, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map((u, i) => (
              <tr key={u.id} style={{ borderBottom: i<users.length-1?`1px solid ${T.border}`:'none', background: u.username===currentUser.username?`${T.accent}08`:'transparent' }}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:28, height:28, borderRadius:6, background:`${ROLE_COLORS[u.role]}22`, border:`1px solid ${ROLE_COLORS[u.role]}44`, display:'flex', alignItems:'center', justifyContent:'center', color:ROLE_COLORS[u.role], fontSize:11, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace" }}>
                      {u.username[0].toUpperCase()}
                    </div>
                    <span style={{ color:T.text, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>
                      {u.username}
                      {u.username===currentUser.username && <span style={{ color:T.accent, fontSize:9, marginLeft:6 }}>▶ ANDA</span>}
                    </span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.sub, fontSize:12, fontFamily:"'IBM Plex Sans',sans-serif" }}>{u.name}</td>
                <td style={{ padding:'13px 16px' }}>
                  <Chip color={ROLE_COLORS[u.role]}>{u.role}</Chip>
                </td>
                <td style={{ padding:'13px 16px' }}>
                  <div onClick={() => toggleActive(u)} style={{ cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5, background: u.active?`${T.green}22`:`${T.red}22`, border:`1px solid ${u.active?T.green:T.red}44`, borderRadius:20, padding:'3px 10px' }}>
                    <div style={{ width:6, height:6, borderRadius:'50%', background: u.active?T.green:T.red }}/>
                    <span style={{ color: u.active?T.green:T.red, fontSize:9, fontFamily:"'IBM Plex Mono',monospace", fontWeight:600 }}>{u.active?'AKTIF':'NONAKTIF'}</span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>{u.createdAt}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={() => openEdit(u)} style={{ ...btn(T.accent), padding:'4px 10px', fontSize:10 }} title="Edit profil">✎ Edit</button>
                    <button onClick={() => openPassword(u)} style={{ ...btn(T.yellow), padding:'4px 10px', fontSize:10 }} title="Ganti password">🔑 PW</button>
                    {u.username !== currentUser.username && (
                      <button onClick={() => openDelete(u)} style={{ ...btn(T.red), padding:'4px 10px', fontSize:10 }} title="Hapus user">✕</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      <div style={{ marginTop:12, color:T.muted, fontSize:10, fontFamily:"'IBM Plex Mono',monospace" }}>
        ⓘ Data user tersimpan di localStorage browser ini. Bersih saat clear browser data.
      </div>

      {/* ── MODAL ───────────────────────────────── */}
      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000 }}>
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:28, width:420, maxWidth:'90vw' }}>

            {/* ADD USER */}
            {modal === 'add' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>+ Tambah User Baru</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>USERNAME</div>
                  <input style={inp} value={form.username} onChange={e=>setForm({...form,username:e.target.value.toLowerCase().replace(/\s/g,'')})} placeholder="cth: finance_mgr" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="cth: Budi Santoso" />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD</div>
                  <div style={{ position:'relative' }}>
                    <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" />
                    <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                  </div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE & AKSES MODUL</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleAdd} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan User</button>
              </div>
            </>}

            {/* EDIT USER */}
            {modal === 'edit' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:20 }}>✎ Edit User — {selected?.username}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>NAMA LENGKAP</div>
                  <input style={inp} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>ROLE</div>
                  <select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}
                    disabled={selected?.username === currentUser.username}>
                    {ROLES.map(r=><option key={r} value={r}>{r} — {ROLE_PAGES[r].length} modul</option>)}
                  </select>
                  <div style={{ color:T.muted, fontSize:10, marginTop:5 }}>Akses: {ROLE_PAGES[form.role].join(', ')}</div>
                </div>
                <div>
                  <div style={{ color:T.muted, fontSize:10, marginBottom:8, letterSpacing:1 }}>STATUS</div>
                  <div style={{ display:'flex', gap:10 }}>
                    {[true,false].map(v=>(
                      <button key={String(v)} onClick={()=>setForm({...form,active:v})}
                        style={{ ...btn(v?T.green:T.red), background:form.active===v?(v?`${T.green}22`:`${T.red}22`):'transparent', flex:1 }}>
                        {v?'✓ AKTIF':'✕ NONAKTIF'}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleEdit} style={{ ...btn(T.accent), background:`${T.accent}22` }}>Simpan Perubahan</button>
              </div>
            </>}

            {/* CHANGE PASSWORD */}
            {modal === 'password' && <>
              <div style={{ color:T.text, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:6 }}>🔑 Ganti Password</div>
              <div style={{ color:T.muted, fontSize:11, marginBottom:20 }}>User: <span style={{ color:T.accent }}>{selected?.username}</span></div>
              <div>
                <div style={{ color:T.muted, fontSize:10, marginBottom:5, letterSpacing:1 }}>PASSWORD BARU</div>
                <div style={{ position:'relative' }}>
                  <input style={inp} type={showPw?'text':'password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min. 6 karakter" autoFocus />
                  <button onClick={()=>setShowPw(!showPw)} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:T.muted, cursor:'pointer', fontSize:12 }}>{showPw?'🙈':'👁'}</button>
                </div>
                {form.password.length > 0 && form.password.length < 6 && (
                  <div style={{ color:T.red, fontSize:10, marginTop:4 }}>Terlalu pendek — minimal 6 karakter</div>
                )}
              </div>
              <div style={{ display:'flex', gap:10, marginTop:20, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handlePassword} style={{ ...btn(T.yellow), background:`${T.yellow}22` }}>Ganti Password</button>
              </div>
            </>}

            {/* DELETE */}
            {modal === 'delete' && <>
              <div style={{ color:T.red, fontSize:15, fontWeight:700, fontFamily:"'IBM Plex Mono',monospace", marginBottom:8 }}>✕ Hapus User</div>
              <div style={{ color:T.sub, fontSize:12, marginBottom:20, lineHeight:1.6 }}>
                Yakin hapus user <span style={{ color:T.accent, fontFamily:"'IBM Plex Mono',monospace" }}>{selected?.username}</span> ({selected?.name})?<br/>
                <span style={{ color:T.red, fontSize:11 }}>Tindakan ini tidak bisa dibatalkan.</span>
              </div>
              <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
                <button onClick={()=>setModal(null)} style={btn(T.muted)}>Batal</button>
                <button onClick={handleDelete} style={{ ...btn(T.red), background:`${T.red}22` }}>Ya, Hapus</button>
              </div>
            </>}

          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);
  const [dark,setDark]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [sideOpen, setSideOpen] = React.useState(false);
  T = dark?DARK:LIGHT;

  if(!user) return <LoginPage onLogin={u=>{setUser(u);setPage(u.pages[0]||'dashboard');}}/>;

  const pageMap = {
    dashboard:<DashboardPage/>,
    pl:<PLPage/>,
    bs:<BSPage/>,
    cf:<CFPage/>,
    budget:<BudgetPage/>,
    kpi:<KPIPage/>,
    forecast:<ForecastPage/>,
    ai:<AIPage/>,
    macro:<MacroPage/>,
    reports:<ReportsPage dark={dark}/>,
    users:<UserManagementPage currentUser={user}/>,
  };

  return (
    <div style={{display:'flex',background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'IBM Plex Sans',sans-serif",position:'relative'}}>
      {/* Mobile overlay */}
      <div className={sideOpen?'gds-overlay show':'gds-overlay'} onClick={()=>setSideOpen(false)}/>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        html,body,#root{height:100%}
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:${T.border};border-radius:4px}
        input[type=range]{height:4px;cursor:pointer}
        select option{background:${T.card};color:${T.text}}

        /* ── SIDEBAR ──────────────────────────────────────────── */
        .gds-sidebar{
          flex-shrink:0;
          transition:transform 0.28s cubic-bezier(.4,0,.2,1);
          z-index:200;
        }
        /* ── OVERLAY ────────────────────────────────────────────── */
        .gds-overlay{
          display:none;position:fixed;inset:0;
          background:rgba(0,0,0,0.55);
          z-index:199;
          backdrop-filter:blur(2px);
        }
        .gds-overlay.show{display:block}
        /* ── MAIN AREA ──────────────────────────────────────────── */
        .gds-main{min-width:0;flex:1;display:flex;flex-direction:column;overflow:hidden;max-height:100vh}
        .gds-content{flex:1;overflow:auto;padding:24px;background:${T.bg}}

        /* ── HAMBURGER ──────────────────────────────────────────── */
        .gds-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;border-radius:6px}
        .gds-hamburger span{display:block;width:20px;height:2px;background:${T.text};border-radius:2px;transition:all 0.2s}

        /* ── DESKTOP ────────────────────────────────────────────── */
        @media(min-width:769px){
          .gds-sidebar{position:relative;transform:none!important}
        }

        /* ── MOBILE ─────────────────────────────────────────────── */
        @media(max-width:768px){
          .gds-sidebar{
            position:fixed!important;top:0;left:0;
            height:100vh;
            transform:translateX(-220px);
          }
          .gds-sidebar.open{transform:translateX(0)!important}
          .gds-hamburger{display:flex!important}
          .gds-content{padding:12px!important}
          .gds-page-title{font-size:13px!important}
        }

        /* ── RESPONSIVE GRIDS ───────────────────────────────────── */
        @media(max-width:900px){
          .r-grid-4{grid-template-columns:repeat(2,1fr)!important}
          .r-grid-2{grid-template-columns:1fr!important}
          .r-grid-21{grid-template-columns:1fr!important}
          .r-grid-12{grid-template-columns:1fr!important}
          .r-grid-5{grid-template-columns:repeat(2,1fr)!important}
        }
        @media(max-width:500px){
          .r-grid-4{grid-template-columns:1fr 1fr!important}
          .r-grid-5{grid-template-columns:1fr 1fr!important}
          .hide-xs{display:none!important}
        }

        @media print{
          body{background:#fff!important;color:#000!important}
          .gds-sidebar,.gds-hamburger{display:none!important}
          *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
      `}</style>
      <Sidebar user={user} active={page} setPage={p=>{if(user.pages.includes(p)){setPage(p);setSideOpen(false);}}} dark={dark} open={sideOpen}/>
      <div className="gds-main">
        <TopBar page={page} dark={dark} setDark={setDark} onLogout={()=>setUser(null)} onMenu={()=>setSideOpen(o=>!o)}/>
        <main className="gds-content">
          {pageMap[page]||<DashboardPage/>}
        </main>
      </div>
    </div>
  );
}

if(!window.__gds_root){
  const _container = document.getElementById('root');
  window.__gds_root = ReactDOM.createRoot(_container);
}
window.__gds_root.render(React.createElement(App));
</script>
  <script>
    window.addEventListener('error', function(e){
      var d=document.getElementById('status');
      var b=document.getElementById('bar');
      if(d) d.textContent='JS ERROR: '+e.message+' @ '+(e.filename||'').split('/').pop()+':'+e.lineno;
      if(b){b.style.width='100%';b.style.background='#EF4444';}
    });
    function setBar(p,m){document.getElementById('bar').style.width=p+'%';if(m)document.getElementById('status').textContent=m;}
    function hide(){var e=document.getElementById('loading');e.style.opacity='0';setTimeout(function(){e.style.display='none'},500);}
    function err(m){document.getElementById('status').style.color='#EF4444';document.getElementById('status').textContent=m;console.error('GDS:',m);}
    window.addEventListener('load',function(){
      setBar(30,'Memeriksa library...');
      try{
        if(!window.React) return err('React gagal dimuat');
        if(!window.ReactDOM) return err('ReactDOM gagal dimuat');
        if(!window.Recharts) return err('Recharts gagal dimuat');
        if(!window.Babel) return err('Babel gagal dimuat');
        setBar(60,'Kompilasi JSX...');
        var src=document.getElementById('app-src').textContent;
        var out=Babel.transform(src,{presets:['react']});
        setBar(90,'Menjalankan...');
        setTimeout(function(){
          try{eval(out.code);setBar(100);hide();}
          catch(e){err('Runtime: '+e.message+' | '+e.stack?.split('\n')[1]);console.error(e);}
        },100);
      }catch(e){err('Compile: '+e.message);console.error(e);}
    });
  </script>
</body>
</html>
