            </Card>
            <Card>
              <SectionTitle>Revenue Mix — {periodLabel}</SectionTitle>
              <ResponsiveContainer width="100%" height={210}>
                <PieChart>
                  <Pie data={revMixData} cx="50%" cy="50%" innerRadius={52} outerRadius={82} paddingAngle={2} dataKey="value">
                    {revMixData.map((e,i)=><Cell key={i} fill={e.color}/>)}
                  </Pie>
                  <Tooltip formatter={v=>fM(v)}/>
                  <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:9,fontFamily:"'IBM Plex Mono'"}}/>
                </PieChart>
              </ResponsiveContainer>
            </Card>
          </div>
          <Card>
            <SectionTitle>Expense Breakdown — {periodLabel}</SectionTitle>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead>
                  <tr style={{borderBottom:`2px solid ${T.border}`}}>
                    {['Kategori','Amount (M IDR)','% Revenue','vs Prior'].map(h=>(
                      <th key={h} style={{padding:'8px 12px',textAlign:h==='Kategori'?'left':'right',color:T.muted,fontSize:9,letterSpacing:2,fontFamily:"'IBM Plex Mono'",textTransform:'uppercase'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    {l:'F&B Cost',           v:safe(cur.cos),                             pv:prv?safe(prv.cos):null,      bg:false},
                    {l:'Dept Payroll',        v:safe(cur.deptPay),                         pv:prv?safe(prv.deptPay):null,  bg:true},
                    {l:'Dept Other Expenses', v:safe(cur.deptOther),                       pv:prv?safe(prv.deptOther):null,bg:false},
                    {l:'Overhead Payroll',    v:safe(cur.ovhdPay),                         pv:prv?safe(prv.ovhdPay):null,  bg:true},
                    {l:'Overhead Other Exp.', v:safe(cur.ovhdOther),                       pv:prv?safe(prv.ovhdOther):null,bg:false},
                    {l:'Mgmt & Incentive Fee',v:safe(cur.incentFee)+safe(cur.mgmtFee),     pv:prv?safe(prv.incentFee)+safe(prv.mgmtFee):null,bg:true},
                    {l:'Depreciation',        v:safe(cur.deprTotal),                       pv:prv?safe(prv.deprTotal):null,bg:false},
                    {l:'Interest & ROI',      v:safe(cur.interest)+safe(cur.roi),          pv:prv?safe(prv.interest)+safe(prv.roi):null,bg:true},
                  ].map(r=>{
                    const pct=cur.rev>0?r.v/cur.rev*100:0;
                    const delta=(r.pv&&r.pv>0)?chg(r.v,r.pv):null;
                    return(
                      <tr key={r.l} style={{background:r.bg?T.card:'transparent',borderBottom:`1px solid ${T.border}22`}}>
                        <td style={{padding:'8px 12px',color:T.text,fontFamily:"'IBM Plex Sans'"}}>{r.l}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:T.red,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{fM(r.v)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{fP(pct)}</td>
                        <td style={{padding:'8px 12px',textAlign:'right',color:delta!=null?(delta>0?T.red:T.green):T.muted,fontFamily:"'IBM Plex Mono'",fontSize:10}}>
                          {delta!=null?(delta>0?'▲ ':'▼ ')+Math.abs(delta).toFixed(1)+'%':'—'}
                        </td>
                      </tr>
                    );
                  })}
                  <tr style={{borderTop:`2px solid ${T.border}`}}>
                    <td style={{padding:'9px 12px',color:T.text,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>TOTAL EXPENSES</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:T.red,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>{fM(safe(cur.rev)-safe(cur.nop))}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:T.muted,fontFamily:"'IBM Plex Mono'"}}>{fP(cur.rev>0?(safe(cur.rev)-safe(cur.nop))/cur.rev*100:0)}</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}


function PLPage({ tbVersion=0 }) {
  const [yr,setYr]         = useState('2026');
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [period,setPeriod] = useState('full');
  const c=T.card, brd=T.border, ac=T.accent, sc=T.secondary, tx=T.text, mu=T.muted, sb=T.sub;

  const isAnnual = parseInt(yr) < 2024;

  // ── Period options ───────────────────────────────────────────────
  const periodOptions = useMemo(()=>{
    if(isAnnual) return [{v:'full',l:`Full Year ${yr}`}];
    const mKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
    const opts=[{v:'full',l:`Full Year ${yr}`},{v:'ytd',l:`YTD ${yr}`}];
    mKeys.forEach((k,i)=>{ if(TB[k]) opts.push({v:`m${i+1}`,l:ML[i]+' '+yr}); });
    const qMap={Q1:[0,1,2],Q2:[3,4,5],Q3:[6,7,8],Q4:[9,10,11]};
    Object.entries(qMap).forEach(([q,idxs])=>{
      const qKeys=idxs.map(i=>`${yr}-${String(i+1).padStart(2,'0')}`).filter(k=>TB[k]);
      if(qKeys.length===3) opts.push({v:q.toLowerCase(),l:`${q} ${yr}`});
    });
    return opts;
  },[yr,isAnnual,tbVersion]);

  const handleYrChange = (v)=>{ setYr(v); setPeriod('full'); };

  // ── Keys to aggregate ────────────────────────────────────────────
  const keys = useMemo(()=>{
    if(isAnnual) return null;
    const mKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
    if(period==='full'||period==='ytd') return mKeys.filter(k=>TB[k]);
    if(period==='q1') return mKeys.slice(0,3).filter(k=>TB[k]);
    if(period==='q2') return mKeys.slice(3,6).filter(k=>TB[k]);
    if(period==='q3') return mKeys.slice(6,9).filter(k=>TB[k]);
    if(period==='q4') return mKeys.slice(9,12).filter(k=>TB[k]);
    const mi=parseInt(period.replace('m',''))-1;
    return [mKeys[mi]].filter(k=>k&&TB[k]);
  },[yr,period,isAnnual,tbVersion]);

  const cur = useMemo(()=>{
    if(isAnnual) return annPnl(parseInt(yr));
    return keys&&keys.length>0?aggKeys(keys):null;
  },[yr,keys,isAnnual,tbVersion]);

  // ── Budget ───────────────────────────────────────────────────────
  const bud = useMemo(()=>{
    if(yr!=='2026') return null;
    const bKeys = (period==='full'||period==='ytd')?['2026-01','2026-02']:
                  period==='m1'?['2026-01']:period==='m2'?['2026-02']:null;
    if(!bKeys) return null;
    const valid=bKeys.filter(k=>BUD26[k]);
    return valid.length?aggKeys(valid,BUD26):null;
  },[yr,period,tbVersion]);

  // ── Prior period ─────────────────────────────────────────────────
  const prior = useMemo(()=>{
    const pyear=parseInt(yr)-1;
    if(isAnnual) return pyear>=2013?annPnl(pyear):null;
    if(period==='full'||period==='ytd'){
      if(parseInt(yr)===2025) return aggKeys(mKeys24);
      if(parseInt(yr)===2026) return aggKeys(mKeys25);
      return pyear>=2013?annPnl(pyear):null;
    }
    if(period.startsWith('m')&&parseInt(yr)>=2025){
      const mi=parseInt(period.replace('m',''))-1;
      const priorKey=`${pyear}-${String(mi+1).padStart(2,'0')}`;
      return TB[priorKey]?aggKeys([priorKey]):null;
    }
    return null;
  },[yr,period,isAnnual,tbVersion]);

  // ── Trend data ────────────────────────────────────────────────────
  const trendKeys = yr==='2024'?mKeys24:yr==='2025'?mKeys25:['2026-01','2026-02'];

  const marginTrend = useMemo(()=>{
    if(isAnnual) return [];
    return trendKeys.filter(k=>TB[k]).map((k,i)=>{
      const d=pnl(TB[k]);
      const b=BUD26[k]?pnl(BUD26[k]):null;
      return {
        name:ML[i],
        gopMgn:+d.gopMgn.toFixed(1),
        nopMgn:+d.nopMgn.toFixed(1),
        budGopMgn:b?+b.gopMgn.toFixed(1):null,
        budNopMgn:b?+b.nopMgn.toFixed(1):null,
      };
    });
  },[yr,isAnnual,tbVersion]);

  const revTrend = useMemo(()=>{
    if(isAnnual){
      return Object.entries(ANN).filter(([y])=>parseInt(y)<=parseInt(yr)).slice(-8).map(([y,d])=>{
        const v=pnl(d); return {name:y,rev:+v.rev.toFixed(3),gop:+v.gop.toFixed(3),nop:+v.nop.toFixed(3)};
      });
    }
    return trendKeys.filter(k=>TB[k]).map((k,i)=>{
      const d=pnl(TB[k]);
      return {name:ML[i],rev:+d.rev.toFixed(3),gop:+d.gop.toFixed(3),nop:+d.nop.toFixed(3)};
    });
  },[yr,isAnnual,tbVersion]);

  if(!cur) return <div style={{padding:40,color:T.muted,textAlign:'center'}}>No data for selected period.</div>;

  const showBud   = !!bud;
  const showPrior = !!prior;

  // ── P&L rows ──────────────────────────────────────────────────────
  const rows=[
    {l:'ROOM REVENUE',        v:cur.rooms,      b:bud?.rooms,      p:prior?.rooms,      pct:cur.rev>0?cur.rooms/cur.rev*100:0,   indent:0,bold:false,sub:true},
    {l:'F&B REVENUE',         v:cur.fnb,        b:bud?.fnb,        p:prior?.fnb,        pct:cur.rev>0?cur.fnb/cur.rev*100:0,     indent:0,bold:false,sub:true},
    {l:'MINOR OPERATED',      v:cur.minor,      b:bud?.minor,      p:prior?.minor,      pct:cur.rev>0?cur.minor/cur.rev*100:0,   indent:0,bold:false,sub:true},
    {l:'OTHER INCOME',        v:cur.otherinc,   b:bud?.otherinc,   p:prior?.otherinc,   pct:cur.rev>0?cur.otherinc/cur.rev*100:0,indent:0,bold:false,sub:true},
    {l:'TOTAL REVENUE',       v:cur.rev,        b:bud?.rev,        p:prior?.rev,        pct:100,indent:0,bold:true,sep:true},
    {l:'Cost of Sales',       v:-cur.cos,       b:bud?-bud.cos:null,      p:prior?-prior.cos:null,      pct:cur.rev>0?cur.cos/cur.rev*100:0,      indent:1,neg:true},
    {l:'Dept Payroll',        v:-cur.deptPay,   b:bud?-bud.deptPay:null,  p:prior?-prior.deptPay:null,  pct:cur.rev>0?cur.deptPay/cur.rev*100:0,  indent:1,neg:true},
    {l:'Dept Other Exp',      v:-cur.deptOther, b:bud?-bud.deptOther:null,p:prior?-prior.deptOther:null,pct:cur.rev>0?cur.deptOther/cur.rev*100:0,indent:1,neg:true},
    {l:'DEPT PROFIT',         v:cur.deptProfit, b:bud?.deptProfit, p:prior?.deptProfit, pct:cur.rev>0?cur.deptProfit/cur.rev*100:0,indent:0,bold:true,sep:true},
    {l:'Overhead Payroll',    v:-cur.ovhdPay,   b:bud?-bud.ovhdPay:null,  p:prior?-prior.ovhdPay:null,  pct:cur.rev>0?cur.ovhdPay/cur.rev*100:0,  indent:1,neg:true},
    {l:'Overhead Other Exp',  v:-cur.ovhdOther, b:bud?-bud.ovhdOther:null,p:prior?-prior.ovhdOther:null,pct:cur.rev>0?cur.ovhdOther/cur.rev*100:0,indent:1,neg:true},
    {l:'GROSS OPERATING PROFIT',v:cur.gop,      b:bud?.gop,        p:prior?.gop,        pct:cur.gopMgn,indent:0,bold:true,sep:true,highlight:true},
    {l:'Incentive Fee',       v:-cur.incentFee, b:bud?-bud.incentFee:null,p:prior?-prior.incentFee:null,pct:cur.rev>0?cur.incentFee/cur.rev*100:0,indent:1,neg:true},
    {l:'Management Fee',      v:-cur.mgmtFee,   b:bud?-bud.mgmtFee:null,  p:prior?-prior.mgmtFee:null,  pct:cur.rev>0?cur.mgmtFee/cur.rev*100:0,  indent:1,neg:true},
    {l:'Depreciation & Amort.',v:-cur.deprTotal,b:bud?-bud.deprTotal:null,p:prior?-prior.deprTotal:null,pct:cur.rev>0?cur.deprTotal/cur.rev*100:0,indent:1,neg:true},
    {l:'Interest (Net)',      v:cur.interest,   b:bud?.interest,   p:prior?.interest,   pct:cur.rev>0?Math.abs(cur.interest)/cur.rev*100:0,indent:1},
    {l:'ROI Expense',         v:-cur.roi,       b:bud?-bud.roi:null,      p:prior?-prior.roi:null,      pct:cur.rev>0?cur.roi/cur.rev*100:0,      indent:1,neg:true},
    {l:'Owning Company Exp',  v:-cur.ownExp,    b:bud?-bud.ownExp:null,   p:prior?-prior.ownExp:null,   pct:cur.rev>0?cur.ownExp/cur.rev*100:0,   indent:1,neg:true},
    {l:'Other Non-Operating', v:-cur.otherNonOp,b:bud?-bud.otherNonOp:null,p:prior?-prior.otherNonOp:null,pct:cur.rev>0?cur.otherNonOp/cur.rev*100:0,indent:1,neg:true},
    {l:'Income Tax',          v:-cur.tax,       b:bud?-bud.tax:null,      p:prior?-prior.tax:null,      pct:0,indent:1,neg:true},
    {l:'NET OPERATING PROFIT',v:cur.nop,        b:bud?.nop,        p:prior?.nop,        pct:cur.nopMgn,indent:0,bold:true,sep:true,highlight:true},
  ];

  // ── Revenue Mix ───────────────────────────────────────────────────
  const revMix = [
    {l:'Rooms',       v:cur.rooms,    pct:cur.rev>0?cur.rooms/cur.rev*100:0,     color:ac},
    {l:'F&B',         v:cur.fnb,      pct:cur.rev>0?cur.fnb/cur.rev*100:0,       color:sc},
    {l:'Minor Ops',   v:cur.minor,    pct:cur.rev>0?cur.minor/cur.rev*100:0,     color:T.yellow},
    {l:'Other Inc.',  v:cur.otherinc, pct:cur.rev>0?cur.otherinc/cur.rev*100:0,  color:T.purple||'#8B5CF6'},
  ];
  const revMixChart = revMix.map(r=>({name:r.l, value:+r.pct.toFixed(1)}));

  // ── Cost Ratios ────────────────────────────────────────────────────
  const costRatios = [
    {l:'Cost of Sales',       v:cur.rev>0?cur.cos/cur.rev*100:0,       tgt:20,  inv:true,  color:T.red},
    {l:'Dept Payroll',        v:cur.rev>0?cur.deptPay/cur.rev*100:0,   tgt:25,  inv:true,  color:T.yellow},
    {l:'Dept Other Exp',      v:cur.rev>0?cur.deptOther/cur.rev*100:0, tgt:8,   inv:true,  color:T.orange||'#F97316'},
    {l:'Overhead Payroll',    v:cur.rev>0?cur.ovhdPay/cur.rev*100:0,   tgt:10,  inv:true,  color:T.yellow},
    {l:'Overhead Other',      v:cur.rev>0?cur.ovhdOther/cur.rev*100:0, tgt:7,   inv:true,  color:T.orange||'#F97316'},
  ];

  // ── Margin benchmark ──────────────────────────────────────────────
  const margins = {
    actual:  {gop:cur.gopMgn,  nop:cur.nopMgn},
    budget:  bud?{gop:bud.gopMgn,  nop:bud.nopMgn}:null,
    prior:   prior?{gop:prior.gopMgn, nop:prior.nopMgn}:null,
  };

  // ── Profit bridge ─────────────────────────────────────────────────
  const bridge = bud ? [
    {l:'Revenue Variance',     v:cur.rev-bud.rev,            pos:true},
    {l:'CoS Variance',         v:-(cur.cos-bud.cos),         pos:false},
    {l:'Dept Payroll Var.',    v:-(cur.deptPay-bud.deptPay), pos:false},
    {l:'Dept Other Var.',      v:-(cur.deptOther-bud.deptOther), pos:false},
    {l:'Overhead Payroll Var.',v:-(cur.ovhdPay-bud.ovhdPay), pos:false},
    {l:'Overhead Other Var.',  v:-(cur.ovhdOther-bud.ovhdOther), pos:false},
    {l:'GOP Variance (Net)',   v:cur.gop-bud.gop,            pos:true, bold:true},
    {l:'Below-Line Var.',      v:-(cur.deprTotal-bud.deprTotal)-(cur.incentFee-bud.incentFee)-(cur.mgmtFee-bud.mgmtFee), pos:false},
    {l:'NOP Variance (Net)',   v:cur.nop-bud.nop,            pos:true, bold:true},
  ] : null;

  // ── Variance driver insight ───────────────────────────────────────
  const insight = useMemo(()=>{
    if(!bud) return null;
    const revVar    = cur.rev  - bud.rev;
    const gopVar    = cur.gop  - bud.gop;
    const nopVar    = cur.nop  - bud.nop;
    const payVar    = cur.deptPay - bud.deptPay;
    const cosVar    = cur.cos  - bud.cos;
    const ovhVar    = (cur.ovhdPay+cur.ovhdOther) - (bud.ovhdPay+bud.ovhdOther);

    const revPct  = bud.rev>0?(revVar/bud.rev*100):0;
    const gopPct  = bud.gop!==0?(gopVar/Math.abs(bud.gop)*100):0;
    const nopPct  = bud.nop!==0?(nopVar/Math.abs(bud.nop)*100):0;

    const lines = [];

    // Revenue
    if(Math.abs(revPct)>1){
      const main = cur.rooms-bud.rooms < cur.fnb-bud.fnb ? 'room revenue' : 'F&B revenue';
      lines.push(`Revenue ${revVar>=0?'exceeded':'missed'} budget by ${fM(Math.abs(revVar))} (${Math.abs(revPct).toFixed(1)}%), primarily driven by ${revVar>=0?'stronger':'weaker'} ${main}.`);
    } else {
      lines.push(`Revenue is on track vs budget (${revPct>=0?'+':''}${revPct.toFixed(1)}% variance).`);
    }

    // Costs
    if(Math.abs(payVar/Math.max(bud.deptPay,0.001)*100)>3){
      lines.push(`Dept payroll ${payVar>0?'overran':'saved'} budget by ${fM(Math.abs(payVar))} — ${payVar>0?'review staffing vs occupancy':'efficiency gain'}.`);
    }
    if(Math.abs(cosVar/Math.max(bud.cos,0.001)*100)>3){
      lines.push(`Cost of sales ${cosVar>0?'above':'below'} budget by ${fM(Math.abs(cosVar))}.`);
    }
    if(Math.abs(ovhVar/Math.max(bud.ovhdPay+bud.ovhdOther,0.001)*100)>3){
      lines.push(`Overhead ${ovhVar>0?'exceeded':'came under'} budget by ${fM(Math.abs(ovhVar))}.`);
    }

    // GOP impact
    lines.push(`Net impact on GOP: ${gopVar>=0?'+':''}${fM(gopVar)} (${gopPct>=0?'+':''}${gopPct.toFixed(1)}% vs budget). NOP: ${nopVar>=0?'+':''}${fM(nopVar)} (${nopPct>=0?'+':''}${nopPct.toFixed(1)}%).`);

    if(cur.nop<0 && bud.nop>0) lines.push(`⚠ Budget targeted positive NOP. Actual result is a loss — below-the-line charges amplified the revenue shortfall.`);

    return lines;
  },[cur,bud]);

  const periodLabel = periodOptions.find(o=>o.v===period)?.l || period;

  // ── Inline helpers ────────────────────────────────────────────────
  const COLORS = [ac, sc, T.yellow, T.purple||'#8B5CF6'];

  return (
    <div style={{padding:24}}>
      {/* ── Header ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:tx,fontFamily:'IBM Plex Mono,monospace'}}>
            PROFIT &amp; LOSS STATEMENT
          </div>
          <div style={{fontSize:11,color:mu,marginTop:2}}>
            {isAnnual?`Annual ${yr}`:`${periodLabel} · Rp Milyar`}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer',outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=>
              <option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnnual&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer',outline:'none'}}>
              {periodOptions.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* ── KPI summary strip ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:18}}>
        {[
          {l:'Total Revenue', v:fC(cur.rev),   color:ac,   sub: showBud?`Bud: ${fC(bud.rev)}`:''},
          {l:'GOP',           v:fC(cur.gop),   color:cur.gop>=0?T.green:T.red, sub:`${cur.gopMgn.toFixed(1)}% margin`},
          {l:'GOP Margin',    v:`${cur.gopMgn.toFixed(1)}%`, color:cur.gopMgn>=30?T.green:cur.gopMgn>=20?T.yellow:T.red, sub:showBud?`Bud: ${bud.gopMgn.toFixed(1)}%`:'Benchmark: 30%'},
          {l:'NOP',           v:fC(cur.nop),   color:cur.nop>=0?T.green:T.red, sub:`${cur.nopMgn.toFixed(1)}% margin`},
          {l:'NOP Margin',    v:`${cur.nopMgn.toFixed(1)}%`, color:cur.nopMgn>=5?T.green:cur.nopMgn>=0?T.yellow:T.red, sub:showBud?`Bud: ${bud.nopMgn.toFixed(1)}%`:'Benchmark: 5%'},
          {l:'Payroll Ratio', v:`${cur.payRat.toFixed(1)}%`, color:cur.payRat<35?T.green:cur.payRat<40?T.yellow:T.red, sub:'Target: <35%'},
        ].map(({l,v,color,sub})=>(
          <div key={l} style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'12px 14px'}}>
            <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:1}}>{l}</div>
            <div style={{fontSize:17,fontWeight:700,color,marginTop:3,fontFamily:'IBM Plex Mono,monospace'}}>{v}</div>
            {sub&&<div style={{fontSize:10,color:mu,marginTop:2}}>{sub}</div>}
          </div>
        ))}
      </div>

      {/* ── Main content: P&L table + Revenue Mix ── */}
      <div style={{display:'grid',gridTemplateColumns:'3fr 1fr',gap:14,marginBottom:18}} className="r-grid-2">

        {/* P&L Table */}
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{background:T.bg,borderBottom:`2px solid ${brd}`}}>
                  <th style={{padding:'10px 16px',textAlign:'left',color:mu,fontWeight:600,fontSize:9,textTransform:'uppercase',letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>{t('pl_line_item')}</th>
                  <th style={{padding:'10px 12px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,textTransform:'uppercase',letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>ACTUAL</th>
                  <th style={{padding:'10px 10px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,textTransform:'uppercase',letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>%REV</th>
                  {showBud&&<th style={{padding:'10px 12px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>BUDGET</th>}
                  {showBud&&<th style={{padding:'10px 10px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>VAR</th>}
                  {showPrior&&<th style={{padding:'10px 12px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>{parseInt(yr)-1}</th>}
                  {showPrior&&<th style={{padding:'10px 10px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>YoY%</th>}
                </tr>
              </thead>
              <tbody>
                {rows.map((row,i)=>{
                  const varBud   = showBud&&row.b!=null?row.v-row.b:null;
                  const varPrior = showPrior&&row.p!=null&&row.p!==0?(row.v-row.p)/Math.abs(row.p)*100:null;
                  const budOk    = varBud!=null?(row.neg?varBud<=0:varBud>=0):null;
                  return (
                    <tr key={i} style={{
                      borderBottom:`1px solid ${row.sep?brd:'transparent'}`,
                      background: row.highlight?(row.v>=0?`${T.green}08`:`${T.red}06`):'transparent',
                    }}>
                      <td style={{padding:`${row.sep?'9px':'5px'} 16px`,paddingLeft:row.indent?32:16,
                        color:row.bold?tx:sb,fontWeight:row.bold?700:400,
                        fontFamily:row.bold?'IBM Plex Mono,monospace':'inherit',fontSize:row.bold?12:11}}>
                        {row.l}
                      </td>
                      <td style={{padding:`${row.sep?'9px':'5px'} 12px`,textAlign:'right',
                        color:row.bold?(row.v>=0?T.green:T.red):tx,fontWeight:row.bold?700:400,
                        fontFamily:'IBM Plex Mono,monospace',fontSize:row.bold?12:11}}>
                        {fC(row.v)}
                      </td>
                      <td style={{padding:'5px 10px',textAlign:'right',color:mu,fontSize:10,fontFamily:'IBM Plex Mono,monospace'}}>
                        {row.pct!=null?`${Math.abs(row.pct).toFixed(1)}%`:''}
                      </td>
                      {showBud&&<td style={{padding:'5px 12px',textAlign:'right',color:sb,fontFamily:'IBM Plex Mono,monospace',fontSize:11}}>
                        {row.b!=null?fC(row.b):'-'}
                      </td>}
                      {showBud&&<td style={{padding:'5px 10px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:11,
                        color:varBud!=null?(budOk?T.green:T.red):mu,fontWeight:row.bold?700:400}}>
                        {varBud!=null?fC(varBud):'-'}
                      </td>}
                      {showPrior&&<td style={{padding:'5px 12px',textAlign:'right',color:sb,fontFamily:'IBM Plex Mono,monospace',fontSize:11}}>
                        {row.p!=null?fC(row.p):'-'}
                      </td>}
                      {showPrior&&<td style={{padding:'5px 10px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:11,
                        color:varPrior!=null?(varPrior>=0?T.green:T.red):mu}}>
                        {varPrior!=null?`${varPrior>=0?'+':''}${varPrior.toFixed(1)}%`:'-'}
                      </td>}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Revenue Mix panel */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'14px 16px',flex:1}}>
            <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>
              — Revenue Mix
            </div>
            {revMix.map(r=>(
              <div key={r.l} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:10,color:sb}}>{r.l}</span>
                  <div style={{textAlign:'right'}}>
                    <span style={{fontSize:11,fontWeight:700,color:r.color,fontFamily:'IBM Plex Mono,monospace'}}>{r.pct.toFixed(1)}%</span>
                    <div style={{fontSize:9,color:mu}}>{fM(r.v)}</div>
                  </div>
                </div>
                <div style={{height:6,background:brd,borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:`${Math.min(r.pct,100)}%`,height:'100%',background:r.color,borderRadius:3,transition:'width 0.4s ease'}}/>
                </div>
              </div>
            ))}
          </div>

          {/* Margin benchmark */}
          <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'14px 16px'}}>
            <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:10,fontFamily:'IBM Plex Mono,monospace'}}>
              — Margin Benchmark
            </div>
            {[
              {l:'GOP Margin',act:margins.actual.gop, bud:margins.budget?.gop, pri:margins.prior?.gop, tgt:30, color:T.green},
              {l:'NOP Margin',act:margins.actual.nop, bud:margins.budget?.nop, pri:margins.prior?.nop, tgt:5,  color:T.green},
            ].map(m=>(
              <div key={m.l} style={{marginBottom:12}}>
                <div style={{fontSize:10,color:sb,marginBottom:4}}>{m.l}</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <div style={{background:`${ac}15`,borderRadius:4,padding:'3px 8px',fontSize:9,color:ac,fontFamily:'IBM Plex Mono,monospace',fontWeight:700}}>
                    ACT {m.act.toFixed(1)}%
                  </div>
                  {m.bud!=null&&<div style={{background:`${T.yellow}15`,borderRadius:4,padding:'3px 8px',fontSize:9,color:T.yellow,fontFamily:'IBM Plex Mono,monospace'}}>
                    BUD {m.bud.toFixed(1)}%
                  </div>}
                  {m.pri!=null&&<div style={{background:`${T.muted}20`,borderRadius:4,padding:'3px 8px',fontSize:9,color:mu,fontFamily:'IBM Plex Mono,monospace'}}>
                    PY {m.pri.toFixed(1)}%
                  </div>}
                </div>
                {m.bud!=null&&(
                  <div style={{fontSize:9,marginTop:3,color:m.act>=m.bud?T.green:T.red,fontWeight:600}}>
                    {m.act>=m.bud?'▲':'▼'} {Math.abs(m.act-m.bud).toFixed(1)}pp vs budget
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Cost Ratio Analysis ── */}
      <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'16px 20px',marginBottom:18}}>
        <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:14,fontFamily:'IBM Plex Mono,monospace'}}>
          — Cost Ratio Analysis (% of Revenue)
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12}} className="r-grid-5">
          {costRatios.map(r=>{
            const ok = r.v <= r.tgt;
            return (
              <div key={r.l} style={{background:T.bg,border:`1px solid ${ok?r.color+'30':T.red+'30'}`,borderRadius:8,padding:'10px 12px',borderLeft:`3px solid ${ok?r.color:T.red}`}}>
                <div style={{fontSize:9,color:mu,marginBottom:4,lineHeight:1.3}}>{r.l}</div>
                <div style={{fontSize:16,fontWeight:700,color:ok?r.color:T.red,fontFamily:'IBM Plex Mono,monospace'}}>{r.v.toFixed(1)}%</div>
                <div style={{fontSize:9,color:mu,marginTop:2}}>Target: ≤{r.tgt}%</div>
                <div style={{fontSize:9,color:ok?T.green:T.red,marginTop:1,fontWeight:600}}>{ok?'✓ OK':'⚠ OVER'}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Variance Driver + Profit Bridge ── */}
      {(insight||bridge)&&(
        <div style={{display:'grid',gridTemplateColumns:bridge?'1fr 1fr':'1fr',gap:14,marginBottom:18}} className="r-grid-2">

          {/* Variance Driver Insight */}
          {insight&&(
            <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'16px 20px'}}>
              <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>
                — Variance Driver Insight
              </div>
              {insight.map((line,i)=>{
                const isWarn = line.startsWith('⚠');
                const isGood = line.includes('exceeded') || line.includes('on track') || line.includes('saving') || line.includes('under');
                const col = isWarn?T.red:isGood?T.green:T.accent;
                return (
                  <div key={i} style={{display:'flex',gap:10,marginBottom:10,padding:'8px 12px',
                    background:`${col}08`,borderRadius:6,borderLeft:`3px solid ${col}`}}>
                    <span style={{fontSize:14,lineHeight:1}}>{isWarn?'⚠️':isGood?'✅':'💡'}</span>
                    <span style={{fontSize:11,color:sb,lineHeight:1.6}}>{line.replace('⚠ ','')}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Profit Bridge */}
          {bridge&&(
            <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'16px 20px'}}>
              <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>
                — Profit Bridge vs Budget
              </div>
              {bridge.map((b,i)=>{
                const ok = b.v>=0;
                const pct = bud&&bud.rev>0?(b.v/bud.rev*100):0;
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    padding:`${b.bold?'8px':'5px'} 10px`,
                    marginBottom:2,borderRadius:5,
                    background:b.bold?`${ok?T.green:T.red}10`:'transparent',
                    borderLeft:b.bold?`3px solid ${ok?T.green:T.red}`:'3px solid transparent'}}>
                    <span style={{fontSize:b.bold?11:10,color:b.bold?tx:sb,fontWeight:b.bold?700:400}}>{b.l}</span>
                    <div style={{textAlign:'right'}}>
                      <span style={{fontSize:b.bold?12:11,color:ok?T.green:T.red,fontFamily:'IBM Plex Mono,monospace',fontWeight:b.bold?700:400}}>
                        {b.v>=0?'+':''}{fM(b.v)}
                      </span>
                      {bud&&<div style={{fontSize:9,color:mu}}>{pct>=0?'+':''}{pct.toFixed(1)}% of Rev</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── Charts ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}} className="r-grid-2">

        {/* Revenue Trend */}
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>— Revenue & Profit Trend</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={revTrend} margin={{top:4,right:8,bottom:4,left:8}}>
              <CartesianGrid strokeDasharray="3 3" stroke={brd}/>
              <XAxis dataKey="name" tick={{fill:mu,fontSize:9}} tickLine={false}/>
              <YAxis tick={{fill:mu,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(1)}M`}/>
              <Tooltip contentStyle={{background:T.bg,border:`1px solid ${brd}`,borderRadius:6}} labelStyle={{color:tx}} formatter={(v,n)=>[`${v.toFixed(3)}M`,n]}/>
              <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10,color:sb}}/>
              <Bar dataKey="rev" fill={ac}  name="Revenue" radius={[2,2,0,0]}/>
              <Bar dataKey="gop" fill={sc}  name="GOP"     radius={[2,2,0,0]}/>
              <Bar dataKey="nop" fill={T.purple||'#8B5CF6'} name="NOP" radius={[2,2,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Margin Trend with budget reference */}
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>— Margin Trend {yr==='2026'?'(YTD)':yr}</div>
          {!isAnnual&&marginTrend.length>0?(
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={marginTrend} margin={{top:4,right:8,bottom:4,left:8}}>
                <CartesianGrid strokeDasharray="3 3" stroke={brd}/>
                <XAxis dataKey="name" tick={{fill:mu,fontSize:9}} tickLine={false}/>
                <YAxis tick={{fill:mu,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${brd}`,borderRadius:6}} formatter={(v,n)=>[`${v}%`,n]}/>
                <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10,color:sb}}/>
                <Line type="monotone" dataKey="gopMgn"    stroke={T.green}  name="GOP%" strokeWidth={2} dot={{r:4}}/>
                <Line type="monotone" dataKey="nopMgn"    stroke={T.purple||'#8B5CF6'} name="NOP%" strokeWidth={2} dot={{r:4}}/>
                {marginTrend.some(d=>d.budGopMgn!=null)&&(
                  <Line type="monotone" dataKey="budGopMgn" stroke={T.yellow} name="Bud GOP%" strokeWidth={1.5} strokeDasharray="5 3" dot={false}/>
                )}
                {marginTrend.some(d=>d.budNopMgn!=null)&&(
                  <Line type="monotone" dataKey="budNopMgn" stroke={T.yellow} name="Bud NOP%" strokeWidth={1} strokeDasharray="3 3" dot={false}/>
                )}
                <ReferenceLine y={30} stroke={T.green} strokeDasharray="4 2" label={{value:'30%',fill:T.muted,fontSize:8,position:'right'}}/>
                <ReferenceLine y={0}  stroke={T.red}   strokeDasharray="3 3"/>
              </LineChart>
            </ResponsiveContainer>
          ):(
            <div style={{height:200,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{display:'flex',gap:6,alignItems:'flex-end'}}>
                {[...Array(8)].map((_,i)=>{
                  const y=parseInt(yr)-7+i; if(y<2013||y>2025) return null;
                  const d=annPnl(y);
                  return <div key={y} style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
                    <div style={{fontSize:8,color:d.gopMgn>=30?T.green:d.gopMgn>=20?T.yellow:T.red,fontWeight:700,marginBottom:2}}>{d.gopMgn.toFixed(0)}%</div>
                    <div style={{width:22,background:brd,borderRadius:3,height:60,position:'relative',overflow:'hidden'}}>
                      <div style={{position:'absolute',bottom:0,width:'100%',background:d.gopMgn>=30?T.green:d.gopMgn>=20?T.yellow:T.red,height:`${Math.max(0,Math.min(100,d.gopMgn/50*100))}%`}}/>
                    </div>
                    <div style={{fontSize:8,color:mu,marginTop:2}}>{y}</div>
                  </div>;
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function BSPage({ tbVersion=0 }) {
  const [yr, setYr]         = useState('2026');
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [period, setPeriod] = useState('m2');

  // ── Period options ───────────────────────────────────────────────
  const periodOpts = useMemo(() => {
    if (yr === '2026') return [
      {v:'m1', l:'Jan 2026'},
      {v:'m2', l:'Feb 2026 (Latest)'},
    ];
    if (MON_YEARS.includes(yr)) return [
      {v:'full', l:`Dec ${yr} (Year-End)`},
      {v:'q1',   l:`Q1 ${yr} (Mar)`},
      {v:'q2',   l:`Q2 ${yr} (Jun)`},
      {v:'q3',   l:`Q3 ${yr} (Sep)`},
      {v:'q4',   l:`Q4 ${yr} (Dec)`},
      ...Array.from({length:12},(_,i)=>({v:`m${i+1}`,l:`${ML[i]} ${yr}`})),
    ];
    return [{v:'full', l:`Dec ${yr}`}];
  }, [yr]);

  const handleYrChange = (v) => {
    setYr(v);
    setPeriod(v === '2026' ? 'm2' : 'full');
  };

  // ── Snapshot keys ─────────────────────────────────────────────────
  const snapK = useMemo(() => snapKey(yr, period),     [yr, period]);
  const prevK = useMemo(() => prevSnapKey(yr, period), [yr, period]);

  const bs  = useMemo(() => bsCalc(BS_SNAPSHOTS[snapK] || BS_SNAPSHOTS['feb26']), [snapK]);
  const prv = useMemo(() => bsCalc(BS_SNAPSHOTS[prevK] || BS_SNAPSHOTS['dec25']), [prevK]);

  // ── Revenue for efficiency metrics (read-only via getCur) ─────────
  const rev = useMemo(() => getCur(yr, period), [yr, period]);

  // ── Balance validation ────────────────────────────────────────────
  const balanceDiff  = Math.abs(bs.tA - (bs.tL + bs.tEq));
  const isBalanced   = balanceDiff < 0.005;
  const balanceErrMsg = isBalanced ? null :
    `Assets ${fM(bs.tA)} ≠ L+E ${fM(bs.tL + bs.tEq)} · Diff: ${fM(balanceDiff)}`;

  // ── Working Capital analysis ──────────────────────────────────────
  const wc     = bs.tCA  - bs.tCL;
  const wcPrv  = prv.tCA - prv.tCL;
  const wcDiff = wc - wcPrv;

  const wcComponents = [
    {l:'Accounts Receivable', asset:true,  v:bs.ar,        p:prv.ar,        color:T.accent},
    {l:'Inventories',         asset:true,  v:bs.inv,       p:prv.inv,       color:T.secondary},
    {l:'Prepaid & Others',    asset:true,  v:bs.pre,       p:prv.pre,       color:T.yellow},
    {l:'Accounts Payable',    asset:false, v:bs.ap,        p:prv.ap,        color:T.red},
    {l:'Accrued Expenses',    asset:false, v:bs.acc,       p:prv.acc,       color:T.orange||'#F97316'},
  ];

  // WC insight: find biggest driver
  const wcInsight = useMemo(() => {
    const drivers = wcComponents.map(c => {
      const net = c.asset ? (c.v - c.p) : -(c.v - c.p); // positive = wc improvement
      return {l: c.l, net};
    }).sort((a,b) => Math.abs(b.net) - Math.abs(a.net));
    const top = drivers[0];
    if (!top || Math.abs(top.net) < 0.001) return 'Working capital movement is minimal vs prior period.';
    const dir = top.net >= 0 ? 'improved' : 'declined';
    const side = wcComponents.find(c=>c.l===top.l)?.asset ? 'asset' : 'liability';
    return `Working capital ${dir} by ${fM(Math.abs(wcDiff))} vs prior. Primary driver: ${top.l} ${top.net>=0?'decreased':'increased'} (${side}-side movement).`;
  }, [snapK, prevK]);

  // ── Asset efficiency ──────────────────────────────────────────────
  const assetTurnover = rev.rev > 0 && bs.tA > 0   ? rev.rev / bs.tA   : null;
  const fixedATurnover= rev.rev > 0 && bs.netF > 0  ? rev.rev / bs.netF : null;
  const receivablesDays = rev.rev > 0 ? bs.ar / (rev.rev / (period.startsWith('m')?1:period.startsWith('q')?3:12) / 30) : null;

  // ── Leverage ──────────────────────────────────────────────────────
  const debtRatio     = bs.tA   > 0 ? bs.tL  / bs.tA  : 0;
  const debtToEquity  = bs.tEq  > 0 ? bs.tL  / bs.tEq : 0;
  const equityRatio   = bs.tA   > 0 ? bs.tEq / bs.tA  : 0;
  const leverageLabel = debtRatio < 0.40 ? {l:'Low Leverage',    c:T.green}
                      : debtRatio < 0.65 ? {l:'Moderate Leverage',c:T.yellow}
                      :                    {l:'High Leverage',    c:T.red};

  // Capital structure insight
  const capStructInsight = useMemo(() => {
    const clPct = bs.tL > 0 ? (bs.tCL / bs.tL * 100) : 0;
    const ltPct = 100 - clPct;
    const eqPct = equityRatio * 100;
    if (clPct > 70) return `Capital structure is dominated by short-term liabilities (${clPct.toFixed(0)}% of total liab.), which may increase liquidity pressure.`;
    if (eqPct > 55) return `Strong equity position (${eqPct.toFixed(0)}% of assets) provides a solid financial cushion with low external dependency.`;
    if (debtRatio > 0.6) return `Leverage is elevated — debt represents ${(debtRatio*100).toFixed(0)}% of assets. Monitor debt service capacity closely.`;
    return `Balanced capital structure: equity ${eqPct.toFixed(0)}% of assets, short-term liab. ${clPct.toFixed(0)}% of total liabilities.`;
  }, [snapK]);

  // Liquidity movement insight
  const crNow = bs.tCL > 0 ? bs.tCA / bs.tCL : 0;
  const crPrv = prv.tCL > 0 ? prv.tCA / prv.tCL : 0;
  const qrNow = bs.tCL > 0 ? (bs.cash + bs.ar) / bs.tCL : 0;
  const qrPrv = prv.tCL > 0 ? (prv.cash + prv.ar) / prv.tCL : 0;
  const liqInsight = useMemo(() => {
    const crDir = crNow > crPrv ? 'improved' : crNow < crPrv ? 'declined' : 'unchanged';
    const qrDir = qrNow > qrPrv ? 'improved' : qrNow < qrPrv ? 'declined' : 'unchanged';
    const cashDir = bs.cash > prv.cash ? 'increased' : bs.cash < prv.cash ? 'decreased' : 'unchanged';
    return `Current ratio ${crDir} to ${crNow.toFixed(2)}x (prior: ${crPrv.toFixed(2)}x). Quick ratio ${qrDir} to ${qrNow.toFixed(2)}x. Cash position ${cashDir} by ${fM(Math.abs(bs.cash-prv.cash))}.`;
  }, [snapK, prevK]);

  // ── Asset mix ─────────────────────────────────────────────────────
  const assetMix = [
    {l:'Cash & Equiv',     v:bs.cash, pct:bs.tA>0?bs.cash/bs.tA*100:0,  color:T.accent},
    {l:'Receivables',      v:bs.ar,   pct:bs.tA>0?bs.ar/bs.tA*100:0,    color:T.secondary},
    {l:'Inventories',      v:bs.inv,  pct:bs.tA>0?bs.inv/bs.tA*100:0,   color:T.purple||'#8B5CF6'},
    {l:'Net Fixed Assets', v:bs.netF, pct:bs.tA>0?bs.netF/bs.tA*100:0,  color:T.orange||'#F97316'},
    {l:'Prepaid & Other',  v:bs.pre+bs.otNA, pct:bs.tA>0?(bs.pre+bs.otNA)/bs.tA*100:0, color:T.muted},
  ];

  // ── Capital structure mix ─────────────────────────────────────────
  const capMix = [
    {l:'Current Liab',   v:bs.tCL,  pct:(bs.tL+bs.tEq)>0?bs.tCL/(bs.tL+bs.tEq)*100:0,  color:T.red},
    {l:'Long-term Debt', v:bs.ltD,  pct:(bs.tL+bs.tEq)>0?bs.ltD/(bs.tL+bs.tEq)*100:0,  color:T.yellow},
    {l:'Equity',         v:bs.tEq,  pct:(bs.tL+bs.tEq)>0?bs.tEq/(bs.tL+bs.tEq)*100:0,  color:T.green},
  ];

  // ── CFO Ratios ────────────────────────────────────────────────────
  const ratios = [
    {l:'Current Ratio',    v:crNow.toFixed(2)+'x',           ok:crNow>1.5,            tgt:'>1.5x', prev:crPrv.toFixed(2)+'x'},
    {l:'Quick Ratio',      v:qrNow.toFixed(2)+'x',           ok:qrNow>1.0,            tgt:'>1.0x', prev:qrPrv.toFixed(2)+'x'},
    {l:'Cash Ratio',       v:(bs.cash/Math.max(bs.tCL,0.001)).toFixed(2)+'x', ok:bs.cash/Math.max(bs.tCL,0.001)>0.5, tgt:'>0.5x', prev:null},
    {l:'Debt Ratio',       v:(debtRatio*100).toFixed(1)+'%', ok:debtRatio<0.6,        tgt:'<60%',  prev:null},
    {l:'Debt / Equity',    v:debtToEquity.toFixed(2)+'x',    ok:debtToEquity<1.0,     tgt:'<1.0x', prev:null},
    {l:'Equity Ratio',     v:(equityRatio*100).toFixed(1)+'%',ok:equityRatio>0.4,     tgt:'>40%',  prev:null},
    {l:'Working Capital',  v:fM(wc),                         ok:wc>0,                 tgt:'> 0',   prev:fM(wcPrv)},
    {l:'WC Change vs Prior',v:(wcDiff>=0?'+':'')+fM(wcDiff), ok:wcDiff>=0,            tgt:'Positive',prev:null},
  ];

  const periodLabel = periodOpts.find(o=>o.v===period)?.l || period;

  // ── Sub-components ─────────────────────────────────────────────────
  const BSRow = ({l,v,p,bold,indent,isLiab}) => {
    const chg = p!=null && p!==0 ? (v-p)/Math.abs(p)*100 : null;
    return (
      <tr>
        <td style={{padding:'5px 12px',paddingLeft:indent?28:12,color:bold?T.text:T.sub,fontSize:11,fontWeight:bold?600:400}}>{l}</td>
        <td style={{padding:'5px 12px',textAlign:'right',color:bold?(v<0?T.red:T.text):T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:bold?600:400}}>{fM(v)}</td>
        <td style={{padding:'5px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{p!=null?fM(p):''}</td>
        <td style={{padding:'5px 12px',textAlign:'right',fontSize:10,fontFamily:"'IBM Plex Mono'",
          color:chg!=null?clr(isLiab?-chg:chg):T.muted}}>
          {chg!=null?`${chg>=0?'+':''}${chg.toFixed(1)}%`:'-'}
        </td>
      </tr>
    );
  };
  const BSec = ({t,c}) => <tr><td colSpan={4} style={{padding:'10px 12px 4px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600,textTransform:'uppercase'}}>{t}</td></tr>;
  const BDiv = () => <tr><td colSpan={4}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;
  const TRow = ({l,v,p,color}) => (
    <tr style={{background:`${color}10`}}>
      <td style={{padding:'7px 12px',color,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{l}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(v)}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{fM(p)}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color:p&&p!==0?clr(v-p):T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{p&&p!==0?`${((v-p)/Math.abs(p)*100).toFixed(1)}%`:''}</td>
    </tr>
  );

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>BALANCE SHEET</div>
          <div style={{color:T.muted,fontSize:11}}>Statement of Financial Position · {periodLabel} · Rp Milyar</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 12px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          <select value={period} onChange={e=>setPeriod(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 12px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
          </select>
          {/* Balance validation badge */}
          <div style={{padding:'5px 12px',borderRadius:6,
            background:isBalanced?`${T.green}15`:`${T.red}15`,
            border:`1px solid ${isBalanced?T.green:T.red}`,
            fontSize:10,color:isBalanced?T.green:T.red,fontFamily:"'IBM Plex Mono'",fontWeight:700}}>
            {isBalanced ? '✓ BALANCED' : '⚠ IMBALANCE'}
          </div>
        </div>
      </div>

      {/* Balance error banner */}
      {!isBalanced && (
        <div style={{background:`${T.red}12`,border:`1px solid ${T.red}40`,borderRadius:8,
          padding:'10px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18}}>⚠️</span>
          <div>
            <div style={{color:T.red,fontWeight:700,fontSize:12,fontFamily:"'IBM Plex Mono'"}}>ACCOUNTING EQUATION ERROR</div>
            <div style={{color:T.sub,fontSize:11,marginTop:2}}>{balanceErrMsg}</div>
          </div>
        </div>
      )}

      {/* ── Top KPI strip ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}} className="r-grid-4">
        {[
          {l:'Total Assets',      v:fM(bs.tA),  sub:`Chg: ${bs.tA>prv.tA?'+':''}${fM(bs.tA-prv.tA)}`,   c:T.accent},
          {l:'Total Liabilities', v:fM(bs.tL),  sub:`D/E: ${debtToEquity.toFixed(2)}x · ${leverageLabel.l}`, c:T.red},
          {l:'Total Equity',      v:fM(bs.tEq), sub:`Equity ratio: ${(equityRatio*100).toFixed(1)}%`,   c:T.green},
          {l:'Working Capital',   v:fM(wc),     sub:`Chg vs prior: ${wcDiff>=0?'+':''}${fM(wcDiff)}`,   c:wc>0?T.green:T.red},
        ].map(k=>(
          <div key={k.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 16px'}}>
            <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1}}>{k.l}</div>
            <div style={{fontSize:18,fontWeight:700,color:k.c,marginTop:4,fontFamily:"'IBM Plex Mono'"}}>{k.v}</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* ── Main grid: BS tables + right panel ── */}
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,marginBottom:14}} className="r-grid-2">

        {/* BS Tables side by side */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}} className="r-grid-2">

          {/* ASSETS */}
          <Card style={{padding:0}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:T.border}}>
                  <th colSpan={4} style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}> ASSETS</th>
                </tr>
                <tr style={{background:T.border}}>
                  {['Account','Current','Prior','Δ%'].map((h,i)=>(
                    <th key={i} style={{padding:'4px 12px',textAlign:i===0?'left':'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                <BSec t="Current Assets"/>
                <BSRow l="Cash & Equiv."       v={bs.cash}  p={prv.cash}  indent/>
                <BSRow l="Accounts Receivable" v={bs.ar}    p={prv.ar}    indent/>
                <BSRow l="Inventories"         v={bs.inv}   p={prv.inv}   indent/>
                <BSRow l="Prepaid & Others"    v={bs.pre}   p={prv.pre}   indent/>
                <BDiv/>
                <BSRow l="Total Current Assets" v={bs.tCA} p={prv.tCA} bold/>
                <BSec t="Non-Current Assets"/>
                <BSRow l="Fixed Assets (Gross)" v={bs.fixG}  p={prv.fixG}  indent/>
                <BSRow l="Accum. Depreciation"  v={-bs.accD} p={-prv.accD} indent/>
                <BSRow l="Net Fixed Assets"      v={bs.netF}  p={prv.netF}  indent bold/>
                <BSRow l="Other Non-Current"     v={bs.otNA}  p={prv.otNA}  indent/>
                <BDiv/>
                <TRow l="TOTAL ASSETS" v={bs.tA} p={prv.tA} color={T.accent}/>
              </tbody>
            </table>
          </Card>

          {/* LIABILITIES + EQUITY */}
          <Card style={{padding:0}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:T.border}}>
                  <th colSpan={4} style={{padding:'8px 12px',textAlign:'left',color:T.secondary,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}> LIAB + EQUITY</th>
                </tr>
                <tr style={{background:T.border}}>
                  {['Account','Current','Prior','Δ%'].map((h,i)=>(
                    <th key={i} style={{padding:'4px 12px',textAlign:i===0?'left':'right',color:T.muted,fontSize:9,letterSpacing:1,fontFamily:"'IBM Plex Mono'"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                <BSec t="Current Liabilities" c={T.red}/>
                <BSRow l="Accounts Payable"  v={bs.ap}         p={prv.ap}         indent isLiab/>
                <BSRow l="Accrued Expenses"  v={bs.acc}        p={prv.acc}        indent isLiab/>
                <BSRow l="Advance Deposits"  v={bs.advDep||0}  p={prv.advDep||0}  indent isLiab/>
                <BSRow l="Tax Payable"        v={bs.taxPay||0}  p={prv.taxPay||0}  indent isLiab/>
                <BSRow l="Current LT Debt"   v={bs.cLTD}       p={prv.cLTD}       indent isLiab/>
                <BDiv/>
                <BSRow l="Total Current Liab" v={bs.tCL} p={prv.tCL} bold isLiab/>
                <BSec t="Long-Term Liabilities" c={T.yellow}/>
                <BSRow l="Long-term Debt"   v={bs.ltD}        p={prv.ltD}        indent isLiab/>
                <BSRow l="Other LT Liab"    v={bs.dTax||0}    p={prv.dTax||0}    indent isLiab/>
                <BDiv/>
                <BSRow l="Total Liabilities" v={bs.tL} p={prv.tL} bold isLiab/>
                <BSec t="Equity" c={T.green}/>
                <BSRow l="Paid-in Capital"   v={bs.pic} p={prv.pic} indent/>
                <BSRow l="Retained Earnings" v={bs.re}  p={prv.re}  indent/>
                <BDiv/>
                <TRow l="TOTAL L + E" v={bs.tL+bs.tEq} p={prv.tL+prv.tEq} color={T.secondary}/>
              </tbody>
            </table>
          </Card>
        </div>

        {/* Right column: ratios + asset mix + capital structure */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>

          {/* CFO Ratios */}
          <Card>
            <SectionTitle>CFO ANALYTICS</SectionTitle>
            {ratios.map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.sub,fontSize:10}}>{r.l}</span>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  {r.prev&&<span style={{color:T.muted,fontSize:9}}>prev:{r.prev}</span>}
                  <span style={{color:T.muted,fontSize:9}}>{r.tgt}</span>
                  <span style={{color:r.ok?T.green:T.red,fontSize:11,fontWeight:700,
                    fontFamily:"'IBM Plex Mono'",minWidth:44,textAlign:'right'}}>{r.v}</span>
                  <span style={{fontSize:10}}>{r.ok?'✅':'⚠️'}</span>
                </div>
              </div>
            ))}
          </Card>

          {/* Asset Mix */}
          <Card>
            <SectionTitle>ASSET MIX</SectionTitle>
            {assetMix.map(a=>(
              <div key={a.l} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{color:T.sub,fontSize:10}}>{a.l}</span>
                  <span style={{color:a.color,fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>
                    {fM(a.v)} · {a.pct.toFixed(1)}%
                  </span>
                </div>
                <div style={{height:5,background:T.border,borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:`${Math.min(a.pct,100)}%`,height:'100%',background:a.color,borderRadius:3}}/>
                </div>
              </div>
            ))}
          </Card>
        </div>
      </div>

      {/* ── Bottom row: WC + Asset Efficiency + Leverage + Insights ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:14}} className="r-grid-4">

        {/* Working Capital Analysis */}
        <Card>
          <SectionTitle>WORKING CAPITAL</SectionTitle>
          <div style={{marginBottom:10,padding:'8px 10px',background:wc>0?`${T.green}10`:`${T.red}10`,
            borderRadius:6,border:`1px solid ${wc>0?T.green:T.red}30`}}>
            <div style={{fontSize:9,color:T.muted,marginBottom:2}}>NET WORKING CAPITAL</div>
            <div style={{fontSize:16,fontWeight:700,color:wc>0?T.green:T.red,fontFamily:"'IBM Plex Mono'"}}>{fM(wc)}</div>
            <div style={{fontSize:9,color:wcDiff>=0?T.green:T.red,marginTop:1,fontWeight:600}}>
              {wcDiff>=0?'▲':'▼'} {fM(Math.abs(wcDiff))} vs prior
            </div>
          </div>
          {wcComponents.map(w=>{
            const chg = w.p>0 ? (w.v-w.p)/w.p*100 : 0;
            const okDir = w.asset ? w.v>=w.p : w.v<=w.p;
            return (
              <div key={w.l} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',
                borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.sub,fontSize:9,lineHeight:1.3}}>{w.l}</span>
                <div style={{textAlign:'right'}}>
                  <div style={{color:T.text,fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{fM(w.v)}</div>
                  <div style={{fontSize:8,color:okDir?T.green:T.red}}>
                    {chg>=0?'+':''}{chg.toFixed(1)}%
                  </div>
                </div>
              </div>
            );
          })}
        </Card>

        {/* Asset Efficiency */}
        <Card>
          <SectionTitle>ASSET EFFICIENCY</SectionTitle>
          {[
            {
              l:'Asset Turnover',
              v:assetTurnover,
              fmt:v=>v!=null?v.toFixed(2)+'x':'—',
              tgt:0.4, tgtLabel:'>0.4x',
              ok:assetTurnover!=null&&assetTurnover>0.4,
              note:'Revenue / Total Assets',
            },
            {
              l:'Fixed Asset Turnover',
              v:fixedATurnover,
              fmt:v=>v!=null?v.toFixed(2)+'x':'—',
              tgt:0.6, tgtLabel:'>0.6x',
              ok:fixedATurnover!=null&&fixedATurnover>0.6,
              note:'Revenue / Net Fixed Assets',
            },
          ].map(m=>(
            <div key={m.l} style={{marginBottom:12,padding:'10px 12px',
              background:`${m.ok?T.green:T.yellow}08`,borderRadius:8,
              border:`1px solid ${m.ok?T.green:T.yellow}25`}}>
              <div style={{fontSize:9,color:T.muted,marginBottom:2}}>{m.l}</div>
              <div style={{fontSize:20,fontWeight:700,color:m.ok?T.green:T.yellow,fontFamily:"'IBM Plex Mono'"}}>{m.fmt(m.v)}</div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                <span style={{fontSize:9,color:T.muted}}>{m.note}</span>
                <span style={{fontSize:9,color:m.ok?T.green:T.yellow,fontWeight:600}}>{m.ok?'✓':'–'} {m.tgtLabel}</span>
              </div>
            </div>
          ))}
          {rev.rev > 0 && (
            <div style={{padding:'8px 10px',background:T.bg,borderRadius:6,border:`1px solid ${T.border}`}}>
              <div style={{fontSize:9,color:T.muted,marginBottom:2}}>Revenue (period)</div>
              <div style={{fontSize:13,fontWeight:700,color:T.accent,fontFamily:"'IBM Plex Mono'"}}>{fM(rev.rev)}</div>
              <div style={{fontSize:9,color:T.muted}}>Used for efficiency calc</div>
            </div>
          )}
        </Card>

        {/* Leverage Analysis */}
        <Card>
          <SectionTitle>LEVERAGE ANALYSIS</SectionTitle>
          <div style={{marginBottom:10,padding:'8px 12px',background:`${leverageLabel.c}10`,
            borderRadius:6,border:`1px solid ${leverageLabel.c}30`,textAlign:'center'}}>
            <div style={{fontSize:9,color:T.muted,marginBottom:2}}>CLASSIFICATION</div>
            <div style={{fontSize:14,fontWeight:800,color:leverageLabel.c,fontFamily:"'IBM Plex Mono'"}}>{leverageLabel.l}</div>
          </div>
          {[
            {l:'Debt Ratio',          v:(debtRatio*100).toFixed(1)+'%',   ok:debtRatio<0.6,   tgt:'<60%',  note:'Liab / Assets'},
            {l:'Debt / Equity',       v:debtToEquity.toFixed(2)+'x',      ok:debtToEquity<1,  tgt:'<1.0x', note:'Liab / Equity'},
            {l:'Equity Ratio',        v:(equityRatio*100).toFixed(1)+'%', ok:equityRatio>0.4, tgt:'>40%',  note:'Equity / Assets'},
            {l:'LT Debt / Assets',    v:(bs.ltD/Math.max(bs.tA,0.001)*100).toFixed(1)+'%', ok:bs.ltD/Math.max(bs.tA,0.001)<0.3, tgt:'<30%', note:'LTD / Assets'},
          ].map(l=>(
            <div key={l.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
              <div>
                <div style={{color:T.sub,fontSize:10}}>{l.l}</div>
                <div style={{color:T.muted,fontSize:8}}>{l.note}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <span style={{color:T.muted,fontSize:8}}>{l.tgt}</span>
                <span style={{color:l.ok?T.green:T.red,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{l.v}</span>
                <span style={{fontSize:10}}>{l.ok?'✅':'⚠️'}</span>
              </div>
            </div>
          ))}
        </Card>

        {/* Capital Structure + Insights */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <Card>
            <SectionTitle>CAPITAL STRUCTURE</SectionTitle>
            {capMix.map(l=>(
              <div key={l.l} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{color:T.sub,fontSize:10}}>{l.l}</span>
                  <span style={{color:l.color,fontSize:10,fontFamily:"'IBM Plex Mono'",fontWeight:600}}>{l.pct.toFixed(1)}%</span>
                </div>
                <div style={{height:5,background:T.border,borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:`${Math.min(l.pct,100)}%`,height:'100%',background:l.color,borderRadius:3}}/>
                </div>
                <div style={{fontSize:9,color:T.muted,marginTop:1}}>{fM(l.v)}</div>
              </div>
            ))}
          </Card>

          {/* Insights */}
          <Card>
            <SectionTitle>CFO INSIGHTS</SectionTitle>
            {[
              {icon:'🏗',  text:capStructInsight},
              {icon:'💧',  text:liqInsight},
              {icon:'📊',  text:wcInsight},
            ].map((ins,i)=>(
              <div key={i} style={{display:'flex',gap:8,marginBottom:8,padding:'7px 10px',
                background:`${T.accent}06`,borderRadius:6,
                borderLeft:`2px solid ${i===0?T.yellow:i===1?T.accent:T.green}`}}>
                <span style={{fontSize:14,lineHeight:1.4}}>{ins.icon}</span>
                <span style={{fontSize:10,color:T.sub,lineHeight:1.5}}>{ins.text}</span>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
}
