  {l:'Minor Operated Dept',v:cur.minorProfit, b:(bud&&bud.minorProfit), p:(prior&&prior.minorProfit), pct:cur.rev>0?cur.minorProfit/cur.rev*100:0,indent:1},
  {l:'Other Income',       v:cur.otherProfit, b:(bud&&bud.otherProfit), p:(prior&&prior.otherProfit), pct:cur.rev>0?cur.otherProfit/cur.rev*100:0,indent:1},
  {l:'TOTAL DEPT PROFIT',  v:cur.deptProfit,  b:(bud&&bud.deptProfit),  p:(prior&&prior.deptProfit),  pct:cur.rev>0?cur.deptProfit/cur.rev*100:0, indent:0,bold:true,sep:true,highlight:true},
  // ── OVERHEAD PAYROLL ─────────────────────────────────────────
  {l:'— OVERHEAD PAYROLL —',v:null,b:null,p:null,pct:null,indent:0,section:true},
  {l:'Admin & General',    v:-cur.agPay,     b:bud?-bud.agPay:null,     p:prior?-prior.agPay:null,     pct:cur.rev>0?cur.agPay/cur.rev*100:0,     indent:1,neg:true},
  {l:'Human Resources',    v:-cur.hrdPay,    b:bud?-bud.hrdPay:null,    p:prior?-prior.hrdPay:null,    pct:cur.rev>0?cur.hrdPay/cur.rev*100:0,    indent:1,neg:true},
  {l:'Sales & Marketing',  v:-cur.smPay,     b:bud?-bud.smPay:null,     p:prior?-prior.smPay:null,     pct:cur.rev>0?cur.smPay/cur.rev*100:0,     indent:1,neg:true},
  {l:'Engineering (POMEC)',v:-cur.pomecPay,  b:bud?-bud.pomecPay:null,  p:prior?-prior.pomecPay:null,  pct:cur.rev>0?cur.pomecPay/cur.rev*100:0,  indent:1,neg:true},
  {l:'TOTAL OVHD PAYROLL', v:-cur.ovhdPay,   b:bud?-bud.ovhdPay:null,   p:prior?-prior.ovhdPay:null,   pct:cur.rev>0?cur.ovhdPay/cur.rev*100:0,   indent:0,bold:true,sep:true,neg:true},
  // ── OVERHEAD OTHER ───────────────────────────────────────────
  {l:'— OVERHEAD OTHER —', v:null,b:null,p:null,pct:null,indent:0,section:true},
  {l:'Admin & General',    v:-cur.agOther,   b:bud?-bud.agOther:null,   p:prior?-prior.agOther:null,   pct:cur.rev>0?cur.agOther/cur.rev*100:0,   indent:1,neg:true},
  {l:'Human Resources',    v:-cur.hrdOther,  b:bud?-bud.hrdOther:null,  p:prior?-prior.hrdOther:null,  pct:cur.rev>0?cur.hrdOther/cur.rev*100:0,  indent:1,neg:true},
  {l:'Sales & Marketing',  v:-cur.smOther,   b:bud?-bud.smOther:null,   p:prior?-prior.smOther:null,   pct:cur.rev>0?cur.smOther/cur.rev*100:0,   indent:1,neg:true},
  {l:'Engineering (POMEC)',v:-cur.pomecOther,b:bud?-bud.pomecOther:null,p:prior?-prior.pomecOther:null,pct:cur.rev>0?cur.pomecOther/cur.rev*100:0,indent:1,neg:true},
  {l:'Energy Cost',        v:-cur.energy,    b:bud?-bud.energy:null,    p:prior?-prior.energy:null,    pct:cur.rev>0?cur.energy/cur.rev*100:0,    indent:1,neg:true},
  {l:'TOTAL OVHD OTHER',   v:-cur.ovhdOther, b:bud?-bud.ovhdOther:null, p:prior?-prior.ovhdOther:null, pct:cur.rev>0?cur.ovhdOther/cur.rev*100:0, indent:0,bold:true,sep:true,neg:true},
  // ── GOP ──────────────────────────────────────────────────────
  {l:'GOP',v:cur.gop,    b:(bud&&bud.gop),        p:(prior&&prior.gop),        pct:cur.gopMgn,indent:0,bold:true,sep:true,highlight:true},
  // ── NON-OPERATING ────────────────────────────────────────────
  {l:'— NON-OPERATING —',  v:null,b:null,p:null,pct:null,indent:0,section:true},
  {l:'Incentive Fee',      v:-cur.incentFee, b:bud?-bud.incentFee:null, p:prior?-prior.incentFee:null, pct:cur.rev>0?cur.incentFee/cur.rev*100:0, indent:1,neg:true},
  {l:'Management Fee',     v:-cur.mgmtFee,   b:bud?-bud.mgmtFee:null,   p:prior?-prior.mgmtFee:null,   pct:cur.rev>0?cur.mgmtFee/cur.rev*100:0,   indent:1,neg:true},
  {l:'Reserved for CAPEX', v:-cur.capexRes,  b:bud?-bud.capexRes:null,  p:prior?-prior.capexRes:null,  pct:0,                                     indent:1,neg:true},
  {l:'Land Tax (PBB)',      v:-cur.landTax,   b:bud?-bud.landTax:null,   p:prior?-prior.landTax:null,   pct:cur.rev>0?cur.landTax/cur.rev*100:0,   indent:1,neg:true},
  {l:'Property Insurance', v:-cur.insur,     b:bud?-bud.insur:null,     p:prior?-prior.insur:null,     pct:cur.rev>0?cur.insur/cur.rev*100:0,     indent:1,neg:true},
  {l:'Depreciation',       v:-cur.depr,      b:bud?-bud.depr:null,      p:prior?-prior.depr:null,      pct:cur.rev>0?cur.depr/cur.rev*100:0,      indent:1,neg:true},
  {l:'Amortization',       v:-cur.amor,      b:bud?-bud.amor:null,      p:prior?-prior.amor:null,      pct:cur.rev>0?cur.amor/cur.rev*100:0,      indent:1,neg:true},
  {l:'Interest Inc/Exp',   v:cur.interest,   b:(bud&&bud.interest),   p:(prior&&prior.interest),   pct:cur.rev>0?Math.abs(cur.interest)/cur.rev*100:0,          indent:1},
  {l:'ROI Expenses',       v:-cur.roi,       b:bud?-bud.roi:null,       p:prior?-prior.roi:null,       pct:cur.rev>0?cur.roi/cur.rev*100:0,       indent:1,neg:true},
  {l:'ROI Subsidi',        v:-cur.roiSub,    b:bud?-bud.roiSub:null,    p:prior?-prior.roiSub:null,    pct:0,                                     indent:1,neg:true},
  {l:'Property Mgmt Fee',  v:-cur.propMgmt,  b:bud?-bud.propMgmt:null,  p:prior?-prior.propMgmt:null,  pct:0,                                     indent:1,neg:true},
  {l:'Sinking Fund',       v:-cur.sinkFund,  b:bud?-bud.sinkFund:null,  p:prior?-prior.sinkFund:null,  pct:0,                                     indent:1,neg:true},
  {l:'Owning Co Exp',      v:-cur.ownExp,    b:bud?-bud.ownExp:null,    p:prior?-prior.ownExp:null,    pct:cur.rev>0?cur.ownExp/cur.rev*100:0,    indent:1,neg:true},
  {l:'Forex Gain/Loss',    v:-cur.forex,     b:bud?-bud.forex:null,     p:prior?-prior.forex:null,     pct:0,                                     indent:1,neg:true},
  {l:'Gain/Loss on Assets',v:-cur.gainLoss,  b:bud?-bud.gainLoss:null,  p:prior?-prior.gainLoss:null,  pct:0,                                     indent:1,neg:true},
  {l:'Others Inc/Exp',     v:-cur.otherNonOp,b:bud?-bud.otherNonOp:null,p:prior?-prior.otherNonOp:null,pct:cur.rev>0?cur.otherNonOp/cur.rev*100:0,indent:1,neg:true},
  {l:'TOTAL NON-OPERATING',v:-cur.nonOp,    b:bud?-bud.nonOp:null,     p:prior?-prior.nonOp:null,     pct:cur.rev>0?cur.nonOp/cur.rev*100:0,     indent:0,bold:true,sep:true,neg:true},
  // ── TAXES ────────────────────────────────────────────────────
  {l:'— INCOME TAX —',     v:null,b:null,p:null,pct:null,indent:0,section:true},
  {l:'Income Tax Current', v:-cur.taxCur,    b:bud?-bud.taxCur:null,    p:prior?-prior.taxCur:null,    pct:0,                                     indent:1,neg:true},
  {l:'Income Tax Deferred',v:-cur.taxDef,    b:bud?-bud.taxDef:null,    p:prior?-prior.taxDef:null,    pct:0,                                     indent:1,neg:true},
  // ── NOP ──────────────────────────────────────────────────────
  {l:'OWNER SHARE PROFIT', v:cur.nop,        b:(bud&&bud.nop),        p:(prior&&prior.nop),        pct:cur.nopMgn,indent:0,bold:true,sep:true,highlight:true},
];

  // ── Revenue Mix ───────────────────────────────────────────────────
  const revMix = [
    {l:'Rooms',       v:cur.rooms,    pct:cur.rev>0?cur.rooms/cur.rev*100:0,     color:ac},
    {l:'F&B',         v:cur.fnb,      pct:cur.rev>0?cur.fnb/cur.rev*100:0,       color:sc},
    {l:'Minor Ops',   v:cur.minor,    pct:cur.rev>0?cur.minor/cur.rev*100:0,     color:T.yellow},
    {l:'Other Inc.',  v:cur.otherinc, pct:cur.rev>0?cur.otherinc/cur.rev*100:0,  color:T.purple||'#8B5CF6'},
  ];
  const revMixChart = revMix.map(r=>({name:r.l, value:+r.pct.toFixed(1)}));

  // ── Cost Ratios ────────────────────────────────────────────────────
  const costRatios = [
    {l:'Cost of Sales',       v:cur.rev>0?cur.cos/cur.rev*100:0,       tgt:20,  inv:true,  color:T.red},
    {l:'Dept Payroll',        v:cur.rev>0?cur.deptPay/cur.rev*100:0,   tgt:25,  inv:true,  color:T.yellow},
    {l:'Dept Other Exp',      v:cur.rev>0?cur.deptOther/cur.rev*100:0, tgt:8,   inv:true,  color:T.orange||'#F97316'},
    {l:'Overhead Payroll',    v:cur.rev>0?cur.ovhdPay/cur.rev*100:0,   tgt:10,  inv:true,  color:T.yellow},
    {l:'Overhead Other',      v:cur.rev>0?cur.ovhdOther/cur.rev*100:0, tgt:7,   inv:true,  color:T.orange||'#F97316'},
  ];

  // ── Margin benchmark ──────────────────────────────────────────────
  const margins = {
    actual:  {gop:cur.gopMgn,  nop:cur.nopMgn},
    budget:  bud?{gop:bud.gopMgn,  nop:bud.nopMgn}:null,
    prior:   prior?{gop:prior.gopMgn, nop:prior.nopMgn}:null,
  };

  // ── Profit bridge ─────────────────────────────────────────────────
  const bridge = bud ? [
    {l:'Revenue Variance',     v:cur.rev-bud.rev,            pos:true},
    {l:'CoS Variance',         v:-(cur.cos-bud.cos),         pos:false},
    {l:'Dept Payroll Var.',    v:-(cur.deptPay-bud.deptPay), pos:false},
    {l:'Dept Other Var.',      v:-(cur.deptOther-bud.deptOther), pos:false},
    {l:'Overhead Payroll Var.',v:-(cur.ovhdPay-bud.ovhdPay), pos:false},
    {l:'Overhead Other Var.',  v:-(cur.ovhdOther-bud.ovhdOther), pos:false},
    {l:'GOP Variance (Net)',   v:cur.gop-bud.gop,            pos:true, bold:true},
    {l:'Below-Line Var.',      v:-(cur.deprTotal-bud.deprTotal)-(cur.incentFee-bud.incentFee)-(cur.mgmtFee-bud.mgmtFee), pos:false},
    {l:'NOP Variance (Net)',   v:cur.nop-bud.nop,            pos:true, bold:true},
  ] : null;

  // ── Variance driver insight ───────────────────────────────────────
  const insight = useMemo(()=>{
    if(!bud) return null;
    const revVar    = cur.rev  - bud.rev;
    const gopVar    = cur.gop  - bud.gop;
    const nopVar    = cur.nop  - bud.nop;
    const payVar    = cur.deptPay - bud.deptPay;
    const cosVar    = cur.cos  - bud.cos;
    const ovhVar    = (cur.ovhdPay+cur.ovhdOther) - (bud.ovhdPay+bud.ovhdOther);

    const revPct  = bud.rev>0?(revVar/bud.rev*100):0;
    const gopPct  = bud.gop!==0?(gopVar/Math.abs(bud.gop)*100):0;
    const nopPct  = bud.nop!==0?(nopVar/Math.abs(bud.nop)*100):0;

    const lines = [];

    // Revenue
    if(Math.abs(revPct)>1){
      const main = cur.rooms-bud.rooms < cur.fnb-bud.fnb ? 'room revenue' : 'F&B revenue';
      lines.push(`Revenue ${revVar>=0?'exceeded':'missed'} budget by ${fM(Math.abs(revVar))} (${Math.abs(revPct).toFixed(1)}%), primarily driven by ${revVar>=0?'stronger':'weaker'} ${main}.`);
    } else {
      lines.push(`Revenue is on track vs budget (${revPct>=0?'+':''}${revPct.toFixed(1)}% variance).`);
    }

    // Costs
    if(Math.abs(payVar/Math.max(bud.deptPay,0.001)*100)>3){
      lines.push(`Dept payroll ${payVar>0?'overran':'saved'} budget by ${fM(Math.abs(payVar))} — ${payVar>0?'review staffing vs occupancy':'efficiency gain'}.`);
    }
    if(Math.abs(cosVar/Math.max(bud.cos,0.001)*100)>3){
      lines.push(`Cost of sales ${cosVar>0?'above':'below'} budget by ${fM(Math.abs(cosVar))}.`);
    }
    if(Math.abs(ovhVar/Math.max(bud.ovhdPay+bud.ovhdOther,0.001)*100)>3){
      lines.push(`Overhead ${ovhVar>0?'exceeded':'came under'} budget by ${fM(Math.abs(ovhVar))}.`);
    }

    // GOP impact
    lines.push(`Net impact on GOP: ${gopVar>=0?'+':''}${fM(gopVar)} (${gopPct>=0?'+':''}${gopPct.toFixed(1)}% vs budget). NOP: ${nopVar>=0?'+':''}${fM(nopVar)} (${nopPct>=0?'+':''}${nopPct.toFixed(1)}%).`);

    if(cur.nop<0 && bud.nop>0) lines.push(`⚠ Budget targeted positive NOP. Actual result is a loss — below-the-line charges amplified the revenue shortfall.`);

    return lines;
  },[cur,bud]);

  const periodLabel = (periodOptions.find(o=>o.v===period)||{}).l || period;

  // ── Inline helpers ────────────────────────────────────────────────
  const COLORS = [ac, sc, T.yellow, T.purple||'#8B5CF6'];


  if(!cur) return (<div style={{padding:40,textAlign:'center',color:T.muted,fontFamily:"'IBM Plex Mono'",fontSize:12}}>No data for selected period</div>);
  return (
    <div style={{padding:24}}>
      {/* ── Header ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:tx,fontFamily:'IBM Plex Mono,monospace'}}>
            PROFIT &amp; LOSS STATEMENT
          </div>
          <div style={{fontSize:11,color:mu,marginTop:2}}>
            {isAnnual?`Annual ${yr}`:`${periodLabel} · Rp Milyar`}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer',outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018','2017','2016','2015','2014','2013'].map(y=>
              <option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnnual&&(
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:c,border:`1px solid ${brd}`,color:tx,padding:'6px 10px',borderRadius:6,fontSize:12,cursor:'pointer',outline:'none'}}>
              {periodOptions.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
        </div>
      </div>

      {/* ── KPI summary strip ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:18}}>
        {[
          {l:'Total Revenue', v:fC(cur.rev),   color:ac,   sub: showBud?`Bud: ${fC(bud.rev)}`:''},
          {l:'GOP',           v:fC(cur.gop),   color:cur.gop>=0?T.green:T.red, sub:`${cur.gopMgn.toFixed(1)}% margin`},
          {l:'GOP Margin',    v:`${cur.gopMgn.toFixed(1)}%`, color:cur.gopMgn>=30?T.green:cur.gopMgn>=20?T.yellow:T.red, sub:showBud?`Bud: ${(bud&&bud.gopMgn!=null?bud.gopMgn:0).toFixed(1)}%`:'Benchmark: 30%'},
          {l:'Owner Share Profit', v:fC(cur.nop), color:cur.nop>=0?T.green:T.red, sub:`${cur.nopMgn.toFixed(1)}% margin`},
          {l:'NOP Margin',    v:`${cur.nopMgn.toFixed(1)}%`, color:cur.nopMgn>=5?T.green:cur.nopMgn>=0?T.yellow:T.red, sub:showBud?`Bud: ${(bud&&bud.nopMgn!=null?bud.nopMgn:0).toFixed(1)}%`:'Benchmark: 5%'},
          {l:'Payroll Ratio', v:`${cur.payRat.toFixed(1)}%`, color:cur.payRat<35?T.green:cur.payRat<40?T.yellow:T.red, sub:'Target: <35%'},
        ].map(({l,v,color,sub})=>(
          <div key={l} style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'12px 14px'}}>
            <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:1}}>{l}</div>
            <div style={{fontSize:17,fontWeight:700,color,marginTop:3,fontFamily:'IBM Plex Mono,monospace'}}>{v}</div>
            {sub&&<div style={{fontSize:10,color:mu,marginTop:2}}>{sub}</div>}
          </div>
        ))}
      </div>

      {/* ── Main content: P&L table + Revenue Mix ── */}
      <div style={{display:'grid',gridTemplateColumns:'3fr 1fr',gap:14,marginBottom:18}} className="r-grid-2">

        {/* P&L Table */}
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{background:T.bg,borderBottom:`2px solid ${brd}`}}>
                  <th style={{padding:'10px 16px',textAlign:'left',color:mu,fontWeight:600,fontSize:9,textTransform:'uppercase',letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>{t('pl_line_item')}</th>
                  <th style={{padding:'10px 12px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,textTransform:'uppercase',letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>ACTUAL</th>
                  <th style={{padding:'10px 10px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,textTransform:'uppercase',letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>%REV</th>
                  {showBud&&<th style={{padding:'10px 12px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>BUDGET</th>}
                  {showBud&&<th style={{padding:'10px 10px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>VAR</th>}
                  {showPrior&&<th style={{padding:'10px 12px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>{parseInt(yr)-1}</th>}
                  {showPrior&&<th style={{padding:'10px 10px',textAlign:'right',color:mu,fontWeight:600,fontSize:9,letterSpacing:1,fontFamily:'IBM Plex Mono,monospace'}}>YoY%</th>}
                </tr>
              </thead>
              <tbody>
                {rows.map((row,i)=>{
                  // Section header rows
                  if(row.section) return (
                    <tr key={i}>
                      <td colSpan={showBud&&showPrior?7:showBud||showPrior?5:3}
                        style={{padding:'10px 16px 3px',color:T.muted,fontSize:9,
                        fontFamily:"'IBM Plex Mono'",letterSpacing:2,textTransform:'uppercase',
                        borderBottom:`1px solid ${brd}`,background:T.bg}}>
                        {row.l}
                      </td>
                    </tr>
                  );
                  const varBud   = showBud&&row.b!=null?row.v-row.b:null;
                  const varPrior = showPrior&&row.p!=null&&row.p!==0?(row.v-row.p)/Math.abs(row.p)*100:null;
                  const budOk    = varBud!=null?(row.neg?varBud<=0:varBud>=0):null;
                  return (
                    <tr key={i} style={{
                      borderBottom:`1px solid ${row.sep?brd:'transparent'}`,
                      background: row.highlight?(row.v>=0?`${T.green}08`:`${T.red}06`):'transparent',
                    }}>
                      <td style={{padding:`${row.sep?'9px':'5px'} 16px`,paddingLeft:row.indent?32:16,
                        color:row.bold?tx:sb,fontWeight:row.bold?700:400,
                        fontFamily:row.bold?'IBM Plex Mono,monospace':'inherit',fontSize:row.bold?12:11}}>
                        {row.l}
                      </td>
                      <td style={{padding:`${row.sep?'9px':'5px'} 12px`,textAlign:'right',
                        color:row.bold?(row.v>=0?T.green:T.red):tx,fontWeight:row.bold?700:400,
                        fontFamily:'IBM Plex Mono,monospace',fontSize:row.bold?12:11}}>
                        {fC(row.v)}
                      </td>
                      <td style={{padding:'5px 10px',textAlign:'right',color:mu,fontSize:10,fontFamily:'IBM Plex Mono,monospace'}}>
                        {row.pct!=null?`${Math.abs(row.pct).toFixed(1)}%`:''}
                      </td>
                      {showBud&&<td style={{padding:'5px 12px',textAlign:'right',color:sb,fontFamily:'IBM Plex Mono,monospace',fontSize:11}}>
                        {row.b!=null?fC(row.b):'-'}
                      </td>}
                      {showBud&&<td style={{padding:'5px 10px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:11,
                        color:varBud!=null?(budOk?T.green:T.red):mu,fontWeight:row.bold?700:400}}>
                        {varBud!=null?fC(varBud):'-'}
                      </td>}
                      {showPrior&&<td style={{padding:'5px 12px',textAlign:'right',color:sb,fontFamily:'IBM Plex Mono,monospace',fontSize:11}}>
                        {row.p!=null?fC(row.p):'-'}
                      </td>}
                      {showPrior&&<td style={{padding:'5px 10px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:11,
                        color:varPrior!=null?(varPrior>=0?T.green:T.red):mu}}>
                        {varPrior!=null?`${varPrior>=0?'+':''}${varPrior.toFixed(1)}%`:'-'}
                      </td>}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Revenue Mix panel */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'14px 16px',flex:1}}>
            <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>
              — Revenue Mix
            </div>
            {revMix.map(r=>(
              <div key={r.l} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:10,color:sb}}>{r.l}</span>
                  <div style={{textAlign:'right'}}>
                    <span style={{fontSize:11,fontWeight:700,color:r.color,fontFamily:'IBM Plex Mono,monospace'}}>{r.pct.toFixed(1)}%</span>
                    <div style={{fontSize:9,color:mu}}>{fM(r.v)}</div>
                  </div>
                </div>
                <div style={{height:6,background:brd,borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:`${Math.min(r.pct,100)}%`,height:'100%',background:r.color,borderRadius:3,transition:'width 0.4s ease'}}/>
                </div>
              </div>
            ))}
          </div>

          {/* Margin benchmark */}
          <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'14px 16px'}}>
            <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:10,fontFamily:'IBM Plex Mono,monospace'}}>
              — Margin Benchmark
            </div>
            {[
              {l:'GOP Margin',act:margins.actual.gop, bud:(margins.budget&&margins.budget.gop), pri:(margins.prior&&margins.prior.gop), tgt:30, color:T.green},
              {l:'NOP Margin',act:margins.actual.nop, bud:(margins.budget&&margins.budget.nop), pri:(margins.prior&&margins.prior.nop), tgt:5,  color:T.green},
            ].map(m=>(
              <div key={m.l} style={{marginBottom:12}}>
                <div style={{fontSize:10,color:sb,marginBottom:4}}>{m.l}</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <div style={{background:`${ac}15`,borderRadius:4,padding:'3px 8px',fontSize:9,color:ac,fontFamily:'IBM Plex Mono,monospace',fontWeight:700}}>
                    ACT {m.act.toFixed(1)}%
                  </div>
                  {m.bud!=null&&<div style={{background:`${T.yellow}15`,borderRadius:4,padding:'3px 8px',fontSize:9,color:T.yellow,fontFamily:'IBM Plex Mono,monospace'}}>
                    BUD {m.bud.toFixed(1)}%
                  </div>}
                  {m.pri!=null&&<div style={{background:`${T.muted}20`,borderRadius:4,padding:'3px 8px',fontSize:9,color:mu,fontFamily:'IBM Plex Mono,monospace'}}>
                    PY {m.pri.toFixed(1)}%
                  </div>}
                </div>
                {m.bud!=null&&(
                  <div style={{fontSize:9,marginTop:3,color:m.act>=m.bud?T.green:T.red,fontWeight:600}}>
                    {m.act>=m.bud?'▲':'▼'} {Math.abs(m.act-m.bud).toFixed(1)}pp vs budget
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Cost Ratio Analysis ── */}
      <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'16px 20px',marginBottom:18}}>
        <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:14,fontFamily:'IBM Plex Mono,monospace'}}>
          — Cost Ratio Analysis (% of Revenue)
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12}} className="r-grid-5">
          {costRatios.map(r=>{
            const ok = r.v <= r.tgt;
            return (
              <div key={r.l} style={{background:T.bg,border:`1px solid ${ok?r.color+'30':T.red+'30'}`,borderRadius:8,padding:'10px 12px',borderLeft:`3px solid ${ok?r.color:T.red}`}}>
                <div style={{fontSize:9,color:mu,marginBottom:4,lineHeight:1.3}}>{r.l}</div>
                <div style={{fontSize:16,fontWeight:700,color:ok?r.color:T.red,fontFamily:'IBM Plex Mono,monospace'}}>{r.v.toFixed(1)}%</div>
                <div style={{fontSize:9,color:mu,marginTop:2}}>Target: ≤{r.tgt}%</div>
                <div style={{fontSize:9,color:ok?T.green:T.red,marginTop:1,fontWeight:600}}>{ok?'✓ OK':'⚠ OVER'}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Variance Driver + Profit Bridge ── */}
      {(insight||bridge)&&(
        <div style={{display:'grid',gridTemplateColumns:bridge?'1fr 1fr':'1fr',gap:14,marginBottom:18}} className="r-grid-2">

          {/* Variance Driver Insight */}
          {insight&&(
            <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'16px 20px'}}>
              <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>
                — Variance Driver Insight
              </div>
              {insight.map((line,i)=>{
                const isWarn = line.startsWith('⚠');
                const isGood = line.includes('exceeded') || line.includes('on track') || line.includes('saving') || line.includes('under');
                const col = isWarn?T.red:isGood?T.green:T.accent;
                return (
                  <div key={i} style={{display:'flex',gap:10,marginBottom:10,padding:'8px 12px',
                    background:`${col}08`,borderRadius:6,borderLeft:`3px solid ${col}`}}>
                    <span style={{fontSize:14,lineHeight:1}}>{isWarn?'⚠️':isGood?'✅':'💡'}</span>
                    <span style={{fontSize:11,color:sb,lineHeight:1.6}}>{line.replace('⚠ ','')}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Profit Bridge */}
          {bridge&&(
            <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:'16px 20px'}}>
              <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>
                — Profit Bridge vs Budget
              </div>
              {bridge.map((b,i)=>{
                const ok = b.v>=0;
                const pct = bud&&bud.rev>0?(b.v/bud.rev*100):0;
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    padding:`${b.bold?'8px':'5px'} 10px`,
                    marginBottom:2,borderRadius:5,
                    background:b.bold?`${ok?T.green:T.red}10`:'transparent',
                    borderLeft:b.bold?`3px solid ${ok?T.green:T.red}`:'3px solid transparent'}}>
                    <span style={{fontSize:b.bold?11:10,color:b.bold?tx:sb,fontWeight:b.bold?700:400}}>{b.l}</span>
                    <div style={{textAlign:'right'}}>
                      <span style={{fontSize:b.bold?12:11,color:ok?T.green:T.red,fontFamily:'IBM Plex Mono,monospace',fontWeight:b.bold?700:400}}>
                        {b.v>=0?'+':''}{fM(b.v)}
                      </span>
                      {bud&&<div style={{fontSize:9,color:mu}}>{pct>=0?'+':''}{pct.toFixed(1)}% of Rev</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── Charts ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}} className="r-grid-2">

        {/* Revenue Trend */}
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>— Revenue & Profit Trend</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={revTrend} margin={{top:4,right:8,bottom:4,left:8}}>
              <CartesianGrid strokeDasharray="3 3" stroke={brd}/>
              <XAxis dataKey="name" tick={{fill:mu,fontSize:9}} tickLine={false}/>
              <YAxis tick={{fill:mu,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(1)}M`}/>
              <Tooltip contentStyle={{background:T.bg,border:`1px solid ${brd}`,borderRadius:6}} labelStyle={{color:tx}} formatter={(v,n)=>[`${v.toFixed(3)}M`,n]}/>
              <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10,color:sb}}/>
              <Bar isAnimationActive={false} dataKey="rev" fill={ac}  name="Revenue" radius={[2,2,0,0]}/>
              <Bar isAnimationActive={false} dataKey="gop" fill={sc}  name="GOP"     radius={[2,2,0,0]}/>
              <Bar isAnimationActive={false} dataKey="nop" fill={T.purple||'#8B5CF6'} name="NOP" radius={[2,2,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Margin Trend with budget reference */}
        <div style={{background:c,border:`1px solid ${brd}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:9,color:mu,textTransform:'uppercase',letterSpacing:2,marginBottom:12,fontFamily:'IBM Plex Mono,monospace'}}>— Margin Trend {yr==='2026'?'(YTD)':yr}</div>
          {!isAnnual&&marginTrend.length>0?(
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={marginTrend} margin={{top:4,right:8,bottom:4,left:8}}>
                <CartesianGrid strokeDasharray="3 3" stroke={brd}/>
                <XAxis dataKey="name" tick={{fill:mu,fontSize:9}} tickLine={false}/>
                <YAxis tick={{fill:mu,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v}%`}/>
                <Tooltip contentStyle={{background:T.bg,border:`1px solid ${brd}`,borderRadius:6}} formatter={(v,n)=>[`${v}%`,n]}/>
                <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10,color:sb}}/>
                <Line isAnimationActive={false} type="monotone" dataKey="gopMgn"    stroke={T.green}  name="GOP%" strokeWidth={2} dot={{r:4}}/>
                <Line isAnimationActive={false} type="monotone" dataKey="nopMgn"    stroke={T.purple||'#8B5CF6'} name="NOP%" strokeWidth={2} dot={{r:4}}/>
                {marginTrend.some(d=>d.budGopMgn!=null)&&(
                  <Line isAnimationActive={false} type="monotone" dataKey="budGopMgn" stroke={T.yellow} name="Bud GOP%" strokeWidth={1.5} strokeDasharray="5 3" dot={false}/>
                )}
                {marginTrend.some(d=>d.budNopMgn!=null)&&(
                  <Line isAnimationActive={false} type="monotone" dataKey="budNopMgn" stroke={T.yellow} name="Bud NOP%" strokeWidth={1} strokeDasharray="3 3" dot={false}/>
                )}
                <ReferenceLine y={30} stroke={T.green} strokeDasharray="4 2" label={{value:'30%',fill:T.muted,fontSize:8,position:'right'}}/>
                <ReferenceLine y={0}  stroke={T.red}   strokeDasharray="3 3"/>
              </LineChart>
            </ResponsiveContainer>
          ):(
            <div style={{height:200,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{display:'flex',gap:6,alignItems:'flex-end'}}>
                {[...Array(8)].map((_,i)=>{
                  const y=parseInt(yr)-7+i; if(y<2013||y>2025) return null;
                  const d=annPnl(y);
                  return <div key={y} style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
                    <div style={{fontSize:8,color:d.gopMgn>=30?T.green:d.gopMgn>=20?T.yellow:T.red,fontWeight:700,marginBottom:2}}>{d.gopMgn.toFixed(0)}%</div>
                    <div style={{width:22,background:brd,borderRadius:3,height:60,position:'relative',overflow:'hidden'}}>
                      <div style={{position:'absolute',bottom:0,width:'100%',background:d.gopMgn>=30?T.green:d.gopMgn>=20?T.yellow:T.red,height:`${Math.max(0,Math.min(100,d.gopMgn/50*100))}%`}}/>
                    </div>
                    <div style={{fontSize:8,color:mu,marginTop:2}}>{y}</div>
                  </div>;
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function BSPage({ tbVersion=0 }) {
  const [yr, setYr]         = useState('2026');
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [period, setPeriod] = useState('m2');

  // ── Period options ───────────────────────────────────────────────
  const periodOpts = useMemo(() => {
    if (yr === '2026') return [
      {v:'m1', l:'Jan 2026'},
      {v:'m2', l:'Feb 2026 (Latest)'},
    ];
    if (MON_YEARS.includes(yr)) return [
      {v:'full', l:`Dec ${yr} (Year-End)`},
      {v:'q1',   l:`Q1 ${yr} (Mar)`},
      {v:'q2',   l:`Q2 ${yr} (Jun)`},
      {v:'q3',   l:`Q3 ${yr} (Sep)`},
      {v:'q4',   l:`Q4 ${yr} (Dec)`},
      ...Array.from({length:12},(_,i)=>({v:`m${i+1}`,l:`${ML[i]} ${yr}`})),
    ];
    return [{v:'full', l:`Dec ${yr}`}];
  }, [yr]);

  const handleYrChange = (v) => {
    setYr(v);
    setPeriod(v === '2026' ? 'm2' : 'full');
  };

  // ── Snapshot keys ─────────────────────────────────────────────────
  const snapK = useMemo(() => snapKey(yr, period),     [yr, period]);
  const prevK = useMemo(() => prevSnapKey(yr, period), [yr, period]);

  const bs  = useMemo(() => bsCalc(BS_SNAPSHOTS[snapK] || BS_SNAPSHOTS['feb26']), [snapK]);
  const prv = useMemo(() => bsCalc(BS_SNAPSHOTS[prevK] || BS_SNAPSHOTS['dec25']), [prevK]);

  // ── Revenue for efficiency metrics (read-only via getCur) ─────────
  const rev = useMemo(() => getCur(yr, period), [yr, period]);

  // ── Balance validation ────────────────────────────────────────────
  const balanceDiff  = Math.abs(bs.tA - (bs.tL + bs.tEq));
  const isBalanced   = balanceDiff < 0.005;
  const balanceErrMsg = isBalanced ? null :
    `Assets ${fM(bs.tA)} ≠ L+E ${fM(bs.tL + bs.tEq)} · Diff: ${fM(balanceDiff)}`;

  // ── Working Capital analysis ──────────────────────────────────────
  const wc     = bs.tCA  - bs.tCL;
  const wcPrv  = prv.tCA - prv.tCL;
  const wcDiff = wc - wcPrv;

  const wcComponents = [
    {l:'Accounts Receivable', asset:true,  v:bs.ar,        p:prv.ar,        color:T.accent},
    {l:'Inventories',         asset:true,  v:bs.inv,       p:prv.inv,       color:T.secondary},
    {l:'Prepaid & Others',    asset:true,  v:bs.pre,       p:prv.pre,       color:T.yellow},
    {l:'Accounts Payable',    asset:false, v:bs.ap,        p:prv.ap,        color:T.red},
    {l:'Accrued Expenses',    asset:false, v:bs.acc,       p:prv.acc,       color:T.orange||'#F97316'},
  ];

  // WC insight: find biggest driver
  const wcInsight = useMemo(() => {
    const drivers = wcComponents.map(c => {
      const net = c.asset ? (c.v - c.p) : -(c.v - c.p); // positive = wc improvement
      return {l: c.l, net};
    }).sort((a,b) => Math.abs(b.net) - Math.abs(a.net));
    const top = drivers[0];
    if (!top || Math.abs(top.net) < 0.001) return 'Working capital movement is minimal vs prior period.';
    const dir = top.net >= 0 ? 'improved' : 'declined';
    const side = (wcComponents.find(c=>c.l===top.l)||{}).asset ? 'asset' : 'liability';
    return `Working capital ${dir} by ${fM(Math.abs(wcDiff))} vs prior. Primary driver: ${top.l} ${top.net>=0?'decreased':'increased'} (${side}-side movement).`;
  }, [snapK, prevK]);

  // ── Asset efficiency ──────────────────────────────────────────────
  const assetTurnover = rev.rev > 0 && bs.tA > 0   ? rev.rev / bs.tA   : null;
  const fixedATurnover= rev.rev > 0 && bs.netF > 0  ? rev.rev / bs.netF : null;
  const receivablesDays = rev.rev > 0 ? bs.ar / (rev.rev / (period.startsWith('m')?1:period.startsWith('q')?3:12) / 30) : null;

  // ── Leverage ──────────────────────────────────────────────────────
  const debtRatio     = bs.tA   > 0 ? bs.tL  / bs.tA  : 0;
  const debtToEquity  = bs.tEq  > 0 ? bs.tL  / bs.tEq : 0;
  const equityRatio   = bs.tA   > 0 ? bs.tEq / bs.tA  : 0;
  const leverageLabel = debtRatio < 0.40 ? {l:'Low Leverage',    c:T.green}
                      : debtRatio < 0.65 ? {l:'Moderate Leverage',c:T.yellow}
                      :                    {l:'High Leverage',    c:T.red};

  // Capital structure insight
  const capStructInsight = useMemo(() => {
    const clPct = bs.tL > 0 ? (bs.tCL / bs.tL * 100) : 0;
    const ltPct = 100 - clPct;
    const eqPct = equityRatio * 100;
    if (clPct > 70) return `Capital structure is dominated by short-term liabilities (${clPct.toFixed(0)}% of total liab.), which may increase liquidity pressure.`;
    if (eqPct > 55) return `Strong equity position (${eqPct.toFixed(0)}% of assets) provides a solid financial cushion with low external dependency.`;
    if (debtRatio > 0.6) return `Leverage is elevated — debt represents ${(debtRatio*100).toFixed(0)}% of assets. Monitor debt service capacity closely.`;
    return `Balanced capital structure: equity ${eqPct.toFixed(0)}% of assets, short-term liab. ${clPct.toFixed(0)}% of total liabilities.`;
  }, [snapK]);

  // Liquidity movement insight
  const crNow = bs.tCL > 0 ? bs.tCA / bs.tCL : 0;
  const crPrv = prv.tCL > 0 ? prv.tCA / prv.tCL : 0;
  const qrNow = bs.tCL > 0 ? (bs.cash + bs.ar) / bs.tCL : 0;
  const qrPrv = prv.tCL > 0 ? (prv.cash + prv.ar) / prv.tCL : 0;
  const liqInsight = useMemo(() => {
    const crDir = crNow > crPrv ? 'improved' : crNow < crPrv ? 'declined' : 'unchanged';
    const qrDir = qrNow > qrPrv ? 'improved' : qrNow < qrPrv ? 'declined' : 'unchanged';
    const cashDir = bs.cash > prv.cash ? 'increased' : bs.cash < prv.cash ? 'decreased' : 'unchanged';
    return `Current ratio ${crDir} to ${crNow.toFixed(2)}x (prior: ${crPrv.toFixed(2)}x). Quick ratio ${qrDir} to ${qrNow.toFixed(2)}x. Cash position ${cashDir} by ${fM(Math.abs(bs.cash-prv.cash))}.`;
  }, [snapK, prevK]);

  // ── Asset mix ─────────────────────────────────────────────────────
  const assetMix = [
    {l:'Cash & Equiv',     v:bs.cash, pct:bs.tA>0?bs.cash/bs.tA*100:0,  color:T.accent},
    {l:'Receivables',      v:bs.ar,   pct:bs.tA>0?bs.ar/bs.tA*100:0,    color:T.secondary},
    {l:'Inventories',      v:bs.inv,  pct:bs.tA>0?bs.inv/bs.tA*100:0,   color:T.purple||'#8B5CF6'},
    {l:'Net Fixed Assets', v:bs.netF, pct:bs.tA>0?bs.netF/bs.tA*100:0,  color:T.orange||'#F97316'},
    {l:'Prepaid & Other',  v:bs.pre+bs.otNA, pct:bs.tA>0?(bs.pre+bs.otNA)/bs.tA*100:0, color:T.muted},
  ];

  // ── Capital structure mix ─────────────────────────────────────────
  const capMix = [
    {l:'Current Liab',   v:bs.tCL,  pct:(bs.tL+bs.tEq)>0?bs.tCL/(bs.tL+bs.tEq)*100:0,  color:T.red},
    {l:'Long-term Debt', v:bs.ltD,  pct:(bs.tL+bs.tEq)>0?bs.ltD/(bs.tL+bs.tEq)*100:0,  color:T.yellow},
    {l:'Equity',         v:bs.tEq,  pct:(bs.tL+bs.tEq)>0?bs.tEq/(bs.tL+bs.tEq)*100:0,  color:T.green},
  ];

  // ── CFO Ratios ────────────────────────────────────────────────────
  const ratios = [
    {l:'Current Ratio',    v:crNow.toFixed(2)+'x',           ok:crNow>1.5,            tgt:'>1.5x', prev:crPrv.toFixed(2)+'x'},
    {l:'Quick Ratio',      v:qrNow.toFixed(2)+'x',           ok:qrNow>1.0,            tgt:'>1.0x', prev:qrPrv.toFixed(2)+'x'},
    {l:'Cash Ratio',       v:(bs.cash/Math.max(bs.tCL,0.001)).toFixed(2)+'x', ok:bs.cash/Math.max(bs.tCL,0.001)>0.5, tgt:'>0.5x', prev:null},
    {l:'Debt Ratio',       v:(debtRatio*100).toFixed(1)+'%', ok:debtRatio<0.6,        tgt:'<60%',  prev:null},
    {l:'Debt / Equity',    v:debtToEquity.toFixed(2)+'x',    ok:debtToEquity<1.0,     tgt:'<1.0x', prev:null},
    {l:'Equity Ratio',     v:(equityRatio*100).toFixed(1)+'%',ok:equityRatio>0.4,     tgt:'>40%',  prev:null},
    {l:'Working Capital',  v:fM(wc),                         ok:wc>0,                 tgt:'> 0',   prev:fM(wcPrv)},
    {l:'WC Change vs Prior',v:(wcDiff>=0?'+':'')+fM(wcDiff), ok:wcDiff>=0,            tgt:'Positive',prev:null},
  ];

  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l || period;

  // ── Sub-components ─────────────────────────────────────────────────
  const BSRow = ({l,v,p,bold,indent,isLiab}) => {
    const chg = p!=null && p!==0 ? (v-p)/Math.abs(p)*100 : null;
    return (
      <tr>
        <td style={{padding:'5px 12px',paddingLeft:indent?28:12,color:bold?T.text:T.sub,fontSize:11,fontWeight:bold?600:400}}>{l}</td>
        <td style={{padding:'5px 12px',textAlign:'right',color:bold?(v<0?T.red:T.text):T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'",fontWeight:bold?600:400}}>{fM(v)}</td>
        <td style={{padding:'5px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{p!=null?fM(p):''}</td>
        <td style={{padding:'5px 12px',textAlign:'right',fontSize:10,fontFamily:"'IBM Plex Mono'",
          color:chg!=null?clr(isLiab?-chg:chg):T.muted}}>
          {chg!=null?`${chg>=0?'+':''}${chg.toFixed(1)}%`:'-'}
        </td>
      </tr>
    );
  };
  const BSec = ({t,c}) => <tr><td colSpan={4} style={{padding:'10px 12px 4px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600,textTransform:'uppercase'}}>{t}</td></tr>;
  const BDiv = () => <tr><td colSpan={4}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;
  const TRow = ({l,v,p,color}) => (
    <tr style={{background:`${color}10`}}>
      <td style={{padding:'7px 12px',color,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{l}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(v)}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color:T.muted,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{fM(p)}</td>
      <td style={{padding:'7px 12px',textAlign:'right',color:p&&p!==0?clr(v-p):T.muted,fontSize:10,fontFamily:"'IBM Plex Mono'"}}>{p&&p!==0?`${((v-p)/Math.abs(p)*100).toFixed(1)}%`:''}</td>
    </tr>
  );

  if(!bs) return (<div style={{padding:40,textAlign:'center',color:T.muted,fontFamily:"'IBM Plex Mono'",fontSize:12}}>No balance sheet data available</div>);

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>BALANCE SHEET</div>
          <div style={{color:T.muted,fontSize:11}}>Statement of Financial Position · {periodLabel} · Rp Milyar</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}

function CFPage({ tbVersion=0 }) {
  const [yr,setYr]         = useState('2026');
  const [lang] = React.useContext(LangContext); // i18n re-render trigger
  const [period,setPeriod] = useState('m2');

  const periodOpts = useMemo(() => getPeriodOpts(yr), [yr]);
  const handleYrChange = (v) => { setYr(v); setPeriod('full'); };

  const keys  = useMemo(() => getKeys(yr, period), [yr, period]);
  const isAnn = parseInt(yr) < 2024;

  // ── Current period P&L ─────────────────────────────────────────
  const cur = useMemo(() => {
    if (isAnn) return annPnl(parseInt(yr));
    return keys && keys.length > 0 ? aggKeys(keys) : null;
  }, [yr, keys, isAnn]);

  // ── BS snapshots (current & prior) ────────────────────────────
  const bsNowKey = useMemo(() => snapKey(yr, period),     [yr, period]);
  const bsPrvKey = useMemo(() => prevSnapKey(yr, period), [yr, period]);
  const bsNow = useMemo(() => bsCalc(BS_SNAPSHOTS[bsNowKey] || BS_SNAPSHOTS['dec25']), [bsNowKey]);
  const bsPrv = useMemo(() => bsCalc(BS_SNAPSHOTS[bsPrvKey] || BS_SNAPSHOTS['dec24']), [bsPrvKey]);

  // ── Prior-month comparison (one step back) ────────────────────
  const priorMonthPeriod = useMemo(() => {
    if (period === 'full' || period === 'ytd' || isAnn) return null;
    if (period.startsWith('m')) {
      const mi = parseInt(period.slice(1));
      if (mi <= 1) return null; // no prior month in same year
      return `m${mi - 1}`;
    }
    if (period.startsWith('q')) {
      const qn = parseInt(period.slice(1));
      if (qn <= 1) return null;
      return `q${qn - 1}`;
    }
    return null;
  }, [period, isAnn]);

  const priorMonthKeys = useMemo(() => priorMonthPeriod ? getKeys(yr, priorMonthPeriod) : null, [yr, priorMonthPeriod]);
  const priorMonthCur  = useMemo(() => priorMonthKeys && priorMonthKeys.length ? aggKeys(priorMonthKeys) : null, [priorMonthKeys]);
  const priorMonthBsNowKey = useMemo(() => priorMonthPeriod ? snapKey(yr, priorMonthPeriod) : null, [yr, priorMonthPeriod]);
  const priorMonthBsPrvKey = useMemo(() => priorMonthPeriod ? prevSnapKey(yr, priorMonthPeriod) : null, [yr, priorMonthPeriod]);
  const priorMonthBsNow = useMemo(() => priorMonthBsNowKey ? bsCalc(BS_SNAPSHOTS[priorMonthBsNowKey] || BS_SNAPSHOTS['dec25']) : null, [priorMonthBsNowKey]);
  const priorMonthBsPrv = useMemo(() => priorMonthBsPrvKey ? bsCalc(BS_SNAPSHOTS[priorMonthBsPrvKey] || BS_SNAPSHOTS['dec24']) : null, [priorMonthBsPrvKey]);

  // ── Prior year same period ────────────────────────────────────
  const priorYr = String(parseInt(yr) - 1);
  const priorYrKeys = useMemo(() => {
    if (isAnn) return null;
    if (!MON_YEARS.includes(priorYr)) return null;
    return getKeys(priorYr, period);
  }, [yr, period, isAnn]);
  const priorYrCur = useMemo(() => {
    if (priorYrKeys && priorYrKeys.length) return aggKeys(priorYrKeys);
    if (parseInt(priorYr) >= 2013) return annPnl(parseInt(priorYr));
    return null;
  }, [priorYrKeys, priorYr]);
  const priorYrBsNowKey = useMemo(() => {
    if (!MON_YEARS.includes(priorYr)) return null;
    return snapKey(priorYr, period);
  }, [priorYr, period]);
  const priorYrBsNow = useMemo(() => priorYrBsNowKey ? bsCalc(BS_SNAPSHOTS[priorYrBsNowKey] || BS_SNAPSHOTS['dec24']) : null, [priorYrBsNowKey]);
  const priorYrBsPrv = useMemo(() => {
    if (!priorYrBsNowKey) return null;
    const k = prevSnapKey(priorYr, period);
    return bsCalc(BS_SNAPSHOTS[k] || BS_SNAPSHOTS['dec23'] || BS_SNAPSHOTS['dec24']);
  }, [priorYr, period]);

  // ── CF calculator (pure function, no side effects) ────────────
  const calcCF = (pnlData, bsEnd, bsStart) => {
    if (!pnlData || !bsEnd || !bsStart) return null;
    // Individual WC components matching official CF report structure
    const dARtrade = (bsEnd.arTrade||bsEnd.ar||0) - (bsStart.arTrade||bsStart.ar||0);
    const dAROther = (bsEnd.arOther||0) - (bsStart.arOther||0);
    const dInv     = (bsEnd.inv||0) - (bsStart.inv||0);
    const dPrepaid = (bsEnd.prepaid||bsEnd.pre||0) - (bsStart.prepaid||bsStart.pre||0);
    const dAdvPmt  = (bsEnd.advPmt||0) - (bsStart.advPmt||0);  // Other current assets
    const dAP      = (bsEnd.apTrade||bsEnd.ap||0) - (bsStart.apTrade||bsStart.ap||0);
    const dTax     = (bsEnd.taxPay||0) - (bsStart.taxPay||0);
    const dAccExp  = (bsEnd.accExp||0) - (bsStart.accExp||0);
    const dAdvDep  = (bsEnd.advDep||0) - (bsStart.advDep||0);
    const dProv    = (bsEnd.otherL||0) - (bsStart.otherL||0);  // provision & reserve
    const dAPOther = 0;  // not tracked separately in our BS
    const wcNet = -dARtrade - dAROther - dInv - dPrepaid - dAdvPmt
                 + dAP + dTax + dAccExp + dAdvDep + dProv + dAPOther;
    const depAmort = pnlData.deprTotal || (pnlData.depr||0)+(pnlData.amor||0);
    const ops    = pnlData.nop + depAmort + wcNet;
    const capex  = -((bsEnd.fixG||0) - (bsStart.fixG||0));
    // Due to Management = FINANCING (per official report: "paid to stockholders/management")
    const fin    = (bsEnd.dTMgmt||0) - (bsStart.dTMgmt||0);  // negative = cash paid outank debt
    const net    = ops + capex + fin;
    return {
      nop: pnlData.nop, depAmort,
      dARtrade, dAROther, dInv, dPrepaid, dAdvPmt, dAP, dTax, dAccExp, dAdvDep, wcNet,
      ops, capex, fin, net,
      cashEnd: bsEnd.cash, cashStart: bsStart.cash,
    };
  };

  const cf      = useMemo(() => calcCF(cur,          bsNow, bsPrv),          [cur, bsNow, bsPrv]);
  const cfPrMo  = useMemo(() => calcCF(priorMonthCur,priorMonthBsNow,priorMonthBsPrv), [priorMonthCur,priorMonthBsNow,priorMonthBsPrv]);
  const cfPrYr  = useMemo(() => calcCF(priorYrCur,   priorYrBsNow,  priorYrBsPrv),  [priorYrCur, priorYrBsNow, priorYrBsPrv]);

  // ── YTD CF (2026 only: sum all available months) ──────────────
  const ytdCF = useMemo(() => {
    if (yr !== '2026' || period === 'full' || period === 'ytd') return null;
    const ytdKeys = ['2026-01','2026-02'].filter(k=>TB[k]);
    if (!ytdKeys.length) return null;
    const ytdPnl = aggKeys(ytdKeys);
    const ytdBsNow = bsCalc(BS_SNAPSHOTS['feb26']);
    const ytdBsPrv = bsCalc(BS_SNAPSHOTS['dec25']);
    return calcCF(ytdPnl, ytdBsNow, ytdBsPrv);
  }, [yr, period]);

  // ── Trend chart data ──────────────────────────────────────────
  const trendKeys = yr==='2026'?['2026-01','2026-02']:yr==='2025'?mKeys25:mKeys24;
  const cfTrend = useMemo(() => {
    if (isAnn) return [];
    return trendKeys.filter(k=>TB[k]).map((k,i) => {
      const d   = pnl(TB[k]);
      // Simplified monthly OCF: NOP + D&A (no WC movement available at monthly granularity without consecutive BS)
      const ocf = +(d.nop + d.deprTotal).toFixed(3);
      return {name:ML[i], ocf, nop:+d.nop.toFixed(3), net:ocf};
    });
  }, [yr, isAnn]);

  // ── Liquidity classification ──────────────────────────────────
  const liquidityStatus = useMemo(() => {
    if (!cf) return null;
    const cash = cf.cashEnd;
    const negOpsMonths = cfTrend.filter(d=>d.ocf<0).length;
    if (cash > 1.5 && cf.ops > 0) return {l:'Healthy',    c:T.green,  icon:'✅'};
    if (cash > 0.5 && negOpsMonths < 3) return {l:'Watch',   c:T.yellow, icon:'⚠️'};
    return {l:'Critical', c:T.red,    icon:'🔴'};
  }, [cf, cfTrend]);

  // ── Auto insight ──────────────────────────────────────────────
  const cfInsights = useMemo(() => {
    if (!cf) return [];
    const lines = [];
    // Profit-to-cash conversion
    if (cf.nop < 0 && cf.ops > 0)
      lines.push({icon:'💡', text:`Operating cash flow is positive (${fC(cf.ops)}) despite negative NOP — D&A add-back (${fC(cf.depAmort)}) and working capital inflow are sustaining cash generation.`});
    else if (cf.nop > 0 && cf.ops < 0)
      lines.push({icon:'⚠️', text:`NOP is positive but operating CF is negative — working capital buildup (${fC(cf.wcNet)}) is consuming cash. Monitor AR and inventory levels.`});
    else if (cf.ops > 0)
      lines.push({icon:'✅', text:`Operating cash flow is positive at ${fC(cf.ops)}, aligned with net profit of ${fC(cf.nop)}. D&A adds back ${fC(cf.depAmort)}.`});
    else
      lines.push({icon:'🔴', text:`Operating cash flow is negative at ${fC(cf.ops)}. Net loss of ${fC(cf.nop)} is not fully offset by D&A or working capital movements.`});

    // WC driver
    const wcDrivers = [
      {l:'AR', v:cf.dAR}, {l:'Inventory', v:cf.dInv}, {l:'Prepaid', v:cf.dPre},
      {l:'AP', v:-cf.dAP}, {l:'Accruals', v:-cf.dAcc}
    ].sort((a,b)=>Math.abs(b.v)-Math.abs(a.v));
    const topWC = wcDrivers[0];
    if (topWC && Math.abs(topWC.v) > 0.01) {
      const dir = topWC.v > 0 ? 'increase (cash consumed)' : 'decrease (cash released)';
      lines.push({icon:'📊', text:`Largest WC driver: ${topWC.l} ${dir} of ${fC(Math.abs(topWC.v))}. Net WC impact on cash: ${fC(cf.wcNet)}.`});
    }

    // Investing / Financing
    if (cf.capex < -0.05)
      lines.push({icon:'🏗', text:`Capital expenditure of ${fC(Math.abs(cf.capex))} reflects fixed asset investment. Monitor CAPEX-to-OCF ratio for sustainability.`});
    if (Math.abs(cf.fin) > 0.05)
      lines.push({icon:'🏦', text:`Financing: ${cf.fin<0?'Payments to':'Receipts from'} Owner/Management Co. ${fC(Math.abs(cf.fin))} (Due to Management Co.)`});

    // Period comparison
    if (cfPrMo)
      lines.push({icon:'📈', text:`vs Prior Month: OCF ${cf.ops>=cfPrMo.ops?'improved':'declined'} by ${fC(Math.abs(cf.ops-cfPrMo.ops))} (from ${fC(cfPrMo.ops)} to ${fC(cf.ops)}).`});

    return lines;
  }, [cf, cfPrMo]);

  const periodLabel = (periodOpts.find(o=>o.v===period)||{}).l || period;

  // ── Sub-components ─────────────────────────────────────────────
  const CFR = ({l,v,indent,bold,isOut}) => (
    <tr>
      <td style={{padding:'5px 12px',paddingLeft:indent?32:12,color:bold?T.text:T.sub,fontSize:11,fontWeight:bold?600:400}}>{l}</td>
      <td style={{padding:'5px 12px',textAlign:'right',fontFamily:"'IBM Plex Mono'",fontSize:11,fontWeight:bold?600:400,
        color:bold?(v>=0?T.green:T.red):(isOut?(v>0?T.red:T.green):(v>=0?T.green:T.red))}}>
        {fC(v)}
      </td>
    </tr>
  );
  const CSec = ({t,c}) => <tr><td colSpan={2} style={{padding:'9px 12px 4px',color:c||T.accent,fontSize:9,letterSpacing:3,fontFamily:"'IBM Plex Mono'",fontWeight:600,textTransform:'uppercase'}}>{t}</td></tr>;
  const CDivider = () => <tr><td colSpan={2}><div style={{borderBottom:`1px solid ${T.border}`,margin:'2px 12px'}}/></td></tr>;

  if (!cf) return <div style={{padding:40,color:T.muted,textAlign:'center'}}>No data for selected period.</div>;

  const wc = cf.wcNet;

  if(!cf) return (<div style={{padding:40,textAlign:'center',color:T.muted,fontFamily:"'IBM Plex Mono'",fontSize:12}}>No cash flow data available</div>);

  return (
    <div>
      {/* ── Header ── */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{color:T.text,fontSize:18,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>CASH FLOW STATEMENT</div>
          <div style={{color:T.muted,fontSize:11}}>Indirect Method · {periodLabel} · Rp Milyar</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <select value={yr} onChange={e=>handleYrChange(e.target.value)}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
            {['2026','2025','2024','2023','2022','2021','2020','2019','2018'].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          {!isAnn && (
            <select value={period} onChange={e=>setPeriod(e.target.value)}
              style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',color:T.text,fontSize:11,fontFamily:"'IBM Plex Mono'",outline:'none'}}>
              {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
          )}
          {liquidityStatus && (
            <div style={{padding:'5px 12px',borderRadius:6,background:`${liquidityStatus.c}15`,
              border:`1px solid ${liquidityStatus.c}40`,fontSize:10,color:liquidityStatus.c,
              fontFamily:"'IBM Plex Mono'",fontWeight:700}}>
              {liquidityStatus.icon} {liquidityStatus.l}
            </div>
          )}
        </div>
      </div>

      {/* ── KPI strip with period comparison ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}} className="r-grid-4">
        {[
          {l:'Operating CF',  v:cf.ops,  prMo:(cfPrMo&&cfPrMo.ops),  prYr:(cfPrYr&&cfPrYr.ops)},
          {l:'Investing CF',  v:cf.capex,prMo:(cfPrMo&&cfPrMo.capex),prYr:(cfPrYr&&cfPrYr.capex)},
          {l:'Owner/Mgmt Co.(Fin.)',  v:cf.fin,  prMo:(cfPrMo&&cfPrMo.fin),  prYr:(cfPrYr&&cfPrYr.fin)},
          {l:'Net Cash Flow', v:cf.net,  prMo:(cfPrMo&&cfPrMo.net),  prYr:(cfPrYr&&cfPrYr.net)},
        ].map(k=>{
          const moChg = k.prMo!=null ? k.v - k.prMo : null;
          const yrChg = k.prYr!=null ? k.v - k.prYr : null;
          return (
            <div key={k.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:9,color:T.muted,textTransform:'uppercase',letterSpacing:1}}>{k.l}</div>
              <div style={{fontSize:18,fontWeight:700,color:k.v>=0?T.green:T.red,marginTop:3,fontFamily:"'IBM Plex Mono'"}}>{fC(k.v)}</div>
              {moChg!=null && (
                <div style={{fontSize:9,color:moChg>=0?T.green:T.red,marginTop:2}}>
                  {moChg>=0?'▲':'▼'} {fC(Math.abs(moChg))} vs prev mo
                </div>
              )}
              {yrChg!=null && (
                <div style={{fontSize:9,color:yrChg>=0?T.green:T.red}}>
                  {yrChg>=0?'▲':'▼'} {fC(Math.abs(yrChg))} vs prev yr
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ── Main layout: CF statement + right panels ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:12,marginBottom:14}} className="r-grid-2">

        {/* CF Statement */}
        <Card style={{padding:0}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:T.border}}>
                <th colSpan={2} style={{padding:'8px 12px',textAlign:'left',color:T.accent,fontSize:10,letterSpacing:2,fontFamily:"'IBM Plex Mono'"}}> CASH FLOW — {periodLabel}</th>
              </tr>
            </thead>
            <tbody>
              <CSec t="A. Operating Activities" c={T.accent}/>
              <CFR l="Owner Share Profit (NOP)"     v={cf.nop}         indent/>
              <CFR l="(+) Depreciation"             v={cf.depAmort}    indent/>
              <CSec t="  Working Capital Changes" c={T.muted}/>
              <CFR l="  Δ Accounts Receivable"      v={-cf.dAR}        indent isOut/>
              <CFR l="  Δ Inventories"              v={-cf.dInv}        indent isOut/>
              <CFR l="  Δ Prepaid Expenses"         v={-cf.dPre}       indent isOut/>
              <CFR l="  Δ Accounts Payable"         v={cf.dAP}         indent/>
              <CFR l="  Δ Accrued Expenses"         v={cf.dAcc}        indent/>
              <CFR l="  Δ Advance Deposits"         v={cf.dAdvD|| 0}    indent/>
              <CDivider/>
              <CFR l="NET OPERATING CASH FLOW"     v={cf.ops}      bold/>

              <CSec t="B. Investing Activities" c={T.yellow}/>
              <CFR l="Capital Expenditure (CAPEX)"  v={cf.capex}   indent isOut/>
              <CDivider/>
              <CFR l="NET INVESTING CASH FLOW"      v={cf.capex}   bold/>

              <CSec t="C. Financing Activities" c={T.purple||'#8B5CF6'}/>
              <CFR l="Payments to Owner/Management Co." v={cf.fin}    indent/>
              <CDivider/>
              <CFR l="NET FINANCING CASH FLOW"       v={cf.fin}    bold/>

              <tr style={{background:`${T.accent}10`}}>
                <td style={{padding:'8px 12px',color:T.accent,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>NET CHANGE IN CASH</td>
                <td style={{padding:'8px 12px',textAlign:'right',color:cf.net>=0?T.green:T.red,fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fC(cf.net)}</td>
              </tr>
              <tr>
                <td style={{padding:'5px 12px',color:T.muted,fontSize:10}}>Opening Cash</td>
                <td style={{padding:'5px 12px',textAlign:'right',color:T.sub,fontSize:11,fontFamily:"'IBM Plex Mono'"}}>{fM(cf.cashStart)}</td>
              </tr>
              <tr style={{background:`${T.green}08`}}>
                <td style={{padding:'6px 12px',color:T.green,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>Ending Cash Balance</td>
                <td style={{padding:'6px 12px',textAlign:'right',color:T.green,fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fM(cf.cashEnd)}</td>
              </tr>
            </tbody>
          </table>
        </Card>

        {/* Right column */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>

          {/* Cash Conversion bridge + WC drivers — side by side */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="r-grid-2">

            {/* Cash Conversion Analysis */}
            <Card>
              <SectionTitle>CASH CONVERSION ANALYSIS</SectionTitle>
              {[
                {l:'Net Operating Profit',   v:cf.nop,      c:cf.nop>=0?T.green:T.red},
                {l:'(+) D&A Add-back',       v:cf.depAmort, c:T.accent},
                {l:'(±) WC Movement',        v:(cf.wcNet||0), c:(cf.wcNet||0)>=0?T.green:T.red},
                {l:'= Operating Cash Flow',  v:cf.ops,      c:cf.ops>=0?T.green:T.red, bold:true},
                {l:'(+) Investing CF',       v:cf.capex,    c:cf.capex>=0?T.green:T.red},
                {l:'Owner/Mgmt Co. (Fin.)',v:cf.fin,      c:cf.fin>=0?T.green:T.red},
                {l:'= Net Cash Flow',        v:cf.net,      c:cf.net>=0?T.green:T.red, bold:true},
              ].map((r,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:`${r.bold?'7px':'5px'} 0`,
                  borderBottom:`1px solid ${T.border}`,
                  background:r.bold?`${r.c}08`:'transparent',
                  borderLeft:r.bold?`3px solid ${r.c}`:'3px solid transparent',
                  paddingLeft:r.bold?8:0}}>
                  <span style={{color:r.bold?T.text:T.sub,fontSize:r.bold?11:10,fontWeight:r.bold?700:400}}>{r.l}</span>
                  <span style={{color:r.c,fontSize:r.bold?13:11,fontWeight:r.bold?700:400,fontFamily:"'IBM Plex Mono'"}}>{fC(r.v)}</span>
                </div>
              ))}
              <div style={{marginTop:10,padding:'8px 10px',background:`${T.accent}08`,borderRadius:6,border:`1px solid ${T.border}`}}>
                <div style={{fontSize:9,color:T.muted,marginBottom:2}}>OCF / NOP Conversion</div>
                <div style={{fontSize:14,fontWeight:700,color:T.accent,fontFamily:"'IBM Plex Mono'"}}>
                  {cf.nop!==0?`${(cf.ops/Math.abs(cf.nop)*100).toFixed(0)}%`:'—'}
                </div>
                <div style={{fontSize:9,color:T.muted}}>Cash generated per unit of profit</div>
              </div>
            </Card>

            {/* Working Capital Drivers */}
            <Card>
              <SectionTitle>WORKING CAPITAL DRIVERS</SectionTitle>
              {[
                {l:'Δ A/R',         v:-cf.dAR,   raw:cf.dAR,   asset:true},
  {l:'Δ Advance Dep', v:cf.dAdvD|| 0, raw:cf.dAdvD|| 0},
                {l:'Δ Inventories',         v:-cf.dInv, raw:cf.dInv, asset:true},
                {l:'Δ Prepaid Expenses',    v:-cf.dPre, raw:cf.dPre, asset:true},
                {l:'Δ Accounts Payable',    v:cf.dAP,   raw:cf.dAP,  asset:false},
                {l:'Δ Accrued Expenses',    v:cf.dAcc,  raw:cf.dAcc, asset:false},
              ].map((w,i)=>{
                const barPct = cf.nop!==0 ? Math.min(Math.abs(w.v)/Math.max(Math.abs(cf.ops),0.001)*100,100) : 0;
                return (
                  <div key={i} style={{marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{color:T.sub,fontSize:10}}>{w.l}</span>
                      <span style={{color:w.v>=0?T.green:T.red,fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{fC(w.v)}</span>
                    </div>
                    <div style={{height:5,background:T.border,borderRadius:3,overflow:'hidden'}}>
                      <div style={{width:`${barPct}%`,height:'100%',background:w.v>=0?T.green:T.red,borderRadius:3}}/>
                    </div>
                    <div style={{fontSize:8,color:T.muted,marginTop:1}}>
                      {w.raw>=0?(w.asset?'↑ Asset buildup→cash used':'↑ Liab increase→cash in'):(w.asset?'↓ Asset release→cash in':'↓ Liab reduction→cash used')}
                    </div>
                  </div>
                );
              })}
              <div style={{marginTop:8,padding:'8px 10px',background:`${wc>=0?T.green:T.red}10`,
                borderRadius:6,border:`1px solid ${wc>=0?T.green:T.red}30`}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{color:T.sub,fontSize:10,fontWeight:600}}>Net WC Impact on Cash</span>
                  <span style={{color:wc>=0?T.green:T.red,fontSize:13,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{fC(wc)}</span>
                </div>
              </div>
            </Card>
          </div>

          {/* Trend chart + Cash Balance + YTD */}
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}} className="r-grid-2">

            {/* Trend Chart */}
            <Card>
              <SectionTitle>CASH FLOW vs PROFIT TREND — {yr}</SectionTitle>
              {cfTrend.length > 0 ? (
                <ResponsiveContainer width="100%" height={180}>
                  <ComposedChart data={cfTrend} margin={{top:4,right:8,bottom:4,left:8}}>
                    <CartesianGrid stroke={T.border} strokeDasharray="2 4"/>
                    <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} tickLine={false}/>
                    <YAxis tick={{fill:T.muted,fontSize:9}} tickLine={false} axisLine={false} tickFormatter={v=>`${v.toFixed(2)}M`}/>
                    <Tooltip contentStyle={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6}} formatter={(v,n)=>[`${v.toFixed(3)}M`,n]}/>
                    <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:10}}/>
                    <Bar isAnimationActive={false}  dataKey="ocf" name="Op. CF"    fill={T.accent}              radius={[2,2,0,0]}/>
                    <Line isAnimationActive={false} type="monotone" dataKey="nop"  name="NOP"  stroke={T.green} strokeWidth={2} dot={{r:3}}/>
                    <Line isAnimationActive={false} type="monotone" dataKey="net"  name="Net CF" stroke={T.yellow} strokeWidth={1.5} strokeDasharray="4 2" dot={false}/>
                    <ReferenceLine y={0} stroke={T.red} strokeDasharray="3 3"/>
                  </ComposedChart>
                </ResponsiveContainer>
              ) : (
                <div style={{height:180,display:'flex',alignItems:'center',justifyContent:'center',color:T.muted,fontSize:12}}>
                  No monthly trend for annual view
                </div>
              )}
            </Card>

            {/* Cash Balance Tracking + Period Comparison */}
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {/* Cash Balance */}
              <Card>
                <SectionTitle>CASH BALANCE</SectionTitle>
                {[
                  {l:'Opening Cash',  v:cf.cashStart, c:T.sub},
                  {l:'Net CF Change', v:cf.net,        c:cf.net>=0?T.green:T.red},
                  {l:'Closing Cash',  v:cf.cashEnd,    c:T.accent, bold:true},
                ].map(r=>(
                  <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                    padding:`${r.bold?'8px':'5px'} 0`,borderBottom:`1px solid ${T.border}`,
                    borderLeft:r.bold?`3px solid ${T.accent}`:'3px solid transparent',
                    paddingLeft:r.bold?8:0}}>
                    <span style={{color:r.bold?T.text:T.sub,fontSize:10,fontWeight:r.bold?700:400}}>{r.l}</span>
                    <span style={{color:r.c,fontSize:r.bold?14:11,fontWeight:r.bold?700:400,fontFamily:"'IBM Plex Mono'"}}>{fM(r.v)}</span>
                  </div>
                ))}
                {liquidityStatus && (
                  <div style={{marginTop:8,padding:'6px 10px',background:`${liquidityStatus.c}12`,
                    borderRadius:6,border:`1px solid ${liquidityStatus.c}30`,
                    display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:14}}>{liquidityStatus.icon}</span>
                    <span style={{color:liquidityStatus.c,fontSize:11,fontWeight:700,fontFamily:"'IBM Plex Mono'"}}>{liquidityStatus.l}</span>
                  </div>
                )}
              </Card>

              {/* Period comparison */}
              <Card>
                <SectionTitle>PERIOD COMPARISON — OCF</SectionTitle>
                {[
                  {l:'Current',   v:cf.ops,        show:true},
                  {l:'Prev Month',v:(cfPrMo&&cfPrMo.ops),   show:cfPrMo!=null},
                  {l:'Prev Year', v:(cfPrYr&&cfPrYr.ops),   show:cfPrYr!=null},
                  {l:'YTD 2026',  v:(ytdCF&&ytdCF.ops),    show:ytdCF!=null},
                ].filter(r=>r.show).map(r=>{
                  const chg = r.v!=null&&r.l!=='Current' ? cf.ops - r.v : null;
                  return (
                    <div key={r.l} style={{padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                      <div style={{display:'flex',justifyContent:'space-between'}}>
                        <span style={{color:T.sub,fontSize:10}}>{r.l}</span>
                        <span style={{color:r.v!=null?(r.v>=0?T.green:T.red):T.muted,fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Mono'"}}>{r.v!=null?fC(r.v):'—'}</span>
                      </div>
                      {chg!=null&&<div style={{fontSize:9,color:chg>=0?T.green:T.red,textAlign:'right'}}>
                        Δ {chg>=0?'+':''}{fC(chg)}
                      </div>}
                    </div>
                  );
                })}
              </Card>
            </div>
          </div>
        </div>
      </div>

      {/* ── Insight section ── */}
      {cfInsights.length > 0 && (
        <Card>
          <SectionTitle>CASH FLOW INSIGHTS</SectionTitle>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(250px,1fr))',gap:8}}>
            {cfInsights.map((ins,i)=>(
              <div key={i} style={{display:'flex',gap:10,padding:'10px 14px',
                background:`${T.accent}06`,borderRadius:8,
                borderLeft:`3px solid ${ins.icon==='✅'?T.green:ins.icon==='⚠️'?T.yellow:ins.icon==='🔴'?T.red:T.accent}`}}>
                <span style={{fontSize:16,lineHeight:1.5}}>{ins.icon}</span>
                <span style={{color:T.sub,fontSize:11,lineHeight:1.6}}>{ins.text}</span>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}
